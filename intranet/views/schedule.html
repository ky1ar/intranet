<div x-data="schedule_data">
	<div id="schedule">
		<header>

			<div class="navigation desktop">
				<div class="button white hover-opacity" @click="prevMonth()">
					<img alt="prev" src="/static/images/arrow.svg" width="16" height="16">
				</div>
				<div class="button white middle hover-opacity" @click="goToCurrentMonth()" x-text="formatMonthLabel(currentYear, currentMonth)"></div>
				<div class="button white hover-opacity" @click="nextMonth()">
					<img alt="next" src="/static/images/arrow.svg" width="16" height="16">
				</div>
			</div>
			
		</header>

		<div class="main">
			<div class="left">
				<div class="card glass mini-calendar">
					<div class="mini-nav">
						<div class="button white hover-opacity" @click="prevMonth()">
							<img alt="prev" src="/static/images/arrowleft.svg" width="16" height="16">
						</div>
						<span class="label" x-text="formatMonthLabel(currentYear, currentMonth)"></span>
						<div class="button white hover-opacity" @click="nextMonth()">
							<img alt="next" src="/static/images/arrowright.svg" width="16" height="16">
						</div>
					</div>

					<div class="mini-weekdays">
						<span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span>
					</div>

					<div class="grid">
						<template x-for="day in calendarDays" :key="'mini-'+day.date">
							<div class="cell" :class="{ outside: !day.isCurrentMonth, today: day.isToday }" x-text="day.dayNumber"></div>
						</template>
					</div>
				</div>
			</div>

			<div class="middle">
				<div class="card glass">

					<div class="center">
						<span>
							Lunes
						</span>
						<span>
							Martes
						</span>
						<span>
							Miércoles
						</span>
						<span>
							Jueves
						</span>
						<span>
							Viernes
						</span>
						<span>
							Sábado
						</span>
						<span>
							Domingo
						</span>
					</div>
					
					<div class="bottom">
                        <template x-for="day in calendarDays" :key="day.date">
                            <div class="month" :class="[day.isCurrentMonth ? 'white' : 'glass', isPastDate(day.date) ? 'past' : '']"  @click="addEvent(day.date)">
                                <span class="number" :class="{ today: day.isToday }" x-text="String(day.dayNumber).padStart(2, '0')"></span>
                                <div class="body">
									<template x-if="day.events && day.events.length">
                                        <template x-for="(ev, idx) in day.events" :key="idx">
                                            <div class="item" :class="ev.fullColor ? 'full' : 'normal'" @click.stop="openEvent(ev.id)"
                                                :style="ev.hexColor ? (ev.fullColor ? `background-color: ${ev.hexColor};` : ``) : ''">
                                                <div class="row">
                                                    <!-- Circulito de color si NO es fullColor -->
                                                    <template x-if="ev.hexColor">
                                                        <span class="color-dot" :style="!ev.fullColor ? `background-color: ${ev.hexColor};`:`background-color: #fff;`"></span>
                                                    </template>
                                                    <div class="content">
                                                        <span class="label" x-text="ev.label"></span>
                                                        <span class="date" x-show="!ev.allDay && ev.time" x-text="ev.time"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
									</template>
								</div>
							</div>
						</template>
					</div>
				</div>
			</div>
		</div>

        <div
			x-show="$store.cache.isVisibleModal('event')"
			@mousedown.self="$store.cache.hideLastModal()"
			x-transition.duration.300ms
			class="modal-wrap"
			id="modal-event"
			x-cloak>

            <div class="modal head glass2" @click.stop>
                <!--  ACCIONES SUPERIORES: independientes -->
                <template x-if="edit && can_edit">
                    <button class="icon-button modal-delete hover-opacity" @click.prevent.stop="Alpine.store('cache').showModal('confirm-delete')" aria-label="Eliminar">
                        <img alt="eliminar" src="/static/images/icons/delete.svg">
                    </button>
                </template>
                <div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
                    <img alt="close" src="/static/images/x.svg" width="12" height="12">
                </div>
				
                <!--  TÍTULO -->
                <input 
                    class="percent100 title" 
                    type="text" 
                    placeholder="Agregar título" 
                    x-model="event_data.title" 
                    @input="errors.title = ''"
                    :disabled="edit && !editing">
                <small class="error-text" x-show="errors.title" x-text="errors.title"></small>

				<!--  DESCRIPCIÓN -->
				<div class="fields">
					<label class="white flex2-3">
						<img alt="desc" src="/static/images/icons/tag.svg" width="16" height="16">
                        <input placeholder="Descripción" x-model="event_data.description" rows="3" class="percent100" :disabled="edit && !editing"></input>
					</label>

                    <!-- COLOR DEL EVENTO (posicionado junto a Descripción) -->
                    <label class="white compact-color">
                        <img alt="color" src="/static/images/icons/tag.svg" width="16" height="16">

						<div class="color-select" x-data="{ open: false }" @click.outside="open = false">
						<!-- Círculo principal (muestra el color seleccionado) -->
                        <button 
                            class="color-dot"
                            :style="`background-color: ${event_data.color || '#999'}`"
                            :disabled="edit && !editing"
                            @click.prevent="open = (edit && !editing) ? false : !open"
                            aria-label="Seleccionar color">
                        </button>

						<!-- Panel flotante con lista de colores -->
						<div class="color-panel" x-show="open" x-transition>
							<template x-for="(c, index) in colorOptions" :key="c.id || index">
							<button 
                                class="color-option"
                                :title="c.name"
                                :style="`background-color: ${c.hex}`"
                                :class="{ 'selected': event_data.color === c.hex }"
                                @click.prevent="
                                event_data.color = c.hex;
                                open = false;
                                ">
                            </button>
                            </template>
                        </div>
                        </div>
                    </label>
				</div>

                <!--  FECHAS DE INICIO Y FIN -->
                <div class="fields">
                    <label class="white">
                        <img alt="calendar" src="/static/images/icons/schedule.svg" width="16" height="16">
                        <input type="date" x-model="event_data.start_date_only" :min="todayISO" @change="errors.start_date_only = ''" :disabled="edit && !editing">
                        <input type="time" x-model="event_data.start_time" :disabled="edit && !editing">
                        <small class="error-text" x-show="errors.start_date_only" x-text="errors.start_date_only"></small>
                    </label>

                    <label class="white">
                        <img alt="calendar" src="/static/images/icons/schedule.svg" width="16" height="16">
                        <input type="date" x-model="event_data.end_date_only" :disabled="(edit && !editing) || event_data.all_day" :min="todayISO">
                        <input type="time" x-model="event_data.end_time" :disabled="(edit && !editing) || event_data.all_day">
                    </label>
                </div>

				<!--  ENLACE DE GOOGLE MEET + TODO EL DÍA -->
				<div class="fields">
					<label class="white flex2-3">
						<img alt="link" src="/static/images/icons/link.svg" width="16" height="16">
                <input type="url" placeholder="Enlace de Google Meet" x-model="event_data.meet" :disabled="edit && !editing">
					</label>

					<label class="white checkbox">
                        <input type="checkbox" x-model="event_data.all_day" :disabled="edit && !editing">
						<span>Todo el día</span>
					</label>
				</div>

                <!-- VISIBILIDAD + REPETIR -->
                <div class="fields">

                    <!-- VISIBILIDAD -->
                    <label class="white flex2-3">
                        <img alt="eye" src="/static/images/icons/eye.svg" width="16" height="16">
                        <select x-model="event_data.visibility" :disabled="edit && !editing">
                            <option value="" disabled :selected="!event_data.visibility">Visibilidad</option>
                            <template x-for="opt in visibilityOptions" :key="opt.id">
                                <option :value="opt.slug" x-text="opt.name"></option>
                            </template>
                        </select>
                    </label>

                    <!-- REPETIR -->
                    <label class="white">
                        <img alt="repeat" src="/static/images/pending.svg" width="16" height="16">
                        <select x-model="event_data.repeat" :disabled="edit && !editing">
                            <option value="" disabled :selected="!event_data.repeat">Repetir</option>
                            <template x-for="opt in repeatOptions" :key="opt.id">
                                <option :value="opt.slug" x-text="opt.name"></option>
                            </template>
                        </select>
                    </label>

                    <!-- NOTIFICACIÓN -->
                    <label class="white notify-field">
                        <img alt="bell" src="/static/images/notifications.svg" width="16" height="16">
                        <select x-model="event_data.notify" :disabled="edit && !editing">
                            <option value="" disabled :selected="!event_data.notify">Notificación</option>
                            <template x-for="opt in notifyOptions" :key="opt.id">
                                <option :value="opt.slug" x-text="opt.name"></option>
                            </template>
                        </select>
                    </label>
                </div>




                <!--  BOTONES DE ACCIÓN -->
                <div class="fields">
                    <button 
                        x-show="!edit || can_edit"
                        class="button hover-opacity" 
                        @click="handlePrimaryAction()" 
                        :class="!edit ? buttons.save.class : (editing ? buttons.update.class : buttons.update.class)"
                        x-text="!edit ? buttons.save.text : (editing ? 'Actualizar' : 'Editar')">
                    </button>
                    <div class="inline-success" x-show="successMessage" x-text="successMessage"></div>
                </div>

			</div>
		</div>
	</div>
        <!-- Modal de confirmación para eliminar etiqueta -->
    <div
        x-show="$store.cache.isVisibleModal('confirm-delete')"
        @mousedown.self="$store.cache.hideLastModal()"
        x-transition.duration.300ms
        class="modal-wrap"
        id="modal-confirm-delete"
        x-cloak>

        <div class="modal head glass2" @click.stop>
            <div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
                <img alt="close" src="/static/images/x.svg" width="12" height="12">
            </div>

            <h3 class="white" style="margin-bottom: 1rem;">¿Deseas eliminar la etiqueta?</h3>
            <div class="fields" style="justify-content: flex-end; gap: 0.5rem;">
                <button class="button red hover-opacity" @click="deleteEvent()">Sí, eliminar</button>
                <button class="button hover-opacity" @click="$store.cache.hideLastModal()">No</button>
            </div>
        </div>
    </div>



	<script>
		Alpine.data('schedule_data', () => ({
			api: Alpine.store('cache').api,
			user_id: Alpine.store('cache').user.id,
			startHour: 8,
			todayISO: '',
			editing: false,
            errors: {
                title: '',
                start_date_only: ''
            },
            successMessage: '',
            edit: false,
            can_edit: false,

            // Botones del modal
            buttons: {
                save: { text: 'Guardar', class: 'blue' },
                update: { text: 'Actualizar', class: 'blue' },
                delete: { text: 'Eliminar', class: 'red' }
            },

			// Estado del formulario de evento
            event_data: {
                schedule_id: null,
                title: '',
                description: '',
                // campos legacy (no usados): start_date, end_date
                start_date: '',
                end_date: '',
                // nuevos campos para datepicker
                start_date_only: '',
                start_time: '',
                end_date_only: '',
                end_time: '',
                meet: '',
                all_day: false,
                color: '',
                visibility: '',
                repeat: '',
                notify: '',
            },

			// Estado del calendario
			currentYear: 2025,
			currentMonth: 11,
			calendarDays: [],

			// Opciones dinámicas
			visibilityOptions: [],
			repeatOptions: [],
			notifyOptions: [],
			colorOptions: [],

            async init() {
                console.log('Inicializando calendario...');
                this.todayISO = this.formatTodayISO();
                
                this.buildMonthDays(this.currentYear, this.currentMonth);
                
                // Cargar en paralelo
                this.getEvents();
                this.loadOptions();

				const socket = Alpine.store('cache').socket;
				if (socket) {
					socket.removeAllListeners();
					socket.on("attendance_update_dashboard", async () => {
						await Alpine.store('cache').refresh(['attendance_period']);
					});
				}

				Alpine.store('cache').fetchData([
					{ key: 'attendance_period', url: `/attendance/period/summary?user_id=${this.user_id}&period_id=2`, force: true },
				]).then(() => Alpine.store('cache').verify()).catch(() => {});

                this.$watch('event_data.all_day', (val) => {
                    if (val) {
                        this.event_data.end_date_only = '';
                        this.event_data.end_time = '';
                    }
                });
            },

			async loadOptions() {
				try {
					const endpoints = [
						{ key: 'visibility', url: '/schedule/options/visibility' },
						{ key: 'repeat', url: '/schedule/options/repeat' },
						{ key: 'notify', url: '/schedule/options/notify' },
						{ key: 'colors', url: '/schedule/options/colors' },
					];

					const responses = await Promise.all(endpoints.map(e => fetch(this.api + e.url)));
					const results = await Promise.all(responses.map(r => r.json()));

					const [visData, repData, notData, colData] = results.map(r => r.data);

					this.visibilityOptions = visData.visibility || [];
					this.repeatOptions = repData.repeat || [];
					this.notifyOptions = notData.notify || [];
					this.colorOptions = colData.colors || [];

					console.log("Opciones cargadas:", {
						visibility: this.visibilityOptions,
						repeat: this.repeatOptions,
						notify: this.notifyOptions,
						colors: this.colorOptions,
					});

				} catch (error) {
					console.error('Error cargando opciones:', error);
				}
			},

            addEvent(selectedDate) {
                // Evitar abrir modal para fechas pasadas
                try {
                    if (selectedDate) {
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        const d = new Date(`${selectedDate}T00:00:00`);
                        if (d < today) return; // bloquear creación en días pasados
                    }
                } catch {}
                this.edit = false;
                this.editing = true; // creación: editable
                this.resetEventForm();
                this.event_data.creator_id = this.user_id;
                // Autocompletar datepicker: fecha seleccionada y horas por defecto
                if (selectedDate) {
                    const startHourStr = String(this.startHour).padStart(2, '0');
                    const endHourStr = String(this.startHour + 1).padStart(2, '0');
                    this.event_data.start_date_only = selectedDate; // yyyy-mm-dd
                    this.event_data.start_time = `${startHourStr}:00`;
                    this.event_data.end_date_only = selectedDate; // yyyy-mm-dd
                    this.event_data.end_time = `${endHourStr}:00`;
                }
                Alpine.store('cache').showModal('event');
            },

            isPastDate(dateStr) {
                try {
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const d = new Date(`${dateStr}T00:00:00`);
                    return d < today;
                } catch {
                    return false;
                }
            },

			async openEvent(eventId) {
				try {
					this.edit = true;
					this.editing = false; // valor inicial, se ajusta según permisos
					this.clearErrors();
					this.resetEventForm();

                    const res = await fetch(`${this.api}/schedule/event/${eventId}`, { cache: 'no-cache' });
                    const json = await res.json();
                    const d = json?.data || {};

                    // Mapear datos al formulario
                    this.event_data.schedule_id = d.id || null;
                    this.event_data.title = d.title || '';
                    this.event_data.description = d.description || '';
                    this.event_data.meet = (d.meet || '').replace(/`/g, '').trim();
                    this.event_data.all_day = !!d.all_day;
                    this.event_data.color = d.hex_color || '';
                    this.event_data.visibility = d.visibility || (this.visibilityOptions[0]?.slug || 'all');
                    this.event_data.repeat = d.repeat || '';
                    this.event_data.notify = d.notify || '';
                    this.event_data.creator_id = (d.creator_id ?? d.user_id ?? null);
					this.can_edit = (this.user_id === this.event_data.creator_id);
					// Si tiene permisos, habilitar edición directa y mostrar botón "Actualizar"
					this.editing = !!this.can_edit;

                    // Fechas y horas
                    const toDateOnly = (iso) => (iso && typeof iso === 'string') ? iso.slice(0, 10) : '';
                    const toTime = (iso) => (iso && typeof iso === 'string') ? iso.slice(11, 16) : '';

                    this.event_data.start_date_only = toDateOnly(d.start_datetime);
                    this.event_data.start_time = toTime(d.start_datetime);

                    if (!this.event_data.all_day && d.end_datetime) {
                        this.event_data.end_date_only = toDateOnly(d.end_datetime);
                        this.event_data.end_time = toTime(d.end_datetime);
                    } else {
                        this.event_data.end_date_only = '';
                        this.event_data.end_time = '';
                    }

                    Alpine.store('cache').showModal('event');
                } catch (e) {
                    console.error('No se pudieron cargar los datos del evento', e);
                    alert('No se pudieron cargar los datos del evento');
                }
            },

			async getEvents() {
				try {
					const serverOffset = this.computeServerOffset(this.currentYear, this.currentMonth);
					
					const controller = new AbortController();
					const timeout = setTimeout(() => controller.abort(), 4000); // ⬅ CAMBIAR de 600 a 3000ms
					
					const res = await fetch(`${this.api}/schedule/month?offset=${serverOffset}`, { 
						signal: controller.signal, 
						cache: 'no-cache' 
					});
					clearTimeout(timeout);

					const json = await res.json();

					const daysData = json?.data?.days || [];
					
					this.attachEventsToDays(daysData);
					
				} catch (error) {
					console.error('Error al obtener eventos del mes:', error);
					console.error('Tipo de error:', error.name); // Verá "AbortError" si fue timeout
				}
			},

			buildMonthDays(year, month) {
				const first = new Date(year, month - 1, 1);
				const last = new Date(year, month, 0);
				const total = last.getDate();
				const today = new Date();

				const startIndexMonday = (first.getDay() + 6) % 7;
				const days = [];

				// Días del mes anterior
				if (startIndexMonday > 0) {
					const prevLast = new Date(year, month - 1, 0);
					const prevTotal = prevLast.getDate();
					for (let i = startIndexMonday - 1; i >= 0; i--) {
						const d = prevTotal - i;
						const date = new Date(year, month - 2, d);
						days.push({
							date: date.toISOString().slice(0, 10),
							dayNumber: d,
							isCurrentMonth: false,
							isToday: false,
							events: [],
						});
					}
				}

				// Días del mes actual
				for (let d = 1; d <= total; d++) {
					const date = new Date(year, month - 1, d);
					days.push({
						date: date.toISOString().slice(0, 10),
						dayNumber: d,
						isCurrentMonth: true,
						isToday: today.getFullYear() === year && 
								(today.getMonth() + 1) === month && 
								today.getDate() === d,
						events: [],
					});
				}

				// Días del mes siguiente
				const remainder = days.length % 7;
				if (remainder !== 0) {
					const trailing = 7 - remainder;
					for (let d = 1; d <= trailing; d++) {
						const date = new Date(year, month, d);
						days.push({
							date: date.toISOString().slice(0, 10),
							dayNumber: d,
							isCurrentMonth: false,
							isToday: false,
							events: [],
						});
					}
				}

				this.calendarDays = days;
			},

				attachEventsToDays(daysData) {
					// daysData = [{ date: "2025-11-01", events: [...] }, ...]
					const indexByDate = {};
					this.calendarDays.forEach((day, idx) => { 
						day.events = []; 
						indexByDate[day.date] = idx; 
					});

                daysData.forEach(dayObj => {
                    const dayDate = dayObj.date;
                    const idx = indexByDate[dayDate];
                    if (idx === undefined) return;

                    const apiEvents = dayObj.events || [];
                    const unique = {};
                    apiEvents.forEach(ev => {
                        if (ev && ev.id != null) {
                            if (unique[ev.id]) return; // dedupe por id
                            unique[ev.id] = true;
                        }
                        const label = ev.title || 'Evento';
                        const hexColor = ev.hex_color || null;
                        
                        // Formato de hora
                        let timeStr = '';
                        try {
                            if (ev.start_datetime) {
                                const dt = new Date(ev.start_datetime);
                                const startTime = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                                
                                if (ev.end_datetime) {
                                    const dtEnd = new Date(ev.end_datetime);
                                    const endTime = dtEnd.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                                    timeStr = `${startTime} - ${endTime}`;
                                } else {
                                    timeStr = startTime;
                                }
                            }
                        } catch {}

                        this.calendarDays[idx].events.push({ 
                            id: ev.id,
                            label, 
                            time: timeStr,
                            hexColor: hexColor,
                            // Evento de día completo
                            allDay: !!ev.all_day,
                            // fullColor solo si es Todo el día con color
                            fullColor: !!hexColor && !!ev.all_day
                        });
                    });
                });
            },

				// Calcula estilo dinámico para cada día según cantidad de eventos
				computeDayStyle(day) {
					const count = (day?.events || []).length;
					const baseRem = 7; // altura base
					const perEventRem = 1.25; // incremento por evento
					const minHeight = baseRem + (count > 0 ? count * perEventRem : 0);
					return `min-height: ${minHeight}rem`;
				},

			computeServerOffset(targetYear, targetMonth) {
				const now = new Date();
				const y = now.getFullYear();
				const m = now.getMonth() + 1;
				return (targetYear - y) * 12 + (targetMonth - m);
			},

			nextMonth() {
				if (this.currentMonth === 12) {
					this.currentMonth = 1;
					this.currentYear += 1;
				} else {
					this.currentMonth += 1;
				}
				this.buildMonthDays(this.currentYear, this.currentMonth);
				this.getEvents();
			},

			goToCurrentMonth() {
				const now = new Date();
				this.currentYear = now.getFullYear();
				this.currentMonth = now.getMonth() + 1;
				this.buildMonthDays(this.currentYear, this.currentMonth);
				this.getEvents();
			},

			prevMonth() {
				if (this.currentMonth === 1) {
					this.currentMonth = 12;
					this.currentYear -= 1;
				} else {
					this.currentMonth -= 1;
				}
				this.buildMonthDays(this.currentYear, this.currentMonth);
				this.getEvents();
			},


			resetEventForm() {
				this.event_data = {
					schedule_id: null,
					creator_id: null,
					title: '',
					description: '',
					// legacy
					start_date: '',
					end_date: '',
					// datepicker
					start_date_only: '',
					start_time: '',
					end_date_only: '',
					end_time: '',
					meet: '',
					all_day: false,
					color: '',
					visibility: this.visibilityOptions[0]?.slug || 'all',
					repeat: '',
					notify: '',
				};
				this.can_edit = false;
				this.clearErrors();
			},

            clearErrors() {
                this.errors = { title: '', start_date_only: '' };
            },


			formatMonthLabel(year, month) {
				const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
							'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
				return `${months[month - 1]} ${year}`;
			},

			formatTodayISO() {
				const d = new Date();
				const y = d.getFullYear();
				const m = String(d.getMonth() + 1).padStart(2, '0');
				const day = String(d.getDate()).padStart(2, '0');
				return `${y}-${m}-${day}`;
			},

            async saveEvent() {
                // limpiar errores previos
                this.clearErrors();
                this.successMessage = '';
                // Componer ISO desde datepicker: yyyy-mm-dd + HH:mm
                const composeISO = (dateOnly, time) => {
                    if (!dateOnly) return null;
                    const t = time && time.length ? time : '00:00';
                    return `${dateOnly}T${t}`;
                };

                // Validación: no permitir eventos antes de la fecha actual
                const startOnly = this.event_data.start_date_only;
                const today = this.todayISO || this.formatTodayISO();
                let hasError = false;
                if (!this.event_data.title || !this.event_data.title.trim().length) {
                    this.errors.title = 'Este campo es obligatorio';
                    hasError = true;
                }
                if (!startOnly) {
                    this.errors.start_date_only = 'Selecciona la fecha de inicio';
                    hasError = true;
                } else if (startOnly < today) {
                    this.errors.start_date_only = 'No se permite registrar eventos antes de la fecha actual';
                    hasError = true;
                }
                if (hasError) return;

                const startISO = composeISO(this.event_data.start_date_only, this.event_data.start_time);
                const endISO = this.event_data.all_day ? null : composeISO(this.event_data.end_date_only, this.event_data.end_time);

                const payload = {
                    event_id: this.event_data.schedule_id || null,
                    user_id: this.user_id,
                    title: (this.event_data.title || '').trim(),
                    description: (this.event_data.description || '').trim(),
                    start_datetime: startISO,
                    end_datetime: endISO,
                    meet: (this.event_data.meet || '').trim() || null,
                    hex_color: this.event_data.color || this.colorOptions[0]?.hex || '#999',
                    visibility: this.event_data.visibility || 'all',
                    repeat: this.event_data.repeat || null,
                    notify: this.event_data.notify || null,
                    all_day: !!this.event_data.all_day
                };

				if (!payload.title) return alert('Ingresa un título');
				if (!payload.start_datetime) return alert('Ingresa una fecha de inicio');

                try {
                    console.log('Enviando evento a /schedule/process:', payload);
                    const res = await fetch(this.api + '/schedule/process', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();

					console.log('Respuesta /schedule/process:', { status: res.status, data });

                    if (res.ok) {
                        this.successMessage = 'Evento registrado correctamente ✅';
                        setTimeout(() => { this.successMessage = ''; }, 3500);
                        this.resetEventForm();
                        Alpine.store('cache').hideLastModal();
                        await this.getEvents();
                    } else {
                        alert(typeof data === 'string' ? data : 'No se pudo registrar el evento');
                    }
                } catch (e) {
                    console.error(e);
                    alert('Error al conectar con el servidor');
                }
            },

            async updateEvent() {
                if (!this.can_edit) {
                    alert('No tienes permiso para editar este evento');
                    return;
                }

                this.clearErrors();
                const composeISO = (dateOnly, time) => {
                    if (!dateOnly) return null;
                    const t = time && time.length ? time : '00:00';
                    return `${dateOnly}T${t}`;
                };

                const startOnly = this.event_data.start_date_only;
                let hasError = false;
                if (!this.event_data.title || !this.event_data.title.trim().length) {
                    this.errors.title = 'Este campo es obligatorio';
                    hasError = true;
                }
                if (!startOnly) {
                    this.errors.start_date_only = 'Selecciona la fecha de inicio';
                    hasError = true;
                }
                if (hasError) return;

                const startISO = composeISO(this.event_data.start_date_only, this.event_data.start_time);
                const endISO = this.event_data.all_day ? null : composeISO(this.event_data.end_date_only, this.event_data.end_time);

                const payload = {
                    event_id: this.event_data.schedule_id || null,
                    user_id: this.user_id,
                    title: (this.event_data.title || '').trim(),
                    description: (this.event_data.description || '').trim(),
                    start_datetime: startISO,
                    end_datetime: endISO,
                    meet: (this.event_data.meet || '').trim() || null,
                    hex_color: this.event_data.color || this.colorOptions[0]?.hex || '#999',
                    visibility: this.event_data.visibility || 'all',
                    repeat: this.event_data.repeat || null,
                    notify: this.event_data.notify || null,
                    all_day: !!this.event_data.all_day
                };

                if (!payload.title) return alert('Ingresa un título');
                if (!payload.start_datetime) return alert('Ingresa una fecha de inicio');
                if (!payload.event_id) return alert('Falta el identificador del evento');

                try {
                    console.log('Actualizando evento en /schedule/process:', payload);
                    const res = await fetch(this.api + '/schedule/process', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();

                    console.log('Respuesta actualización /schedule/process:', { status: res.status, data });

                    if (res.ok) {
                        this.successMessage = 'Evento actualizado correctamente';
                        setTimeout(() => { this.successMessage = ''; }, 3500);
                        // Actualización local inmediata para evitar duplicados visuales
                        try {
                            const updatedId = payload.event_id;
                            const updatedDate = this.event_data.start_date_only;
                            const label = payload.title || 'Evento';
                            const hexColor = payload.hex_color || null;
                            const timeStr = (() => {
                                const opts = { hour: '2-digit', minute: '2-digit' };
                                if (payload.start_datetime && payload.end_datetime) {
                                    const s = new Date(payload.start_datetime).toLocaleTimeString([], opts);
                                    const e = new Date(payload.end_datetime).toLocaleTimeString([], opts);
                                    return `${s} - ${e}`;
                                }
                                if (payload.start_datetime) {
                                    return new Date(payload.start_datetime).toLocaleTimeString([], opts);
                                }
                                return '';
                            })();

                            // Reemplazar el evento en el día correspondiente
                            const day = (this.calendarDays || []).find(d => d.date === updatedDate);
                            if (day && Array.isArray(day.events)) {
                                const idx = day.events.findIndex(ev => ev.id === updatedId);
                                const newEv = { id: updatedId, label, time: timeStr, hexColor, fullColor: !!hexColor && !!payload.all_day };
                                if (idx >= 0) {
                                    day.events.splice(idx, 1, newEv);
                                } else {
                                    // Si no se encuentra, lo añadimos (caso borde)
                                    day.events.push(newEv);
                                }
                            }
                        } catch (e2) {
                            console.warn('No se pudo actualizar localmente el calendario', e2);
                        }

                        this.resetEventForm();
                        Alpine.store('cache').hideLastModal();
                        await this.getEvents();
                    } else {
                        alert(typeof data === 'string' ? data : 'No se pudo actualizar el evento');
                    }
                } catch (e) {
                    console.error(e);
                    alert('Error al conectar con el servidor');
                }
            },

			requestEnableEditing() {
				// Eliminado flujo de confirmación: se habilita edición directamente
				this.editing = true;
			},


            handlePrimaryAction() {
                // Si es creación, siempre guardar
                if (!this.edit) {
                    return this.saveEvent();
                }
                // Si está en vista, pedir confirmación para editar
                if (this.edit && !this.editing) {
                    return this.requestEnableEditing();
                }
                // En edición: si existe schedule_id, actualizar el mismo evento
                if (this.event_data.schedule_id) {
                    return this.updateEvent();
                }
                // Fallback: si por alguna razón no hay id, evita duplicados y guarda como nuevo
                return this.saveEvent();
            },

			async deleteEvent() {
				try {
					const eventId = this.event_data?.schedule_id;
					if (!eventId) {
						console.warn('No hay event_id para eliminar');
						return;
					}

					const res = await fetch(this.api + '/schedule/delete', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ event_id: eventId })
					});
					const data = await res.json().catch(() => ({}));

					console.log('Respuesta /schedule/delete:', { status: res.status, data });

					if (res.ok) {
						// Remueve el evento del calendario local inmediatamente
						if (Array.isArray(this.calendarDays)) {
							this.calendarDays.forEach(day => {
								if (Array.isArray(day.events)) {
									day.events = day.events.filter(ev => ev.id !== eventId);
								}
							});
						}

					// Cierra el modal de confirmación y el modal de evento
					Alpine.store('cache').hideLastModal();
					Alpine.store('cache').hideLastModal();
					// Refresca desde el servidor para mantener consistencia
					await this.getEvents();
					} else {
						alert(typeof data === 'string' ? data : 'No se pudo eliminar el evento');
					}
				} catch (e) {
					console.error('Error al eliminar el evento', e);
					alert('Error al conectar con el servidor');
				}
			}
		}));

	</script>
