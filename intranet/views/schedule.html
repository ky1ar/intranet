<div x-data="schedule_data">
	<div id="schedule">
		<header>

			<div class="navigation desktop">
				<div class="button white middle hover-opacity" @click="today()" x-text="formatMonthLabel()"></div>

				<div class="button white hover-opacity" @click="prev()">
					<img alt="prev" src="/static/images/arrow.svg" width="16" height="16">
				</div>
				<div class="button white hover-opacity" @click="next()">
					<img alt="next" src="/static/images/arrow.svg" width="16" height="16">
				</div>
			</div>
			
		</header>

				<div class="main card glass">
					<div class="center">
						<span>
							Lunes
						</span>
						<span>
							Martes
						</span>
						<span>
							Miércoles
						</span>
						<span>
							Jueves
						</span>
						<span>
							Viernes
						</span>
						<span>
							Sábado
						</span>
						<span>
							Domingo
						</span>
					</div>
					
					<div class="bottom">
                        <template x-for="day in $store.cache.getData('calendar_dashboard')" :key="day.date">
                            <div
								class="month"
								:class="[
									day.isCurrentMonth ? 'white' : 'glass',
									isPastDate(day.date) ? 'past' : '',
									day.isHoliday ? 'holiday-day' : '',
									day.hasBirthdays ? 'birthday-day' : ''
								]"
								@click="addEvent(day.date)"
							>
                                <span class="number" :class="{ today: day.isToday }" x-text="String(day.dayNumber).padStart(2, '0')"></span>
                                <div class="body">
									<template x-if="day.events && day.events.length">
                                        <template x-for="(ev, idx) in day.events" :key="idx">
                                            <div
												class="item"
												:class="[
													ev.fullColor ? 'full' : 'normal',
													Number(ev.creatorId) === Number(user_id) ? 'mine' : '',
													ev.type === 'BIRTHDAY' ? 'birthday' : '',
													ev.type === 'HOLIDAY' ? 'holiday' : ''
												]"
												@click.stop="ev.type !== 'BIRTHDAY' && ev.clickable !== false && openEvent(ev.id)"
												:style="ev.hexColor ? (ev.fullColor ? `background-color: ${ev.hexColor}; margin: 0.125rem 0;` : ``) : ''"
											>
                                                <div class="row">
                                                    <template x-if="ev.hexColor">
														<span class="color-dot" :style="!ev.fullColor ? `background-color: ${ev.hexColor};`:`background-color: #fff;`"></span>
                                                        
                                                    </template>
                                                    <div class="content">
                                                        <span class="label" x-text="ev.label"></span>
                                                        <span class="date" x-show="!ev.allDay && ev.time" x-text="ev.time"></span>
														<!-- <img class="thumb" x-show="ev.creatorId == user_id" width="24" height="24" src="/static/images/user.svg"> -->
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
									</template>
								</div>
							</div>
						</template>
					</div>
				</div>

        <div
			x-show="$store.cache.isVisibleModal('event')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-event"
			x-cloak
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
		>

			<div class="modal glass2 small" @click.stop>
				

				<div class="modal-content" x-show="!edit || can_edit">
					<!--  TÍTULO -->
					<div class="fields">
						<label class="white flex2-3">
							<input 
								class="percent100 title" 
								type="text" 
								placeholder="Título" 
								x-model="event_data.title" 
								@input="errors.title = ''">
							<small class="error-text" x-show="errors.title" x-text="errors.title"></small>
						</label>

						<!-- COLOR DEL EVENTO -->
						<label class="white compact-color">
							<img alt="color" src="/static/images/icons/tag.svg" width="16" height="16">

							<div class="color-select" x-data="{ open: false }" @click.outside="open = false">
								<!-- Círculo principal -->
								<button 
									class="color-dot"
									:style="`background-color: ${event_data.color || '#999'}`"
									@click.prevent="open = !open"
									aria-label="Seleccionar color">
								</button>

								<!-- Panel flotante con lista de colores -->
								<div class="color-panel" x-show="open" x-transition>
									<template x-for="(c, index) in $store.cache.getData('color_options')" :key="c.id || index">
										<button 
											class="color-option"
											:title="c.name"
											:style="`background-color: ${c.hex}`"
											:class="{ 'selected': event_data.color === c.hex }"
											@click.prevent="
												event_data.color = c.hex;
												open = false;
											">
										</button>
									</template>
								</div>
							</div>
						</label>
					</div>

					<!--  FECHAS DE INICIO Y FIN -->
					<div class="fields">
						<label class="white">
							<span
								style="cursor: pointer; flex: 1; line-height: 2.5rem;"
								@click="
									if ($refs.start_date_input.showPicker) {
										$refs.start_date_input.showPicker();
									} else {
										$refs.start_date_input.focus();
									}
								"
								x-text="
									event_data.start_date_only
										? (() => {
											const [y, m, d] = event_data.start_date_only.split('-');
											const months = ['ene.', 'feb.', 'mar.', 'abr.', 'may.', 'jun.', 'jul.', 'ago.', 'sep.', 'oct.', 'nov.', 'dic.'];
											return `${parseInt(d)} ${months[parseInt(m) - 1]} ${y}`;
										})()
										: 'Selecciona una fecha'
								"
							></span>

							<input
								x-ref="start_date_input"
								type="date"
								x-model="event_data.start_date_only"
								:min="todayISO"
								@change="errors.start_date_only = ''"
								style="
									position:absolute;
									inset:0;
									opacity:0;
									pointer-events:none;
								"
							>
						</label>

						<label class="white checkbox">
							<input type="checkbox" x-model="event_data.all_day">
							<span>Todo el día</span>
						</label>

						<label class="white" x-show="false">
							<input type="date" x-model="event_data.end_date_only" :min="todayISO">
						</label>

						<label class="white" x-show="!event_data.all_day">
							<input 
								type="time" 
								x-model="event_data.start_time"
								@change="
									if (event_data.end_time && event_data.end_time <= event_data.start_time) {
										event_data.end_time = event_data.start_time;
									}
								"
							>

							<input 
								type="time" 
								x-model="event_data.end_time"
								:min="event_data.start_time || null"
								@change="
									if (event_data.start_time && event_data.end_time && event_data.end_time <= event_data.start_time) {
										event_data.start_time = event_data.end_time;
									}
								"
							>
						</label>
					</div>

					<!-- VISIBILIDAD + REPETIR + NOTIFICACIÓN -->
					<div class="fields">
						<!-- VISIBILIDAD -->
						<label class="white flex2-3">
							<img alt="eye" src="/static/images/icons/eye.svg" width="16" height="16">
							<select x-model="event_data.visibility_id">
								<option value="" disabled>Visibilidad</option>
								<template x-for="opt in ($store.cache.getData('visibility_options') || [])" :key="opt.id">
									<option :value="opt.id" x-text="opt.name"></option>
								</template>
							</select>
						</label>

						<!-- REPETIR -->
						<label class="white">
							<img alt="repeat" src="/static/images/pending.svg" width="16" height="16">
							<select x-model="event_data.repeat_id">
								<option value="" disabled>Repetición</option>
								<template x-for="opt in ($store.cache.getData('repeat_options') || [])" :key="opt.id">
									<option :value="opt.id" x-text="opt.name"></option>
								</template>
							</select>
						</label>

						<label class="white flex2-3">
							<img alt="link" src="/static/images/icons/link.svg" width="16" height="16">
							<input type="url" placeholder="Google Meet" x-model="event_data.meet">
						</label>

						<!-- NOTIFICACIÓN -->
						<!-- <label class="white notify-field">
							<img alt="bell" src="/static/images/notifications.svg" width="16" height="16">
							<select x-model="event_data.notify_id">
								<option value="" disabled>Notificación</option>
								<template x-for="opt in ($store.cache.getData('notify_options') || [])" :key="opt.id">
									<option :value="opt.id" x-text="opt.name"></option>
								</template>
							</select>
						</label> -->
					</div>

					<!--  DESCRIPCIÓN -->
					<textarea placeholder="Descripción (opcional)" x-model="event_data.description" class="text-area" style="
						max-width: 100%;
						border: 2px solid white;
					"></textarea>

					
				</div>
				<!--  BOTONES DE ACCIÓN -->
				<div class="buttons" x-show="!edit || can_edit">
					<button
						x-show="edit && can_edit && canDeleteEvent()"
						class="button black hover-opacity"
						@click.prevent.stop="Alpine.store('cache').showModal('confirm-delete')"
					>
						<span>Eliminar</span>
					</button>
					
					<button 
						x-show="!edit || can_edit"
						class="button icon hover-opacity" 
						@click="handlePrimaryAction()" 
						:class="!edit ? buttons.save.class : buttons.update.class"
					>
						<span x-text="!edit ? buttons.save.text : 'Actualizar'"></span>
					</button>
				</div>
				

				<!-- ============ MODO SOLO LECTURA (no creador) ============ -->
				<div class="readonly-view" x-show="edit && !can_edit">
					<div class="readonly-title">
						
						<span x-text="event_data.title || 'Sin título'" :style="`color: ${event_data.color}`"></span>
					</div>
					
					<div class="readonly-row">
						<span class="readonly-creator" x-text="`Creado por ${event_data.creator_name}`"></span>
					</div>

					<div class="readonly-box white">
						<template x-if="event_data.description">
							<div class="readonly-row">
								<span class="readonly-label">
									<img alt="repeat" src="/static/images/icons/board.svg" width="16" height="16">
									Descripción
								</span>
								<span class="readonly-value" x-html="event_data.description"></span>
							</div>
						</template>

						<div class="readonly-row">
							<span class="readonly-label">
								<img alt="repeat" src="/static/images/icons/calendar.svg" width="16" height="16">
								Fecha y hora
							</span>
							<span class="readonly-value" x-text="formattedEventRange()"></span>
						</div>

						<template x-if="event_data.meet">
							<div class="readonly-row">
								<span class="readonly-label">
									<img alt="repeat" src="/static/images/icons/link.svg" width="16" height="16">
									Google Meet
								</span>
								<a class="readonly-value readonly-link"
								:href="event_data.meet"
								target="_blank"
								rel="noopener"
								x-text="event_data.meet"></a>
							</div>
						</template>
					</div>
				</div>
			</div>
		</div>

		<div
			x-show="$store.cache.isVisibleModal('confirm-delete')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-confirm-delete"
			x-cloak
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			>

			<div class="modal head glass2" @click.stop>
				<span class="title">¿Realmente deseas eliminar el evento?</span>
				<div class="buttons">
					<button class="button black hover-opacity" @click="deleteEvent()">Sí, eliminar</button>
					<button class="button hover-opacity" @click="$store.cache.hideLastModal()">No</button>
				</div>
			</div>
		</div>
		
	</div>

	







	<script>
	Alpine.data('schedule_data', () => ({
		api: Alpine.store('cache').api,
		user_id: Alpine.store('cache').user.id,
		offset: 0,
		todayISO: '',
		processing: false,
		errors: {
			title: '',
			start_date_only: ''
		},
		edit: false,
		can_edit: false,

		buttons: {
			save:   { text: 'Crear evento', class: '' },
			update: { text: 'Actualizar',   class: '' },
		},

		event_data: {
			schedule_id: null,
			title: '',
			description: '',
			start_date_only: '',
			start_time: '',
			end_date_only: '',
			end_time: '',
			meet: '',
			all_day: true,
			color: '',
			visibility_id: null,
			repeat_id: null,
			notify_id: null,
			start_iso: null,
    		end_iso: null,
		},

		currentYear: 2025,
		currentMonth: 11,

		async init() {
			console.log('Inicializando Calendario...');
			this.todayISO = this.formatTodayISO();
			
			const socket = Alpine.store('cache').socket;
			if (socket) {
				socket.removeAllListeners();
				socket.on("calendar_update_dashboard", async () => {
					await Alpine.store('cache').refresh(['calendar_dashboard']);
				});
			}

			Alpine.store('cache').fetchData([
				{ key: 'calendar_dashboard', url: `/schedule/month?offset=${this.offset}`, force: true },
				{ key: 'visibility_options', url: '/schedule/options/visibility' },
				{ key: 'repeat_options',     url: '/schedule/options/repeat' },
				//{ key: 'notify_options',     url: '/schedule/options/notify' },
				{ key: 'color_options',      url: '/schedule/options/colors' },
			]).then(() => Alpine.store('cache').verify()).catch(() => {});
		},

		composeISO(dateOnly, time) {
			if (!dateOnly) return null;
			const t = time && time.length ? time : '00:00';
			return `${dateOnly}T${t}`;
		},

		addEvent(selectedDate) {
			if (selectedDate) {
				const today = new Date();
				today.setHours(0, 0, 0, 0);
				const d = new Date(`${selectedDate}T00:00:00`);
				if (d < today) return;
			}
			
			this.edit = false;
			this.event_data.creator_id = this.user_id;

			if (selectedDate) {
				this.resetEventForm();
				const now = new Date();
				let startHour = now.getHours() + 1;
				let endHour   = startHour + 1;

				if (startHour >= 23) {
					startHour = 23;
					endHour = 23;
				}

				const startHourStr = String(startHour).padStart(2, '0');
				const endHourStr   = String(endHour).padStart(2, '0');

				this.event_data.start_date_only = selectedDate;
				this.event_data.start_time = `${startHourStr}:00`;

				this.event_data.end_date_only = selectedDate;
				this.event_data.end_time = `${endHourStr}:00`;
			} 
			Alpine.store('cache').showModal('event');
		},

		isPastDate(dateStr) {
			try {
				const today = new Date();
				today.setHours(0, 0, 0, 0);
				const d = new Date(`${dateStr}T00:00:00`);
				return d < today;
			} catch {
				return false;
			}
		},

		formattedEventRange() {
			const dStart = this.event_data.start_date_only;
			const dEnd   = this.event_data.end_date_only;
			const tStart = this.event_data.start_time;
			const tEnd   = this.event_data.end_time;

			if (!dStart && !dEnd) return '';

			const months = ['ene.','feb.','mar.','abr.','may.','jun.',
							'jul.','ago.','sep.','oct.','nov.','dic.'];

			const fmtDate = (iso) => {
				if (!iso) return '';
				const [y, m, d] = iso.split('-');
				return `${parseInt(d, 10)} ${months[parseInt(m, 10) - 1]} ${y}`;
			};

			const startLabel = fmtDate(dStart);
			const endLabel   = dEnd && dEnd !== dStart ? fmtDate(dEnd) : '';

			let timeLabel = '';
			if (this.event_data.all_day) {
				timeLabel = 'Todo el día';
			} else if (tStart || tEnd) {
				if (tStart && tEnd) timeLabel = `${tStart} - ${tEnd}`;
				else timeLabel = tStart || tEnd || '';
			}

			let result = startLabel;
			if (endLabel) result += ` - ${endLabel}`;
			if (timeLabel) result += ` · ${timeLabel}`;
			return result;
		},

		normalizeSlug(value) {
			if (value === null || value === undefined) return '';
			return String(value).trim();
		},

		canDeleteEvent() {
			const now = new Date();
			console.log(now)
			// 1) Si tenemos end_iso, lo usamos directamente (caso más preciso)
			if (this.event_data.end_iso) {
				const end = new Date(this.event_data.end_iso);
				console.log("this.event_data.end_iso")
				console.log(end)

				console.log(now < end)
				return now < end;   // solo mientras no haya terminado
			}

			// 2) Si hay end_date_only (y opcional end_time), calculamos fin
			if (this.event_data.end_date_only) {
				console.log("this.event_data.end_date_only")
				const dateStr = this.event_data.end_date_only;
				const timeStr = this.event_data.end_time
					|| this.event_data.start_time
					|| '00:00';

				const [ey, em, ed] = dateStr.split('-').map(Number);
				const [hh, mm] = timeStr.split(':').map(Number);
				const end = new Date(ey, em - 1, ed, hh || 0, mm || 0, 0, 0);
				console.log(now < end)
				return now < end;
			}

			// 3) Evento TODO EL DÍA: mientras no haya pasado el día
			if (this.event_data.all_day && this.event_data.start_date_only) {
				console.log("this.event_data.all_day")

				const [y, m, d] = this.event_data.start_date_only.split('-').map(Number);
				const endOfDay = new Date(y, m - 1, d, 23, 59, 59, 999);
				console.log(now < endOfDay)
				return now < endOfDay;
			}

			// 4) Sin fin explícito: usamos la hora de inicio como límite (antes de que empiece)
			if (this.event_data.start_iso) {
				console.log("this.event_data.start_iso")
				const start = new Date(this.event_data.start_iso);
				console.log(now < start)

				return now < start;
			}

			if (this.event_data.start_date_only) {
				console.log("this.event_data.start_date_only")
				const [y, m, d] = this.event_data.start_date_only.split('-').map(Number);
				const [hh, mm] = (this.event_data.start_time || '00:00').split(':').map(Number);
				const start = new Date(y, m - 1, d, hh || 0, mm || 0, 0, 0);
				console.log(now < start)
				return now < start;
			}

			// Si algo está raro, mejor no mostrar el botón
			return false;
		},

		async openEvent(eventId) {
			NProgress.start();
			try {
				//this.clearErrors();
				const res = await fetch(`${this.api}/schedule/event/${eventId}`);
				const json = await res.json();
				const d = json?.data || {};

				this.event_data.schedule_id  = d.id || null;
				this.event_data.title        = d.title || '';
				this.event_data.description  = d.description || '';
				this.event_data.meet         = (d.meet || '').replace(/`/g, '').trim();
				this.event_data.all_day      = !!d.all_day;
				this.event_data.color        = d.hex_color || '';
				this.event_data.visibility_id = d.visibility_id;
				this.event_data.repeat_id     = d.repeat_id;
				this.event_data.notify_id     = d.notify_id;
				this.event_data.creator_id   = d.creator_id;
				this.event_data.creator_name = d.creator_name || 'Fabrix';
				this.event_data.start_iso = d.start_datetime || null;
				this.event_data.end_iso   = d.end_datetime || null;

				this.edit = true;
				this.can_edit = (this.user_id == this.event_data.creator_id);

				const toDateOnly = (iso) => (iso && typeof iso === 'string') ? iso.slice(0, 10) : '';
				const toTime     = (iso) => (iso && typeof iso === 'string') ? iso.slice(11, 16) : '';

				this.event_data.start_date_only = toDateOnly(d.start_datetime);
				this.event_data.start_time      = toTime(d.start_datetime);

				this.event_data.end_date_only   = toDateOnly(d.end_datetime);
				this.event_data.end_time        = toTime(d.end_datetime);

				Alpine.store('cache').showModal('event');
			} catch (e) {
				console.error('No se pudieron cargar los datos del evento', e);
			} finally {
				NProgress.done();
			}
		},

		async next() {
			this.offset++;
			await Alpine.store('cache').refresh([
				{ key: 'calendar_dashboard', url: `/schedule/month?offset=${this.offset}` }
			]);
		},

		async prev() {
			this.offset--;
			await Alpine.store('cache').refresh([
				{ key: 'calendar_dashboard', url: `/schedule/month?offset=${this.offset}` }
			]);
		},

		async today() {
			this.offset = 0;
			await Alpine.store('cache').refresh([
				{ key: 'calendar_dashboard', url: `/schedule/month` }
			]);
		},

		resetEventForm() {
			this.event_data = {
				schedule_id: null,
				creator_id: null,
				title: '',
				description: '',
				start_date_only: '',
				start_time: '',
				end_date_only: '',
				end_time: '',
				meet: '',
				all_day: true,
				color: '',
				visibility_id: null,
				repeat_id: null,
				notify_id: null,
				start_iso: null,
        		end_iso: null,
			};
			this.can_edit = false;
			//this.clearErrors();
		},

		clearErrors() {
			this.errors = { title: '', start_date_only: '' };
		},

		formatMonthLabel() {
			const months = [
				'Enero','Febrero','Marzo','Abril','Mayo','Junio',
				'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'
			];

			const d = new Date();
			d.setMonth(d.getMonth() + this.offset);

			const year  = d.getFullYear();
			const monthIndex = d.getMonth();

			return `${months[monthIndex]} ${year}`;
		},

		formatTodayISO() {
			const d = new Date();
			const y = d.getFullYear();
			const m = String(d.getMonth() + 1).padStart(2, '0');
			const day = String(d.getDate()).padStart(2, '0');
			return `${y}-${m}-${day}`;
		},

		async saveEvent() {
			if (this.processing) return;
			this.processing = true;

			const startISO = this.composeISO(this.event_data.start_date_only, this.event_data.start_time);
			const endISO   = this.composeISO(this.event_data.end_date_only,   this.event_data.end_time);

			NProgress.start();

			const payload = {
				event_id:       this.event_data.schedule_id || null,
				user_id:        this.user_id,
				title:          (this.event_data.title || '').trim(),
				description:    (this.event_data.description || '').trim(),
				start_datetime: startISO,
				end_datetime:   endISO,
				meet:           (this.event_data.meet || '').trim() || null,
				hex_color:      this.event_data.color || '#999',
				visibility_id:  this.event_data.visibility_id || 3,
				repeat_id:      this.event_data.repeat_id || 1,
				notify_id:      this.event_data.notify_id || 1,
				all_day:        !!this.event_data.all_day
			};

			try {
				const response = await fetch(`${this.api}/schedule/process`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(payload)
				});
				const jsonData = await response.json();
				if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');

				Alpine.store('cache').hideLastModal();
			} catch (error) {
				if (this.edit) {
					this.showError('update', error.message);
				} else {
					this.showError('save', error.message);
				}
			} finally {
				NProgress.done();
				this.processing = false; // 🔹 libera el lock
			}
		},

		async updateEvent() {
			if (this.processing) return;
			this.processing = true;

			const startISO = this.composeISO(this.event_data.start_date_only, this.event_data.start_time);
			const endISO   = this.composeISO(this.event_data.end_date_only,   this.event_data.end_time);

			NProgress.start();

			const payload = {
				event_id:       this.event_data.schedule_id || null,
				user_id:        this.user_id,
				title:          (this.event_data.title || '').trim(),
				description:    (this.event_data.description || '').trim(),
				start_datetime: startISO,
				end_datetime:   endISO,
				meet:           (this.event_data.meet || '').trim() || null,
				hex_color:      this.event_data.color || '#999',
				visibility_id:  this.event_data.visibility_id || 3,
				repeat_id:      this.event_data.repeat_id || 1,
				notify_id:      this.event_data.notify_id || 1,
				all_day:        !!this.event_data.all_day
			};

			try {
				const response = await fetch(`${this.api}/schedule/process`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(payload)
				});
				const jsonData = await response.json();
				if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');

				Alpine.store('cache').hideLastModal();
			} catch (error) {
				if (this.edit) {
					this.showError('update', error.message);
				} else {
					this.showError('save', error.message);
				}
			} finally {
				NProgress.done();
				this.processing = false;
			}
		},

		showError(btnKey, errorMsg) {
			const originalText  = this.buttons[btnKey].text;
			const originalClass = this.buttons[btnKey].class;

			if (originalClass == 'error') {
				return;
			}
			this.buttons[btnKey].text  = errorMsg;
			this.buttons[btnKey].class = 'error';

			setTimeout(() => {
				this.buttons[btnKey].text  = originalText;
				this.buttons[btnKey].class = originalClass;
			}, 1000);
		},

		handlePrimaryAction() {
			if (this.processing) return;
			if (this.edit && this.event_data.schedule_id) {
				return this.updateEvent();
			}
			return this.saveEvent();
		},

		async deleteEvent() {
			if (this.processing) return;
			this.processing = true;

			NProgress.start();

			try {
				const eventId = this.event_data?.schedule_id;

				const response = await fetch(`${this.api}/schedule/delete`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ event_id: eventId })
				});
				const jsonData = await response.json();
				if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');

				Alpine.store('cache').hideAllModals();
			} catch (e) {
				console.error('Error al eliminar el evento', e);
			} finally {
				NProgress.done();
				this.processing = false;
			}
		}
	}));
