<div x-data="warehouse_data">
	<div id="warehouse">
		<div class="controls">
			<div class="right frost-dark" style="margin-left: auto;">
				<div class="item hover-opacity press" @click="$refs.excelInput.click()" :class="{ 'loading': excel_loading }">
					<img class="invert" alt="" width="20" height="20" src="/static/images/icons/add.svg">
					<span x-text="excel_loading ? 'Cargando...' : 'Cargar'"></span>
				</div>
				<input
					type="file"
					accept=".xlsx"
					x-ref="excelInput"
					style="display: none;"
					@change="loadExcelFile($event)"
				>
			</div>
		</div>
		
		<div class="main">
			<div class="main-title" x-text="`Hola, ${$store.cache.user.name.trim().split(/\s+/)[0] || ''}. ¿Que deseas ubicar?`"></div>

			<div class="searchbar glass2">
				<img alt="" class="ico" width="20" height="20" src="/static/images/icons/find.svg">
				<input
					type="text"
					x-model="product_input"
					:placeholder="animated_placeholder"
					@input="findProducts()"
				>

				<div
					class="hover-opacity press clear"
					x-show="product_input"
					title="Limpiar búsqueda"
					@click="product_input = ''; finded_products = []; finded_locations = [];"
					style="display: none;"
				>
					<img alt="" width="12" height="12" src="/static/images/icons/filled/x.svg">
				</div>

				<div class="hover-opacity press" title="Lector QR" @click="readQR()">
					<img alt="" width="20" height="20" src="/static/images/icons/qr.svg">
				</div>
			</div>

			<div
				x-transition.duration.300ms
				x-cloak
				class="finded-products glass2"
				x-show="finded_locations.length > 0 || finded_products.length > 0"
			>
					<div class="section-locations" x-show="finded_locations.length > 0">
						<template x-for="loc in finded_locations" :key="`${loc.id}`">
							<div class="item hover-opacity" @click="openLocationModal(loc.label)">
								<div class="location ware">
									<span class="block">
										<span class="label">Bloque</span>
										<span class="number" x-text="loc.block || '-'"></span>
									</span>

									<span class="block black">
										<span class="label">Rack</span>
										<span class="number" x-text="loc.level || '-'"></span>
									</span>

									<span class="block black">
										<span class="label">Nivel</span>
										<span class="number fix" x-text="loc.position || '-'"></span>
									</span>

									<span class="stock" x-text="`${loc.products_count} items`"></span>
								</div>
							</div>
						</template>
					</div>

				<template x-for="row in finded_products.location .block" :key="row.warehouse_stock_id || `${row.product_id}-${row.location?.label}`">
					<div class="item">
						<div class="product" @click="openRemoveStockModal(row)">
							<img class="image" alt="" width="48" height="48" :src="`/static/images/uploads/machines/${row.image}`">

							<div class="text">
								<div class="title">
									<span class="brand" x-text="`${row.brand} ${row.model}`"></span>
									<span class="category" x-text="row.category"></span>
								</div>
								<span class="stock" x-text="`${row.stock ?? 0} uds.`"></span>
							</div>
						</div>
						
						<div class="location hover-opacity" @click="openLocationModal(row.location?.label)">
							<span class="block">
								<span class="label">Bloque</span>
								<span class="number" x-text="row.location?.block || '-'"></span>
							</span>

							<span class="block black">
								<span class="label">Rack</span>
								<span class="number" x-text="row.location?.level || '-'"></span>
							</span>

							<span class="block black">
								<span class="label">Nivel</span>
								<span class="number fix" x-text="row.location?.position || '-'"></span>
							</span>

							<span class="ubi">
								<span x-text="row.location?.label || '-'"></span>
							</span>
						</div>
					</div>
				</template>
			</div>
		</div>
		

		<!-- Modal lector QR -->
		<div
			x-show="$store.cache.isVisibleModal('read')"
			@mousedown.self="$store.cache.hideModal('read'); stopScan();"
			class="modal-wrap"
			id="modal-read"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2" @click.stop>
				<div id="scannerBox">
					<video id="cameraFrame"></video>
					<div class="scannerDots"></div>
				</div>
			</div>
		</div>

		<!-- Modal detalle ubicación -->
		<div
			x-show="$store.cache.isVisibleModal('warehouse-location')"
			@mousedown.self="$store.cache.hideModal('warehouse-location')"
			class="modal-wrap"
			id="modal-warehouse-location"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<template x-if="!location_modal_loading && selected_location">
					<div class="modal-head">
						<div class="location full">
							<span class="block">
								<span class="label">Bloque</span>
								<span class="number" x-text="selected_location?.block || '-'"></span>
							</span>
							<span class="block black">
								<span class="label">Rack</span>
								<span class="number" x-text="selected_location?.level || '-'"></span>
							</span>
							<span class="block black">
								<span class="label">Nivel</span>
								<span class="number fix" x-text="selected_location?.position || '-'"></span>
							</span>
						</div>

						<!-- <span class="stock" x-text="`${selected_location.products_count || 0} items`"></span> -->

						<div class="buttons">
							<button class="button button-add hover-opacity" @click="openAddStockModal()">
								<img alt="" width="16" height="16" src="/static/images/icons/add.svg">
								Añadir
							</button>
						</div>
					</div>
				</template>

				<template x-if="!location_modal_loading && selected_location && selected_location.products?.length > 0">
					<div class="modal-content bottom">
						<div class="table-header">
							<div>Modelo</div>
							<div>Marca</div>
							<div>Tipo</div>
							<div style="text-align: right;">Cantidad</div>
						</div>

						<div class="table-box">
							<template x-for="p in selected_location.products" :key="p.warehouse_stock_id">
								<div class="table-parent">
									<div class="table-row hover-opacity white" @click="openRemoveStockModal(p)">
										<img alt="" width="40" height="40" :src="`/static/images/uploads/machines/${p.image}`">
										<div class="data">
											<span class="model" x-text="`${p.brand} ${p.model}`"></span>
											<span class="category" x-text="p.category"></span>
											<span class="qty" x-text="`${p.stock ?? 0} uds.`"></span>
										</div>
									</div>
									
									<div class="white hover-opacity press move-btn" @click.stop="openMoveModal(p)" title="Mover stock">
										<img alt="" width="24" height="24" src="/static/images/icons/move.svg" class="invert">
										<span>Mover</span>
									</div>
								</div>
							</template>
						</div>
					</div>
				</template>

				<template x-if="!location_modal_loading && selected_location && !selected_location.products?.length">
					<div class="center text" style="padding: 1rem 0; text-align: center;">
						Esta ubicación está vacía.
					</div>
				</template>
			</div>
		</div>


		<!-- Modal añadir stock -->
		<div
			x-show="$store.cache.isVisibleModal('warehouse-add-stock')"
			@mousedown.self="$store.cache.hideModal('warehouse-add-stock')"
			class="modal-wrap"
			id="modal-warehouse-add-stock"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal little glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="title">
					<span>Añadir stock</span>
					<span class="location-badge" x-text="selected_location?.label || ''"></span>
				</div>

				<div class="modal-content change-box">
					<!-- Buscador de modelo -->
						<div class="add-search-bar white">
							<img alt="" width="16" height="16" src="/static/images/icons/find.svg" style="opacity:.5;">
							<input
								type="text"
								placeholder="Buscar modelo..."
								x-model="add_stock_query"
								@input="searchMachinesForAdd()"
								autocomplete="off"
							>
							<div
								x-show="add_stock_query && !add_stock_selected"
								class="hover-opacity press"
								style="display:none; width:1.5rem; height:1.5rem; align-items:center; justify-content:center;"
								@click="add_stock_query = ''; add_stock_results = [];"
							>
								<img alt="" width="10" height="10" src="/static/images/icons/filled/x.svg">
							</div>
						</div>

						<!-- Resultados -->
						<div class="add-search-results white" x-show="add_stock_results.length > 0" style="display:none;">
							<template x-for="m in add_stock_results" :key="m.id">
								<div class="add-result-row hover-opacity press" @click="selectMachineForAdd(m)">
									<img alt="" width="32" height="32" :src="`/static/images/uploads/machines/${m.image}`">
									<div class="add-result-text">
										<span class="brand" x-text="m.brand"></span>
										<span class="model" x-text="m.model"></span>
									</div>
								</div>
							</template>
						</div>

					<!-- Producto seleccionado -->
					<div class="selected white" x-show="add_stock_selected" style="display:none;">
						<div class="item">
							<img alt="" width="48" height="48" :src="`/static/images/uploads/machines/${add_stock_selected?.image}`">
							<div class="data">
								<span class="model" x-text="`${add_stock_selected?.brand} ${add_stock_selected?.model}`"></span>
							</div>
							<div class="hover-opacity press" style="margin-left:auto; padding:.25rem;" @click="add_stock_selected = null; add_stock_query = ''; add_stock_results = [];">
								<img alt="" width="12" height="12" src="/static/images/icons/filled/x.svg">
							</div>
						</div>
					</div>

					<!-- Cantidad -->
					<div class="remove-box" x-show="add_stock_selected" style="display:none;">
						<div class="number">
							<div class="action white hover-opacity" @click="if(add_stock_qty > 1) add_stock_qty--">
								<span>-</span>
							</div>
							<input
								class="white"
								type="number"
								min="1"
								x-model="add_stock_qty"
								@input="if(add_stock_qty < 1) add_stock_qty = 1"
							>
							<div class="action white hover-opacity" @click="add_stock_qty++">
								<span>+</span>
							</div>
						</div>
					</div>
				</div>

				<div class="buttons">
					<button class="button black hover-opacity" @click="$store.cache.hideModal('warehouse-add-stock')">
						Cancelar
					</button>
					<button
						class="button hover-opacity"
						@click="!add_stock_loading && confirmAddStock()"
					>
						<span x-text="add_stock_loading ? 'Añadiendo...' : 'Añadir stock'"></span>
					</button>
				</div>
			</div>
		</div>


		<!-- Modal mover stock -->
		<div
			x-show="$store.cache.isVisibleModal('warehouse-move-stock')"
			@mousedown.self="$store.cache.hideModal('warehouse-move-stock')"
			class="modal-wrap"
			id="modal-warehouse-move-stock"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal little glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="title">
					<span>Mover stock</span>
				</div>

				<div class="modal-content change-box">
					<!-- Producto origen -->
					<div class="selected white">
						<div class="item">
							<img alt="" width="48" height="48" :src="`/static/images/uploads/machines/${move_product?.image}`">
							<div class="data">
								<span class="model" x-text="`${move_product?.brand} ${move_product?.model}`"></span>
								<span class="category" x-text="move_product?.category || 'Impresoras 3D'"></span>
								<span class="stock" x-text="`Stock actual: ${move_product?.stock ?? 0} uds.`"></span>
							</div>
						</div>
					</div>

					<!-- Cantidad -->
					<div class="remove-box">
						<div class="number">
							<div class="action white hover-opacity" @click="decreaseMoveQty()">
								<span>-</span>
							</div>
							<input
								class="white"
								type="number"
								min="1"
								:max="move_product?.stock || 1"
								x-model="move_qty"
								@input="sanitizeMoveQty()"
							>
							<div class="action white hover-opacity" @click="increaseMoveQty()">
								<span>+</span>
							</div>
						</div>
					</div>

					<!-- Destino -->
					<div class="move-destination-wrap">
						<span class="move-dest-label">Ubicación destino</span>
						<div class="move-dest-input white">
							<input
								type="text"
								placeholder="Ej: B1-3-A"
								x-model="move_destination"
								@input="move_destination = move_destination.toUpperCase()"
								autocomplete="off"
							>
							<div class="hover-opacity press" title="Escanear QR" @click="readQRForMove()">
								<img alt="" width="20" height="20" src="/static/images/icons/qr.svg">
							</div>
						</div>
					</div>
				</div>

				<div class="buttons">
					<button class="button black hover-opacity" @click="$store.cache.hideModal('warehouse-move-stock')">
						Cancelar
					</button>
					<button
						class="button hover-opacity"
						@click="!move_loading && confirmMoveStock()"
					>
						<span x-text="move_loading ? 'Moviendo...' : 'Mover stock'"></span>
					</button>
				</div>
			</div>
		</div>


		<!-- Modal pequeño retirar stock -->
		<div
			x-show="$store.cache.isVisibleModal('warehouse-remove-stock')"
			@mousedown.self="$store.cache.hideModal('warehouse-remove-stock')"
			class="modal-wrap"
			id="modal-warehouse-remove-stock"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal little glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="title">
					<span>Retirar stock</span>
				</div>

				<div class="modal-content change-box">
					<div class="selected white">
						<div class="item">
							<img alt="" width="48" height="48" :src="`/static/images/uploads/machines/${selected_product.image}`">

							<div class="data">
								<span class="model" x-text="`${selected_product.brand} ${selected_product.model}`"></span>
								<span class="category" x-text="selected_product.category || 'Impresoras 3D'"></span>
								<span class="stock" x-text="`Stock actual: ${selected_product.stock ?? 0} uds.`"></span>
							</div>
						</div>
						<!-- <span class="stock" x-text="`Ubicación: ${selected_product.location?.label || '-'}`"></span> -->
					</div>

					<div class="remove-box">
						<div class="number">
							<div class="action white hover-opacity" @click="decreaseRemoveQty()">
								<span>-</span>
							</div>

							<input
								class="white"
								type="number"
								min="1"
								:max="selected_product.stock || 1"
								x-model="remove_qty"
								@input="sanitizeRemoveQty()"
							>

							<div class="action white hover-opacity" @click="increaseRemoveQty()">
								<span>+</span>
							</div>
						</div>

						<div class="text">
							<span>Stock resultante</span>
							<span
								class="black"
								x-text="`${Math.max((selected_product.stock || 0) - (Number(remove_qty) || 0), 0)} uds.`"
							></span>
						</div>
					</div>
				</div>

				<div class="buttons">
					<button
						class="button black hover-opacity"
						@click="$store.cache.hideModal('warehouse-remove-stock')"
					>
						Cancelar
					</button>

					<button
						class="button hover-opacity"
						@click="!remove_loading && confirmRemoveStock()"
					>
						<span x-text="remove_loading ? 'Retirando...' : 'Retirar stock'"></span>
					</button>
				</div>
			</div>
		</div>
	</div>
	

	<script>
		Alpine.data('warehouse_data', () => ({
			api: Alpine.store('cache').api,
			buttons: {
				process: { class: '', text: 'Añadir' },
			},

			animated_placeholder: '',
			placeholder_texts: [
				'Busca por modelo...',
				'Buscar por marca...',
				'Busca por ubicación...'
			],
			placeholder_index: 0,
			placeholder_char_index: 0,
			placeholder_deleting: false,
			placeholder_timer: null,

			product_input: '',
			finded_products: [],
			finded_locations: [],

			selected_location: null,
			location_modal_loading: false,

			selected_product: null,
			remove_qty: 1,
			remove_loading: false,

			scannerRunning: false,
			scannerBusy: false,
			codeReader: null,

			excel_loading: false,
			excel_result:  null,

			// Add stock
			add_stock_query: '',
			add_stock_results: [],
			add_stock_selected: null,
			add_stock_qty: 1,
			add_stock_loading: false,
			add_stock_search_timer: null,

			// Move stock
			move_product: null,
			move_qty: 1,
			move_destination: '',
			move_loading: false,

			// QR mode
			qr_mode: 'location',  // 'location' | 'move'
			_findAbortController: null,

			async init() {
				console.log('Inicializando Warehouse...');
				this.codeReader = new ZXingBrowser.BrowserQRCodeReader();

				this.startPlaceholderAnimation();

				const socket = Alpine.store('cache').socket;
				if (socket) {
					socket.removeAllListeners();
				}

				await Alpine.store('cache').verify();
			},

			async loadExcelFile(event) {
				const file = event.target.files?.[0];
				if (!file) return;

				// reset para poder seleccionar el mismo archivo otra vez
				event.target.value = '';

				this.excel_loading = true;
				this.excel_result  = null;

				try {
					const formData = new FormData();
					formData.append('file', file);

					const response = await fetch(`${this.api}/warehouse/load`, {
						method: 'POST',
						body: formData,
					});

					const json = await response.json();

					if (!response.ok) {
						throw new Error(json?.message || 'Error al procesar el archivo');
					}

					const d = json.data ?? json;

					const lines = [
						`✅ Procesados: ${d.processed}`,
						d.skipped   ? `⚠️ Omitidos: ${d.skipped}` : null,
						d.created_brands?.length     ? `🆕 Marcas nuevas: ${d.created_brands.join(', ')}` : null,
						d.created_categories?.length ? `🆕 Categorías nuevas: ${d.created_categories.join(', ')}` : null,
						d.created_machines?.length   ? `🆕 Modelos nuevos: ${d.created_machines.join(', ')}` : null,
						d.errors?.length             ? `❌ Errores (${d.errors.length}): ${d.errors.slice(0, 3).join(' | ')}${d.errors.length > 3 ? ' ...' : ''}` : null,
					].filter(Boolean).join('\n');

					// alert(lines);

				} catch (error) {
					console.error('Error cargando Excel:', error);
				} finally {
					this.excel_loading = false;
				}
			},

			_locationLabel(block, level, position) {
				return `B${block}-${level}-${position}`;
			},

			_normalizeLocationQuery(q) {
				return (q || '').trim().toUpperCase().replace(/\s+/g, '');
			},

			normalizeWarehouseLabel(value) {
				const clean = (value || '')
					.toString()
					.trim()
					.toUpperCase()
					.replace(/\s+/g, '');

				const match = clean.match(/^B\d+-\d+-[A-Z0-9]$/);
				return match ? match[0] : null;
			},

			extractWarehouseLabelFromQR(text) {
				const raw = (text || '').toString().trim().toUpperCase();
				if (!raw) return null;

				const compact = raw.replace(/\s+/g, '');

				const candidates = [
					compact,
					compact.slice(1)
				];

				for (const candidate of candidates) {
					const match = candidate.match(/B\d+-\d+-[A-Z0-9]/);
					if (match) {
						return this.normalizeWarehouseLabel(match[0]);
					}
				}

				return null;
			},

			async findProducts() {
				const input = (this.product_input || '').trim();

				if (this._findAbortController) {
					this._findAbortController.abort();
				}

				if (input.length < 2) {
					this.finded_products = [];
					this.finded_locations = [];
					return;
				}

				this._findAbortController = new AbortController();

				try {
					const response = await fetch(`${this.api}/warehouse/find/${encodeURIComponent(input)}`, {
						method: 'GET',
						headers: { 'Content-Type': 'application/json' },
						signal: this._findAbortController.signal,
					});

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || 'Error en la solicitud');
					}

					const data = jsonData.data || {};
					this.finded_locations = data.locations || [];
					this.finded_products = (data.products || []).sort((a, b) => {
						return (Number(a.stock) || 0) - (Number(b.stock) || 0);
					});
				} catch (error) {
					if (error.name === 'AbortError') return;
					console.log('Error al buscar productos:', error);
					this.finded_products = [];
					this.finded_locations = [];
				}
			},

			async openLocationModal(label, options = {}) {
				const fromQr = !!options.fromQr;
				const normalized = this.normalizeWarehouseLabel(label);

				if (!normalized) return false;

				try {
					this.location_modal_loading = true;
					this.selected_location = null;

					const response = await fetch(`${this.api}/warehouse/location/${encodeURIComponent(normalized)}`, {
						method: 'GET',
						headers: { 'Content-Type': 'application/json' },
					});

					const jsonData = await response.json();

					if (!response.ok) {
						throw new Error(jsonData?.data?.message || 'No se pudo obtener la ubicación');
					}

					this.selected_location = jsonData.data.location;
					this.location_modal_loading = false;

					Alpine.store('cache').showModal('warehouse-location');
					return true;
				} catch (error) {
					this.location_modal_loading = false;

					if (!fromQr) {
						console.error('Error al abrir ubicación:', error);
						if (typeof this.showError === 'function') {
							this.showError('warehouse', error.message);
						} else {
							// alert(error.message);
						}
					}

					return false;
				}
			},

			openRemoveStockModal(product) {
				if (!product) return;

				this.selected_product = JSON.parse(JSON.stringify(product));
				this.remove_qty = 1;

				Alpine.store('cache').showModal('warehouse-remove-stock');
			},

			sanitizeRemoveQty() {
				let qty = Number(this.remove_qty) || 1;
				const max = Number(this.selected_product?.stock) || 1;

				if (qty < 1) qty = 1;
				if (qty > max) qty = max;

				this.remove_qty = qty;
			},

			increaseRemoveQty() {
				if (!this.selected_product) return;

				const max = Number(this.selected_product.stock) || 1;
				let qty = Number(this.remove_qty) || 1;

				if (qty < max) qty += 1;
				this.remove_qty = qty;
			},

			decreaseRemoveQty() {
				let qty = Number(this.remove_qty) || 1;
				if (qty > 1) qty -= 1;
				this.remove_qty = qty;
			},

			async confirmRemoveStock() {
				if (!this.selected_product) return;

				const quantity = Number(this.remove_qty) || 0;
				if (quantity < 1) return;

				try {
					this.remove_loading = true;

					const payload = {
						warehouse_stock_id: this.selected_product.warehouse_stock_id,
						quantity,
					};

					const response = await fetch(`${this.api}/warehouse/stock/remove`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify(payload),
					});

					const jsonData = await response.json();

					if (!response.ok) {
						throw new Error(jsonData?.data?.message || 'No se pudo retirar el stock');
					}

					this.selected_location = jsonData.data.location;

					Alpine.store('cache').hideModal('warehouse-remove-stock');

					if ((this.product_input || '').trim().length >= 2) {
						await this.findProducts();
					}
				} catch (error) {
					console.error('Error retirando stock:', error);

					if (typeof this.showError === 'function') {
						this.showError('warehouse-remove', error.message);
					} else {
						// alert(error.message);
					}
				} finally {
					this.remove_loading = false;
				}
			},

			readQR() {
				Alpine.store('cache').showModal('read');
				this.startScan();
			},

			async startScan() {
				try {
					if (!this.codeReader) {
						this.codeReader = new ZXingBrowser.BrowserQRCodeReader();
					}

					this.scannerRunning = true;
					this.scannerBusy = false;

					await this.codeReader.decodeFromVideoDevice(null, 'cameraFrame', async (result, err, controls) => {
						if (!this.scannerRunning || this.scannerBusy) return;
						if (!result) return;

						const label = this.extractWarehouseLabelFromQR(result.text);

						if (!label) return;

						this.scannerBusy = true;

						// Modo mover: poblar input destino y cerrar
						if (this.qr_mode === 'move') {
							this.move_destination = label;
							this.stopScan();
							if (controls?.stop) controls.stop();
							Alpine.store('cache').hideModal('read');
							this.qr_mode = 'location';
							return;
						}

						// Modo normal: abrir modal de ubicación
						const opened = await this.openLocationModal(label, { fromQr: true });

						if (opened) {
							this.stopScan();
							if (controls?.stop) controls.stop();
							Alpine.store('cache').hideModal('read');
							return;
						}

						this.scannerBusy = false;
					});
				} catch (e) {
					console.error('Error accediendo a la cámara:', e);
					this.stopScan();
					Alpine.store('cache').hideModal('read');
				}
			},

			// ── Add Stock ──────────────────────────────────────────────────────────────
			openAddStockModal() {
				this.add_stock_query    = '';
				this.add_stock_results  = [];
				this.add_stock_selected = null;
				this.add_stock_qty      = 1;
				Alpine.store('cache').showModal('warehouse-add-stock');
			},

			searchMachinesForAdd() {
				clearTimeout(this.add_stock_search_timer);
				const q = (this.add_stock_query || '').trim();
				if (this.add_stock_selected) return;
				if (q.length < 2) { this.add_stock_results = []; return; }
				this.add_stock_search_timer = setTimeout(async () => {
					try {
						const res  = await fetch(`${this.api}/warehouse/machines/search?q=${encodeURIComponent(q)}`);
						const json = await res.json();
						this.add_stock_results = json.data || json || [];
					} catch (e) {
						this.add_stock_results = [];
					}
				}, 300);
			},

			selectMachineForAdd(machine) {
				this.add_stock_selected = machine;
				this.add_stock_query    = `${machine.brand} ${machine.model}`;
				this.add_stock_results  = [];
			},

			async confirmAddStock() {
				if (!this.add_stock_selected || !this.selected_location) return;
				const qty = parseInt(this.add_stock_qty);
				if (qty < 1) return;

				this.add_stock_loading = true;
				try {
					const res = await fetch(`${this.api}/warehouse/stock/add`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({
							product_id:     this.add_stock_selected.id,
							location_label: this.selected_location.label,
							quantity:       qty,
						}),
					});
					const json = await res.json();
					if (!res.ok) throw new Error(json?.data?.message || json?.message || 'Error');

					this.selected_location = json.data?.location || json.location;
					Alpine.store('cache').hideModal('warehouse-add-stock');

					if ((this.product_input || '').trim().length >= 2) {
						await this.findProducts();
					}
				} catch (e) {
					// alert('Error: ' + e.message);
				} finally {
					this.add_stock_loading = false;
				}
			},

			// ── Move Stock ─────────────────────────────────────────────────────────────
			openMoveModal(product) {
				if (!product) return;
				this.move_product     = JSON.parse(JSON.stringify(product));
				this.move_qty         = 1;
				this.move_destination = '';
				Alpine.store('cache').showModal('warehouse-move-stock');
			},

			sanitizeMoveQty() {
				let qty = Number(this.move_qty) || 1;
				const max = Number(this.move_product?.stock) || 1;
				if (qty < 1) qty = 1;
				if (qty > max) qty = max;
				this.move_qty = qty;
			},

			increaseMoveQty() {
				const max = Number(this.move_product?.stock) || 1;
				let qty = Number(this.move_qty) || 1;
				if (qty < max) qty++;
				this.move_qty = qty;
			},

			decreaseMoveQty() {
				let qty = Number(this.move_qty) || 1;
				if (qty > 1) qty--;
				this.move_qty = qty;
			},

			readQRForMove() {
				this.qr_mode = 'move';
				Alpine.store('cache').showModal('read');
				this.startScan();
			},

			async confirmMoveStock() {
				if (!this.move_product || !this.move_destination) return;
				const qty = parseInt(this.move_qty);
				if (qty < 1) return;

				this.move_loading = true;
				try {
					const res = await fetch(`${this.api}/warehouse/stock/move`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({
							warehouse_stock_id: this.move_product.warehouse_stock_id,
							quantity:           qty,
							destination_label:  this.move_destination,
						}),
					});
					const json = await res.json();
					if (!res.ok) throw new Error(json?.data?.message || json?.message || 'Error');

					this.selected_location = json.data?.location || json.location;
					Alpine.store('cache').hideModal('warehouse-move-stock');

					if ((this.product_input || '').trim().length >= 2) {
						await this.findProducts();
					}
				} catch (e) {
					// alert('Error: ' + e.message);
				} finally {
					this.move_loading = false;
				}
			},


			stopScan() {
				this.scannerRunning = false;
				this.scannerBusy = false;

				if (this.codeReader?.reset) {
					this.codeReader.reset();
				}

				const video = document.getElementById('cameraFrame');
				if (video?.srcObject) {
					video.srcObject.getTracks().forEach(track => track.stop());
					video.srcObject = null;
				}
			},

			startPlaceholderAnimation() {
				const tick = () => {
					const currentText = this.placeholder_texts[this.placeholder_index];

					if (!this.placeholder_deleting) {
						this.placeholder_char_index++;
						this.animated_placeholder = currentText.slice(0, this.placeholder_char_index);

						if (this.placeholder_char_index >= currentText.length) {
							this.placeholder_deleting = true;
							this.placeholder_timer = setTimeout(tick, 1200);
							return;
						}

						this.placeholder_timer = setTimeout(tick, 90);
					} else {
						this.placeholder_char_index--;
						this.animated_placeholder = currentText.slice(0, this.placeholder_char_index);

						if (this.placeholder_char_index <= 0) {
							this.placeholder_deleting = false;
							this.placeholder_index = (this.placeholder_index + 1) % this.placeholder_texts.length;
							this.placeholder_timer = setTimeout(tick, 250);
							return;
						}

						this.placeholder_timer = setTimeout(tick, 45);
					}
				};

				tick();
			},
		}));
	</script>
