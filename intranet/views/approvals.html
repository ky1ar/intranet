<div x-data="approvals_data">
	<div id="approvals">

		<div class="controls">
			<div class="left frost">
				<div class="item" :class="activeTab === 'servicios' && 'active'" @click="setTab('servicios')">
					<span>Servicios</span>
				</div>
				<div class="item" :class="activeTab === 'guias' && 'active'" @click="setTab('guias')">
					<span>Guías</span>
				</div>
			</div>
			<div class="right frost">
				<div class="item" @click="load()">
					<img alt="" width="18" height="18" src="/static/icons/line/refresh.svg">
				</div>
			</div>
	
			<div class="left frost">
				<div class="item" :class="filter === 'pending'  && 'active'" @click="setFilter('pending')">
					<span>Pendientes</span>
				</div>
				<div class="item" :class="filter === 'approved' && 'active'" @click="setFilter('approved')">
					<span>Aprobados</span>
				</div>
				<div class="item" :class="filter === 'rejected' && 'active'" @click="setFilter('rejected')">
					<span>Rechazados</span>
				</div>
				<div class="item" :class="filter === ''          && 'active'" @click="setFilter('')">
					<span>Todos</span>
				</div>
			</div>
		</div>

		<div class="main glass">

			<template x-if="loading">
				<div class="empty-state">
					<span>Cargando...</span>
				</div>
			</template>

			<template x-if="!loading && requests.length === 0">
				<div class="empty-state">
					<span>No hay solicitudes</span>
				</div>
			</template>

			<template x-if="!loading && requests.length > 0">
				<div class="approval-list">
					<template x-for="req in requests" :key="req.id">
						<div class="req-card white hover-opacity" @click="openDetail(req)">
							<div class="req-top">
								<span class="req-id" x-text="`#${req.id}`"></span>
								<span class="req-badge" :class="statusClass(req.status)" x-text="statusLabel(req.status)"></span>
							</div>
							<!-- Guía: muestra imagen + nombre de máquina -->
							<template x-if="activeTab === 'guias'">
								<div class="req-machine">
									<img :src="'/static/images/uploads/machines/' + req.machine_image" width="36" height="36" style="object-fit:contain;border-radius:6px;">
									<span x-text="req.machine_name"></span>
								</div>
							</template>
							<div class="req-name" x-text="req.client_name || '—'"></div>
							<template x-if="activeTab === 'servicios'">
								<div class="req-type" x-text="req.type"></div>
							</template>
							<div class="req-bottom">
								<span class="req-email" x-text="req.client_email || '—'"></span>
								<span class="req-date" x-text="req.created_at"></span>
							</div>
						</div>
					</template>
				</div>
			</template>

		</div>

		<!-- ── Modal detalle solicitud servicio ── -->
		<div
			x-show="$store.cache.isVisibleModal('approval-detail')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-approval-detail"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 small" @click.stop x-show="detail">
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>

				<div class="detail-head">
					<span class="detail-title" x-text="`Solicitud #${detail?.id}`"></span>
					<span class="req-badge" :class="statusClass(detail?.status)" x-text="statusLabel(detail?.status)"></span>
				</div>

				<div class="modal-content">
					<div class="detail-row">
						<span class="label">Servicio</span>
						<span x-text="detail?.type"></span>
					</div>
					<div class="detail-row">
						<span class="label">Cliente</span>
						<span x-text="detail?.client_name || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">DNI</span>
						<span x-text="detail?.client_dni || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Correo</span>
						<span x-text="detail?.client_email || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Teléfono</span>
						<span x-text="detail?.client_phone || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Fecha</span>
						<span x-text="detail?.created_at"></span>
					</div>

					<template x-if="detail?.rejection_reason">
						<div class="detail-row">
							<span class="label">Motivo rechazo</span>
							<span x-text="detail.rejection_reason"></span>
						</div>
					</template>

					<template x-if="detail?.status === 'pending'">
						<div class="approval-actions">
							<div class="fields">
								<label class="white">
									<input type="text" placeholder="URL de acceso (opcional)" x-model="actionForm.access_url">
								</label>
							</div>
							<div class="fields">
								<label class="white">
									<input type="text" placeholder="Motivo de rechazo (si aplica)" x-model="actionForm.reason">
								</label>
							</div>
							<div class="action-btns">
								<button class="btn-approve" @click="approve()">Aprobar</button>
								<button class="btn-reject"  @click="reject()">Rechazar</button>
							</div>
						</div>
					</template>
				</div>
			</div>
		</div>

		<!-- ── Modal detalle solicitud GUÍA ── -->
		<div
			x-show="$store.cache.isVisibleModal('guide-detail')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-guide-detail"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 guide-modal" @click.stop x-show="detail">
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>

				<div class="detail-head">
					<span class="detail-title" x-text="`Guía #${detail?.id}`"></span>
					<span class="req-badge" :class="statusClass(detail?.status)" x-text="statusLabel(detail?.status)"></span>
				</div>

				<div class="modal-content">
					<!-- Máquina -->
					<div class="guide-machine-row">
						<img :src="'/static/images/uploads/machines/' + detail?.machine_image" width="56" height="56" style="object-fit:contain;border-radius:8px;background:#f5f5f5;padding:4px;">
						<div>
							<div style="font-weight:700" x-text="detail?.machine_name"></div>
							<div style="font-size:0.8rem;opacity:0.5" x-text="detail?.brand_name"></div>
						</div>
					</div>

					<!-- Voucher -->
					<template x-if="detail?.voucher_filename">
						<div class="detail-row">
							<span class="label">Comprobante</span>
							<a :href="`${$store.cache.api}/guide/voucher/${detail.voucher_filename}`"
							   target="_blank" class="voucher-link">Ver archivo</a>
						</div>
					</template>
					<template x-if="!detail?.voucher_filename">
						<div class="detail-row">
							<span class="label">Comprobante</span>
							<span style="opacity:0.4">Sin archivo</span>
						</div>
					</template>

					<!-- Cliente -->
					<div class="detail-row">
						<span class="label">Cliente</span>
						<span x-text="detail?.client_name || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">DNI</span>
						<span x-text="detail?.client_dni || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Correo</span>
						<span x-text="detail?.client_email || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Teléfono</span>
						<span x-text="detail?.client_phone || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Fecha</span>
						<span x-text="detail?.created_at"></span>
					</div>

					<template x-if="detail?.rejection_reason">
						<div class="detail-row">
							<span class="label">Motivo rechazo</span>
							<span x-text="detail.rejection_reason"></span>
						</div>
					</template>

					<!-- Acciones pendiente -->
					<template x-if="detail?.status === 'pending'">
						<div class="approval-actions">
							<div class="fields">
								<label class="white">
									<input type="text" placeholder="Motivo de rechazo (si aplica)" x-model="actionForm.reason">
								</label>
							</div>
							<div class="action-btns">
								<button class="btn-approve" @click="approveGuide()">Aprobar</button>
								<button class="btn-reject"  @click="rejectGuide()">Rechazar</button>
							</div>
						</div>
					</template>

					<!-- Gestionar contenido (solo aprobados) -->
					<template x-if="detail?.status === 'approved'">
						<div class="guide-content-section">
							<div class="guide-content-header">
								<span>Contenido de la Guía</span>
								<button class="btn-save-guide" @click="saveGuideContent()" :disabled="savingGuide">
									<span x-text="savingGuide ? 'Guardando...' : 'Guardar'"></span>
								</button>
							</div>

							<textarea class="guide-desc-input" placeholder="Descripción general del equipo..." x-model="guideContent.description" rows="3"></textarea>

							<!-- Items actuales -->
							<div class="guide-items-list">
								<template x-for="(item, idx) in guideContent.items" :key="idx">
									<div class="guide-item-row">
										<select x-model="item.type" class="item-type-sel">
											<option value="image">Imagen</option>
											<option value="video">Video</option>
											<option value="pdf">PDF</option>
										</select>
										<input type="text" placeholder="Título" x-model="item.title" class="item-title-inp">
										<template x-if="item.type === 'video'">
											<input type="text" placeholder="URL del video (YouTube, etc.)" x-model="item.url" class="item-url-inp">
										</template>
										<template x-if="item.type !== 'video'">
											<div class="item-file-wrap">
												<template x-if="item.filename">
													<a :href="`${$store.cache.api}/guide/media/${item.filename}?wp_user_id=0&machine_id=0`"
													   target="_blank" class="item-file-preview" x-text="item.filename.substring(0,12)+'...'"></a>
												</template>
												<label class="item-upload-btn">
													<input type="file" accept=".jpg,.jpeg,.png,.webp,.pdf" style="display:none"
														@change="uploadItemFile($event, idx)">
													<span x-text="item.filename ? 'Cambiar' : 'Subir'"></span>
												</label>
											</div>
										</template>
										<button class="item-remove-btn" @click="guideContent.items.splice(idx,1)">✕</button>
									</div>
								</template>
							</div>

							<button class="btn-add-item" @click="guideContent.items.push({type:'video',title:'',url:'',filename:''})">
								+ Agregar item
							</button>
						</div>
					</template>
				</div>
			</div>
		</div>

	</div>

	<script>
	Alpine.data('approvals_data', () => ({
		requests:     [],
		loading:      false,
		filter:       'pending',
		activeTab:    'servicios',
		detail:       null,
		actionForm:   { request_id: null, access_url: '', reason: '' },
		guideContent: { description: '', items: [] },
		savingGuide:  false,

		async init() {
			await this.load();
		},

		async load() {
			this.loading = true;
			const api = Alpine.store('cache').api;

			if (this.activeTab === 'servicios') {
				const url = this.filter
					? `${api}/approval/list?status=${this.filter}`
					: `${api}/approval/list`;
				const r = await fetch(url);
				const j = await r.json();
				this.requests = j.data || [];
			} else {
				const url = this.filter
					? `${api}/guide/list?status=${this.filter}`
					: `${api}/guide/list`;
				const r = await fetch(url);
				const j = await r.json();
				this.requests = j.data || [];
			}

			this.loading = false;
		},

		async setFilter(f) {
			this.filter = f;
			await this.load();
		},

		async setTab(tab) {
			this.activeTab = tab;
			this.filter = 'pending';
			await this.load();
		},

		openDetail(req) {
			this.detail = req;
			this.actionForm = { request_id: req.id, access_url: '', reason: '' };

			if (this.activeTab === 'guias') {
				this.guideContent = { description: '', items: [] };
				if (req.status === 'approved') this.loadGuideContent(req.machine_id);
				Alpine.store('cache').showModal('guide-detail');
			} else {
				Alpine.store('cache').showModal('approval-detail');
			}
		},

		async loadGuideContent(machine_id) {
			const api = Alpine.store('cache').api;
			try {
				const r = await fetch(`${api}/guide/admin/content/${machine_id}`, {
					headers: { 'X-No-Toast': '1' }
				});
				const j = await r.json();
				if (j.data) {
					this.guideContent = {
						description: j.data.description || '',
						items: j.data.items || [],
					};
				}
			} catch(e) {}
		},

		async saveGuideContent() {
			if (!this.detail?.machine_id) return;
			this.savingGuide = true;
			const api = Alpine.store('cache').api;
			try {
				const r = await fetch(`${api}/guide/content/save`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({
						machine_id:  this.detail.machine_id,
						description: this.guideContent.description,
						items:       this.guideContent.items,
					}),
				});
				const j = await r.json();
			} finally {
				this.savingGuide = false;
			}
		},

		async uploadItemFile(event, idx) {
			const file = event.target.files[0];
			if (!file) return;
			const api = Alpine.store('cache').api;
			const fd = new FormData();
			fd.append('files[]', file);
			const r = await fetch(`${api}/guide/media/upload`, { method: 'POST', body: fd });
			const j = await r.json();
			if (j.data?.uploaded?.length) {
				this.guideContent.items[idx].filename = j.data.uploaded[0];
			}
		},

		// ── Servicios approve/reject ─────────────────────────────────────────

		async approve() {
			if (!this.actionForm.request_id) return;
			const cache = Alpine.store('cache');
			const r = await fetch(`${cache.api}/approval/approve`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					request_id: this.actionForm.request_id,
					user_id: cache.user.id,
					access_url: this.actionForm.access_url || null,
				}),
			});
			const j = await r.json();
			if (j.success) {
				cache.hideLastModal();
				await this.load();
			}
		},

		async reject() {
			if (!this.actionForm.request_id) return;
			const cache = Alpine.store('cache');
			const r = await fetch(`${cache.api}/approval/reject`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					request_id: this.actionForm.request_id,
					user_id: cache.user.id,
					reason: this.actionForm.reason || null,
				}),
			});
			const j = await r.json();
			if (j.success) {
				cache.hideLastModal();
				await this.load();
			}
		},

		// ── Guías approve/reject ─────────────────────────────────────────────

		async approveGuide() {
			if (!this.actionForm.request_id) return;
			const cache = Alpine.store('cache');
			const r = await fetch(`${cache.api}/approval/approve`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					request_id: this.actionForm.request_id,
					user_id: cache.user.id,
					access_url: null,
				}),
			});
			const j = await r.json();
			if (j.success) {
				cache.hideLastModal();
				await this.load();
			}
		},

		async rejectGuide() {
			if (!this.actionForm.request_id) return;
			const cache = Alpine.store('cache');
			const r = await fetch(`${cache.api}/approval/reject`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					request_id: this.actionForm.request_id,
					user_id: cache.user.id,
					reason: this.actionForm.reason || null,
				}),
			});
			const j = await r.json();
			if (j.success) {
				cache.hideLastModal();
				await this.load();
			}
		},

		statusLabel(s) {
			return { pending: 'Pendiente', approved: 'Aprobado', rejected: 'Rechazado' }[s] || s;
		},
		statusClass(s) {
			return { pending: 'status-pending', approved: 'status-approved', rejected: 'status-rejected' }[s] || '';
		},
	}));
	</script>

	<style>

		flex-direction: column;

		margin-bottom: 0;
	}

		margin-top: 0.4rem;
		margin-bottom: 0;
	}

		width: 100%;
