<div x-data="approvals_data">
	<div id="approvals">

		<!-- Controls vacío por ahora -->
		<div class="controls"></div>

		<!-- Kanban -->
		<div class="main glass">
			<template x-for="group in ($store.cache.getData('approval_dashboard') || [])" :key="group.status_slug">
				<div class="group">
					<div class="group-head">
						<img alt="" width="18" height="18" :src="statusIcon(group.status_slug)">
						<span class="group-name" x-text="group.status_name"></span>
						<span class="group-count" x-text="group.requests.length"></span>
					</div>

					<template x-for="req in group.requests" :key="req.id">
						<div class="req-card white hover-opacity" @click="openDetail(req)">
							<div class="req-top">
								<span class="req-id" x-text="`AP-${req.id}`"></span>
								<span class="req-date" x-text="req.created_at"></span>
							</div>
							<div class="req-name" x-text="req.client_name || '—'"></div>
							<div class="req-type" x-text="req.type"></div>
						</div>
					</template>

					<template x-if="group.requests.length === 0">
						<div class="group-empty">Sin solicitudes</div>
					</template>
				</div>
			</template>
		</div>

		<!-- ── Modal detalle ── -->
		<div
			x-show="$store.cache.isVisibleModal('approval-detail')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-approval-detail"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 small" @click.stop x-show="detail">
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>

				<div class="detail-head">
					<span class="detail-title" x-text="`Solicitud AP-${detail?.id}`"></span>
					<span class="req-badge" :class="statusClass(detail?.status)" x-text="statusLabel(detail?.status)"></span>
				</div>

				<div class="modal-content">
					<div class="detail-row">
						<span class="label">Servicio</span>
						<span x-text="detail?.type || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Cliente</span>
						<span x-text="detail?.client_name || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">DNI</span>
						<span x-text="detail?.client_dni || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Correo</span>
						<span x-text="detail?.client_email || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Teléfono</span>
						<span x-text="detail?.client_phone || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Fecha</span>
						<span x-text="detail?.created_at"></span>
					</div>
					<template x-if="detail?.invoice_number">
						<div class="detail-row">
							<span class="label">N° boleta/factura</span>
							<span x-text="detail.invoice_number"></span>
						</div>
					</template>
					<div class="detail-row">
						<span class="label">Comprobante</span>
						<template x-if="detail?.voucher_filename">
							<a :href="`${$store.cache.api}/approval/voucher/${detail.voucher_filename}`" target="_blank" style="color:#e05a00;font-weight:600;text-decoration:none;">Ver archivo</a>
						</template>
						<template x-if="!detail?.voucher_filename">
							<span style="opacity:0.4">Sin archivo</span>
						</template>
					</div>

					<template x-if="detail?.rejection_reason">
						<div class="detail-row">
							<span class="label">Motivo rechazo</span>
							<span x-text="detail.rejection_reason"></span>
						</div>
					</template>

					<!-- Pendiente → iniciar revisión -->
					<template x-if="detail?.status === 'pending'">
						<div class="approval-actions">
							<div class="action-btns">
								<button class="btn-review" @click="review()">Iniciar revisión</button>
							</div>
						</div>
					</template>

					<!-- En revisión → aprobar / rechazar -->
					<template x-if="detail?.status === 'in_review'">
						<div class="approval-actions">
							<div class="fields">
								<label class="white">
									<input type="text" placeholder="URL de acceso (opcional)" x-model="actionForm.access_url">
								</label>
							</div>
							<div class="fields">
								<label class="white">
									<input type="text" placeholder="Motivo de rechazo (si aplica)" x-model="actionForm.reason">
								</label>
							</div>
							<div class="action-btns">
								<button class="btn-approve" @click="approve()" :disabled="processing">Aprobar</button>
								<button class="btn-reject"  @click="reject()"  :disabled="processing">Rechazar</button>
							</div>
						</div>
					</template>
				</div>
			</div>
		</div>

	</div>

	<script>
	Alpine.data('approvals_data', () => ({
		detail:     null,
		processing: false,
		actionForm: { request_id: null, access_url: '', reason: '' },

		async init() {
			const socket = Alpine.store('cache').socket;
			if (socket) {
				socket.on('approval_update', async () => {
					await Alpine.store('cache').refresh('approval_dashboard');
				});
			}
			await Alpine.store('cache').fetchData([
				{ key: 'approval_dashboard', url: '/approval/dashboard', force: true },
			]);
		},

		openDetail(req) {
			this.detail = req;
			this.actionForm = { request_id: req.id, access_url: '', reason: '' };
			Alpine.store('cache').showModal('approval-detail');
		},

		async review() {
			if (this.processing) return;
			this.processing = true;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/approval/review`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ request_id: this.actionForm.request_id, user_id: cache.user.id }),
				});
				const j = await r.json();
				if (j.success) { cache.hideLastModal(); await cache.refresh('approval_dashboard'); }
				else { alert(j?.data || 'Error'); }
			} finally { this.processing = false; }
		},

		async approve() {
			if (this.processing) return;
			this.processing = true;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/approval/approve`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({
						request_id: this.actionForm.request_id,
						user_id:    cache.user.id,
						access_url: this.actionForm.access_url || null,
					}),
				});
				const j = await r.json();
				if (j.success) { cache.hideLastModal(); await cache.refresh('approval_dashboard'); }
				else { alert(j?.data || 'Error al aprobar'); }
			} finally { this.processing = false; }
		},

		async reject() {
			if (this.processing) return;
			this.processing = true;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/approval/reject`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({
						request_id: this.actionForm.request_id,
						user_id:    cache.user.id,
						reason:     this.actionForm.reason || null,
					}),
				});
				const j = await r.json();
				if (j.success) { cache.hideLastModal(); await cache.refresh('approval_dashboard'); }
				else { alert(j?.data || 'Error'); }
			} finally { this.processing = false; }
		},

		statusIcon(slug) {
			const map = { pending: 'pending', in_review: 'find', approved: 'approve', rejected: 'dislike' };
			return `/static/icons/line/${map[slug] || 'pending'}.svg`;
		},
		statusLabel(s) {
			return { pending: 'Pendiente', in_review: 'En revisión', approved: 'Aprobado', rejected: 'Rechazado' }[s] || s;
		},
		statusClass(s) {
			return { pending: 'status-pending', in_review: 'status-review', approved: 'status-approved', rejected: 'status-rejected' }[s] || '';
		},
	}));
	</script>

	<style>
		#approvals {
			display: flex;
			flex-direction: column;
			min-height: calc(100vh - 6.5rem);
			gap: 1rem;
			overflow: auto;
		}
		#approvals .controls { min-height: 0; }
		#approvals .main {
			display: flex;
			overflow-x: auto;
			flex: 1;
			padding: 0;
		}
		#approvals .group {
			flex: 1;
			display: flex;
			flex-direction: column;
			border-right: 3px solid #ffffff80;
			gap: 0.6rem;
			padding: 0.75rem;
			min-width: 13rem;
		}
		#approvals .group:last-child { border-right: none; }
		#approvals .group-head {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 0.4rem;
		}
		#approvals .group-name { font-weight: 600; font-size: 0.85rem; }
		#approvals .group-count {
			font-size: 0.65rem;
			opacity: 0.5;
			font-weight: 600;
			background: var(--graydark);
			padding: 0.1rem 0.45rem;
			border-radius: 1rem;
		}
		#approvals .group-empty {
			text-align: center;
			font-size: 0.72rem;
			opacity: 0.3;
			padding: 1rem 0;
		}
		#approvals .req-card {
			padding: 0.75rem;
			border-radius: 10px;
			display: flex;
			flex-direction: column;
			gap: 0.35rem;
			cursor: pointer;
		}
		#approvals .req-top {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#approvals .req-id { font-size: 0.8rem; opacity: 0.5; font-weight: 600; }
		#approvals .req-date { font-size: 0.65rem; opacity: 0.4; }
		#approvals .req-name { font-weight: 600; font-size: 0.9rem; }
		#approvals .req-type {
			font-size: 0.8rem;
			color: var(--primary, #e05a00);
			font-weight: 600;
		}
		#approvals .req-bottom {
			display: flex;
			justify-content: space-between;
			font-size: 0.7rem;
			opacity: 0.55;
		}

		.req-badge {
			font-size: 0.72rem;
			padding: 2px 8px;
			border-radius: 20px;
			font-weight: 600;
		}
		.status-pending  { background: #fff3cd; color: #856404; }
		.status-review   { background: #dff5ff; color: #0c5a73; }
		.status-approved { background: #d1e7dd; color: #0a3622; }
		.status-rejected { background: #f8d7da; color: #842029; }

		.detail-head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 1rem;
		}
		.detail-title { font-weight: 700; font-size: 1.1rem; }
		.detail-row {
			display: flex;
			justify-content: space-between;
			padding: 0.4rem 0;
			border-bottom: 1px solid rgba(0,0,0,0.05);
			font-size: 0.9rem;
			gap: 1rem;
		}
		.detail-row .label { font-weight: 600; opacity: 0.6; min-width: 100px; }
		.approval-actions {
			margin-top: 1rem;
			display: flex;
			flex-direction: column;
			gap: 0.6rem;
		}
		.action-btns { display: flex; gap: 0.6rem; }
		.btn-review, .btn-approve, .btn-reject {
			flex: 1;
			padding: 10px;
			border: none;
			border-radius: 8px;
			font-weight: 700;
			cursor: pointer;
		}
		.btn-review  { background: #0c5a73; color: #fff; }
		.btn-approve { background: #198754; color: #fff; }
		.btn-reject  { background: #dc3545; color: #fff; }
		.btn-approve:disabled, .btn-reject:disabled, .btn-review:disabled { opacity: 0.5; cursor: not-allowed; }

		@media (max-width: 48rem) {
			#approvals .main { flex-direction: column; }
			#approvals .group { flex: unset; min-width: 100%; }
		}
	</style>
</div>
