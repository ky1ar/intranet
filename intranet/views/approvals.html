<div x-data="approvals_data">
	<div id="approvals">

		<div class="controls">
			<div class="left frost">
				<div class="item" :class="filter === 'pending'  && 'active'" @click="setFilter('pending')">
					<span>Pendientes</span>
				</div>
				<div class="item" :class="filter === 'approved' && 'active'" @click="setFilter('approved')">
					<span>Aprobados</span>
				</div>
				<div class="item" :class="filter === 'rejected' && 'active'" @click="setFilter('rejected')">
					<span>Rechazados</span>
				</div>
				<div class="item" :class="filter === ''          && 'active'" @click="setFilter('')">
					<span>Todos</span>
				</div>
			</div>
			<div class="right frost">
				<div class="item" @click="load()">
					<img alt="" width="18" height="18" src="/static/icons/line/refresh.svg">
				</div>
			</div>
		</div>

		<div class="main glass">

			<template x-if="loading">
				<div class="empty-state">
					<span>Cargando...</span>
				</div>
			</template>

			<template x-if="!loading && requests.length === 0">
				<div class="empty-state">
					<span>No hay solicitudes</span>
				</div>
			</template>

			<template x-if="!loading && requests.length > 0">
				<div class="approval-list">
					<template x-for="req in requests" :key="req.id">
						<div class="req-card white hover-opacity" @click="openDetail(req)">
							<div class="req-top">
								<span class="req-id" x-text="`#${req.id}`"></span>
								<span class="req-badge" :class="statusClass(req.status)" x-text="statusLabel(req.status)"></span>
							</div>
							<div class="req-name" x-text="req.client_name || '—'"></div>
							<div class="req-type" x-text="req.type"></div>
							<div class="req-bottom">
								<span class="req-email" x-text="req.client_email || '—'"></span>
								<span class="req-date" x-text="req.created_at"></span>
							</div>
						</div>
					</template>
				</div>
			</template>

		</div>

		<!-- Modal detalle / acción -->
		<div
			x-show="$store.cache.isVisibleModal('approval-detail')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-approval-detail"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 small" @click.stop x-show="detail">
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>

				<div class="detail-head">
					<span class="detail-title" x-text="`Solicitud #${detail?.id}`"></span>
					<span class="req-badge" :class="statusClass(detail?.status)" x-text="statusLabel(detail?.status)"></span>
				</div>

				<div class="modal-content">
					<div class="detail-row">
						<span class="label">Servicio</span>
						<span x-text="detail?.type"></span>
					</div>
					<div class="detail-row">
						<span class="label">Cliente</span>
						<span x-text="detail?.client_name || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">DNI</span>
						<span x-text="detail?.client_dni || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Correo</span>
						<span x-text="detail?.client_email || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Teléfono</span>
						<span x-text="detail?.client_phone || '—'"></span>
					</div>
					<div class="detail-row">
						<span class="label">Fecha</span>
						<span x-text="detail?.created_at"></span>
					</div>

					<template x-if="detail?.rejection_reason">
						<div class="detail-row">
							<span class="label">Motivo rechazo</span>
							<span x-text="detail.rejection_reason"></span>
						</div>
					</template>

					<template x-if="detail?.status === 'pending'">
						<div class="approval-actions">
							<div class="fields">
								<label class="white">
									<input type="text" placeholder="URL de acceso (opcional)" x-model="actionForm.access_url">
								</label>
							</div>
							<div class="fields">
								<label class="white">
									<input type="text" placeholder="Motivo de rechazo (si aplica)" x-model="actionForm.reason">
								</label>
							</div>
							<div class="action-btns">
								<button class="btn-approve" @click="approve()">Aprobar</button>
								<button class="btn-reject"  @click="reject()">Rechazar</button>
							</div>
						</div>
					</template>
				</div>
			</div>
		</div>

	</div>

	<script>
	Alpine.data('approvals_data', () => ({
		requests: [],
		loading: false,
		filter: 'pending',
		detail: null,
		actionForm: { request_id: null, access_url: '', reason: '' },

		async init() {
			await this.load();
		},

		async load() {
			this.loading = true;
			const api = Alpine.store('cache').api;
			const url = this.filter
				? `${api}/approval/list?status=${this.filter}`
				: `${api}/approval/list`;
			const r = await fetch(url);
			const j = await r.json();
			this.requests = j.data || [];
			this.loading = false;
		},

		async setFilter(f) {
			this.filter = f;
			await this.load();
		},

		openDetail(req) {
			this.detail = req;
			this.actionForm = { request_id: req.id, access_url: '', reason: '' };
			Alpine.store('cache').showModal('approval-detail');
		},

		async approve() {
			if (!this.actionForm.request_id) return;
			const cache = Alpine.store('cache');
			const r = await fetch(`${cache.api}/approval/approve`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					request_id: this.actionForm.request_id,
					user_id: cache.user.id,
					access_url: this.actionForm.access_url || null,
				}),
			});
			const j = await r.json();
			if (j.success) {
				cache.hideLastModal();
				await this.load();
			}
		},

		async reject() {
			if (!this.actionForm.request_id) return;
			const cache = Alpine.store('cache');
			const r = await fetch(`${cache.api}/approval/reject`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					request_id: this.actionForm.request_id,
					user_id: cache.user.id,
					reason: this.actionForm.reason || null,
				}),
			});
			const j = await r.json();
			if (j.success) {
				cache.hideLastModal();
				await this.load();
			}
		},

		statusLabel(s) {
			return { pending: 'Pendiente', approved: 'Aprobado', rejected: 'Rechazado' }[s] || s;
		},
		statusClass(s) {
			return { pending: 'status-pending', approved: 'status-approved', rejected: 'status-rejected' }[s] || '';
		},
	}));
	</script>

	<style>
	#approvals {
		display: flex;
		flex-direction: column;
		height: 100%;
	}
	#approvals .main {
		flex: 1;
		overflow-y: auto;
		padding: 1rem;
	}
	.approval-list {
		display: flex;
		flex-wrap: wrap;
		gap: 0.8rem;
	}
	#approvals .req-card {
		width: 240px;
		border-radius: 10px;
		padding: 1rem;
		cursor: pointer;
		display: flex;
		flex-direction: column;
		gap: 0.4rem;
	}
	#approvals .req-top {
		display: flex;
		justify-content: space-between;
		align-items: center;
	}
	#approvals .req-id {
		font-size: 0.8rem;
		opacity: 0.5;
	}
	#approvals .req-name {
		font-weight: 600;
		font-size: 0.95rem;
	}
	#approvals .req-type {
		font-size: 0.85rem;
		color: var(--pri, #e05a00);
		font-weight: 600;
	}
	#approvals .req-bottom {
		display: flex;
		justify-content: space-between;
		font-size: 0.75rem;
		opacity: 0.6;
		margin-top: 0.2rem;
	}
	.req-badge {
		font-size: 0.72rem;
		padding: 2px 8px;
		border-radius: 20px;
		font-weight: 600;
	}
	.status-pending  { background: #fff3cd; color: #856404; }
	.status-approved { background: #d1e7dd; color: #0a3622; }
	.status-rejected { background: #f8d7da; color: #842029; }
	.empty-state {
		display: flex;
		align-items: center;
		justify-content: center;
		height: 200px;
		opacity: 0.4;
	}
	.detail-head {
		display: flex;
		justify-content: space-between;
		align-items: center;
		margin-bottom: 1rem;
	}
	.detail-title {
		font-weight: 700;
		font-size: 1.1rem;
	}
	.detail-row {
		display: flex;
		justify-content: space-between;
		padding: 0.4rem 0;
		border-bottom: 1px solid rgba(0,0,0,0.05);
		font-size: 0.9rem;
	}
	.detail-row .label {
		font-weight: 600;
		opacity: 0.6;
		min-width: 100px;
	}
	.approval-actions {
		margin-top: 1rem;
		display: flex;
		flex-direction: column;
		gap: 0.6rem;
	}
	.action-btns {
		display: flex;
		gap: 0.6rem;
	}
	.btn-approve, .btn-reject {
		flex: 1;
		padding: 10px;
		border: none;
		border-radius: 8px;
		font-weight: 700;
		cursor: pointer;
	}
	.btn-approve { background: #198754; color: #fff; }
	.btn-reject  { background: #dc3545; color: #fff; }
	</style>
</div>
