<div x-data="approvals_data">
	<div id="approvals">

		<div class="controls">
			<div class="menu-collapse frost" x-transition.duration.300ms x-show="$store.cache.more_menu">
				<div class="item" @click="guides()">
					<img alt="" width="18" height="18" src="/static/icons/line/book.svg">
				</div>
			</div>
			
			<div class="left mobile-hide frost">
				<div class="item" @click="guides()">
					<img alt="" width="20" height="20" src="/static/icons/line/book.svg">
					<span>Manuales</span>
				</div>
			</div>
		</div>

		<!-- Kanban -->
		<div class="main glass">
			<template x-for="group in ($store.cache.getData('approval_dashboard') || [])" :key="group.status_slug">
				<div class="group">
					<div class="group-head">
						<img alt="" width="18" height="18" :src="statusIcon(group.status_slug)">
						<span class="group-name" x-text="group.status_name"></span>
						<span class="group-count" x-text="group.requests.length"></span>
					</div>

					<template x-for="req in group.requests" :key="req.id">
						<div class="req-card white hover-opacity" @click="openDetail(req)">
							<div class="req-top">
								<span class="req-id" x-text="`AP-${req.id}`"></span>
								<span class="req-date" x-text="req.created_at"></span>
							</div>
							<div class="req-name" x-text="req.client_name || '—'"></div>
							<div class="req-type" x-text="typeLabel(req)"></div>
						</div>
					</template>

					<template x-if="group.requests.length === 0">
						<div class="group-empty">Sin solicitudes</div>
					</template>
				</div>
			</template>
		</div>

		<!-- ── Modal detalle ── -->
		<div
			x-show="$store.cache.isVisibleModal('approval-detail')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-approval-detail"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 big" @click.stop x-show="detail">
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>

				<div class="title">
					<div class="title-row">
						<span x-text="`Solicitud AP-${detail?.id}`"></span>
						<span class="req-badge" :class="statusClass(detail?.status)" x-text="statusLabel(detail?.status)"></span>
					</div>
					<p class="created">
						<img alt="" width="14" height="14" src="/static/icons/line/calendar.svg">
						<span x-text="detail?.created_at"></span>
					</p>
				</div>

				<div class="modal-content dual">
					<div class="dataview overflow percent50">
						<div class="boxes">

							<!-- Servicio -->
							<div class="box-cont">
								<div class="desc">Servicio</div>
								<div class="white service-box">
									<img alt="" width="16" height="16" src="/static/icons/filled/pin.svg">
									<span class="service-name" x-text="typeLabel(detail)"></span>
								</div>
							</div>

							<!-- Cliente -->
							<div class="box-cont">
								<div class="desc">Cliente</div>
								<div class="white info-box">
									<div class="info-row">
										<img alt="" width="16" height="16" src="/static/icons/line/user.svg">
										<span class="lbl">Nombre</span>
										<span class="val" x-text="detail?.client_name || '—'"></span>
									</div>
									<div class="info-row">
										<img alt="" width="16" height="16" src="/static/icons/line/id.svg">
										<span class="lbl">DNI</span>
										<span class="val" x-text="detail?.client_dni || '—'"></span>
									</div>
									<div class="info-row">
										<img alt="" width="16" height="16" src="/static/icons/line/email.svg">
										<span class="lbl">Correo</span>
										<span class="val" x-text="detail?.client_email || '—'"></span>
									</div>
									<div class="info-row">
										<img alt="" width="16" height="16" src="/static/icons/line/phone.svg">
										<span class="lbl">Teléfono</span>
										<span class="val" x-text="detail?.client_phone || '—'"></span>
									</div>
								</div>
							</div>

							<!-- Comprobante -->
							<div class="box-cont">
								<div class="desc">Comprobante</div>

								<template x-if="detail?.invoice_number">
									<div class="white info-box">
										<div class="info-row">
											<img alt="" width="16" height="16" src="/static/icons/line/document.svg">
											<span class="lbl">N° boleta/factura</span>
											<span class="val" x-text="detail.invoice_number"></span>
										</div>
									</div>
								</template>

								<!-- Detalle del pedido (Odoo) -->
								<template x-if="detail?.invoice_number">
									<div class="odoo-detail">
										<template x-if="odoo_loading">
											<div class="white odoo-state">Consultando Odoo…</div>
										</template>

										<template x-if="!odoo_loading && odoo_error">
											<div class="white odoo-state error" x-text="odoo_error"></div>
										</template>

										<template x-if="!odoo_loading && odoo_invoice && !odoo_invoice.found">
											<div class="white odoo-state empty">No se encontró el pedido en Odoo.</div>
										</template>

										<template x-if="!odoo_loading && odoo_invoice && odoo_invoice.found">
											<div class="white odoo-box">
												<div class="odoo-head">
													<span class="odoo-name" x-text="odoo_invoice.name"></span>
													<span class="odoo-pill" :class="odooPayClass(odoo_invoice.payment_state)" x-text="odooPayLabel(odoo_invoice.payment_state)"></span>
												</div>

												<div class="odoo-sub">
													<span x-show="odoo_invoice.partner_name" x-text="odoo_invoice.partner_name"></span>
													<span x-show="odoo_invoice.invoice_date"
														:class="{ 'date-old': isInvoiceOld(odoo_invoice.invoice_date) }"
														x-text="odoo_invoice.invoice_date"></span>
												</div>

												<div class="odoo-lines">
													<template x-for="(ln, i) in (odoo_invoice.lines || [])" :key="i">
														<div class="odoo-line">
															<span class="prod" :title="ln.product" x-text="ln.product"></span>
															<span class="qty" x-text="`x${ln.quantity}`"></span>
															<span class="amt" x-text="formatMoney(ln.price_subtotal, odoo_invoice.currency)"></span>
														</div>
													</template>
													<template x-if="!odoo_invoice.lines || odoo_invoice.lines.length === 0">
														<div class="odoo-line empty">Sin líneas de detalle</div>
													</template>
												</div>

												<div class="odoo-totals">
													<div class="row">
														<span>Subtotal</span>
														<span x-text="formatMoney(odoo_invoice.amount_untaxed, odoo_invoice.currency)"></span>
													</div>
													<div class="row">
														<span>IGV</span>
														<span x-text="formatMoney(odoo_invoice.amount_tax, odoo_invoice.currency)"></span>
													</div>
													<div class="row total">
														<span>Total</span>
														<span x-text="formatMoney(odoo_invoice.amount_total, odoo_invoice.currency)"></span>
													</div>
												</div>
											</div>
										</template>
									</div>
								</template>

								<template x-if="detail?.voucher_filename">
									<div class="voucher-card white hover-opacity" @click="openVoucher()">
										<div class="voucher-thumb">
											<template x-if="isVoucherImage()">
												<img :src="voucherUrl()" alt="Comprobante">
											</template>
											<template x-if="!isVoucherImage()">
												<span class="ext" x-text="voucherExt().toUpperCase() || 'FILE'"></span>
											</template>
										</div>
										<div class="voucher-data">
											<span class="name">Ver comprobante</span>
											<span class="meta" x-text="`Archivo ${voucherExt().toUpperCase() || 'adjunto'}`"></span>
										</div>
										<img class="arrow" alt="" width="20" height="20" src="/static/icons/line/right.svg">
									</div>
								</template>

								<template x-if="!detail?.voucher_filename">
									<div class="white empty-box">Sin archivo adjunto</div>
								</template>
							</div>

							<!-- Acceso otorgado -->
							<!-- <template x-if="detail?.access_url">
								<div class="box-cont">
									<div class="desc">Acceso</div>
									<div class="white info-box">
										<div class="info-row">
											<img alt="" width="16" height="16" src="/static/icons/line/link.svg">
											<span class="lbl">URL</span>
											<a class="val link" :href="detail.access_url" target="_blank" rel="noopener" x-text="detail.access_url"></a>
										</div>
									</div>
								</div>
							</template> -->

							<!-- Motivo de rechazo -->
							<template x-if="detail?.rejection_reason">
								<div class="box-cont">
									<div class="desc">Motivo de rechazo</div>
									<div class="white reason-box" x-text="detail.rejection_reason"></div>
								</div>
							</template>
						</div>

						<!-- Pendiente → iniciar revisión -->
						<template x-if="detail?.status === 'pending'">
							<div class="buttons">
								<button class="button icon hover-opacity" @click="review()" :disabled="processing">
									<img alt="" width="16" height="16" src="/static/icons/line/find.svg">
									<span>Iniciar revisión</span>
								</button>
							</div>
						</template>

						<!-- En revisión → aprobar / rechazar -->
						<template x-if="detail?.status === 'in_review'">
							<div class="approval-actions">
								<div class="buttons">
									<button class="button icon black hover-opacity" @click="reject()" :disabled="processing">
										<img alt="" width="16" height="16" src="/static/icons/line/dislike.svg">
										<span>Rechazar</span>
									</button>
									<button class="button icon hover-opacity" @click="approve()" :disabled="processing">
										<img alt="" width="16" height="16" src="/static/icons/line/approve.svg">
										<span>Aprobar</span>
									</button>
								</div>
							</div>
						</template>
					</div>
					
					<!-- ── Chat ── -->
					<div class="comments-container white percent50" x-show="detail">
						<div class="comments-box overflow" x-ref="commentsBox">
							<template x-if="!detail?.chats || detail.chats.length === 0">
								<div class="no-comments">Nada por aquí</div>
							</template>

							<template x-for="chat in (detail?.chats || [])" :key="chat.id">
								<div class="user-comment" :class="{'self': chat.commenter_id == user_id}">
									<img alt="user" :src="'/static/images/uploads/users/' + chat.commenter_image" width="24" height="24">
									<div class="white bubble">
										<div class="top">
											<span x-text="chat.commenter_id == user_id ? 'Tú' : chat.commenter_name"></span>
											<p x-text="chat.created_at"></p>
										</div>
										<p x-text="chat.comment"></p>
									</div>
								</div>
							</template>
						</div>

						<div class="comments-input white">
							<label>
								<textarea type="text" x-model="chat_message" placeholder="Ingresa un mensaje..." @keydown.enter="handleEnterSend($event)"></textarea>
							</label>
							<div class="send hover-opacity" @click="sendChat()" :class="{'disabled': !chat_message || !chat_message.trim()}">
								<img alt="enviar" width="16" height="16" src="/static/icons/filled/send.svg">
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- ── Modal visor de comprobante (PDF / imagen) ── -->
		<div
			x-show="$store.cache.isVisibleModal('approval-attachment')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-approval-attachment"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal small glass2" @click.stop>
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>

				<div class="modal-content">
					<!-- PDF -->
					<template x-if="isVoucherPdf()">
						<iframe :src="voucherUrl()" style="width:100%; height:70vh; border:0; border-radius:0.75rem;"></iframe>
					</template>

					<!-- Imagen -->
					<template x-if="isVoucherImage()">
						<img style="border-radius:0.75rem; width:100%;" :src="voucherUrl()" alt="Comprobante">
					</template>

					<!-- Sin previsualización -->
					<template x-if="!isVoucherPdf() && !isVoucherImage()">
						<div class="white" style="text-align:center; padding:1rem;">
							No se puede previsualizar este archivo.
							<a :href="voucherUrl()" target="_blank" rel="noopener" style="color:var(--primary, #e05a00); font-weight:600; text-decoration:none;">Descargar</a>
						</div>
					</template>
				</div>
			</div>
		</div>

		<!-- ── Modal: Gestor de guías ── -->
		<div
			x-show="$store.cache.isVisibleModal('guide-manager')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-guide-manager"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 big" @click.stop>
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>

				<div class="gm-head">
					<div class="gm-title">
						<img width="20" height="20" src="/static/icons/line/book.svg" alt="">
						<span x-text="gm.view === 'list' ? 'Gestor de guías' : (gm.view === 'search' ? 'Agregar guía' : (gm.machine?.name || 'Editar guía'))"></span>
					</div>
					<template x-if="gm.view === 'list'">
						<button class="gm-btn primary" @click="gmNew()">+ Agregar guía</button>
					</template>
					<template x-if="gm.view !== 'list'">
						<button class="gm-btn ghost" @click="gmBack()">← Volver</button>
					</template>
				</div>

				<div class="modal-content gm-content">
					<!-- LIST -->
					<template x-if="gm.view === 'list'">
						<div class="gm-list">
							<template x-if="gm.loading"><div class="gm-empty">Cargando…</div></template>
							<template x-if="!gm.loading && gm.guides.length === 0"><div class="gm-empty">No hay guías creadas todavía.</div></template>
							<template x-for="g in gm.guides" :key="g.machine_id">
								<div class="gm-card white">
									<img class="gm-card-img" :src="'/static/images/uploads/machines/' + g.machine_image" :alt="g.machine_name">
									<div class="gm-card-info">
										<div class="gm-card-name" x-text="g.machine_name"></div>
										<div class="gm-card-meta" x-text="g.item_count + ' paso(s)'"></div>
									</div>
									<div class="gm-card-actions">
										<button class="gm-icon" title="Editar" @click="gmEditExisting(g)">✎</button>
										<button class="gm-icon danger" title="Eliminar" @click="gmDelete(g)">🗑</button>
									</div>
								</div>
							</template>
						</div>
					</template>

					<!-- SEARCH -->
					<template x-if="gm.view === 'search'">
						<div class="gm-search">
							<input type="text" class="gm-input" placeholder="Busca el equipo por modelo…" x-model="gm.search" @input.debounce.300ms="gmSearch()">
							<div class="gm-results">
								<template x-for="m in gm.results" :key="m.id">
									<div class="gm-result" @click="gmPickMachine(m)">
										<img :src="'/static/images/uploads/machines/' + m.image" :alt="m.name">
										<span x-text="m.name"></span>
									</div>
								</template>
								<template x-if="gm.search.length >= 2 && gm.results.length === 0"><div class="gm-empty">Sin resultados.</div></template>
							</div>
						</div>
					</template>

					<!-- EDITOR -->
					<template x-if="gm.view === 'editor'">
						<div class="gm-editor">
							<div class="gm-machine">
								<img :src="'/static/images/uploads/machines/' + (gm.machine?.image || '')" :alt="gm.machine?.name">
								<div class="gm-machine-name" x-text="gm.machine?.name"></div>
							</div>

							<label class="gm-label">Introducción (opcional)</label>
							<textarea class="gm-input" rows="2" x-model="gm.description" placeholder="Ej: Te enviamos un paso a paso para tu impresora…"></textarea>

							<label class="gm-label">Pasos (título + link de YouTube)</label>
							<div class="gm-steps">
								<template x-for="(step, i) in gm.steps" :key="i">
									<div class="gm-step">
										<span class="gm-step-n" x-text="i + 1"></span>
										<div class="gm-step-fields">
											<input type="text" class="gm-input" placeholder="Título (ej: Unboxing y ensamblado)" x-model="step.title">
											<input type="text" class="gm-input" placeholder="https://youtu.be/…" x-model="step.url">
										</div>
										<button class="gm-icon danger" title="Quitar" @click="gmRemoveStep(i)">✕</button>
									</div>
								</template>
							</div>
							<button class="gm-btn ghost" @click="gmAddStep()">+ Agregar paso</button>

							<label class="gm-label">Link de Google Drive (Bonus Track)</label>
							<input type="text" class="gm-input" placeholder="https://drive.google.com/…" x-model="gm.drive_url">

							<div class="gm-editor-actions">
								<button class="gm-btn ghost" @click="gmBack()">Cancelar</button>
								<button class="gm-btn primary" :disabled="gm.saving" @click="gmSave()" x-text="gm.saving ? 'Guardando…' : 'Guardar guía'"></button>
							</div>
						</div>
					</template>
				</div>
			</div>
		</div>

	</div>

	<script>
	Alpine.data('approvals_data', () => ({
		detail:     null,
		processing: false,
		actionForm: { request_id: null },
		odoo_invoice: null,
		odoo_loading: false,
		odoo_error:   null,
		user_id:      Alpine.store('cache').user.id,
		chat_message: '',
		gm: { view:'list', guides:[], loading:false, saving:false, search:'', results:[], machine:null, description:'', steps:[], drive_url:'' },

		async init() {
			const socket = Alpine.store('cache').socket;
			if (socket) {
				socket.on('approval_update', async () => {
					await Alpine.store('cache').refresh('approval_dashboard');
				});
			}
			await Alpine.store('cache').fetchData([
				{ key: 'approval_dashboard', url: '/approval/dashboard', force: true },
			]);
		},

		async openDetail(req) {
			this.detail = req;
			this.actionForm = { request_id: req.id };
			this.odoo_invoice = null;
			this.odoo_error = null;
			this.chat_message = '';
			Alpine.store('cache').showModal('approval-detail');
			if (req?.invoice_number) this.loadOdooInvoice(req.invoice_number);

			// Trae el detalle fresco (incluye los mensajes del chat)
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/approval/${req.id}`, {
					headers: { 'X-No-Toast': '1' },
				});
				const j = await r.json();
				if (r.ok && j.success && j.data) {
					this.detail = j.data;
					this.actionForm = { request_id: j.data.id };
				}
			} catch (e) {
				console.error(e);
			}
			this.$nextTick(() => this.scrollCommentsToBottom('auto'));
		},

		scrollCommentsToBottom(behavior = 'smooth') {
			const box = this.$refs.commentsBox;
			if (!box) return;
			box.scrollTo({ top: box.scrollHeight, behavior });
		},

		handleEnterSend(e) {
			if (e.shiftKey) return;
			e.preventDefault();
			this.sendChat();
		},

		async sendChat() {
			const message = (this.chat_message || '').trim();
			if (!message || this.processing || !this.detail) return;

			this.processing = true;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/approval/${this.detail.id}/chat`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ comment: message, user_id: cache.user.id }),
				});
				const j = await r.json();
				if (!r.ok || !j.success) {
					throw new Error(j?.data?.message || j?.data || 'Error enviando comentario');
				}
				const data = j.data;
				if (!this.detail.chats) this.detail.chats = [];
				this.detail.chats.push({
					id: data.id,
					comment: data.comment,
					commenter_id: data.commenter_id,
					commenter_name: data.commenter_name,
					commenter_image: data.commenter_image,
					created_at: data.created_at,
				});
				this.chat_message = '';
				this.$nextTick(() => this.scrollCommentsToBottom());
			} catch (e) {
				console.error(e);
			} finally {
				this.processing = false;
			}
		},

		voucherExt() {
			const name = this.detail?.voucher_filename || '';
			const i = name.lastIndexOf('.');
			return i >= 0 ? name.slice(i + 1).toLowerCase() : '';
		},

		typeLabel(r) {
			// Para guías mostramos también el equipo: "Manual de Equipo · <modelo>"
			if (r?.is_guide) return r.machine_name ? `Manual de Equipo · ${r.machine_name}` : 'Manual de Equipo';
			return r?.type || '—';
		},

		voucherUrl() {
			if (!this.detail?.voucher_filename) return '';
			return `${Alpine.store('cache').api}/approval/voucher/${this.detail.voucher_filename}`;
		},

		isVoucherImage() {
			return ['png', 'jpg', 'jpeg', 'webp', 'gif'].includes(this.voucherExt());
		},

		isVoucherPdf() {
			return this.voucherExt() === 'pdf';
		},

		openVoucher() {
			if (!this.detail?.voucher_filename) return;
			Alpine.store('cache').showModal('approval-attachment');
		},

		async loadOdooInvoice(invoiceNumber) {
			this.odoo_loading = true;
			this.odoo_error = null;
			this.odoo_invoice = null;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/odoo/invoice?number=${encodeURIComponent(invoiceNumber)}`, {
					headers: { 'X-No-Toast': '1' },
				});
				const j = await r.json();
				if (!r.ok) throw new Error(j?.data?.message || 'No se pudo consultar Odoo');
				this.odoo_invoice = j.data || { found: false };
			} catch (e) {
				this.odoo_error = e.message || 'Error consultando Odoo';
			} finally {
				this.odoo_loading = false;
			}
		},

		isInvoiceOld(dateStr) {
			if (!dateStr) return false;
			const d = new Date(`${String(dateStr).slice(0, 10)}T00:00:00`);
			if (isNaN(d)) return false;
			const cutoff = new Date();
			cutoff.setHours(0, 0, 0, 0);
			cutoff.setMonth(cutoff.getMonth() - 3);
			return d < cutoff;
		},

		formatMoney(n, currency) {
			const value = Number(n || 0).toFixed(2);
			const symbols = { PEN: 'S/ ', USD: '$', EUR: '€' };
			const prefix = symbols[currency] || (currency ? `${currency} ` : '');
			return `${prefix}${value}`;
		},

		odooPayLabel(s) {
			return {
				not_paid: 'No pagado', in_payment: 'En proceso', paid: 'Pagado',
				partial: 'Parcial', reversed: 'Revertido', invoicing_legacy: 'Heredado',
			}[s] || (s || '—');
		},

		odooPayClass(s) {
			return {
				not_paid: 'pay-unpaid', in_payment: 'pay-process', paid: 'pay-paid',
				partial: 'pay-partial', reversed: 'pay-reversed',
			}[s] || 'pay-unpaid';
		},

		async review() {
			if (this.processing) return;
			this.processing = true;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/approval/review`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ request_id: this.actionForm.request_id, user_id: cache.user.id }),
				});
				const j = await r.json();
				if (j.success) { cache.hideLastModal(); await cache.refresh('approval_dashboard'); PineToast.flash('Solicitud en revisión', 'success'); }
				else { PineToast.flash(this.msgOf(j, 'Error'), 'error'); }
			} finally { this.processing = false; }
		},

		async approve() {
			if (this.processing) return;
			this.processing = true;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/approval/approve`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({
						request_id: this.actionForm.request_id,
						user_id:    cache.user.id,
					}),
				});
				const j = await r.json();
				if (j.success) { cache.hideLastModal(); await cache.refresh('approval_dashboard'); PineToast.flash('Solicitud aprobada', 'success'); }
				else { PineToast.flash(this.msgOf(j, 'Error al aprobar'), 'error'); }
			} finally { this.processing = false; }
		},

		async reject() {
			if (this.processing) return;
			this.processing = true;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/approval/reject`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({
						request_id: this.actionForm.request_id,
						user_id:    cache.user.id,
					}),
				});
				const j = await r.json();
				if (j.success) { cache.hideLastModal(); await cache.refresh('approval_dashboard'); PineToast.flash('Solicitud rechazada', 'success'); }
				else { PineToast.flash(this.msgOf(j, 'Error'), 'error'); }
			} finally { this.processing = false; }
		},

		msgOf(j, fallback) {
			const d = j && j.data;
			if (d && typeof d === 'object' && d.message) return d.message;
			if (typeof d === 'string') return d;
			return fallback || 'Ocurrió un error';
		},

		guides() {
			Alpine.store('cache').showModal('guide-manager');
			this.gm.view = 'list';
			this.gmLoad();
		},
		async gmLoad() {
			this.gm.loading = true;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/guide/admin/list`, { headers: { 'X-No-Toast': '1' } });
				const j = await r.json();
				this.gm.guides = (j.success && j.data) ? j.data : [];
			} catch(e) { this.gm.guides = []; }
			finally { this.gm.loading = false; }
		},
		gmBack() { this.gm.view = 'list'; },
		gmNew() { this.gm.view = 'search'; this.gm.search = ''; this.gm.results = []; },
		async gmSearch() {
			const q = (this.gm.search || '').trim();
			if (q.length < 2) { this.gm.results = []; return; }
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/machine/find/${encodeURIComponent(q)}`, { headers: { 'X-No-Toast': '1' } });
				const j = await r.json();
				this.gm.results = (j.success && j.data) ? j.data : [];
			} catch(e) { this.gm.results = []; }
		},
		gmPickMachine(m) { this.gm.machine = { id: m.id, name: m.name, image: m.image }; this.gmOpenEditor(m.id); },
		gmEditExisting(g) { this.gm.machine = { id: g.machine_id, name: g.machine_name, image: g.machine_image }; this.gmOpenEditor(g.machine_id); },
		async gmOpenEditor(machine_id) {
			this.gm.description = ''; this.gm.steps = []; this.gm.drive_url = ''; this.gm.view = 'editor';
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/guide/admin/content/${machine_id}`, { headers: { 'X-No-Toast': '1' } });
				const j = await r.json();
				const data = (j.success && j.data) ? j.data : {};
				this.gm.description = data.description || '';
				const items = data.items || [];
				this.gm.steps = items.filter(it => it.type === 'video').map(it => ({ title: it.title || '', url: it.url || '' }));
				const drive = items.find(it => it.type === 'drive');
				this.gm.drive_url = drive ? (drive.url || '') : '';
			} catch(e) {}
			if (this.gm.steps.length === 0) this.gm.steps = [{ title:'', url:'' }];
		},
		gmAddStep() { this.gm.steps.push({ title:'', url:'' }); },
		gmRemoveStep(i) { this.gm.steps.splice(i, 1); },
		async gmSave() {
			if (this.gm.saving || !this.gm.machine) return;
			const items = this.gm.steps
				.filter(st => (st.title || '').trim() || (st.url || '').trim())
				.map(st => ({ type:'video', title:(st.title||'').trim(), url:(st.url||'').trim() }));
			const drive = (this.gm.drive_url || '').trim();
			if (drive) items.push({ type:'drive', url: drive });
			this.gm.saving = true;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/guide/content/save`, {
					method:'POST', headers:{'Content-Type':'application/json'},
					body: JSON.stringify({ machine_id: this.gm.machine.id, description: (this.gm.description||'').trim(), items }),
				});
				const j = await r.json();
				if (j.success) { this.gm.view = 'list'; await this.gmLoad(); PineToast.flash('Guía guardada', 'success'); }
				else { PineToast.flash(this.msgOf(j, 'Error al guardar la guía'), 'error'); }
			} finally { this.gm.saving = false; }
		},
		async gmDelete(g) {
			if (!confirm(`¿Eliminar el manual de ${g.machine_name}?`)) return;
			const cache = Alpine.store('cache');
			try {
				const r = await fetch(`${cache.api}/guide/content/${g.machine_id}`, { method:'DELETE' });
				const j = await r.json();
				if (j.success) { await this.gmLoad(); PineToast.flash('Guía eliminada', 'success'); }
				else PineToast.flash(this.msgOf(j, 'Error al eliminar'), 'error');
			} catch(e) { PineToast.flash('Error de conexión', 'error'); }
		},
		statusIcon(slug) {
			const map = {
				pending: 'pending',
				in_review: 'in_review',
				approved: 'approve',
				rejected: 'rejected'
			};
			return `/static/icons/module/approvals/${map[slug] || 'pending'}.svg`;
		},
		statusLabel(s) {
			return { pending: 'Pendiente', in_review: 'En revisión', approved: 'Aprobado', rejected: 'Rechazado' }[s] || s;
		},
		statusClass(s) {
			return { pending: 'status-pending', in_review: 'status-review', approved: 'status-approved', rejected: 'status-rejected' }[s] || '';
		},
	}));
