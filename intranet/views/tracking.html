<div x-data="tracking_data">
	<div id="tracking-dashboard">
        <div class="header">
			<div class="titles">
				<span class="range">Panel de Trackings</span>
			</div>
			<template x-if="editAllowed()">
				<div class="title hover-opacity" @click="addTracking()">+ Añadir tracking</div>
			</template>
		</div>

		<div class="container-tracking main glass">
			<!-- AGENCIA -->
			<div class="cont agencia">
				<h1 class="title"><img class="icon" src="/static/images/tracking/op1-house.svg" alt="">En Agencia</h1>
				<div class="data">
					<template x-if="orders.agencia.length > 0">
						<template x-for="order in orders.agencia" :key="order.order_number">
							<div class="order white">
								<div class="f1">
									<p class="orderId" x-text="order.order_number"></p>
									<img :src="order.agency_image" alt="">
								</div>
								<div class="f2">
									<p class="tracking" x-text="order.codes"></p>
									<p class="client_name" x-text="order.client_name"></p>
									<p class="document" x-text="order.client_document"></p>
								</div>
								<div class="f3">
									<p class="origin" x-text="order.origin_agency"></p>
									<span class="line par-animation" :style="`--line-color: ${getLineColor(order.agency_id)}`"></span>
									<p class="destiny" x-text="order.destination_agency"></p>
								</div>
							</div>
						</template>
					</template>
					<template x-if="orders.agencia.length === 0">
						<p class="no-orders">No hay pedidos en agencia.</p>
					</template>
				</div>
			</div>
		
			<!-- RUTA -->
			<div class="cont ruta">
				<h1 class="title"><img class="icon" src="/static/images/tracking/op2-car.svg" alt="">En Ruta</h1>
				<div class="data">
					<template x-if="orders.ruta.length > 0">
						<template x-for="order in orders.ruta" :key="order.order_number">
							<div class="order white">
								<div class="f1">
									<p class="orderId" x-text="order.order_number"></p>
									<img :src="order.agency_image" alt="">
								</div>
								<div class="f2">
									<p class="tracking" x-text="order.codes"></p>
									<p class="client_name" x-text="order.client_name"></p>
									<p class="document" x-text="order.client_document"></p>
								</div>
								<div class="f3">
									<p class="origin" x-text="order.origin_agency"></p>
									<span class="line" :style="`--line-color: ${getLineColor(order.agency_id)}`"></span>
									<p class="destiny" x-text="order.destination_agency"></p>
								</div>
							</div>
						</template>
					</template>
					<template x-if="orders.ruta.length === 0">
						<p class="no-orders">No hay pedidos en ruta.</p>
					</template>
				</div>
			</div>
		
			<!-- ENTREGADO -->
			<div class="cont entregado">
				<h1 class="title"><img class="icon" src="/static/images/tracking/op3-pack.svg" alt="">Entregado</h1>
				<div class="data">
					<template x-if="orders.entregado.length > 0">
						<template x-for="order in orders.entregado" :key="order.order_number">
							<div class="order white">
								<div class="f1">
									<p class="orderId" x-text="order.order_number"></p>
									<img :src="order.agency_image" alt="">
								</div>
								<div class="f2">
									<p class="tracking" x-text="order.codes"></p>
									<p class="client_name" x-text="order.client_name"></p>
									<p class="document" x-text="order.client_document"></p>
								</div>
								<div class="f3">
									<p class="origin" x-text="order.origin_agency"></p>
									<span class="line no-animation" :style="`--line-color: ${getLineColor(order.agency_id)}`"></span>
									<p class="destiny" x-text="order.destination_agency"></p>
								</div>
							</div>
						</template>
					</template>
					<template x-if="orders.entregado.length === 0">
						<p class="no-orders">No hay pedidos entregados.</p>
					</template>
				</div>
			</div>
		</div>
	</div>

    <div
		x-show="$store.cache.isVisibleModal('add')"
		@mousedown.self="$store.cache.hideLastModal()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-add"
		x-cloak>

		<form id="registerTrackings" x-ref="form" method="POST" class="modal glass2" @click.stop @submit.prevent="processTracking">
			<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
				<img alt="close" src="/static/images/x.svg" width="12" height="12">
			</div>

			<input
				class="percent40 title"
				type="text"
				x-model="order_number"
				placeholder="Número de orden"
				maxlength="6" 
				@input="order_number = $event.target.value.toUpperCase()"
				@blur="fetchOrderData()"
				required>
			
			<div class="fields">
				<label class="white">
					<select name="agency" id="agency" x-model="agency" @change="updateFields">
						<option value="1">Shalom</option>
						<option value="2">Olva</option>
						<option value="3">Marvisur</option>
					</select>
				</label>

				<label class="white">
					<img alt="user" src="/static/images/id.svg" width="16" height="16">
					<input
						type="text"
						maxlength="15"
						placeholder="DNI / RUC"
						x-model="document"
						x-bind:disabled="disableDoc"
						@blur="fetchDocumentData()"
						required>
				</label>
			</div>

			<div class="fields">
				<label :class="disableName ? 'glass2' : 'white'">
					<img alt="user" src="/static/images/user.svg" width="16" height="16">
					<input 
						x-model="name"
						type="text"
						placeholder="Nombre o Razón Social" 
						maxlength="40" 
						x-bind:disabled="disableName"
						required>
				</label>
			</div>
			
			<div class="fields">
				<label class="white">
					<img alt="phone" src="/static/images/phone.svg" width="16" height="16">
					<input 
						x-model="phone"
						type="tel" 
						placeholder="Celular" 
						minlength="9"
						maxlength="9" 
						x-on:input="
							let val = $event.target.value.replace(/[^0-9]/g, '');
							if (val.length === 1 && val !== '9') {
								val = '';
							}
							phone = val;
						"
						required>
				</label>

				<label class="white">
					<img alt="email" src="/static/images/email.svg" width="16" height="16">
					<input 
						x-model="email"
						type="email" 
						placeholder="Correo"
						maxlength="60">
				</label>
			</div>

			<div class="fields">
				<label class="white">
					<input 
					type="text" 
					:placeholder="config[agency].p1" 
					x-model="code1" 
					x-on:input="
						if (agency === '3') {
							code1 = $event.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
							if (!code1.startsWith('V')) {
								code1 = '';
							}
						} else {
							code1 = $event.target.value.replace(/[^0-9]/g, '');
						}
					" 
					:maxlength="config[agency].m1" 
					required>
				</label>
				
				<template x-if="config[agency].type2 === 'select'">
					<label class="white">
						<select class="sp" x-model="code2" required>
							<template x-for="opt in config[agency].options" :key="opt">
								<option :value="opt" x-text="opt"></option>
							</template>
						</select>
					</label>
				</template>
			
				<template x-if="config[agency].type2 === 'text'">
					<label class="white">
						<input 
							type="text" 
							x-model="code2"
							x-on:input="
							if (agency === '3') {
								code2 = $event.target.value.replace(/[^0-9]/g, '');
							} else {
								code2 = $event.target.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
							}
							"
							:placeholder="config[agency].p2" 
							:maxlength="config[agency].m2" 
							required>
					</label>
				</template>

				<template x-if="agency === '1'">
					<label class="white">
						<input 
							type="text" 
							x-model="code3"
							placeholder="Clave de recojo" 
							maxlength="4">
					</label>
				</template>
			</div>

			<div class="fields">
				<button class="button hover-opacity" type="submit" :class="buttons.add.class" x-text="buttons.add.text"></button>
			</div>
		</form>
	</div>










	<script>
		Alpine.data('tracking_data', () => ({
			order_number: "",    
			document: "",
			name: "", 
			phone: "",    
			email: "",       
			agency: "1",         
			code1: "",          
			code2: "",
			code3: "",
			client_id: null,
			client_order_id: null,
			disableDoc: false,     
			disableName: false,
			orders: {
				agencia: [],
				ruta: [],
				entregado: []
        	},
			config: {
				1: { p1: "N° Orden Shalom", m1: 8, type2: "text", p2: "Código de Orden", m2: 4 },
				2: { p1: "N° de Tracking", m1: 7, type2: "select", options: ["25", "24", "23", "22"] },
				3: { p1: "V001", m1: 4, type2: "text", p2: "0000001", m2: 7 }
			},
			buttons: {
                add: { class: '', text: 'Añadir' },
            },

			async init() {
				console.log('Inicializando Tracking...');

				// Socket
				const socket = Alpine.store('cache').socket;
				if (socket) {
					socket.off("update_tracking_orders");
					socket.on("update_tracking_orders", async () => {
						await this.loadOrders();
					});
				}

				// Load data
				await this.loadOrders();
			},

			editAllowed() {
				const user = Alpine.store('cache').user;
				return (
					(user.department_id === 2 && user.shipping_app_level !== 4) ||
					user.level_id === 4
				);
			},

			updateFields() {
				this.code1 = "";
				this.code2 = "";
				this.code3 = "";
				if (this.agency === "2" && Array.isArray(this.config[this.agency]?.options)) {
					this.code2 = this.config[this.agency].options[0];
				}
				if (this.agency !== "1") {
					this.code3 = null;
				}
				this.$nextTick(() => {});
			},
	  
			fetchOrderData() {
				const orderNumber = this.order_number.trim();
				if (!orderNumber) return;

				fetch(Alpine.store('cache').api + `/client/order_number/${orderNumber}`)
					.then(res => res.json())
					.then(({ data: { client = {}, client_order_id = null } = {} }) => {
						let shouldClear = !client.name && !client.document && !client.phone && !client.email;

						if (client.name) {
							this.name = client.name;
							this.disableName = true;
						} else if (this.disableName) {
							this.name = "";
							this.disableName = false;
						}

						if (client.document) {
							this.document = client.document;
							this.disableDoc = true;
						} else if (this.disableDoc) {
							this.document = "";
							this.disableDoc = false;
						}

						["phone", "email"].forEach(field => {
							if (client[field]) {
								this[field] = client[field];
							} else if (shouldClear) {
								this[field] = "";
							}
						});

						this.client_id = client.id || null;
						this.client_order_id = client_order_id;
					})
					.catch(() => {
						this.name = "";
						this.disableName = false;
						this.document = "";
						this.disableDoc = false;
						["phone", "email"].forEach(field => {
							this[field] = "";
						});
						this.client_id = null;
						this.client_order_id = null;
					});
			},

			fetchDocumentData() {
				const doc = this.document.trim();
				if (!doc) return;

				fetch(Alpine.store('cache').api + `/client/data/${doc}`)
					.then(res => res.json())
					.then(({ data: client = {} } = {}) => {
						['name', 'phone', 'email'].forEach(field => {
							const disableField = `disable${field.charAt(0).toUpperCase() + field.slice(1)}`;
							if (client[field]) {
								this[field] = client[field];
								this[disableField] = true;
							} else if (this[disableField]) {
								this[field] = "";
								this[disableField] = false;
							}
						});
						this.client_id = client.id || null;
					})
					.catch(() => {
						['name', 'phone', 'email'].forEach(field => {
							const disableField = `disable${field.charAt(0).toUpperCase() + field.slice(1)}`;
							if (this[disableField]) {
								this[field] = "";
								this[disableField] = false;
							}
						});
						this.client_id = null;
					});
			},

			getLineColor(agency_id) {
				switch (agency_id) {
					case 1: return '#f2473e';
					case 2: return '#ffb625'; 
					case 3: return '#f58a39'; 
					default: return '#cdcdcd';
				}
			},

			resetForm() {
				this.order_number = "";
				this.document = "";
				this.name = "";
				this.phone = "";
				this.email = "";
				this.client_order_id = "";
				this.client_id = null;
				this.disableDoc = false;
				this.disableName = false;
				this.updateFields();
			},

			async processTracking() {
				if (!this.$refs.form.checkValidity()) {
					return;
				}
                NProgress.start();

				const payload = {
					order_number: this.order_number,
					agency_id: this.agency,
					code1: this.code1,
					code2: this.code2,
					code3: this.code3 || null, 
					client_id: this.client_id || null,
					client_order_id: this.client_order_id || null,
					client: {
						document: this.document,
						name: this.name,
						phone: this.phone,
						email: this.email,
					},
				};

				try {
					const response = await fetch(Alpine.store('cache').api + '/tracking/add', {
						method: 'POST',
						headers: {'Content-Type': 'application/json'},
						body: JSON.stringify(payload),
					});

                    const jsonData = await response.json();
					if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');
					
					Alpine.store('cache').hideModal('add');
					this.resetForm();
					
				} catch (error) {
					this.showError('add', error.message);
                } finally {
                    NProgress.done();
                }
			},

			async loadOrders() {
				try {
					const response = await fetch(Alpine.store('cache').api + "/tracking/all", {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
						},
						body: JSON.stringify({})
					});
					const result = await response.json(); 
					const data = result.data;

					this.orders.agencia = data.filter(order => order.last_status_id === 1);
					this.orders.ruta = data.filter(order => order.last_status_id === 2);
					this.orders.entregado = data.filter(order => order.last_status_id === 3);
				} catch (error) {
					console.error("Error al cargar las órdenes:", error);
				}
			},

			addTracking() {
				Alpine.store('cache').showModal('add');
			}

		}));
	  </script>
	
	






	<style>
        #tracking-dashboard {
			width: 100%;
			user-select: none;
			padding: 1rem;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			gap: 1rem;
			margin: 0 auto;
			max-width: 118rem;
		}
		#tracking-dashboard .header {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#tracking-dashboard .header .title {
			background-color: var(--black);
			color: var(--white);
			padding: 0.75rem 1.5rem;
			border-radius: 2rem;
			font-weight: 300;
		}
		#tracking-dashboard .header .title img {
			padding: 0.5rem;
			border-radius: 0.5rem;
			border: 2px solid #eee;
		}
		#tracking-dashboard .header .range {
			font-size: 1rem;
			font-weight: 600;
			text-transform: capitalize;
			display: flex;
			align-items: center;
			gap: 0.5rem;
			position: relative;
		}
		#tracking-dashboard .container-tracking{
			display: flex;
			flex: 1;
		}
		#tracking-dashboard .container-tracking .cont{
			flex: 1;
			padding: 1rem;
		}
		#tracking-dashboard .container-tracking .cont .title{
			margin: 0 0 1rem 0;
			text-align: center;
			font-size: 1rem;
			font-weight: 400;
		}
		#tracking-dashboard .container-tracking .cont .title .icon{
			width: 1.3rem;
			margin-right: .5rem;
		}
		#tracking-dashboard .container-tracking .cont.ruta{
			border-left: .1rem solid var(--white);
			border-right: .1rem solid var(--white);
		}
		#tracking-dashboard .container-tracking .cont .data{
			display: flex;
			flex-direction: column;
			gap: 1rem;
		}
		#tracking-dashboard .container-tracking .cont .data .no-orders {
			text-align: center;
		}
		#tracking-dashboard .container-tracking .cont .data .order {
			display: flex;
			flex-direction: column;
			padding: 1rem;
		}
		#tracking-dashboard .container-tracking .cont .data .order p{
			margin: 0;
		}
		#tracking-dashboard .container-tracking .cont .data .order .f1{
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#tracking-dashboard .container-tracking .cont .data .order .f1 .orderId{
			font-weight: 500;
			font-size: 1rem;
		}
		#tracking-dashboard .container-tracking .cont .data .order .f1 img{
			height: 1.3rem;
		}
		#tracking-dashboard .container-tracking .cont .data .order .f2{
			display: flex;
			flex-direction: column;
			margin: 1rem 0;
		}
		#tracking-dashboard .container-tracking .cont .data .order .f3{
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#tracking-dashboard .container-tracking .cont .data .order .f3 .origin{
			padding-right: 1rem;
		}
		#tracking-dashboard .container-tracking .cont .data .order .f3 .destiny{
			padding-left: 1rem;
		}  
		#tracking-dashboard .container-tracking .cont .data .order .f3 .line {
			display: flex;
			width: 100%;
			height: 0.5rem;
			background: linear-gradient(90deg, transparent 0%, rgb(255, 255, 255) 40%, var(--line-color) 100%);
			background-size: 200% 100%;
			animation: gradientMove 4s linear infinite;
			margin-top: 0.15rem;
			border-radius: 1rem;
		}
		#tracking-dashboard .container-tracking .cont .data .order .f3 .line.no-animation {
			background: var(--line-color);
			animation: none;
			background-size: initial;
		}
		#tracking-dashboard .container-tracking .cont .data .order .f3 .line.par-animation {
			background: var(--line-color);
			animation: blink 1.5s infinite ease-in-out;
			background-size: initial;
		}

		/* Parpadeo suave */
		@keyframes blink {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.2; }
		}

		@keyframes gradientMove {
			0% {
				background-position: 200% 0;
			}
			100% {
				background-position: -200% 0;
			}
		}
		#registerTrackings {
			width: 36rem;
		}
		#registerTrackings div {
			display: flex;
		}
		#registerTrackings .title {
			font-family: inherit;
			border: none;
			border-radius: 0.75rem;
			padding: 0 0.75rem;
			margin: 0;
			line-height: 2.5rem;
			outline: none;
		}
		#registerTrackings .order,
		#registerTrackings .phone {
			width: 40%;
			margin-bottom: 1rem;
		}
		#registerTrackings .doc,
		#registerTrackings .name {
			width: 58%;
			margin-bottom: 1rem;
		}
		#registerTrackings .email{
			width: 100%;
		}
		#registerTrackings .agen {
			width: 20%;
		}
		#registerTrackings .track {
			width: calc(80% - 1rem);
			gap: 1rem;
		}
		#registerTrackings #error-register{
			width: 100%;
		}
		#registerTrackings #error-register p{
			text-align: center;
			color: red;
			font-size: .9rem;
			font-weight: 600;
			margin: 1rem auto -1rem auto;
			line-height: 1;
		}
		#registerTrackings #error-register p.true{
			color: rgb(11, 199, 73);
		}
		#registerTrackings .order input,
		#registerTrackings .doc input,
		#registerTrackings .name input,
		#registerTrackings .phone input,
		#registerTrackings .email input,
		#registerTrackings .agen select,
		#registerTrackings .track .sp,
		#registerTrackings .track input {
			border: 0.1rem solid var(--newgray);
			padding: 0.5rem;
			border-radius: 0.5rem;
			outline: none;
			width: 100%;
			font-size: 0.9rem;
		}
		#registerTrackings .track input,
		#registerTrackings .track .sp {
			flex: 1;
		}
		#registerTrackings .agen-tit {
			font-size: 1rem;
			font-weight: 1rem;
			width: 100%;
			margin: 0;
			font-weight: 500;
		}
		#registerTrackings .ins {
			width: 100%;
			margin: 2rem 0 0 0;
			border: 0;
			background-color: var(--primary);
			color: var(--white);
			padding: 0.75rem;
			border-radius: 1rem;
			font-size: 0.9rem;
			outline: none;
			cursor: pointer;
		}

		@media only screen and (max-width: 48rem) {
			#tracking-dashboard .container-tracking {
    			flex-direction: column;
			}
			#tracking-dashboard .container-tracking .cont.ruta {
				border-left: none;
    			border-right: none;
				border-bottom: .1rem solid var(--white);
    			border-top: .1rem solid var(--white);
			}

		}
	</style>
</div>
