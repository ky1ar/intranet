<div x-data="logistics_data">
	<div id="logistics">
		<div class="main glass">
			<div class="top">
				<template x-if="editAllowed()">
					<span class="pendings hover-opacity" @click="pendings_open = !pendings_open" x-text="'Pendientes de agendar ' + pendings_total"></span>
				</template>

				<span class="range" x-text="schedule_range"></span>

				<div class="navigation">
					<div class="button white hover-opacity" @click="prev">
						<img alt="prev" src="static/images/arrow.svg" width="16" height="16">
					</div>
					<div class="button white middle hover-opacity" @click="today">Semana actual</div>
					<div class="button white hover-opacity" @click="next">
						<img alt="next" src="static/images/arrow.svg" width="16" height="16">
					</div>
				</div>
			</div>

			<div class="schedule-container">
				<div x-transition.duration.300ms x-cloak x-show="pendings_open" class="pending-shippings">
					<div class="title hover-opacity" @click="processShippingModal()">+ Añadir envío</div>

					<div class="container"
						@dragover="onDragOver($event)" 
						@dragleave="onDragLeave($event)"
						@drop="onDropPending()"
					>
						<template x-if="pending.length > 0">
							<template x-for="shipping in pending" :key="shipping.order_number">
								<div class="item-card"
									:style="`background-color: ${shipping.method_background}; border: 2px solid ${shipping.method_border}`"
									:class="shipping.method_slug"
									:draggable="true"
									@dragstart="onDragStart(shipping)"
									@click="processShippingModal(shipping.shipping_order_id)"
								>   
									<span class="number" x-text="shipping.order_number"></span>
									<span class="district" x-text="shipping.district_name"></span>
									<div class="data">
										<span class="name" x-text="shipping.client_name"></span>
										<span class="address" x-text="shipping.address"></span>
									</div>
									<span class="date" x-text="new Date(shipping.register_date + 'T00:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' })"></span>
								</div>
							</template>
						</template>
						<span class="empty" x-show="!Array.isArray(pending)">No hay órdenes pendientes.</span>
					</div>
				</div>

				<div class="schedule white">
					<template x-for="day in schedule" :key="day.date">
						<div class="day-container">
							<span x-text="day.day_name" class="day-name"></span>

							<template x-for="schedule_index in [1, 2]" :key="schedule_index">
								<div class="order-container"
									@dragover="onDragOver($event, day)" 
									@dragleave="onDragLeave($event)" 
									@drop="onDrop(day, schedule_index)">
									<!--<span class="turn" x-text="schedule_index == 1 ? 'Mañana':'Tarde'"></span>-->
									<template x-if="day.orders['schedule_' + schedule_index]?.length > 0">
										<template x-for="shipping in day.orders['schedule_' + schedule_index]" :key="shipping.order_number">
											<div class="item-card"
												:style="`background-color: ${shipping.method_background}; border: 2px solid ${shipping.method_border}`"
												:class="[shipping.method_slug, isFutureOrToday(day.date) ? '' : 'past-date']"
												:draggable="((editAllowed()) && shipping.status_id != 3 && shipping.status_id != 4)"
												@dragstart="onDragStart(shipping)"
												@click="processShippingModal(shipping.shipping_order_id)"
											>
												<span class="number" x-text="shipping.order_number"></span>
												<span class="district" x-text="shipping.district_name"></span>
												<div class="data">
													<span class="name" x-text="shipping.client_name"></span>
													<span class="address" x-text="shipping.address"></span>
												</div>
												<a class="phone" @click.stop :href="'https://api.whatsapp.com/send?phone=' + shipping.client_phone" target="_blank" rel="nofollow">
													<img src="static/images/wsp.svg" width="16" height="16" alt="phone">
												</a>
												<template x-if="shipping.status_id > 2">
													<span class="status" 
														:style="`border: 2px solid ${shipping.method_border}; 
																background-color: ${shipping.status_id > 3 ? shipping.method_background : 'white'}`"
														x-text="shipping.status_name"></span>
												</template>
											</div>
										</template>
									</template>
							
								</div>
							</template>
							
						</div>
					</template>
				</div>
			</div>

		</div>

		<div
			x-show="$store.cache.isVisibleModal('process')"
			@mousedown.self="$store.cache.hideLastModal()"
			x-transition.duration.300ms
			class="modal-wrap"
			id="modal-shipping"
			x-cloak>
			<div class="modal glass2" @click.stop>
				<input class="percent40 title" type="text" placeholder="Número de orden" x-model="process_shipping.order_number" :disabled="edit" @blur="fetchClientOrder()">

				<div class="fields">
					<label class="white">
						<select x-model="process_shipping.method_id">
							<template x-if="$store.cache.shipping_method?.length !== 1">
								<option value="">Tipo de envío</option>
							</template>

							<template x-for="type in $store.cache.shipping_method" :key="type.id">
								<option :value="type.id" x-text="type.name"></option>
							</template>
						</select>
					</label>

					<label class="white">
						<input type="date" x-model="process_shipping.register_date_format">
					</label>

					<label :class="client_order_found || edit ? 'glass2' : 'white'">
						<img alt="user" src="static/images/id.svg" width="16" height="16">
						<input
							type="text"
							maxlength="11"
							:disabled="client_order_found || edit"
							@input="process_shipping.client_document = process_shipping.client_document.replace(/\D/g, '')"
							placeholder="DNI / RUC"
							x-model="process_shipping.client_document"
							@blur="fetchClientData()">
						<input type="hidden" x-model="process_shipping.client_id">
					</label>
				</div>

				<div class="fields">
					<label :class="client_order_found || client_found || edit ? 'glass2' : 'white'">
						<img alt="user" src="static/images/user.svg" width="16" height="16">
						<input :disabled="client_order_found || client_found || edit" type="text" placeholder="Nombre o Razón Social" x-model="process_shipping.client_name">
					</label>

					<label class="white">
						<img alt="email" src="static/images/email.svg" width="16" height="16">
						<input type="text" placeholder="Email" x-model="process_shipping.client_email">
					</label>

					<label class="white">
						<img alt="phone" src="static/images/phone.svg" width="16" height="16">
						<input type="text" maxlength="9" @input="process_shipping.client_phone = process_shipping.client_phone.replace(/\D/g, '')" placeholder="Celular" x-model="process_shipping.client_phone">
					</label>
				</div>

				<div class="fields">
					<label class="white">
						<img alt="user" src="static/images/location.svg" width="16" height="16">
						<input type="text" placeholder="Dirección" x-model="process_shipping.address">
					</label>

					<label class="white">
						<select x-model="process_shipping.district_id">
							<template x-if="$store.cache.districts?.length !== 1">
								<option value="">Distrito</option>
							</template>
							
							<template x-for="district in $store.cache.districts" :key="district.id">
								<option :value="district.id" x-text="district.name"></option>
							</template>
						</select>
					</label>
				</div>

				<div class="fields">
					<label class="white">
						<img alt="user" src="static/images/maps.svg" width="16" height="16">
						<input type="text" placeholder="Link de Maps" x-model="process_shipping.maps">
					</label>

					<label class="white">
						<select x-model="process_shipping.assigned_id">
							<template x-if="$store.cache.shipping_method?.length !== 1">
								<option value=null>Responsable</option>
							</template>

							<template x-for="vendor in $store.cache.vendors" :key="vendor.id">
								<option :value="vendor.id" x-text="vendor.name"></option>
							</template>
						</select>   
					</label>

					<label class="white">
						<select x-model="process_shipping.driver_id">
							<template x-for="driver in $store.cache.drivers" :key="driver.id">
								<option :value="driver.id" x-text="driver.name"></option>
							</template>
						</select>
					</label>
				</div>
				
				<div class="fields">
					<template x-if="process_shipping.client_order_id && edit && process_shipping.status_id != 3 && process_shipping.status_id != 4">
						<button class="button hover-opacity black" @click="deleteShipping()" :class="buttons.delete.class" x-text="buttons.delete.text"></button>
					</template>
					<button x-show="!edit" class="button hover-opacity" @click="processShipping()" :class="buttons.process.class" x-text="buttons.process.text"></button>
					<button x-show="edit" class="button hover-opacity" @click="processShipping()" :class="buttons.update.class" x-text="buttons.update.text"></button>

				</div>

				<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()" >
					<img alt="close" src="static/images/x.svg" width="12" height="12">
				</div>
			</div>
		</div>

		

		<div
			x-show="$store.cache.isVisibleModal('finish')"
			@mousedown.self="$store.cache.hideLastModal()"
			x-transition.duration.300ms
			class="modal-wrap"
			id="modal-finish"
			x-cloak>
			<div class="modal glass2" @click.stop>
				<div class="top">
					<span class="order" x-text="process_shipping.order_number"></span>
					<span
						class="type"
						:style="`background-color: ${process_shipping.method_background}; border: 2px solid ${process_shipping.method_border}`"
						x-text="process_shipping.method_name">
					</span>
				</div>

				<div class="content">
					<div class="left">
						<div class="white user">
							<span class="letter" x-text="process_shipping.client_name?.charAt(0)"></span>

							<div class="data">
								<span x-text="process_shipping.client_name"></span>
								<span x-text="process_shipping.client_document"></span>
							</div>

							<a class="message hover-opacity" :href="'https://api.whatsapp.com/send?phone=' + process_shipping.client_phone" target="_blank" rel="nofollow">
								<img width="16" height="16" alt="client_phone" src="static/images/whatsapp.svg">
							</a>
						</div>
						
						<div class="white user">
							<img width="16" height="16" alt="client_phone" src="static/images/location.svg">

							<div class="data">
								<span x-text="process_shipping.address"></span>
								<span x-text="process_shipping.district_name"></span>
							</div>

							<template x-if="process_shipping.maps">
								<a class="message hover-opacity" 
									:href="process_shipping.maps" 
									target="_blank" rel="nofollow">
									<img width="16" height="16" alt="notification" src="static/images/maps.svg">
								</a>
							</template>
						</div>

						<div x-show="process_shipping.status_id > 1" class="review glass2">
							<div class="row">
								<span class="detail">Registrado</span>
								<span class="date" x-text="new Date(process_shipping.register_date).toLocaleString('es-ES', { 
									weekday: 'long', 
									day: 'numeric', 
									month: 'long', 
								})"></span>
							</div>

							<div class="row" x-show="process_shipping.on_the_way_date">
								<span class="detail">En camino</span>
								<span class="date" x-text="new Date(process_shipping.on_the_way_date).toLocaleString('es-ES', { 
									weekday: 'long', 
									day: 'numeric', 
									month: 'long', 
									hour: '2-digit', 
									minute: '2-digit', 
								})"></span>
							</div>
							
							<div class="row" x-show="process_shipping.status_id === 4 ? process_shipping.delivered_date : process_shipping.not_delivered_date">
								<span x-text="process_shipping.status_id === 4 ? 'Entregado' : 'No entregado'"></span>
								<span class="date" x-text="new Date(process_shipping.status_id === 4 ? process_shipping.delivered_date : process_shipping.not_delivered_date).toLocaleString('es-ES', { 
									weekday: 'long', 
									day: 'numeric', 
									month: 'long', 
									hour: '2-digit', 
									minute: '2-digit', 
								})"></span>
							</div>
						</div>
					</div>

					<div x-show="process_shipping.proof_photo" class="right">
						<img 
							class="thumbnail hover-opacity" 
							:src="'/static/images/uploads/' + process_shipping.proof_photo" 
							alt="preview" 
							@click="$store.cache.showModal('image');"
						>
					</div>
				</div>
				
				<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()" >
					<img alt="close" src="static/images/x.svg" width="12" height="12">
				</div>
			</div>
		</div>



		<div 
			x-show="$store.cache.isVisibleModal('image')"
			@mousedown.self="$store.cache.hideLastModal()"
			x-transition.duration.300ms
			class="modal-wrap"
			id="modal-image"
			x-cloak>
			<div class="modal glass2">
				<img 
					@click="$store.cache.hideLastModal()"
					:src="'/static/images/uploads/' + process_shipping.proof_photo"
					alt="preview"
					style="border-radius: 0.75rem;">
			</div>
			
		</div>


	</div>













	<script>
		Alpine.data('logistics_data',() => ({
			pending: [],
			pendings_total: 0,
			pendings_open: false,
			schedule: [],
			schedule_range: '',
			offset: 0,
			process_shipping: {},
			selected_shipping: {},
			edit: false,
			buttons: {
                process: { class: '', text: 'Añadir' },
                update: { class: '', text: 'Actualizar' },
                delete: { class: '', text: 'Eliminar' },
            },
			client_order_found: false,
			client_found: false,
			
			async init() {
				console.log('Inicializando Logistics...');

                this.initSocket();

				const fetchDataIfNeeded = !Alpine.store('cache').isLoaded('drivers') ? this.fetchData() : Promise.resolve();
				await Promise.all([fetchDataIfNeeded, this.getPending(), this.getDashboard()]);
			},

			async initSocket() {
				try {
					this.socket = io(Alpine.store('cache').api +"/");

					this.socket.on("update_dashboard", async () => {
						await Promise.all([this.getPending(), this.getDashboard()]);
					});

					this.socket.on("connect_error", (err) => {
						console.error("Error en la conexión del socket:", err.message);
					});

				} catch (error) {
					console.error("Error inicializando WebSocket:", error);
				}
			},

			async fetchData() {
				try {
					const [drivers, vendors, districts, shippingMethod] = await Promise.all([
						fetch(Alpine.store('cache').api + '/general/drivers').then(res => res.json()),
						fetch(Alpine.store('cache').api + '/general/vendors').then(res => res.json()),
						fetch(Alpine.store('cache').api + '/general/districts').then(res => res.json()),
						fetch(Alpine.store('cache').api + '/general/shipping_types').then(res => res.json())
					]);

					Alpine.store('cache').setData('drivers', drivers.data);
					Alpine.store('cache').setData('vendors', vendors.data);
					Alpine.store('cache').setData('districts', districts.data);
					Alpine.store('cache').setData('shipping_method', shippingMethod.data);

					//this.process_shipping.driver_id = this.selectFirstOption(this.drivers);
					//await Promise.all([this.getPending(), this.getDashboard()]);
				} catch (error) {
					console.error('Error fetching data', error);
				}
			},

			editAllowed() {
				const user = Alpine.store('cache').user;
				return (
					(user.department_id === 2 && user.shipping_app_level !== 4) ||
					user.level_id === 4
				);
			},

			onDragStart(shipping) {
				console.log('dragging');
				this.selected_shipping = shipping;
			},

			onDragOver(event, day=null) {
				event.preventDefault();
				if (day) {
					if (this.isFutureOrToday(day.date)) {
						event.currentTarget.classList.add('drag-over');
						event.dataTransfer.dropEffect = 'move';
					} else {
						event.dataTransfer.dropEffect = 'none';
					}
				}
			},
			
			onDragLeave(event) {
				event.currentTarget.classList.remove('drag-over');
			},
			
			async onDrop(day, schedule) {
				document.querySelectorAll('.order-container').forEach(container => {
					container.classList.remove('drag-over');
				});
			
				if (!this.selected_shipping) {
					console.error('No hay orden seleccionada.');
					return;
				}
			
				if (!this.isFutureOrToday(day.date)) {
					console.warn('No se puede soltar en fechas pasadas.');
					return;
				}
			
				if (this.selected_shipping.delivery_date == day.date && this.selected_shipping.schedule_id == schedule) {
					return;
				}

				NProgress.start();
				
				const payload = {
					shipping_order_id: this.selected_shipping.shipping_order_id,
					delivery_date: day.date,
					status_id: 2,
					schedule_id: schedule,
					user_id: Alpine.store('cache').user.id
				};
				try {
					const response = await fetch(Alpine.store('cache').api + '/logistic/set', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify(payload)
					});
			
					if (!response.ok) {
						throw new Error('Error al asignar la orden.');
					}
					
				} catch (error) {
					console.error('Error en la asignación:', error);
                } finally {
                    NProgress.done();
                }
			},

			async onDropPending() {
				if (!this.selected_shipping) {
					console.error('No hay orden seleccionada.');
					return;
				}
				if (this.selected_shipping.status_id == 1) {
					return;
				}

				NProgress.start();

				const payload = {
					shipping_order_id: this.selected_shipping.shipping_order_id,
					delivery_date: null,
					status_id: 1,
					schedule_id: null,
					user_id: Alpine.store('cache').user.id
				};
				try {
					const response = await fetch(Alpine.store('cache').api + '/logistic/set', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify(payload)
					});

					if (!response.ok) {
						throw new Error('Error al asignar la orden.');
					}

				} catch (error) {
					console.error('Error en la asignación:', error);
                } finally {
                    NProgress.done();
                }
			},
			
			async getPending() {
				try {
					const response = await fetch(Alpine.store('cache').api + '/logistic/pending').then(res => res.json());
					this.pending = response.data || [];
					this.pendings_total = Array.isArray(this.pending) ? this.pending.length : 0;

				} catch (error) {
					console.error('Error fetching schedule', error);
				}
			},

			async getDashboard() {
				NProgress.start();

				try {
					const scheduleRes = await fetch(Alpine.store('cache').api + `/logistic/dashboard/week?offset=${this.offset}`).then(res => res.json());
					this.schedule = scheduleRes.data || [];
					this.schedule_range = this.getDateRange(this.schedule)
				} catch (error) {
					console.error('Error fetching schedule', error);
				} finally {
                    NProgress.done();
                }
			},

			async fetchClientData() {
				if (this.client_order_found) {
					return;
				}
				const document = this.process_shipping.client_document;

				if (!document) {
					this.process_shipping.client_id = '';
					this.process_shipping.client_name = '';
					this.process_shipping.client_phone = '';
					this.client_found = false;
					return;
				}
                NProgress.start();

				try {
					const response = await fetch(Alpine.store('cache').api + `/client/data/${document}`);
					if (!response.ok) {
						this.process_shipping.client_id = '';
						this.process_shipping.client_name = '';
						this.process_shipping.client_phone = '';
						this.client_found = false;
						return;
					}

					const data = await response.json();
					if (data.success) {
						this.process_shipping.client_id = data.data.id;
						this.process_shipping.client_name = data.data.name;
						this.process_shipping.client_phone = data.data.phone;
						this.client_found = true;
					} else {
						console.warn('Respuesta de API no exitosa.');
					}
				} catch (error) {
					console.error('Error fetching schedule', error);
				} finally {
                    NProgress.done();
                }
			},

			async fetchClientOrder() {
				const order_number = this.process_shipping.order_number;
				if (!order_number) {
					this.process_shipping.client_order_id = '';
					this.process_shipping.client_id = '';
					this.process_shipping.client_document = '';
					this.process_shipping.client_name = '';
					this.process_shipping.client_phone = '';
					this.process_shipping.client_email = '';
					this.client_order_found = false;
					this.client_found = false;
					return;
				}
                NProgress.start();

				try {
					const response = await fetch(Alpine.store('cache').api + `/client/order_number/${order_number}`);
					if (!response.ok) {
						this.process_shipping.client_order_id = '';
						this.process_shipping.client_id = '';
						this.process_shipping.client_document = '';
						this.process_shipping.client_name = '';
						this.process_shipping.client_phone = '';
						this.process_shipping.client_email = '';
						this.client_order_found = false;
						this.client_found = false;
						return;
					}

					const data = await response.json();
					if (data.success) {
						const client = data.data.client;

						this.process_shipping.client_order_id = data.data.client_order_id;
						this.process_shipping.client_id = client.id;
						this.process_shipping.client_document = client.document;
						this.process_shipping.client_name = client.name;
						this.process_shipping.client_phone = client.phone;
						this.process_shipping.client_email = client.email;
						this.client_order_found = true;
					} else {
						console.warn('Respuesta de API no exitosa.');
					}
				} catch (error) {
					console.error('Error fetching schedule', error);
				} finally {
                    NProgress.done();
                }
			},

			async processShipping() {
                NProgress.start();
				
				const payload = {
					shipping_order_id: this.process_shipping.shipping_order_id,
					client_order_id: this.process_shipping.client_order_id,
					order_number: this.process_shipping.order_number,
					method_id: this.process_shipping.method_id,
					driver_id: this.process_shipping.driver_id,
					assigned_id: this.process_shipping.assigned_id,
					user_id: Alpine.store('cache').user.id,
					driver_id: 4,
					address: this.process_shipping.address,
					district_id: this.process_shipping.district_id,
					maps: this.process_shipping.maps,
					register_date: this.process_shipping.register_date_format,
					client_id: this.process_shipping.client_id,
					client: {
						document: this.process_shipping.client_document,
						email: this.process_shipping.client_email,
						name: this.process_shipping.client_name,
						phone: this.process_shipping.client_phone,
					},
					comments: ""
				};

				try {
					const response = await fetch(Alpine.store('cache').api + '/logistic/process', {
						method: 'POST',
						headers: {'Content-Type': 'application/json'},
						body: JSON.stringify(payload),
					});

                    const jsonData = await response.json();
					if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');
					
					Alpine.store('cache').hideModal('process');
					this.resetOrder();
					
				} catch (error) {
					if (this.edit) {
                    	this.showError('update', error.message);
					} else {
                    	this.showError('process', error.message);
					}
                } finally {
                    NProgress.done();
                }
			},

			async deleteShipping() {
                NProgress.start();

				const payload = {
					shipping_order_id: this.process_shipping.shipping_order_id,
					user_id: Alpine.store('cache').user.id,
				};
				
				try {
					const response = await fetch(Alpine.store('cache').api + '/logistic/delete', {
						method: 'POST',
						headers: {'Content-Type': 'application/json'},
						body: JSON.stringify(payload)
					});
				
					const jsonData = await response.json();
					if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');
					
					Alpine.store('cache').hideModal('process');
					this.resetOrder();
					
				} catch (error) {
                    this.showError('delete', error.message);
                } finally {
                    NProgress.done();
                }
			},
			
			resetOrder() {
                this.process_shipping = {};
				this.edit = false;
            },

			showError(btnKey, errorMsg) {
                const originalText = this.buttons[btnKey].text;
                const originalClass = this.buttons[btnKey].class;

                if (originalClass == 'error') {
                    return;
                }
                this.buttons[btnKey].text = errorMsg;
                this.buttons[btnKey].class = 'error';

                setTimeout(() => {
                    this.buttons[btnKey].text = originalText;
                    this.buttons[btnKey].class = originalClass;
                }, 1000);
            },
			
			getDateRange(data) {
				const dates = data.map(item => new Date(item.date));
				const startDate = dates[0];
				const endDate = dates[dates.length - 1];

				const getNames = (date) => {
					const months = [
						"Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
						"Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
					];
					return months[date.getMonth()];
				};

				const startMonth = getNames(startDate);
				const startYear = startDate.getFullYear();
				const endMonth = getNames(endDate);
				const endYear = endDate.getFullYear();

				if (startMonth === endMonth && startYear === endYear) {
					return `${startMonth} ${startYear}`;
				} else {
					return `${startMonth} ${startYear} - ${endMonth} ${endYear}`;
				}
			},

			async processShippingModal(shipping_order_id){
				this.client_order_found = false;
				if (shipping_order_id){
					await this.getShipping(shipping_order_id);
					if (this.process_shipping.status_id > 3 || (Alpine.store('cache').user.department_id != 2 && Alpine.store('cache').user.level_id != 4) || Alpine.store('cache').user.shipping_app_level == 4){
						Alpine.store('cache').showModal('finish');
					} else {
						Alpine.store('cache').showModal('process');
					}
				} else {
					this.resetOrder();
					Alpine.store('cache').showModal('process');
				}
			},
			
			async getShipping(shipping_order_id) {
				NProgress.start();

				try {
					const response = await fetch(Alpine.store('cache').api + `/logistic/shipping_order_id/${shipping_order_id}`).then(res => res.json());
					this.process_shipping = response.data || {};
					this.edit = true;

				} catch (error) {
					console.error('Error fetching order:', error);
                } finally {
                    NProgress.done();
                }
			},

			async next() {
				this.offset++;
				await this.getDashboard();

				/*if (this.auth.app_level == 4) {
					await this.getShippingDay();
				} else {
					await this.getDashboard();
				}*/
			},

			async prev() {
				this.offset--;
				await this.getDashboard();

				/*if (this.auth.app_level == 4) {
					await this.getShippingDay();
				} else {
					await this.getDashboard();
				}*/
			},

			async today() {
				if (this.offset == 0) {
					return;
				}
				this.offset = 0;
				await this.getDashboard();
				/*
				if (this.auth.app_level == 4) {
					await this.getShippingDay();
				} else {
					await this.getSchedule();
				}*/
			},
			
			isFutureOrToday(dateString) {
				if (!dateString) return false;
				const today = new Date();
				today.setHours(0, 0, 0, 0);
			
				const dateParts = dateString.split('-');
				const targetDate = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
			
				return targetDate >= today;
			},
			
		}));
	</script>
