<div x-data="imports_data">
	<div id="dashboard">
		<div class="controls">
			<div class="toggle-collapse frost" @click="$store.cache.toogleMoreMenu()" @click.outside="$store.cache.hideMoreMenu()">
				<div class="item">
					<img alt="" width="24" height="24" src="/static/images/icons/more.svg">
				</div>
			</div>

			<div class="menu-collapse frost" x-transition.duration.300ms x-show="$store.cache.more_menu">
				<div class="item" @click="pendings_open = !pendings_open" x-show="editAllowed()">
					<img alt="" width="22" height="22" src="/static/images/icons/pending.svg">
				</div>
				<!-- <div class="item" @click="search()">
					<img alt="" width="18" height="18" src="/static/images/icons/find.svg">
				</div>
				<div class="item" @click="viewHistory()">
					<img alt="" width="18" height="18" src="/static/images/icons/history.svg">
				</div>
				<div class="item" @click="viewStatistics()">
					<img alt="" width="18" height="18" src="/static/images/icons/report.svg">
				</div> -->
			</div>
			
			<!-- <div class="left mobile-hide frost">
				<div class="item" @click="search()">
					<img alt="" width="20" height="20" src="/static/images/icons/find.svg">
					<span>Buscar</span>
				</div>
				<div class="item" @click="viewHistory()">
					<img alt="" width="20" height="20" src="/static/images/icons/history.svg">
					<span>Historial</span>
				</div>
				<div class="item" @click="viewStatistics()">
					<img alt="" width="20" height="20" src="/static/images/icons/report.svg">
					<span>Estadísticas</span>
				</div>
			</div>  -->

			
			
			<div class="right frost-dark" x-show="editAllowed()" style="margin-left: auto;">
				<div class="mobile-hide item" @click="pendings_open = !pendings_open">
					<img class="invert" alt="" width="20" height="20" src="/static/images/icons/pending.svg">
					<span x-text="`Borradores ${$store.cache.getData('imports_pendings')?.length || 0}`"></span>
				</div>
				
				<div class="item" @click="addOrder()">
					<img class="invert" alt="" width="20" height="20" src="/static/images/icons/add.svg">
					<span>Añadir</span>
				</div>
			</div>
		</div>

		<div class="main-container">
			<div x-transition.duration.300ms x-cloak x-show="pendings_open" class="pending-imports">
				<div class="container"
					@dragover="onDragOver($event)" 
					@dragleave="onDragLeave($event)"
					@drop="onDrop()"
				>
					
					<template x-if="$store.cache.getData('imports_pendings')?.length > 0">
						<template x-for="item in $store.cache.getData('imports_pendings')" :key="item.id">
							<div class="item-card white"
								:draggable="true"
								@dragstart="onDragStart(item)"
								@click="viewItem(item.id)"
							>   
								<div class="row">
									<span class="order-number" x-text="`SP-${item.id}`"></span>
								</div>
								<div class="row">
									<div>
										<span class="title" x-text="item.provider_name"></span>
										<span class="sub" x-text="item.business_name"></span>
									</div>
								</div>
								<img alt="repeat" x-show="item.type_id == 1" src="/static/images/icons/filled/ship.svg" width="28" height="28">
								<img alt="repeat" x-show="item.type_id == 2" class="ico" src="/static/images/icons/filled/plane.svg" width="20" height="20" style="display: none;">
							</div>
						</template>
					</template>
					<span class="empty glass" x-show="!Array.isArray($store.cache.getData('imports_pendings'))">No hay borradores</span>
				</div>
			</div>

			<div class="board glass">
				<template x-for="group in $store.cache.getData('imports_dashboard')" :key="group.status_id">
					<div class="group"
						@dragover="onDragOver($event, group.status_id)" 
						@dragleave="onDragLeave($event)"
						@drop="onDrop(group.status_id)">
						<div class="name">
							<img alt="" width="24" height="24"
								:src="'/static/images/imports/' + ($store.cache.getById('imports_status', group.status_id)?.image || 'default.png')"
								alt="">
							<span x-text="$store.cache.getById('imports_status', group.status_id)?.name || ''"></span>
						</div>

						<ul>
							<template x-if="group.imports.length > 0">
								<template x-for="item in group.imports" :key="item.id">
									<li
										:draggable="editAllowed()"
										@dragstart="onDragStart(item)"
										@click="viewItem(item.id)"
										class="white"
										>
										<div class="row">
											<span class="order-number"  x-text="`SP-${item.id}`"></span>

											<template x-if="item.updated_today">
												<div class="update-dot"></div>
											</template>

											<div class="passed-days">
												<span class="register-day" x-text="`${item.passed_days} d.`"></span>
											</div>
										</div>

										<div class="row">
											<div>
												<span class="title" x-text="item.provider_name"></span>
												<span class="sub" x-text="item.business_name"></span>
											</div>
										</div>

										<img alt="repeat" x-show="item.type_id == 1" src="/static/images/icons/filled/ship.svg" width="28" height="28">
										<img alt="repeat" x-show="item.type_id == 2" class="ico" src="/static/images/icons/filled/plane.svg" width="20" height="20">
										<span x-show="item.traffic_light" class="dot" :class="item.traffic_light"></span>
									</li>
								</template>
							</template>
						</ul>
					</div>
				</template>
			</div>
		</div>


		<div
			x-show="$store.cache.isVisibleModal('view')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-view"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 extrabig" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="top">
					<span class="title" x-text="`SP-${import_data?.id}`"></span>
					<span class="days" x-text="`${import_data?.passed_days} transcurridos`"></span>
				</div>
				
				<div class="modal-content dual">
					<div class="dataview overflow percent50">
						<div class="box white">
							<div class="container">
								<span class="letter" x-text="import_data?.provider?.name?.charAt(0)"></span>

								<div class="data">
									<div class="head">
										<span class="name" x-text="import_data?.provider?.name"></span>
										<span class="line">|</span>
										<span class="contact" x-text="import_data?.provider?.contact"></span>
									</div>
									<div class="pair-content">
										<div x-show="import_data?.provider?.email" class="pair">
											<img alt="" width="14" height="14" src="/static/images/email.svg">
											<span class="text" x-text="import_data?.provider?.email"></span>
										</div>
										
										<div x-show="import_data?.provider?.phone" class="pair">
											<img alt="" width="14" height="14" src="/static/images/phone.svg">
											<span class="text" x-text="import_data?.provider?.phone"></span>
										</div>

										<div x-show="import_data?.provider?.telephone" class="pair">
											<img alt="" width="14" height="14" src="/static/images/phone.svg">
											<span class="text" x-text="import_data?.provider?.telephone"></span>
										</div>
									</div>
								</div>
								
								<img alt="repeat" x-show="import_data?.type_id == 1" class="type" src="/static/images/icons/filled/ship.svg" width="28" height="28">

								<img alt="repeat" x-show="import_data?.type_id == 2" class="type fix" src="/static/images/icons/filled/plane.svg" width="20" height="20" style="display: none;">

								<span x-show="import_data?.traffic_light" class="dot red" :class="import_data?.traffic_light"></span>
							</div>
							
							<div class="pair-content">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/location.svg">
									<span class="black" x-text="`Puerto:`"></span>
									<span class="text" x-text="`${import_data?.port_name}`"></span>
								</div>
								
								<div class="pair">
									<img alt="" width="14" height="14" src="/static/images/icons/board.svg">
									<span class="black" x-text="`Incoterm:`"></span>
									<span class="text" x-text="`${import_data?.incoterm_code}`"></span>
								</div>

								<div class="pair buss">
									<span class="black" x-text="`${import_data?.business_name}`"></span>
								</div>
							</div>
						</div>

						<div class="box white">
							<div class="pair-content">
								<div class="pair">
									<img alt="" width="14" height="14" src="/static/images/icons/user.svg">
									<span class="black" x-text="`Agente local:`"></span>
									<span class="text" x-text="`${import_data?.local_agent_name}`"></span>
								</div>
							</div>

							<div class="pair-content">
								<div class="pair">
									<img alt="" width="14" height="14" src="/static/images/icons/user.svg">
									<span class="black" x-text="`Agente de origen:`"></span>
									<span class="text" x-text="`${import_data?.origin_agent_name}`"></span>
								</div>
							</div>
						</div>

						<div class="box white"  x-show="import_data?.dates?.booking">
							<div class="pair-content">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/filled/calendar.svg">
									<span class="black" x-text="`Fecha de reserva:`"></span>
									<span class="text" x-text="`${import_data?.dates?.booking}`"></span>
								</div>

							</div>
							
							<div class="pair-content" x-show="import_data?.dates?.etd">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/filled/calendar.svg">
									<span class="black" x-text="`Salida estimada:`"></span>
									<span class="text" x-text="`${import_data?.dates?.etd}`"></span>
								</div>
							</div>
							
							<div class="pair-content" x-show="import_data?.dates?.eta">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/filled/calendar.svg">
									<span class="black" x-text="`Llegada estimada:`"></span>
									<span class="text" x-text="`${import_data?.dates?.eta}`"></span>
								</div>
							</div>
							
							<div class="pair-content" x-show="import_data?.dates?.deadline">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/filled/calendar.svg">
									<span class="black" x-text="`Deadline:`"></span>
									<span class="text" x-text="`${import_data?.dates?.deadline}`"></span>
								</div>
							</div>
							
							<div class="pair-content" x-show="import_data?.dates?.pay">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/filled/calendar.svg">
									<span class="black" x-text="`Pago:`"></span>
									<span class="text" x-text="`${import_data?.dates?.pay}`"></span>
								</div>
							</div>
						</div>

						<div class="box white"  x-show="import_data?.cargo_details?.qty">
							<div class="pair-content" style="justify-content: space-between;">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/imports/pickup.svg">
									<span class="black" x-text="`Cantidad:`"></span>
									<span class="text" x-text="`${import_data?.cargo_details?.qty}`"></span>
								</div>

								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/imports/pickup.svg">
									<span class="black" x-text="`Pallets:`"></span>
									<span class="text" x-text="`${import_data?.cargo_details?.pallets}`"></span>
								</div>

								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/imports/pickup.svg">
									<span class="black" x-text="`Peso (kg):`"></span>
									<span class="text" x-text="`${import_data?.cargo_details?.weight}`"></span>
								</div>

								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/imports/pickup.svg">
									<span class="black" x-text="`Vol. (m³):`"></span>
									<span class="text" x-text="`${import_data?.cargo_details?.volume}`"></span>
								</div>
							</div>
						</div>

						<div class="box white"  x-show="import_data?.delivery?.date">
							<div class="pair-content">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/filled/calendar.svg">
									<span class="black" x-text="`Fecha de entrega:`"></span>
									<span class="text" x-text="`${import_data?.delivery?.date}`"></span>
								</div>
							</div>
							<div class="pair-content">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/filled/calendar.svg">
									<span class="black" x-text="`Hora de la cita:`"></span>
									<span class="text" x-text="`${import_data?.delivery?.time}`"></span>
								</div>
							</div>
							<div class="pair-content" x-show="import_data?.delivery?.name">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/user.svg">
									<span class="black" x-text="`Nombre:`"></span>
									<span class="text" x-text="`${import_data?.delivery?.name}`"></span>
								</div>
							</div>
							<div class="pair-content" x-show="import_data?.delivery?.phone">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/user.svg">
									<span class="black" x-text="`Celular:`"></span>
									<span class="text" x-text="`${import_data?.delivery?.phone}`"></span>
								</div>
							</div>
							<div class="pair-content" x-show="import_data?.delivery?.code">
								<div class="pair">
									<img alt="" width="16" height="16" src="/static/images/icons/user.svg">
									<span class="black" x-text="`Placa:`"></span>
									<span class="text" x-text="`${import_data?.delivery?.code}`"></span>
								</div>
							</div>
						</div>
						
						<template x-for="section in (import_data?.attachment_sections || [])" :key="section.target">
							<div class="box white" x-show="section.files && section.files.length">
								<div class="pair-content" style="margin-bottom: .5rem;">
									<div class="pair">
										<img alt="" width="14" height="14" src="/static/images/icons/filled/clip.svg">
										<span class="black" x-text="section.label"></span>
										<span class="text" x-text="`(${section.files.length})`"></span>
									</div>
								</div>

								<div class="modal-content bottom thumbnails-grid small-grid">
									<template x-for="f in section.files" :key="f.id">
										<div class="thumb-item hover-opacity" @click="openAttachment(f)">
											<div class="thumbnail-wrapper">
												<template x-if="isImageFile(f)">
													<img class="hover-opacity" :src="getInlineUrl(f)" :alt="f.original_name">
												</template>

												<template x-if="!isImageFile(f)">
													<div class="file-card">
														<div class="file-ext" x-text="(f.ext || '').toUpperCase()"></div>
													</div>
												</template>
											</div>

											<div class="thumb-caption" x-text="f.original_name" :title="f.original_name"></div>
										</div>
									</template>
								</div>
							</div>
						</template>
					</div>

					
					<div class="comments-container white percent50">
						<div class="comments-box overflow" x-ref="commentsBox">
							<template x-if="!import_data?.chats || import_data?.chats?.length === 0">
								<div class="no-comments">Nada por aquí</div>
							</template>
							
							<template x-for="chat in import_data?.chats" :key="chat.id">
								<div class="user-comment" :class="{'self': chat.commenter_id == user.id}">
									<img alt="user" :src="'/static/images/uploads/users/' + chat.commenter_image" width="24" height="24">
									<div class="white bubble">
										<div class="top">
											<span x-text="chat.commenter_id == user.id ? 'Tú' :chat.commenter_name"></span>
											<p x-text="chat.created_at"></p>
										</div>
										<p x-text="chat.comment"></p>
									</div>
								</div>
							</template>
						</div>

						<div class="comments-input white">
							<label>
								<textarea type="text" x-model="message" placeholder="Ingresa un mensaje..." @keydown.enter="handleEnterSend($event)"></textarea>
							</label>
							<div class="send hover-opacity" @click="sendChat()" :class="{'disabled': message == '' || message === undefined}">
								<img alt="enviar" width="16" height="16" src="/static/images/icons/send.svg">
							</div>
						</div>
					</div>

				</div>

				<!-- <div class="buttons" x-show="editAllowed() && import_data?.status_id >= 8">
					<button class="button hover-opacity" @click="finish(import_data)"  x-show="import_data?.status_id == 8">Finalizar</button>
				</div> -->
			</div>
		</div>


		<div
			x-show="$store.cache.isVisibleModal('status')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-status"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal little glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="title">
					<span x-text="`${selected_import?.type_letter}-${selected_import?.id}`"></span>
				</div>
				
				<div class="modal-content">
					<div class="update">
						<div class="box">
							<img alt="" width="28" height="28"
								:src="'/static/images/imports/' + ($store.cache.getById('imports_status', selected_import?.status_id)?.image)"
								alt="from">
							<span x-text="($store.cache.getById('imports_status', selected_import?.status_id))?.name"></span>
						</div>

						<div class="box">
							<img alt="" width="28" height="28"
								:src="'/static/images/imports/' + ($store.cache.getById('imports_status', selected_group_id)?.image)"
								alt="to">
							<span x-text="($store.cache.getById('imports_status', selected_group_id))?.name"></span>
						</div>
						<img alt="" class="arrow" width="16" height="16" src="/static/images/arrownext.svg">
					</div>
						
					<template x-if="selected_import?.status_id == 2">
						<div class="fields options">
							<label class="white">
								<img alt="repeat" src="/static/images/icons/calendar.svg" width="16" height="16">

								<span
									style="cursor: pointer; flex: 1; line-height: 2.5rem;"
									@click="
										if ($refs.booking_date_input.showPicker) {
											$refs.booking_date_input.showPicker();
										} else {
											$refs.booking_date_input.focus();
										}
									"
									x-text="dateLabel(booking_date, 'Fecha de Booking')"
								></span>

								<input
									x-ref="booking_date_input"
									type="date"
									x-model="booking_date"
									:min="minDate"
									style="
										position:absolute;
										inset:0;
										opacity:0;
										pointer-events:none;
									"
								>
							</label>
						</div>
					</template>

					<template x-if="selected_import?.status_id == 4">
						<div class="capture-proof">
							<span class="name">Documentos</span>

							<div class="bottom thumbnails-grid small-grid" >
								<template x-for="(f, index) in pendingDocs('consolidated')" :key="f.id">
									<div class="thumb-item" @click="removePendingDocById(f.id)">
										<div class="thumbnail-wrapper">
											<div class="delete-button">
												<img class="delete" alt="delete" width="24" height="24"
													src="/static/images/icons/delete.svg">
											</div>

											<template x-if="isImageFile(f)">
												<img class="thumbnail" :src="f.preview" :alt="f.original_name">
											</template>

											<template x-if="!isImageFile(f)">
												<div class="file-card thumbnail">
													<div class="file-ext" x-text="(f.ext || '').toUpperCase()"></div>
												</div>
											</template>
										</div>

										<div class="thumb-caption" x-text="f.original_name" :title="f.original_name"></div>
									</div>
								</template>

								<div class="add-button hover-opacity" @click="$refs.consolidatedInput.click()">
									<img alt="" width="24" height="24" src="/static/images/icons/add2.svg">
								</div>

								<input
									type="file"
									class="hidden"
									multiple
									x-ref="consolidatedInput"
									data-target="consolidated"
									accept=".pdf,.xml,.txt,.doc,.docx,.xls,.xlsx,image/*"
									@change="queueDocs($event)"
									/>
							</div>
						</div>
					</template>

					<template x-if="selected_import?.status_id == 5">
						<div class="fields options">
							<label class="white">
								<img alt="repeat" src="/static/images/icons/calendar.svg" width="16" height="16">

								<span
									style="cursor: pointer; flex: 1; line-height: 2.5rem;"
									@click="
										if ($refs.etd_date_input.showPicker) {
											$refs.etd_date_input.showPicker();
										} else {
											$refs.etd_date_input.focus();
										}
									"
									x-text="dateLabel(etd_date, `ETD`)"
								></span>

								<input
									x-ref="etd_date_input"
									type="date"

						<label class="white">
							<img alt="" alt="user" src="/static/images/user.svg" width="16" height="16">
							<input type="text" placeholder="Agente local" x-model="new_import.local_agent">
						</label>

						<label class="white">
							<img alt="" alt="user" src="/static/images/user.svg" width="16" height="16">
							<input type="text" placeholder="Agente origen" x-model="new_import.origin_agent">
						</label>
					</div>
				</div>

				<div class="buttons">
					<button class="button hover-opacity" @click="newImport()" :class="buttons.add.class" x-text="buttons.add.text"></button>
				</div>
			</div>
		</div>


		<div 
			x-show="$store.cache.isVisibleModal('attachment')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-attachment"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal small glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<!-- <div class="top" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
					<span class="title" x-text="viewer_file?.original_name || 'Archivo'"></span>

					<a class="button hover-opacity"
						x-show="viewer_file?.download_url"
						:href="viewer_file?.download_url"
						target="_blank"
						rel="noopener noreferrer">
						Descargar
					</a>
				</div> -->

				<div class="modal-content">
					<!-- PDF -->
					<template x-if="viewer_payload?.kind === 'url' && isPdfFile(viewer_file)">
						<iframe :src="viewer_payload.url" style="width:100%; height:70vh; border:0;"></iframe>
					</template>

					<!-- Imagen -->
					<template x-if="viewer_payload?.kind === 'url' && isImageFile(viewer_file)">
						<img style="border-radius: 0.75rem;" :src="viewer_payload.url">
					</template>

					<!-- Texto -->
					<template x-if="viewer_payload?.kind === 'text'">
						<div class="white" style="white-space:pre-wrap; padding: 1rem;" x-text="viewer_payload.text"></div>
					</template>

					<!-- HTML (xlsx preview) -->
					<template x-if="viewer_payload?.kind === 'html'">
						<div style="max-height:70vh;" x-html="viewer_payload.html"></div>
					</template>

					<!-- No preview -->
					<template x-if="viewer_payload?.kind === 'download'">
						<div style="text-align: center;" x-text="viewer_payload.message"></div>
					</template>
				</div>
			</div>
		</div>
	</div>


	<script>
		Alpine.data('imports_data',() => ({
			api: Alpine.store('cache').api,
			user: Alpine.store('cache').user,
			docs: [],
			minDate: "",
			status_notes: '',
			booking_date: null,
			etd_date: null,
			eta_date: null,
			deadline_date: null,
			delivery_date: null,
			delivery_time: null,
			delivery_name: '',
			delivery_phone: '',
			delivery_code: '',
			pay_date: null,
			qty: null,
			pallets: null,
			weight: null,
			volume: null,
			selected_import: null,
			import_data: null,
			selected_provider: null,
			pendings_open: false,
			traffic_light: 'green',
			new_import: {
				provider_id: null,
				business_id: null,
				type_id: null,
				incoterm_id: null,
				port_id: null,
				local_agent: '',
				origin_agent: '',
			},
			message: '',
			processing: false,
			selected_group_id: null,
			viewer_file: null,
			viewer_payload: null,
			buttons: {
                add: { class: '', text: 'Añadir' },
                move_status: { class: '', text: this.selected_import?.status_id == 8 ? 'Finalizar orden': 'Actualizar estado' },
            },
			docs_target: "product_list",
			pending_docs: [],

			async init() {
				console.log('Inicializando Imports...');

                const socket = Alpine.store('cache').socket;
				if (socket) {
					socket.removeAllListeners();
					socket.on("imports_dashboard_update", async () => {
						await Alpine.store('cache').refresh(['imports_dashboard', 'imports_pendings']);
					});
				}	

				const current_date = new Date();
				this.minDate = current_date.toISOString().slice(0, 10);
				
				await Alpine.store('cache').fetchData([
					{ key: 'imports_dashboard', url: '/imports/dashboard', force: true },
					{ key: 'imports_pendings', url: '/imports/pending', force: true },
					{ key: 'imports_status', url: '/imports/status' },
					{ key: 'imports_provider', url: '/imports/options/provider' },
					{ key: 'imports_type', url: '/imports/options/type' },
					{ key: 'imports_business', url: '/imports/options/business' },
					{ key: 'imports_incoterm', url: '/imports/options/incoterm' },
					{ key: 'imports_port', url: '/imports/options/port' },
				]);

				await Alpine.store('cache').verify();
			},

			queueDocs(evt) {
				const files = evt.target.files;
				if (!files || !files.length) return;

				const target = evt.target.dataset.target || "default";
				this.docs_target = target;

				for (const file of files) {
					const ext = (file.name.split(".").pop() || "").toLowerCase();

					const item = {
						id: `tmp-${Date.now()}-${Math.random()}`,
						file,
						target,
						original_name: file.name,
						ext,
						preview: null, // solo imágenes
					};

					// miniatura solo para imágenes
					if (['png','jpg','jpeg','webp','gif'].includes(ext)) {
						item.preview = URL.createObjectURL(file);
					}

					this.pending_docs.push(item);
				}

				evt.target.value = "";
			},

			async viewItem(item_id) {
				try {
					const response = await fetch(`${this.api}/imports/view/${item_id}`);
					const data = await response.json();
					this.import_data = data.data;
					Alpine.store('cache').showModal('view');
				} catch (error) {
					console.error('Error en la asignación:', error);
				}
			},

			pendingDocs(target) {
				return this.pending_docs.filter(p => p.target === target);
			},

			removePendingDocById(id) {
				const idx = this.pending_docs.findIndex(p => p.id === id);
				if (idx === -1) return;

				const item = this.pending_docs[idx];
				if (item.preview) URL.revokeObjectURL(item.preview);

				this.pending_docs.splice(idx, 1);
			},

			removePendingDoc(index) {
				const item = this.pending_docs[index];
				if (!item) return;

				if (item.preview) {
					URL.revokeObjectURL(item.preview);
				}

				this.pending_docs.splice(index, 1);
			},

			async getProvider() {
				try {
					const response = await fetch(`${this.api}/imports/provider/${this.new_import.provider_id}`, {
						headers: { 
							"Content-Type": "application/json",
							// "Authorization": `Bearer ${this.user.token}`,
						}
					});
					const payload = await response.json();
					this.selected_provider = payload.data;

				} catch (error) {
					console.error('Error:', error);
				}
			},

			resetOrder() {
                this.new_import = {
					provider_id: null,
					business_id: null,
					type_id: null,
					incoterm_id: null,
					port_id: null,
					local_agent: '',
					origin_agent: '',
				};
            },

			resetStatus() {
				this.status_notes = '';
				this.booking_date = null;
				this.etd_date = null;
				this.eta_date = null;
				this.deadline_date = null;
				this.delivery_date = null,
				this.delivery_time = null,
				this.delivery_name = '';
				this.delivery_phone = '';
				this.delivery_code = '';
				this.pay_date = null;
				this.qty = null;
				this.pallets = null;
				this.weight = null;
				this.volume = null;
				this.traffic_light = 'green';
            },

			cyclePayLight() {
				const order = ['green', 'amber', 'red'];
				const i = order.indexOf(this.traffic_light);
				this.traffic_light = order[(i + 1) % order.length];
			},

			payLightLabel(color) {
				if (color === 'green') return 'Verde';
				if (color === 'amber') return 'Ámbar';
				if (color === 'red') return 'Rojo';
				return 'Verde';
			},

			async newImport() {
				if (!this.new_import) return;
				if (this.processing) return;

				this.processing = true;

                const payload = { 
					provider_id: this.new_import.provider_id,
					business_id: this.new_import.business_id,
					type_id: this.new_import.type_id,
					incoterm_id: this.new_import.incoterm_id,
					port_id: this.new_import.port_id,
					local_agent: this.new_import.local_agent,
					origin_agent: this.new_import.origin_agent,
                }

                try {
                    const response = await fetch(`${this.api}/imports/new`, {
                        method: 'POST',
                        headers: { 
							"Content-Type": "application/json",
							"Authorization": `Bearer ${this.user.token}`,
						},
                        body: JSON.stringify(payload),
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');
                    
                    this.resetOrder();
					Alpine.store('cache').hideModal('add');
					this.selected_provider = null;

                } catch (error) {
                    this.showError('add', error.message);
                } finally {
					this.processing = false;
                }
            }, 

			async updateStatus() {
				if (!this.selected_import) return;
				
				const import_id = this.selected_import.id;
				const status_id = this.selected_import.status_id;
				const booking_date = this.booking_date == '' ? null:this.booking_date;
				const etd_date = this.etd_date == '' ? null:this.etd_date;
				const eta_date = this.eta_date == '' ? null:this.eta_date;
				const deadline_date = this.deadline_date == '' ? null:this.deadline_date;
				const delivery_date = this.delivery_date == '' ? null:this.delivery_date;
				const delivery_time = this.delivery_time == '' ? null:this.delivery_time;
				const delivery_name = this.delivery_name;
				const delivery_phone = this.delivery_phone;
				const delivery_code = this.delivery_code;
				const pay_date = this.pay_date == '' ? null:this.pay_date;
				const status_notes = this.status_notes;
				const traffic_light = this.traffic_light;
				const qty = this.qty;
				const pallets = this.pallets;
				const weight = this.weight;
				const volume = this.volume;

				if (status_id == 2 && booking_date === null) {
                    this.showError('move_status', 'Selecciona una fecha de booking');
					return;
				}

				if (status_id == 5 && etd_date === null) {
                    this.showError('move_status', 'Selecciona una fecha de salida');
					return;
				}

				if (status_id == 5 && eta_date === null) {
                    this.showError('move_status', 'Selecciona una fecha de llegada');
					return;
				}

				if (status_id == 7 && deadline_date === null) {
                    this.showError('move_status', 'Selecciona un deadline');
					return;
				}

				if (status_id == 9 && pay_date === null) {
                    this.showError('move_status', 'Selecciona una fecha de pago');
					return;
				}

				if (status_id == 12 && delivery_date === null) {
                    this.showError('move_status', 'Selecciona un fecha de retiro');
					return;
				}

				if (status_id == 12 && delivery_time === null) {
                    this.showError('move_status', 'Selecciona un hora de cita');
					return;
				}

				const payload = {
					import_id: import_id,
					booking_date: booking_date,
					etd_date: etd_date,
					eta_date: eta_date,
					deadline_date: deadline_date,
					delivery_date: delivery_date,
					delivery_time: delivery_time,
					delivery_name: delivery_name,
					delivery_phone: delivery_phone,
					delivery_code: delivery_code,
					qty: qty,
					pallets: pallets,
					weight: weight,
					volume: volume,
					notes: status_notes,
					pay_date: pay_date,
  					traffic_light: traffic_light,
				};
				
				if (this.processing) return;
				this.processing = true;

				if ([4, 5, 6, 7].includes(status_id)) {
					const ok = await this.uploadPendingDocs();
					if (!ok) {
						this.processing = false;
						return;
					}
				}

				try {
					const response = await fetch(`${this.api}/imports/move`, {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
							"Authorization": `Bearer ${this.user.token}`,
						},
						body: JSON.stringify(payload)
					});

					const jsonData = await response.json();
                    if (!response.ok) {
						throw new Error(jsonData?.data?.message || 'Error en la solicitud');
					}

					Alpine.store('cache').hideModal('status');
					this.selected_import = null;

				} catch (error) {
					this.showError('move_status', error.message);
				} finally {
					this.processing = false;
				}
			},

			async downStatus() {
				if (!this.selected_import) return;
				
				const import_id = this.selected_import.id;

				const payload = {
					import_id: import_id,
				};
				
				if (this.processing) return;
				this.processing = true;

				try {
					const response = await fetch(`${this.api}/imports/down`, {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
							"Authorization": `Bearer ${this.user.token}`,
						},
						body: JSON.stringify(payload)
					});

					const jsonData = await response.json();
                    if (!response.ok) {
						throw new Error(jsonData?.data?.message || 'Error en la solicitud');
					}

					this.selected_import = null;

				} catch (error) {
					this.showError('move_status', error.message);
				} finally {
					this.processing = false;
				}
			},

			async uploadPendingDocs() {
				if (!this.selected_import?.id) return true;
				if (!this.pending_docs.length) return true;

				const import_id = this.selected_import.id;

				const grouped = this.pending_docs.reduce((acc, p) => {
					(acc[p.target] ||= []).push(p);
					return acc;
				}, {});

				for (const [target, files] of Object.entries(grouped)) {
					const form = new FormData();
					form.append("target", target);
					form.append("import_id", import_id);

					for (const p of files) {
					form.append("files[]", p.file);
					}

					const res = await fetch(`${this.api}/imports/attachments`, {
					method: "POST",
					headers: { "Authorization": `Bearer ${this.user.token}` },
					body: form
					});

					const json = await res.json();
					if (!res.ok) {
					this.showError("move_status", json?.data?.message || "Upload error");
					return false; // NO limpies nada, así el usuario no pierde su cola
					}
				}

				for (const p of this.pending_docs) {
					if (p.preview) URL.revokeObjectURL(p.preview);
				}
				this.pending_docs = [];

				return true;
			},

			handleEnterSend(e) {
				if (e.shiftKey) return;

				e.preventDefault();
				this.sendChat();
			},

			scrollCommentsToBottom(behavior = 'smooth') {
				const box = this.$refs.commentsBox;
				if (!box) return;

				box.scrollTo({
					top: box.scrollHeight,
					behavior
				});
			},

			async sendChat() {
				if (!this.message || this.processing) return;
				this.processing = true;

				try {
					const response = await fetch(`${this.api}/imports/chat/${this.import_data.id}`, {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
							"Authorization": `Bearer ${Alpine.store('cache').user.token}`,
						},
						body: JSON.stringify({
							comment: this.message,
						}),
					});

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || "Error enviando comentario");
					}
					const data = jsonData.data
					this.import_data.chats.push({
						id: data.id,
						comment: data.comment,
						commenter_id: data.commenter_id,
						commenter_name: data.commenter_name,
						commenter_image: data.commenter_image,
						created_at: data.created_at,
					});

					this.message = "";
					this.$nextTick(() => this.scrollCommentsToBottom());
				} catch (error) {
					console.error(error);
				} finally {
					this.processing = false;
				}
			},

			async loadDocs(target = this.docs_target || "default") {
				if (!this.selected_import?.id) return;

				const import_id = this.selected_import.id;

				const res = await fetch(`${this.api}/imports/attachments/${import_id}?target=${encodeURIComponent(target)}`, {
					headers: {
					"Content-Type": "application/json",
					"Authorization": `Bearer ${this.user.token}`,
					}
				});

				const json = await res.json();
				const payload = json?.data ?? json;
				this.docs = Array.isArray(payload) ? payload : [];
			},

			clearPendingDocs() {
				for (const p of this.pending_docs) {
					if (p.preview) URL.revokeObjectURL(p.preview);
				}
				this.pending_docs = [];
			},

			formatShortDate(iso) {
				if (!iso) return "";
				const [y, m, d] = iso.split("-").map(Number);
				const date = new Date(y, m - 1, d);
				const months = ["ene.", "feb.", "mar.", "abr.", "may.", "jun.", "jul.", "ago.", "sep.", "oct.", "nov.", "dic."];

				return `${d} ${months[date.getMonth()]} ${y}`;
			},

			dateLabel(iso, fallback) {
				return iso ? this.formatShortDate(iso) : fallback;
			},

			showError(btnKey, errorMsg) {
                const originalText = this.buttons[btnKey].text;
                const originalClass = this.buttons[btnKey].class;

                if (originalClass == 'error') {
                    return;
                }
                this.buttons[btnKey].text = errorMsg;
                this.buttons[btnKey].class = 'error';

                setTimeout(() => {
                    this.buttons[btnKey].text = originalText;
                    this.buttons[btnKey].class = originalClass;
                }, 1000);
            },

			onDragStart(item) {
				this.selected_import = item;
			},

			onDragOver(event, target_status_id = 1) {
				event.preventDefault();
				console.log(target_status_id)
				if (this.selected_import.status_id == target_status_id || this.selected_import.status_id + 1 == target_status_id || this.selected_import.status_id - 1 == 1 ) {
					event.currentTarget.classList.add('drag-over');
					event.dataTransfer.dropEffect = 'move';
				} else {
					event.dataTransfer.dropEffect = 'none';
				}
			},
			
			onDragLeave(event) {
				event.currentTarget.classList.remove('drag-over');
			},
			
			async onDrop(group_id = 1) {
				document.querySelectorAll('.group').forEach(container => {
					container.classList.remove('drag-over');
				});
			
				if (!this.selected_import) {
					return;
				}
				
				if (this.selected_import.status_id == group_id) {
					this.selected_import = null;
					return;
				}

				this.selected_group_id = group_id;
				this.resetStatus();
				this.clearPendingDocs();
				if (group_id == 1) {
					this.downStatus();
				} else if (group_id == 2) {
					this.updateStatus();
				} else {
					Alpine.store('cache').showModal('status');
				}
			},
			
			addOrder() {
				Alpine.store('cache').showModal('add');
			},

			editAllowed() {
				return (this.user.department_id == 8 || this.user.id == 23);
			},
			
			isImageFile(f) {
				const ext = (f?.ext || '').toLowerCase();
				return ['png','jpg','jpeg','webp','gif'].includes(ext);
			},

			isPdfFile(f) {
				const ext = (f?.ext || '').toLowerCase();
				return ext === 'pdf';
			},

			getInlineUrl(f) {
				if (f?.is_temp) return f.local_url;   // preview local
				return `${this.api}${f.inline_url}`;  // backend
			},

			async openAttachment(file) {
				this.viewer_file = file;
				this.viewer_payload = null;

				// TEMP: no está en backend todavía
				if (file?.is_temp) {
					if (this.isImageFile(file) && file.local_url) {
					this.viewer_payload = { kind: "url", url: file.local_url };
					} else {
					this.viewer_payload = { kind: "download", message: "Archivo pendiente de guardar (se sube al actualizar estado)." };
					}
					Alpine.store("cache").showModal("attachment");
					return;
				}

				// NORMAL: preview backend
				const res = await fetch(`${this.api}${file.preview_url}`, {
					headers: {
					"Content-Type": "application/json",
					"Authorization": `Bearer ${this.user.token}`,
					}
				});

				const json = await res.json();
				const payload = json?.data ?? json;

				if (payload.kind === "url") payload.url = `${this.api}${payload.url}`;
				this.viewer_file.download_url = `${this.api}${file.download_url}`;

				this.viewer_payload = payload;
				Alpine.store("cache").showModal("attachment");
			},

		}));
	</script>







	<style>
		.traffic-row{
			display: flex;
			align-items: center;
			gap: 0.75rem;
			justify-content: center;
			flex-direction: row-reverse;
			font-weight: 600;
		}
		.traffic-pill{
		    height: 3.5rem;
			padding: 0 1.5rem;
			border-radius: 1rem;
			display: flex;
			align-items: center;
			gap: 1rem;
			cursor: pointer;
			user-select: none;
			background: rgb(255 255 255 / 85%);
			box-shadow: 0 10px 22px rgba(0, 0, 0, .08);
			transition: transform .12s ease, box-shadow .12s ease;
		}
		.traffic-pill:hover{
			box-shadow: 0 12px 26px rgba(0,0,0,.10);
		}
		.traffic-pill .dot{
			width: 1.5rem;
			height: 1.5rem;
			border-radius: 2rem;
			background: #6a6a6a;
			border: 2px solid #2f2f2f;
			opacity: .35;
			transform: scale(.98);
			transition: all .15s ease;
