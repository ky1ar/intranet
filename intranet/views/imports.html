<div x-data="imports_data">
	<div id="dashboard">
		<div class="controls">
			<div class="toggle-collapse frost" @click="$store.cache.toogleMoreMenu()" @click.outside="$store.cache.hideMoreMenu()">
				<div class="item">
					<img alt="" width="24" height="24" src="/static/images/icons/more.svg">
				</div>
			</div>

			<div class="menu-collapse frost" x-transition.duration.300ms x-show="editAllowed() && $store.cache.more_menu">
				<div class="item" @click="pendings_open = !pendings_open">
					<img alt="" width="22" height="22" src="/static/images/icons/pending.svg">
				</div>
				<div class="item" @click="toggleViewMode()">
					<img alt="" width="22" height="22" src="/static/images/icons/eye.svg">
				</div>

				<!-- <div class="item" @click="search()">
					<img alt="" width="18" height="18" src="/static/images/icons/find.svg">
				</div>
				<div class="item" @click="viewHistory()">
					<img alt="" width="18" height="18" src="/static/images/icons/history.svg">
				</div>
				<div class="item" @click="viewStatistics()">
					<img alt="" width="18" height="18" src="/static/images/icons/report.svg">
				</div> -->
			</div>
			
			<div class="left mobile-hide frost" x-show="editAllowed()">
				<div class="item" @click="toggleViewMode()">
					<img alt="" width="22" height="22" src="/static/images/icons/eye.svg">
					<span x-text="isSimpleView() ? 'Extendida' : 'Compacta'"></span>
				</div>

				<!-- <div class="item" @click="search()">
					<img alt="" width="20" height="20" src="/static/images/icons/find.svg">
					<span>Buscar</span>
				</div>
				<div class="item" @click="viewHistory()">
					<img alt="" width="20" height="20" src="/static/images/icons/history.svg">
					<span>Historial</span>
				</div>
				<div class="item" @click="viewStatistics()">
					<img alt="" width="20" height="20" src="/static/images/icons/report.svg">
					<span>Estadísticas</span>
				</div> -->
			</div>

			
			
			<div class="right frost-dark" x-show="canAdd() || canEdit()" style="margin-left: auto;">
				<div class="mobile-hide item" @click="pendings_open = !pendings_open" x-show="canEdit()">
					<img class="invert" alt="" width="20" height="20" src="/static/images/icons/pending.svg">
					<span x-text="`Borradores ${$store.cache.getData('imports_pendings')?.length || 0}`"></span>
				</div>
				
				<div class="item" @click="addOrder()" x-show="canAdd()">
					<img class="invert" alt="" width="20" height="20" src="/static/images/icons/add.svg">
					<span>Añadir</span>
				</div>
			</div>
		</div>

		<div class="main-container">
			<div x-transition.duration.300ms x-cloak x-show="pendings_open" class="pending-imports">
				<div class="container"
					@dragover="onDragOver($event)" 
					@dragleave="onDragLeave($event)"
					@drop="onDrop()"
				>
					
					<template x-if="$store.cache.getData('imports_pendings')?.length > 0">
						<template x-for="item in $store.cache.getData('imports_pendings')" :key="item.id">
							<div class="item-card white"
								@click="viewItem(item.id)"
							>   
								<div class="row">
									<template x-if="item.fcl == 0">
										<span class="order-number" x-text="`SP-${item.id}`"></span>
									</template>

									<template x-if="item.fcl == 1">
										<span class="order-number" style="color: var(--primary);    position: relative;" x-html="`SP-${item.id}<img width='16' height='16' style='right: -1.35rem; top: -0.1rem; width: 1rem;' src='/static/images/icons/filled/container.svg'>`"></span>
									</template>
								</div>
								
								<div class="row">
									<div>
										<div class="title multi-lines">
											<template x-for="(pname, i) in item.provider_names" :key="`${item.id}-p-${i}`">
												<span x-text="pname"></span>
											</template>
										</div>
										<span class="sub" x-text="item.business_name"></span>
									</div>
								</div>

								<img alt="ship" x-show="item.type_id == 1" src="/static/images/icons/filled/ship.svg" width="28" height="28">
								<img alt="plane" x-show="item.type_id == 2" class="ico" src="/static/images/icons/filled/plane.svg" width="20" height="20">

								<!-- <div class="row" style="justify-content:space-between; align-items:center;">
									<div style="display:flex; flex-direction:column; gap:.1rem;">
										<span class="sub" x-text="`${item.line_count || 0} línea(s)`"></span>
										<span class="sub" x-text="`${item.port_name || '-'} · ${item.incoterms_text || '-'}`"></span>
									</div>
								</div> -->
							</div>
						</template>
					</template>
					<span class="empty glass" x-show="$store.cache.getData('imports_pendings')?.length == 0">No hay borradores</span>
				</div>
			</div>

			<!-- Vista completa -->
			<div class="board glass" x-show="!isSimpleView()">
				<template x-for="group in $store.cache.getData('imports_dashboard')" :key="group.status_id">
					<div class="group"
						@dragover="onDragOver($event, group.status_id)" 
						@dragleave="onDragLeave($event)"
						@drop="onDrop(group.status_id)">
						<div class="name">
							<img alt="" width="24" height="24"
								:src="'/static/images/imports/' + ($store.cache.getById('imports_status', group.status_id)?.image || 'default.png')">
							<span x-text="$store.cache.getById('imports_status', group.status_id)?.name || ''"></span>
						</div>

						<ul>
							<template x-if="group.imports.length > 0">
								<template x-for="item in group.imports" :key="item.id">
									<li
										:draggable="canMove()"
										@dragstart="onDragStart(item)"
										@click="viewItem(item.id)"
										class="white"
									>
										<div class="row">
											<template x-if="item.fcl == 0">
												<span class="order-number" x-text="`SP-${item.id}`"></span>
											</template>

											<template x-if="item.fcl == 1">
												<span class="order-number" style="color: var(--primary);    position: relative;" x-html="`SP-${item.id}<img width='16' height='16' style='right: -1.35rem; top: -0.1rem; width: 1rem;' src='/static/images/icons/filled/container.svg'>`"></span>
											</template>
											
											<!-- <span class="order-number" x-text="`SP-${item.id}`"></span> -->

											<template x-if="item.updated_today">
												<div class="update-dot"></div>
											</template>

											<div class="passed-days">
												<span class="register-day" x-text="`${item.passed_days} d.`"></span>
											</div>
										</div>

										<div class="row">
											<div>
												<div class="title multi-lines">
													<template x-for="(pname, i) in item.provider_names" :key="`${item.id}-p-${i}`">
														<span x-text="pname"></span>
													</template>
												</div>
												<span class="sub" x-text="item.business_name"></span>
											</div>
										</div>

										<img alt="ship" x-show="item.type_id == 1" src="/static/images/icons/filled/ship.svg" width="28" height="28">
										<img alt="plane" x-show="item.type_id == 2" class="ico" src="/static/images/icons/filled/plane.svg" width="20" height="20">
										<span x-show="item.traffic_light" class="dot" :class="item.traffic_light"></span>
									</li>
								</template>
							</template>
						</ul>
					</div>
				</template>
			</div>

			<!-- Vista simple -->
			<div class="board glass" x-show="isSimpleView()">
				<template x-for="group in simpleDashboard()" :key="group.key">
					<div class="group">
						<div class="name">
							<!-- espacio para imagen -->
							<img
								x-show="group.image"
								:src="group.image"
								alt=""
								width="24"
								height="24"
							>
							<span x-text="group.name"></span>
						</div>

						<ul>
							<template x-if="group.imports.length > 0">
								<template x-for="item in group.imports" :key="item.id">
									<li
										class="white"
										@click="viewItem(item.id)"
									>
										<div class="row">
											<template x-if="item.fcl == 0">
												<span class="order-number" x-text="`SP-${item.id}`"></span>
											</template>

											<template x-if="item.fcl == 1">
												<span class="order-number" style="color: var(--primary);    position: relative;" x-html="`SP-${item.id}<img width='16' height='16' style='right: -1.35rem; top: -0.1rem; width: 1rem;' src='/static/images/icons/filled/container.svg'>`"></span>
											</template>

											<template x-if="item.updated_today">
												<div class="update-dot"></div>
											</template>

											<!-- <div class="passed-days">
												<span class="register-day" x-text="`${item.passed_days} d.`"></span>
											</div> -->
										</div>

										<div class="row">
											<div>
												<div class="title multi-lines">
													<template x-for="(pname, i) in item.provider_names" :key="`${item.id}-p-${i}`">
														<span x-text="pname"></span>
													</template>
												</div>
												<span class="sub" x-text="item.business_name"></span>
											</div>
										</div>

										<img alt="ship" x-show="item.type_id == 1" src="/static/images/icons/filled/ship.svg" width="28" height="28">
										<img alt="plane" x-show="item.type_id == 2" class="ico" src="/static/images/icons/filled/plane.svg" width="20" height="20">
										<span x-show="item.traffic_light" class="dot" :class="item.traffic_light"></span>
									</li>
								</template>
							</template>

							<template x-if="group.imports.length === 0">
								<li class="white" style="opacity:.55; cursor:default;">
									Sin órdenes
								</li>
							</template>
						</ul>
					</div>
				</template>
			</div>
		</div>


		<div
			x-show="$store.cache.isVisibleModal('view')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-view"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 extrabig" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="top">
					<span class="title" x-text="`SP-${import_data?.id}`"></span>
					<span class="text" x-text="import_data?.business_name || '-'" style="margin-right: auto;font-weight: 500;opacity: 0.5;margin-left: 0.5rem;"></span>
					<div class="button extend hover-opacity" x-show="canEdit() && import_data?.status_id <= 5"
						@click="updateBasicImport()">
						<img alt="" width="14" height="14" src="/static/images/icons/save.svg">
						Actualizar
					</div>
					<span class="days" x-text="`${import_data?.passed_days}`"></span>
				</div>
				
				<div class="modal-content dual">
					<div class="dataview overflow percent50">
						<!-- Líneas: proveedor + incoterm -->
						<div
							class="box glass2"
							x-show="import_data?.lines?.length && !(canEdit() && import_data?.status_id <= 5)"
							style="border-radius: 0.75rem;padding: 0.75rem;">
							<template x-for="line in (import_data?.lines || [])" :key="line.id">
								<div class="container white" style="padding:.65rem; border-radius:.8rem;">
									<span class="letter" x-text="line.provider_name?.charAt(0)"></span>

									<div class="data">
										<div class="head">
											<span class="name" x-text="line.provider_name"></span>
											<span class="line" x-show="canEdit() && line.provider_contact">|</span>
											<span class="contact" x-show="canEdit()" x-text="line.provider_contact"></span>
											<span class="icon" x-show="canEdit()" x-text="line.incoterm_code"></span>
										</div>

										<div class="pair-content" x-show="canEdit()">
											<div x-show="line.provider_email" class="pair">
												<img alt="" width="14" height="14" src="/static/images/email.svg">
												<span class="text" x-text="line.provider_email"></span>
											</div>
											
											<div x-show="line.provider_phone" class="pair">
												<img
													alt=""
													width="14"
													height="14"
													:src="(line.provider_phone || '').toLowerCase().includes('www')
														? '/static/images/icons/web.svg'
														: '/static/images/phone.svg'"
												>
												<span class="text" x-text="line.provider_phone"></span>
											</div>

											<div x-show="line.provider_telephone" class="pair">
												<img alt="" width="14" height="14" src="/static/images/phone.svg">
												<span class="text" x-text="line.provider_telephone"></span>
											</div>
										</div>

										<div class="pair-content" style="margin-top: .35rem;"  x-show="canEdit()">
											<div class="pair">
												<img alt="" width="14" height="14" src="/static/images/icons/money.svg">
												<span class="black">Adelanto:</span>
												<span class="text" x-text="`${line.advance_payment_percent ?? 0}%`"></span>
											</div>

											<div class="pair">
												<img alt="" width="14" height="14" src="/static/images/icons/calendar2.svg">
												<span class="black">Saldo:</span>
												<span class="text" x-text="`${line.balance_days ?? 0} día(s)`"></span>
											</div>
										</div>

									</div>
								</div>
							</template>
						</div>

						<!-- Resumen de shipment (compartido) -->
						<div
							class="box white"
							x-show="!(canEdit() && import_data?.status_id <= 5)">
							<div class="container">
								<div class="data">
									<div class="pair-content">
										<div class="pair">
											<img alt="" width="16" height="16" src="/static/images/location.svg">
											<span class="black">Salida:</span>
											<span class="text" x-text="import_data?.port_name || '-'"></span>
										</div>

										<div class="pair" x-show="canEdit()">
											<img alt="" width="16" height="16" src="/static/images/icons/board.svg">
											<span class="black">Carga:</span>
											<span class="text" x-text="Number(import_data?.fcl) === 1 ? 'FCL' : 'LCL'"></span>
										</div>

										<!-- <div class="pair">
											<img alt="" width="16" height="16" src="/static/images/icons/money.svg">
											<span class="black">Adelanto:</span>
											<span class="text" x-text="`${import_data?.advance_payment_percent ?? 0}%`"></span>
										</div>

										<div class="pair">
											<img alt="" width="16" height="16" src="/static/images/icons/calendar2.svg">

											<span class="black">Saldo:</span>
											<span class="text" x-text="`${import_data?.balance_days ?? 0} día(s)`"></span>
										</div> -->
									</div>
								</div>

								<div style="display:flex; align-items:center; gap:.4rem; margin-left:auto;">
									<img alt="ship" x-show="import_data?.type_id == 1" class="type" src="/static/images/icons/filled/ship.svg" width="28" height="28">
									<img alt="plane" x-show="import_data?.type_id == 2" class="type fix" src="/static/images/icons/filled/plane.svg" width="20" height="20">
									<span x-show="import_data?.traffic_light" class="dot red" :class="import_data?.traffic_light"></span>
								</div>
							</div>
						</div>
						
						<div class="flexbox" x-show="canEdit() && import_data?.status_id <= 5">
							<div class="flexbox" style="gap: 0.5rem;">
								<template x-for="(line, index) in (import_data?.lines || [])" :key="line._uid">
									<div class="glass2" style="padding:.75rem; border-radius: 0.75rem;">
										<div class="fields">
											<label class="white">
												<select
													@change="
														line.provider_id = $event.target.value;
														loadProviderPreviewForLine(line);
													"
												>
													<option value="" disabled :selected="!line.provider_id">Proveedor</option>

													<template x-for="provider in providerOptions()" :key="provider.id">
														<option
															:value="provider.id"
															:selected="String(line.provider_id) === String(provider.id)"
															x-text="provider.name"
														></option>
													</template>
												</select>
											</label>

											<label class="white">
												<select
													@change="line.incoterm_id = $event.target.value"
												>
													<option value="" disabled :selected="!line.incoterm_id">Incoterm</option>

													<template x-for="incoterm in incotermOptions()" :key="incoterm.id">
														<option
															:value="incoterm.id"
															:selected="String(line.incoterm_id) === String(incoterm.id)"
															x-text="incoterm.code"
														></option>
													</template>
												</select>
											</label>

											<label class="white" x-show="isOtherIncoterm(line.incoterm_id)">
												<input type="text" placeholder="Incoterm" x-model="line.custom_incoterm_name">
											</label>
											
											<div class="delete-provider white hover-opacity"
												@click="removeEditableLine(index)"
												x-show="import_data.lines.length > 1">
												<img alt="delete" width="16" height="16" src="/static/images/icons/delete.svg">
											</div>
										</div>
										
										<div x-show="line.provider_preview" class="white provider" style="margin-top: .6rem;">
											<span class="letter" x-text="line.provider_preview?.letter"></span>

											<div class="data">
												<div class="header">
													<span class="name" x-text="line.provider_preview?.name"></span>
													<span class="line" x-show="line.provider_preview?.contact">|</span>
													<span class="contact" x-text="line.provider_preview?.contact"></span>
												</div>
												<div class="bottom">
													<div x-show="line.provider_preview?.email" class="row">
														<img alt="" width="14" height="14" src="/static/images/email.svg">
														<span x-text="line.provider_preview?.email"></span>
													</div>
													
													<div x-show="line.provider_preview?.phone" class="row">
														<img
															alt=""
															width="14"
															height="14"
															:src="(line.provider_preview?.phone || '').toLowerCase().includes('www')
																? '/static/images/icons/web.svg'
																: '/static/images/phone.svg'"
														>
														<span x-text="line.provider_preview?.phone"></span>
													</div>

													<div x-show="line.provider_preview?.telephone" class="row">
														<img alt="" width="14" height="14" src="/static/images/phone.svg">
														<span x-text="line.provider_preview?.telephone"></span>
													</div>
												</div>
											</div>
										</div>
										
										<div class="fields" style="margin-top: .5rem;">
											<label class="white number">
												<b style="min-width: 8rem;">Adelanto (%)</b>
												<input type="number" min="0" max="100" step="0.01" x-model.number="line.advance_payment_percent">
											</label>

											<label class="white number">
												<b style="min-width: 8rem;">Saldo (días)</b>
												<input type="number" min="0" step="1" x-model.number="line.balance_days">
											</label>
										</div>
									</div>
								</template>
							</div>

							<div class="add-provider hover-opacity glass2" @click="addEditableLine()">
								<img alt="" width="16" height="16" src="/static/images/icons/add2.svg">
								<span>Agregar proveedor</span>
							</div>
							
							<div class="fields options">
								<label class="white">
									<select x-model="import_data.business_id">
										<option value="null" selected disabled>Empresa</option>
										<template x-for="business in $store.cache.getData('imports_business')" :key="business.id">
											<option :value="business.id" x-text="business.name"></option>
										</template>
									</select>
								</label>

								<label class="white">
									<select x-model="import_data.type_id">
										<option value="null" selected disabled>Tipo de envío</option>
										<template x-for="type in $store.cache.getData('imports_type')" :key="type.id">
											<option :value="type.id" x-text="type.name"></option>
										</template>
									</select>
								</label>
								
								<label class="white">
									<select x-model="import_data.port_id">
										<option value="null" disabled>Salida</option>
										<template x-for="port in portOptions()" :key="port.id">
											<option :value="port.id" x-text="port.name"></option>
										</template>
									</select>
								</label>

								<label class="white" x-show="isOtherPort(import_data.port_id)">
									<input type="text" placeholder="Salida" x-model="import_data.custom_port_name">
								</label>

								<label class="white">
									<select x-model="import_data.fcl">
										<template x-for="mode in shipmentLoadOptions()" :key="mode.id">
											<option :value="mode.id" x-text="mode.name"></option>
										</template>
									</select>
								</label>
							</div>

							<div class="fields options">
								<label class="white">
									<img alt="" src="/static/images/icons/user.svg" width="16" height="16">
									<input type="text" placeholder="Agente local" x-model="import_data.local_agent_name">
								</label>

								<label class="white">
									<img alt="" src="/static/images/icons/user.svg" width="16" height="16">
									<input type="text" placeholder="Agente de origen" x-model="import_data.origin_agent_name">
								</label>
							</div>

							<!-- <div class="fields options">
								<label class="white number">
									<b style="min-width: 8rem;">Adelanto (%)</b>
									<input type="number" min="0" max="100" step="0.01" x-model.number="import_data.advance_payment_percent">
								</label>

								<label class="white number">
									<b style="min-width: 8rem;">Saldo (días)</b>

						name: 'En preparación',
						image: '/static/images/imports/prep.svg',

					},
					{

					},
					{
						key: 'customs',
						name: 'En aduanas',
						image: '/static/images/imports/adua.svg',
						imports: [],
					},
					{
						key: 'available',
						name: 'Disponible',
						image: '/static/images/imports/entrega.svg',
						imports: [],
					},
				];

				for (const group of dashboard) {
					for (const item of (group.imports || [])) {
						const status = Number(item.status_id);

						if (status < 6) {
							groups[0].imports.push(item);
						} else if (status === 6) {
							groups[1].imports.push(item);
						} else if (status > 6 && status <= 12) {
							groups[2].imports.push(item);
						} else if (status > 12) {
							groups[3].imports.push(item);
						}
					}
				}

				return groups;

					origin_agent: (this.import_data?.origin_agent_name || '').trim(),
					business_id: this.import_data?.business_id,
					type_id: this.import_data?.type_id,
					fcl: Number(this.import_data?.fcl || 0),

					port_id: this.isOtherPort(this.import_data?.port_id) ? null : this.import_data?.port_id,
					custom_port_name: this.isOtherPort(this.import_data?.port_id)
						? (this.import_data?.custom_port_name || '').trim()
						: null,

					lines: (this.import_data?.lines || []).map((x, idx) => ({
						provider_id: x.provider_id ? Number(x.provider_id) : null,

				if (!payload.origin_agent) return this.showError('save_draft', 'Ingresa agente origen');

				if (!payload.lines.length) return this.showError('save_draft', 'Agrega línea');

				for (let i = 0; i < payload.lines.length; i++) {
					const row = payload.lines[i];

					if (!row.provider_id) {
						return this.showError('save_draft', `Línea ${i + 1}: proveedor`);
					}

					if (!row.incoterm_id && !row.custom_incoterm_name) {

					// }

					// 	return this.showError('save_draft', `Línea ${i + 1}: saldo`);
					// }

					// if (Number(row.balance_days) < 0) {
					// 	return this.showError('save_draft', `Línea ${i + 1}: saldo inválido`);
					// }
				}

				this.processing = true;
				try {

						method: 'PUT',
						headers: {
							'Content-Type': 'application/json',
							'Authorization': `Bearer ${this.token}`,
						},

					});

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || 'Error actualizando importación');
					}

					// await Alpine.store('cache').refresh(['imports_dashboard', 'imports_pendings']);
					// await this.viewItem(this.import_data.id);
					Alpine.store('cache').hideModal('view');

				} catch (error) {
					this.showError('save_draft', error.message);
				} finally {
					this.processing = false;
				}

			async loadProviderPreviewForLine(line) {
				if (!line) return;

				const providerId = Number(line.provider_id || 0);
				if (!providerId) {
					line.provider_preview = null;
					return;
				}

				if (this.provider_preview_cache[providerId]) {
					line.provider_preview = this.provider_preview_cache[providerId];
					return;
				}

				if (this.provider_preview_loading[providerId]) return;
				this.provider_preview_loading[providerId] = true;

				try {
					const response = await fetch(`${this.api}/imports/provider/${providerId}`, {
						headers: { "Content-Type": "application/json" }
					});

					const payload = await response.json();
					if (!response.ok) throw new Error(payload?.data?.message || 'No se pudo cargar proveedor');

					const data = payload?.data || payload;
					const preview = {
						id: data.id,
						name: data.name,
						contact: data.contact,
						letter: data.letter,
						email: data.email,
						phone: data.phone,
						telephone: data.telephone,
					};

					this.provider_preview_cache[providerId] = preview;
					line.provider_preview = preview;
				} catch (error) {
					console.error('Error cargando proveedor:', error);
					line.provider_preview = null;
				} finally {
					delete this.provider_preview_loading[providerId];
				}
			},

			queueDocs(evt) {
				const files = evt.target.files;
				if (!files || !files.length) return;

				const target = evt.target.dataset.target || "default";
				this.docs_target = target;

				for (const file of files) {
					const ext = (file.name.split(".").pop() || "").toLowerCase();

					const item = {
						id: `tmp-${Date.now()}-${Math.random()}`,
						file,
						target,
						original_name: file.name,
						ext,
						preview: null, // solo imágenes
					};

					// miniatura solo para imágenes
					if (['png','jpg','jpeg','webp','gif'].includes(ext)) {
						item.preview = URL.createObjectURL(file);
					}

					this.pending_docs.push(item);
				}

				evt.target.value = "";
			},

			providerOptions() {
				const rows = Alpine.store('cache').getData('imports_provider') || [];
				return rows.map(x => ({ ...x, id: String(x.id) }));
			},

			async viewItem(item_id) {
				try {
					const response = await fetch(`${this.api}/imports/view/${item_id}`);
					const json = await response.json();
					const data = json.data;

					const prepared = {
						...data,
						fcl: String(data.fcl ?? 0),
						port_id: data.custom_port_name
							? '__other__'
							: (data.port_id != null ? String(data.port_id) : null),

						lines: (data.lines || []).map((line, index) => ({
							...line,
							_uid: line.id ? `line-${line.id}` : `line-tmp-${item_id}-${index}`,
							provider_id: line.provider_id != null ? String(line.provider_id) : null,
							incoterm_id: line.custom_incoterm_name
								? '__other__'
								: (line.incoterm_id != null ? String(line.incoterm_id) : null),
							advance_payment_percent: line.advance_payment_percent ?? null,
							balance_days: line.balance_days ?? null,
						}))
					};

					// console.log('prepared lines', prepared.lines);
					// console.log('incoterm options', this.incotermOptions());
					// console.log('provider options', this.providerOptions());
					this.import_data = {};
					await this.$nextTick();

					this.import_data = prepared;
					await this.$nextTick();

					for (const line of this.import_data.lines || []) {
						if (line.provider_id) {
							this.loadProviderPreviewForLine(line);
						}
					}

					Alpine.store('cache').showModal('view');
				} catch (error) {
					console.error('Error en viewItem:', error);
				}
			},

			pendingDocs(target) {
				return this.pending_docs.filter(p => p.target === target);
			},

			removePendingDocById(id) {
				const idx = this.pending_docs.findIndex(p => p.id === id);
				if (idx === -1) return;

				const item = this.pending_docs[idx];
				if (item.preview) URL.revokeObjectURL(item.preview);

				this.pending_docs.splice(idx, 1);
			},

			removePendingDoc(index) {
				const item = this.pending_docs[index];
				if (!item) return;

				if (item.preview) {
					URL.revokeObjectURL(item.preview);
				}

				this.pending_docs.splice(index, 1);
			},

					booking_date: booking_date,
					etd_date: etd_date,
					eta_date: eta_date,
					deadline_date: deadline_date,
					delivery_date: delivery_date,
					delivery_time: delivery_time,
					delivery_name: delivery_name,
					delivery_phone: delivery_phone,
					delivery_code: delivery_code,
					qty: qty,
					pallets: pallets,
					weight: weight,
					volume: volume,
					notes: status_notes,
					pay_date: pay_date,
  					traffic_light: traffic_light,
					tracking_link: tracking_link,
				};
				
				if (this.processing) return;
				this.processing = true;

				if ([4, 5, 6, 7].includes(status_id)) {
					const ok = await this.uploadPendingDocs();
					if (!ok) {
						this.processing = false;
						return;
					}
				}

				try {
					const response = await fetch(`${this.api}/imports/move`, {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
							"Authorization": `Bearer ${this.token}`,
						},
						body: JSON.stringify(payload)
					});

					const jsonData = await response.json();
                    if (!response.ok) {
						throw new Error(jsonData?.data?.message || 'Error en la solicitud');
					}

					Alpine.store('cache').hideModal('status');
					this.selected_import = null;

				} catch (error) {
					this.showError('move_status', error.message);
				} finally {
					this.processing = false;
				}
			},

			async downStatus() {
				if (!this.selected_import) return;
				
				const import_id = this.selected_import.id;

				const payload = {
					import_id: import_id,
				};
				
				if (this.processing) return;
				this.processing = true;

				try {
					const response = await fetch(`${this.api}/imports/down`, {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
							"Authorization": `Bearer ${this.token}`,
						},
						body: JSON.stringify(payload)
					});

					const jsonData = await response.json();
                    if (!response.ok) {
						throw new Error(jsonData?.data?.message || 'Error en la solicitud');
					}

					this.selected_import = null;

				} catch (error) {
					this.showError('move_status', error.message);
				} finally {
					this.processing = false;
				}
			},

			async uploadPendingDocs() {
				if (!this.selected_import?.id) return true;
				if (!this.pending_docs.length) return true;

				const import_id = this.selected_import.id;

				const grouped = this.pending_docs.reduce((acc, p) => {
					(acc[p.target] ||= []).push(p);
					return acc;
				}, {});

				for (const [target, files] of Object.entries(grouped)) {
					const form = new FormData();
					form.append("target", target);
					form.append("import_id", import_id);

					for (const p of files) {
					form.append("files[]", p.file);
					}

					const res = await fetch(`${this.api}/imports/attachments`, {
					method: "POST",
					headers: {
						"Authorization": `Bearer ${this.token}`
					},
					body: form
					});

					const json = await res.json();
					if (!res.ok) {
					this.showError("move_status", json?.data?.message || "Upload error");
					return false; // NO limpies nada, así el usuario no pierde su cola
					}
				}

				for (const p of this.pending_docs) {
					if (p.preview) URL.revokeObjectURL(p.preview);
				}
				this.pending_docs = [];

				return true;
			},

			handleEnterSend(e) {
				if (e.shiftKey) return;

				e.preventDefault();
				this.sendChat();
			},

			scrollCommentsToBottom(behavior = 'smooth') {
				const box = this.$refs.commentsBox;
				if (!box) return;

				box.scrollTo({
					top: box.scrollHeight,
					behavior
				});
			},

			async sendChat() {
				if (!this.message || this.processing) return;
				this.processing = true;

				try {
					const response = await fetch(`${this.api}/imports/chat/${this.import_data.id}`, {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
							"Authorization": `Bearer ${this.token}`,
						},
						body: JSON.stringify({
							comment: this.message,
						}),
					});

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || "Error enviando comentario");
					}
					const data = jsonData.data
					this.import_data.chats.push({
						id: data.id,
						comment: data.comment,
						commenter_id: data.commenter_id,
						commenter_name: data.commenter_name,
						commenter_image: data.commenter_image,
						created_at: data.created_at,
					});

					this.message = "";
					this.$nextTick(() => this.scrollCommentsToBottom());
				} catch (error) {
					console.error(error);
				} finally {
					this.processing = false;
				}
			},

			clearPendingDocs() {
				for (const p of this.pending_docs) {
					if (p.preview) URL.revokeObjectURL(p.preview);
				}
				this.pending_docs = [];
			},

			formatShortDate(iso) {
				if (!iso) return "";
				const [y, m, d] = iso.split("-").map(Number);
				const date = new Date(y, m - 1, d);
				const months = ["ene.", "feb.", "mar.", "abr.", "may.", "jun.", "jul.", "ago.", "sep.", "oct.", "nov.", "dic."];

				return `${d} ${months[date.getMonth()]} ${y}`;
			},

			dateLabel(iso, fallback) {
				return iso ? this.formatShortDate(iso) : fallback;
			},

			showError(btnKey, errorMsg) {
                const originalText = this.buttons[btnKey].text;
                const originalClass = this.buttons[btnKey].class;

                if (originalClass == 'error') {
                    return;
                }
                this.buttons[btnKey].text = errorMsg;
                this.buttons[btnKey].class = 'error';

                setTimeout(() => {
                    this.buttons[btnKey].text = originalText;
                    this.buttons[btnKey].class = originalClass;
                }, 1000);
            },

			onDragStart(item) {
				this.selected_import = item;
			},

			onDragOver(event, target_status_id = 1) {
				event.preventDefault();

				if (!this.selected_import) {
					if (event.dataTransfer) event.dataTransfer.dropEffect = 'none';
					return;
				}

				if (
					this.selected_import.status_id == target_status_id ||
					this.selected_import.status_id + 1 == target_status_id ||
					this.selected_import.status_id - 1 == 1
				) {
					event.currentTarget.classList.add('drag-over');
					if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
				} else {
					if (event.dataTransfer) event.dataTransfer.dropEffect = 'none';
				}
			},
			
			onDragLeave(event) {
				event.currentTarget.classList.remove('drag-over');
			},
			
			async onDrop(group_id = 1) {
				document.querySelectorAll('.group').forEach(container => {
					container.classList.remove('drag-over');
				});
			
				if (!this.selected_import) {
					return;
				}
				
				if (this.selected_import.status_id == group_id) {
					this.selected_import = null;
					return;
				}

				this.selected_group_id = group_id;
				this.resetStatus();
				this.clearPendingDocs();
				if (group_id == 1) {
					this.downStatus();
				} else if (group_id == 2) {
					this.updateStatus();
				} else {
					Alpine.store('cache').showModal('status');
				}
			},
			
			addOrder() {
				if (!this.new_import || typeof this.new_import !== 'object') {
					this.resetOrder();
				} else if (!Array.isArray(this.new_import.lines)) {
					this.new_import.lines = [this.emptyImportLine()];
				} else if (this.new_import.lines.length === 0) {
					this.new_import.lines.push(this.emptyImportLine());
				}

				Alpine.store('cache').showModal('add');
			},

			canAdd() {
				return Alpine.store('cache').hasPermission('imports', 'add');
			},
			canEdit() {
				return Alpine.store('cache').hasPermission('imports', 'edit');
			},
			canMove() {
				return Alpine.store('cache').hasPermission('imports', 'move');
			},
			editAllowed() {
				return this.canAdd() || this.canEdit() || this.canMove();
			},
			
			isImageFile(f) {
				const ext = (f?.ext || '').toLowerCase();
				return ['png','jpg','jpeg','webp','gif'].includes(ext);
			},

			isPdfFile(f) {
				const ext = (f?.ext || '').toLowerCase();
				return ext === 'pdf';
			},

			getInlineUrl(f) {
				if (f?.is_temp) return f.local_url;   // preview local
				return `${this.api}${f.inline_url}`;  // backend
			},

			async openAttachment(file) {
				this.viewer_file = file;
				this.viewer_payload = null;

				// TEMP: no está en backend todavía
				if (file?.is_temp) {
					if (this.isImageFile(file) && file.local_url) {
					this.viewer_payload = { kind: "url", url: file.local_url };
					} else {
					this.viewer_payload = { kind: "download", message: "Archivo pendiente de guardar (se sube al actualizar estado)." };
					}
					Alpine.store("cache").showModal("attachment");
					return;
				}

				// NORMAL: preview backend
				const res = await fetch(`${this.api}${file.preview_url}`, {
					headers: {
					"Content-Type": "application/json",
					"Authorization": `Bearer ${this.token}`,
					}
				});

				const json = await res.json();
				const payload = json?.data ?? json;

				if (payload.kind === "url") payload.url = `${this.api}${payload.url}`;
				this.viewer_file.download_url = `${this.api}${file.download_url}`;

				this.viewer_payload = payload;
				Alpine.store("cache").showModal("attachment");
			},

		}));
	</script>
