<div x-data="support_data">
	<div id="support-dashboard">
		<div class="header">
			<div class="menu primary">
				<div class="item" @click="viewLinks()">
					<div class="button">
						<img width="20" height="20" src="/static/images/icons/link.svg">
					</div>
					<span>Enlaces</span>
				</div>
				<div class="item" @click="search()">
					<div class="button">
						<img width="20" height="20" src="/static/images/icons/find.svg">
					</div>
					<span>Buscar</span>
				</div>
            </div>

			<div class="menu">
				<div class="item" @click="viewStatistics()">
					<div class="button">
						<img width="20" height="20" src="/static/images/icons/report.svg">
					</div>
					<span>Estadísticas</span>
				</div>
				
				<div class="item" @click="viewHistory()">
					<div class="button">
						<img width="20" height="20" src="/static/images/icons/history.svg">
					</div>
					<span>Historial</span>
				</div>
				<div class="item" @click="addOrder()">
					<div class="button">
						<img width="20" height="20" src="/static/images/icons/add.svg">
					</div>
					<span>Añadir</span>
				</div>
            </div>
			
		</div>

		<div class="board">
			<template x-for="group in $store.cache.getData('support_dashboard')" :key="group.status_id">
				<div class="group"
					@dragover="onDragOver($event, group.status_id)" 
					@dragleave="onDragLeave($event)"
					@drop="dropService(group.status_id)">
					<div class="name">
						<img width="20" height="20"
							:src="'/static/images/support/' + ($store.cache.getById('service_status', group.status_id)?.image || 'default.png')"
							alt="">
						<span x-text="$store.cache.getById('service_status', group.status_id)?.name || ''"></span>
					</div>

					<ul>
						<template x-if="group.service_order.length > 0">
							<template x-for="item in group.service_order" :key="item.order_number">
								<li
									:class="item.priority"
									:draggable="editAllowed()"
									@dragstart="dragService(item)"
									@click="viewOrder(item.order_number)">
									<div class="row">
										<span class="order-number" x-text="`${item.method_letter}-${item.order_number}`"></span>
										<div class="passed-days">
											<!--<span class="updated-days" x-text="item.updated_days"></span>-->
											<span class="register-day" x-text="item.register_days"></span>
										</div>
									</div>

									<div class="row">
										<div>
											<span class="machine" x-text="item.machine"></span>
											<span class="admin-name" x-text="item.technician_name"></span>
										</div>
										<img width="48" height="48" :src="'/static/images/uploads/machines/'+item.machine_image" alt="">
									</div>
								</li>
							</template>
						</template>
					</ul>
				</div>
			</template>
		</div>
	</div>


	<div
		x-show="$store.cache.isVisibleModal('status')"
		@mousedown.self="$store.cache.hideLastModal()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-status"
		x-cloak>
		<div class="modal glass2" @click.stop>
			<span class="title" x-text="'Orden ' + selected_service?.order_number"></span>

			<div class="update">
				<div class="box">
					<img width="20" height="20"
						:src="'/static/images/support/' + ($store.cache.getById('service_status', selected_service?.status_id)?.image)"
						alt="from">
					<span x-text="($store.cache.getById('service_status', selected_service?.status_id))?.name"></span>
				</div>

				<div class="box">
					<img width="20" height="20"
						:src="'/static/images/support/' + ($store.cache.getById('service_status', selected_service?.status_id + 1)?.image)"
						alt="to">
					<span x-text="($store.cache.getById('service_status', selected_service?.status_id + 1))?.name"></span>
				</div>
				<img class="arrow" width="16" height="16" src="/static/images/arrownext.svg">
			</div>
				
			<textarea x-model="status_notes" class="text-area" placeholder="Notas internas"></textarea>

			<div class="send-whatsapp">
				Enviar Whatsapp
				<label class="box">
					<input id="send-whatsapp" type="checkbox" x-model="sendWhatsapp">
					<span class="slider"></span>
				</label>
			</div>

			<button class="hover-opacity button" @click="updateStatus()" x-text="selected_service?.status_id == 8 ? 'Finalizar orden':'Actualizar'"></button>

			<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
				<img alt="close" src="/static/images/x.svg" width="12" height="12">
			</div>
		</div>
	</div>


	<div
		x-show="$store.cache.isVisibleModal('view')"
		@mousedown.self="$store.cache.hideLastModal()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-view"
		x-cloak>
		<div class="modal glass2" @click.stop>
			<div class="top">
				<span class="title" x-text="`N° ${service_order?.order_number}`"></span>
				<span class="days" :class="service_order?.priority" x-text="`${service_order?.passed_days}`"></span>
				<template x-if="service_order?.status_id > 1">
					<div class="pay" :class="service_order.paid == 0 ? '' : 'payed'">
						<span class="hover-opacity" @click="updateOrder('paid')">S/</span>
						<input
							type="text"
							placeholder="0.0"
							@input="service_order.pay_amount = service_order.pay_amount.replace(/[^0-9.]/g, '')"
							@blur="updateOrder('pay_amount')"
							:size="Math.max(1, String(service_order.pay_amount || 0).length)"
							x-model="service_order.pay_amount"
						>
					</div>
				</template>
			</div>

			<template x-if="!editAllowed()">
				<div class="fields no-edit">
					<div class="glass2" x-text="service_order.method_name"></div>
					<div class="glass2" x-text="service_order.origin_name"></div>
				</div>
			</template>

			<div class="client">
				<img width="48" height="48" :src="'/static/images/uploads/machines/'+service_order?.machine_image" alt="">
				
				<div class="data">
					<span class="machine" x-text="service_order?.machine"></span>
					<span class="name" x-text="show_document ? service_order?.client_document : service_order?.client_name"></span>
				</div>

				<div class="icons">
					<a :href="'https://api.whatsapp.com/send?phone=' + service_order?.client_phone" target="_blank" class="hover-opacity" rel="noopener noreferrer">
						<img alt="phone" src="/static/images/whatsapp.svg" width="16" height="16">
					</a>

					<button @click="show_document = !show_document" class="hover-opacity">
						<img alt="document" src="/static/images/document.svg" width="16" height="16">
					</button>
				</div>
			</div>

			<template x-if="editAllowed()">
				<div class="fields">
					<label class="white">
						<select x-model="service_order.method_id" @change="updateOrder('method_id')">
							<template x-for="method in $store.cache.getData('service_methods')" :key="method.id">
								<option :value="method.id" x-text="method.name"></option>
							</template>
						</select>
					</label>

					<label class="white flex1-5">
						<select x-model="service_order.technician_id" @change="updateOrder('technician_id')">
							<template x-for="technician in $store.cache.getData('technicians')" :key="technician.id">
								<option :value="technician.id" x-text="technician.name"></option>
							</template>
						</select>
					</label>

					<label class="white">
						<select x-model="service_order.origin_id" @change="updateOrder('origin_id')">
							<template x-for="origin in $store.cache.getData('service_origin')" :key="origin.id">
								<option :value="origin.id" x-text="origin.name"></option>
							</template>
						</select>
					</label>
				</div>
			</template>

			<div class="history">
				<template x-for="history in service_order?.history" :key="history.status_id">
					<div class="row">
						<img width="20" height="20" :src="'/static/images/support/' + $store.cache.getById('service_status', history.status_id)?.image" alt="">

						<div class="left">
							<div class="head">
								<span class="name" x-text="$store.cache.getById('service_status', history.status_id)?.name"></span>
								<div class="right">
									<!--<span class="admin" x-text="history.user_name"></span>-->
									<span class="date" x-text="history.register_at"></span>
								</div>
							</div>
							<span class="notes" x-html="history.notes.replace(/\n/g, '<br>')"></span>
						</div>
					</div>
				</template>
			</div>
			<template x-if="editAllowed()">
				<div class="hover-opacity finish" @click="finish(service_order)" x-show="service_order?.status_id == 8">Finalizar</div>
			</template>

			<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
				<img alt="close" src="/static/images/x.svg" width="12" height="12">
			</div>
		</div>
	</div>



	<div
		x-show="$store.cache.isVisibleModal('add')"
		@mousedown.self="$store.cache.hideLastModal()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-add"
		x-cloak>
		<div class="modal glass2" @click.stop>
			<span class="title"><img alt="user" width="20" height="20" src="/static/images/uploads/users/00000000.jpg">Nueva orden</span>
			
			<div class="fields">
				<label class="white">
					<select x-model="process_service.method_id">
						<template x-if="$store.cache.getData('service_methods')?.length !== 1">
							<option value="">Tipo</option>
						</template>

						<template x-for="method in $store.cache.getData('service_methods')" :key="method.id">
							<option :value="method.id" x-text="method.name"></option>
						</template>
					</select>
				</label>

				<label class="white">
					<input type="date" x-model="process_service.register_date">
				</label>

				<label class="white">
					<img alt="user" src="/static/images/id.svg" width="16" height="16">
					<input type="text" maxlength="11" @input="process_service.client_document = process_service.client_document.replace(/\D/g, '')" placeholder="DNI / RUC" x-model="process_service.client_document" @blur="fetchClientData()">
				</label>
			</div>

			<div class="fields">
				<label :class="client_found ? 'glass2' : 'white'">
					<img alt="user" src="/static/images/user.svg" width="16" height="16">
					<input :disabled="client_found" type="text" placeholder="Nombre o Razón Social" x-model="process_service.client_name">
				</label>
			</div>

			<div class="fields">
				<label class="white">
					<img alt="phone" src="/static/images/phone.svg" width="16" height="16">
					<input type="text" maxlength="9" @input="process_service.client_phone = process_service.client_phone.replace(/\D/g, '')" placeholder="Celular" x-model="process_service.client_phone">
				</label>

				<label class="white">
					<img alt="email" src="/static/images/email.svg" width="16" height="16">
					<input type="text" placeholder="Email" x-model="process_service.client_email">
				</label>
			</div>

			<div class="fields">
				<label class="white flex2-3">
					<img alt="phone" src="/static/images/icons/printer.svg" width="16" height="16">
                	<input type="text" x-model="process_service.machine" placeholder="Nombre del equipo" @input="getMachine()">
					<div class="white machines">
						<template x-for="machine in machines" :key="machine.id">
							<span
							x-text="machine.name"
							@click="
								process_service.machine = machine.name;
								process_service.machine_id = machine.id;
								process_service.machine_image = machine.image;
								machines = [];
							">
							</span>
						</template>
					</div>
					
				</label>

				
				<label class="white">
					
					<select x-model="process_service.origin_id">
						<template x-for="origin in $store.cache.getData('service_origin')" :key="origin.id">
							<option :value="origin.id" x-text="origin.name"></option>
						</template>
					</select>
				</label>
            </div>

			<textarea x-model="process_service.status_notes" class="text-area" placeholder="Problema reportado"></textarea>

			<button class="button hover-opacity" @click="newOrder()" :class="buttons.add.class" x-text="buttons.add.text"></button>

			<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
				<img alt="close" src="/static/images/x.svg" width="12" height="12">
			</div>
		</div>
	</div>






	<div
		x-show="$store.cache.isVisibleModal('history')"
		@mousedown.self="$store.cache.hideLastModal()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-history"
		x-cloak>
		<div class="modal glass2" @click.stop>
			<div class="top">
				<span class="title">Historial de equipos</span>

				<div class="pagination">
					<span class="white hover-opacity left" :class="current_page > 1 ? '':'disabled'" @click="firstPage()">
						<img src="/static/images/icons/rightfull.svg" width="20" height="20">
					</span>
					<span class="white hover-opacity left" :class="current_page > 1 ? '':'disabled'" @click="prevPage()">
						<img src="/static/images/icons/right.svg" width="20" height="20">
					</span>
					<span class="white hover-opacity" :class="current_page < total_pages ? '':'disabled'" @click="nextPage()">
						<img src="/static/images/icons/right.svg" width="20" height="20">
					</span>
					<span class="white hover-opacity" :class="current_page < total_pages ? '':'disabled'" @click="lastPage()">
						<img src="/static/images/icons/rightfull.svg" width="20" height="20">
					</span>
				</div>

			</div>

			<div class="history">
				<table>
					<thead>
						<tr>
      						<th>Orden</th>
      						<th>Equipo</th>
      						<th>Cliente</th>
      						<th>Estado</th>
      						<th>Ingreso</th>
						</tr>
					</thead>
					<tbody>
						<template x-for="history in history_list" :key="history.id">
							<tr @click="viewOrder(history.order_number)">
								<td class="order">
									<div class="machine">
										<b x-text="history.method_letter"></b>
										<div class="model">
											<span x-text="history.order_number"></span>
											<span x-show="history.origin_name == 'Provincia'" x-text="history.origin_name"></span>
										</div>
									</div>
								</td>
								<td class="machine_box">
									<div class="machine">
										<img width="40" height="40" :src="'/static/images/uploads/machines/'+history.machine_image" alt="">
										<div class="model">
											<span x-text="history.machine"></span>
											<span x-text="history.brand"></span>
										</div>
									</div>
								</td>
								<td class="client" x-text="history.client_name"></td>
								<td class="order">
									<span class="finished" :class="!history.finished ? 'active' : ''" x-text="history.finished ? 'Finalizado':'Activo'"></span>
								</td>
								<td x-text="history.register_at"></td>
							</tr>
						</template>
					</tbody>
				</table>
			</div>
		</div>
	</div>



	<div
		x-show="$store.cache.isVisibleModal('search')"
		@mousedown.self="$store.cache.hideLastModal()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-search"
		x-cloak>
		<div class="modal" @click.stop>
			<div class="bottom glass2">
				<img class="ico" width="20" height="20" src="/static/images/icons/find.svg">
                <input type="text"
                    x-model="find_order_number"
                    placeholder="Orden, nombre, dni/ruc"
                    @input="findOrders()">
				<div class="hover-opacity clear" x-show="find_order_number" @click="find_order_number = ''; finded_orders = [];">
					<img class="" width="12" height="12" src="/static/images/x.svg">
				</div>
            </div>
			<div class="orders glass2" x-show="finded_orders.length > 0">
				<template x-for="order in finded_orders" :key="order.id">
					<div class="item" @click="viewOrder(order.order_number); $store.cache.hideModal('search'); find_order_number = ''; finded_orders = [];">
						<div class="title">
							<span class="order-number" x-text="order.order_number"></span>
							<span class="machine" x-text="order.machine"></span>
						</div>
						<span class="client" x-text="order.client_name"></span>

						<img width="48" height="48" :src="`/static/images/uploads/machines/${order.machine_image}`" alt="">
					</div>
					
				</template>
			</div>
		</div>
	</div>



	<div
		x-show="$store.cache.isVisibleModal('links')"
		@mousedown.self="$store.cache.hideLastModal()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-history"
		x-cloak>
		<div class="modal glass2" @click.stop>
			<div class="top">
				<button class="create-link button hover-opacity" @click="newLink()">
					<img width="16" height="16" src="/static/images/icons/add.svg">
					Nuevo
				</button>

				<template x-if="link_list.length !== 0">
					<div class="pagination">
						<span class="white hover-opacity left" :class="current_page > 1 ? '':'disabled'" @click="firstLinkPage()">
							<img src="/static/images/icons/rightfull.svg" width="20" height="20">
						</span>
						<span class="white hover-opacity left" :class="current_page > 1 ? '':'disabled'" @click="prevLinkPage()">
							<img src="/static/images/icons/right.svg" width="20" height="20">
						</span>
						<span class="white hover-opacity" :class="current_page < total_pages ? '':'disabled'" @click="nextLinkPage()">
							<img src="/static/images/icons/right.svg" width="20" height="20">
						</span>
						<span class="white hover-opacity" :class="current_page < total_pages ? '':'disabled'" @click="lastLinkPage()">
							<img src="/static/images/icons/rightfull.svg" width="20" height="20">
						</span>
					</div>
				</template>
			</div>

			<template x-if="link_list.length == 0">
				<span style="padding: 1rem;">Aún no has creado enlaces, añade uno y aparecerá aquí.</span>
			</template>

			<template x-if="link_list.length > 0">
				<div class="history">
					<table class="static">
						<thead>
							<tr>
								<th>ID</th>
								<th>Orden asignada</th>
								<th>Estado</th>
								<th>Fecha de creación</th>
								<th></th>
							</tr>
						</thead>
						<tbody>
							<template x-for="link in link_list" :key="link.id">
								<tr>
									<td>
										<b class="link-id" x-text="link.id"></b>
									</td>
									<td>
										<b x-text="link.order_number"></b>
									</td>
									<!--<td x-text="link.client_name"></td>-->
									<td>
										<span class="link-status" :class="`status-${link.status_id}`" x-text="link.status"></span>
									</td>
									<td x-text="link.register_at"></td>
									<td>
										<template x-if="link.order_number == '-' && link.status_id < 3">
											<div class="controlls">
												<div class="action hover-opacity" title="Copiar" @click="navigator.clipboard.writeText(link.url)">
													<img alt="icon" src="/static/images/icons/copy.svg" width="16" height="16">
												</div>
												<div class="action hover-opacity" title="Eliminar" @click="deleteLink(link.id)">
													<img alt="icon" src="/static/images/icons/delete.svg" width="16" height="16">
												</div>
											</div>
										</template>
										<template x-if="link.order_number != '-'">
											<div class="controlls">
												<div class="action hover-opacity" @click="viewOrder(link.order_number)">
													<img alt="icon" src="/static/images/icons/eye.svg" width="16" height="16">
												</div>
											</div>
										</template>
									</td>
								</tr>
							</template>
						</tbody>
					</table>
				</div>
			</template>
			
		</div>
	</div>






	<div
		x-show="$store.cache.isVisibleModal('statistics')"
		@mousedown.self="$store.cache.hideLastModal()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-statistics"
		x-cloak>
		<div class="modal glass2" @click.stop>
			<div class="top">
				<span class="title">Estadísticas</span>
			</div>

			<div class="kpi">
				<div class="item white">
					<p>Total</p>
					<span x-text="$store.cache.getData('support_statistics')?.count.total"></span>
				</div>
				<div class="item white">
					<p>Hoy</p>
					<span x-text="$store.cache.getData('support_statistics')?.count.today"></span>
				</div>
				<div class="item white">
					<p>Semana</p>
					<span x-text="$store.cache.getData('support_statistics')?.count.week"></span>
				</div>
				<div class="item white">
					<p>Mes</p>
					<span x-text="$store.cache.getData('support_statistics')?.count.month"></span>
				</div>
			</div>

			<div class="charts">
				<div class="glass2 box">
					<span>Órdenes por Estado</span>
					<canvas x-ref="ordersByStatusChart" width="160" height="80"></canvas>
				</div>

				<div class="glass2 box">
					<span>Órdenes por Mes</span>
					<canvas x-ref="ordersByMonthChart" width="160" height="80"></canvas>
				</div>

				<div class="glass2 box">
					<span>Órdenes por Técnico</span>
					<canvas x-ref="ordersByTechChart" width="160" height="80"></canvas>
				</div>
			</div>
			<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
				<img alt="close" src="/static/images/x.svg" width="12" height="12">
			</div>
		</div>
	</div>











	<script>
		Alpine.data('support_data',() => ({
			find_order_number: '',
			sendWhatsapp: true,
			dashboard: [],
			history_list: [],
			link_list: [],
			total_pages: null,
			current_page: 1,
			service_order: [],
			machines: [],
			finded_orders: [],
			selected_service: null,

			async init() {
				console.log('Inicializando Support...');

                // Socket
                const socket = Alpine.store('cache').socket;
				if (socket) {
					socket.removeAllListeners();
					socket.on("support_dashboard_update", async () => {
						await Alpine.store('cache').refresh('support_dashboard');
					});
					socket.on("support_link_update", async () => {
						await this.getLinkHistory();
					});
				}	

				await Alpine.store('cache').fetchData([
					{ key: 'support_dashboard', url: `/support/dashboard?user_id=${Alpine.store('cache').user.id}`, force: true },
					{ key: 'service_methods', url: '/general/service_methods' },
					{ key: 'service_status', url: '/general/service_status' },
					{ key: 'service_origin', url: '/general/service_origin' },
					{ key: 'technicians', url: '/general/technicians' },

				await Alpine.store('cache').verify();

			async getMachine() {
                const machine_search = this.process_service.machine;
				NProgress.start();

                try {
                    if (machine_search.length < 2) {
                        this.machines = [];
                        return;
                    }
                    
                    const response = await fetch(`${this.api}/machine/find/${machine_search}`, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' },
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');

                    this.machines = jsonData.data;
                } catch (error) {
                    this.machines = [];
                    return;
                } finally {
                    NProgress.done();
                }
            },

			payToggle() {
				this.process_service.payed = !this.process_service.payed
			},

			async newOrder() {
				if (!this.process_service) return;
				if (this.processing) return;

				this.processing = true;
                NProgress.start();

                const payload = { 
                    user_id: Alpine.store('cache').user.id,
                    machine_id: this.process_service.machine_id || null,
                    method_id: this.process_service.method_id || 3,
                    notes: this.process_service.status_notes || "",
                    origin_id: this.process_service.origin_id || 1,
                    register_at: this.process_service.register_date,
                    client_id: this.process_service.client_id,
                    client: {
						document: this.process_service.client_document,
						email: this.process_service.client_email,
						name: this.process_service.client_name,
						phone: this.process_service.client_phone,
					},
                }

                try {
                    const response = await fetch(`${this.api}/support/process`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');
                    
                    //this.$refs.terms.scrollTop = 0;
                    //this.step++;
                    this.resetOrder();
					Alpine.store('cache').hideModal('add');

                } catch (error) {
                    this.showError('add', error.message);
                } finally {
                    NProgress.done();
					this.processing = false;
                }
            }, 

			
			async updateOrder(field) {
				let value = this.service_order[field];
				if (field == 'paid') {
					if (value == 0) {
						this.service_order.paid = 1
					} else {
						this.service_order.paid = 0
					}
					value = this.service_order.paid
				}

				if (!value && field != 'paid') {
					console.warn(`El campo ${field} está vacío`);
					return;
				}

				const payload = {
					order_number: this.service_order.order_number,
					[field]: value,
					user_id: Alpine.store('cache').user.id,
				};

				NProgress.start();
				try {
					const response = await fetch(this.api + '/support/order/update', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify(payload),
					});

					if (!response.ok) throw new Error('Error al actualizar');
					console.log(`Campo ${field} actualizado correctamente`);
				} catch (error) {
					console.error('Error actualizando:', error);
				} finally {
					NProgress.done();
				}
			},
			
			showError(btnKey, errorMsg) {
                const originalText = this.buttons[btnKey].text;
                const originalClass = this.buttons[btnKey].class;

                if (originalClass == 'error') {
                    return;
                }
                this.buttons[btnKey].text = errorMsg;
                this.buttons[btnKey].class = 'error';

                setTimeout(() => {
                    this.buttons[btnKey].text = originalText;
                    this.buttons[btnKey].class = originalClass;
                }, 1000);
            },

			resetOrder() {
                this.process_service = {};
            },

			dragService(service) {
				this.selected_service = service;
			},

			onDragOver(event, targetStatusId) {
				event.preventDefault();

				if (this.selected_service.status_id == targetStatusId || this.selected_service.status_id + 1 == targetStatusId) {
					event.currentTarget.classList.add('drag-over');
					event.dataTransfer.dropEffect = 'move';
				} else {
					event.dataTransfer.dropEffect = 'none';
				}
			},
			
			onDragLeave(event) {
				event.currentTarget.classList.remove('drag-over');
			},
			
			async dropService(group_id) {
				document.querySelectorAll('.group').forEach(container => {
					container.classList.remove('drag-over');
				});
			
				if (!this.selected_service) {
					return;
				}
				
				if (this.selected_service.status_id == group_id) {
					this.selected_service = null;
					return;
				}
				this.status_notes = '';
				this.sendWhatsapp = true;
				Alpine.store('cache').showModal('status');
			},
			
			finish(service) {
				this.selected_service = service;
				this.status_notes = '';
				Alpine.store('cache').showModal('status');
			},

			async processPay() {
				NProgress.start();

				const payload = {

				try {

						headers: {

					});

				} catch (error) {
					console.error('Error en la asignación:', error);
				} finally {
					NProgress.done();
				}
			},

			addOrder() {
				Alpine.store('cache').showModal('add');
			},

			async viewHistory() {
				await this.firstPage();
				Alpine.store('cache').showModal('history');
			},
			
			async search() {
				this.find_order_number = '';
				this.finded_orders = []

				Alpine.store('cache').showModal('search');
			},

			async viewLinks() {
				await this.firstLinkPage();
				Alpine.store('cache').showModal('links');
			},

				await Alpine.store('cache').fetchData([

			async getHistory() {
				NProgress.start();
				try {
					const response = await fetch(this.api + `/support/history?page=${this.current_page}`);
					const data = await response.json();
					const jsonData = data.data || [];

					this.history_list = jsonData.list;
					//this.current_page = jsonData.pagination.page;
					this.total_pages = jsonData.pagination.pages;
				} catch (error) {
					console.error('Error fetching history', error);
				} finally {
					NProgress.done();
				}
			},

			async getLinkHistory() {
				NProgress.start();
				try {
					const response = await fetch(this.api + `/support/link_history?page=${this.current_page}`);
					const data = await response.json();
					const jsonData = data.data || [];

					this.link_list = jsonData.list;
					//this.current_page = jsonData.pagination.page;
					this.total_pages = jsonData.pagination.pages;
				} catch (error) {
					console.error('Error fetching link', error);
				} finally {
					NProgress.done();
				}
			},

			async deleteLink(link_id) {
				if (this.processing) return;

				this.processing = true;
				NProgress.start();

				const payload = {
					link_id: link_id,
					user_id: Alpine.store('cache').user.id,
				};
			
				try {
					const response = await fetch(this.api + '/support/link_delete', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify(payload)
					});
			
				} catch (error) {
					console.error('Error en la asignación:', error);
				} finally {
					NProgress.done();
					this.processing = false;
				}
			},

			async newLink(link_id) {
				if (this.processing) return;

				this.processing = true;
				NProgress.start();

				const payload = {

				};
			
				try {

			async firstPage() {
				this.current_page = 1;
				await this.getHistory();
			},

			async lastPage() {
				this.current_page = this.total_pages;
				await this.getHistory();
			},

			async nextPage() {
				const new_page = this.current_page + 1;
				if (new_page > this.total_pages)
					return;
				this.current_page = new_page;
				await this.getHistory();
			},

			async prevPage() {
				const new_page = this.current_page - 1;
				if (new_page < 1)
					return;
				this.current_page = new_page;
				await this.getHistory();
			},

			async firstLinkPage() {
				this.current_page = 1;
				await this.getLinkHistory();
			},

			async lastLinkPage() {
				this.current_page = this.total_pages;
				await this.getLinkHistory();
			},

			async nextLinkPage() {
				const new_page = this.current_page + 1;
				if (new_page > this.total_pages)
					return;
				this.current_page = new_page;
				await this.getLinkHistory();
			},

			async prevLinkPage() {
				const new_page = this.current_page - 1;
				if (new_page < 1)
					return;
				this.current_page = new_page;
				await this.getLinkHistory();
			},

			editAllowed() {
				const user = Alpine.store('cache').user;
				return (user.department_id === 5 || user.level_id === 4);
			},

			async fetchClientData() {
				const document = this.process_service.client_document;
				if (!document) {
					this.process_service.client_id = '';
					this.process_service.client_name = '';
					this.process_service.client_phone = '';
					this.client_found = false;
					return;
				}

                NProgress.start();
				try {
					const response = await fetch(this.api + `/client/data/${document}`);
					if (!response.ok) {
						this.process_service.client_id = '';
						this.process_service.client_name = '';
						this.process_service.client_phone = '';
						this.process_service.client_email = '';
						this.client_found = false;
						return;
					}

					const data = await response.json();
					if (data.success) {
						this.process_service.client_id = data.data.id;
						this.process_service.client_name = data.data.name;
						this.process_service.client_phone = data.data.phone;
						this.process_service.client_email = data.data.email;
						this.client_found = true;
					} else {
						console.warn('Respuesta de API no exitosa.');
					}
				} catch (error) {
					console.error('Error al obtener datos del usuario:', error);
				} finally {
                    NProgress.done();
                }
			},

			async updateStatus() {
				if (!this.selected_service) return;
				if (this.processing) return;

				this.processing = true;
				NProgress.start();
				const payload = {
					order_number: this.selected_service.order_number,
					user_id: Alpine.store('cache').user.id,
					notes: this.status_notes,
					send: this.sendWhatsapp,
				};
			
				try {
					const response = await fetch(`${this.api}/support/order/next`, {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify(payload)
					});
			
					if (!response.ok) {
						throw new Error('Error al asignar la orden.');
					}
					if (this.selected_service.status_id == 8) {
						Alpine.store('cache').hideAllModals();
					} else {
						Alpine.store('cache').hideModal('status');
					}

					Alpine.store('cache').hideModal('status');
					this.selected_service = null;

				} catch (error) {
					console.error('Error en la asignación:', error);
				} finally {
					NProgress.done();
					this.processing = false;
				}
			},
			
			async findOrders() {
                const order_number = this.find_order_number;
                try {
                    NProgress.start();
                    if (order_number.length < 2) {
                        this.finded_orders = [];
                        return;
                    }
                    
                    const response = await fetch(`${this.api}/support/find/${order_number}`, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' },
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');

                    this.finded_orders = jsonData.data;
                } catch (error) {
                    this.finded_orders = [];
                    return;
                } finally {
                    NProgress.done();
                }
            },
		}));
	</script>
