<div x-data="support_data">
	<div id="support-dashboard">
		<div class="header">
			<div class="titles">
				<span class="range">Panel de Soporte</span>
			</div>

			<div class="title hover-opacity" @click="addOrder()">+ Añadir orden</div>
		</div>

		<div class="board">
			<template x-if="dashboard.length > 0">
				<template x-for="group in dashboard" :key="group.status_id">
					<div class="group"
						@dragover="onDragOver($event, group.status_id)" 
						@dragleave="onDragLeave($event)"
						@drop="dropService(group.status_id)">
						<div class="name">
							<img width="20" height="20" :src="'/static/images/support/' + $store.cache.service_status[group.status_id].image" alt="">
							<span x-text="$store.cache.service_status[group.status_id].name"></span>
						</div>

						<ul>
							<template x-if="group.service_order.length > 0">
								<template x-for="item in group.service_order" :key="item.order_number">
									<li
										:class="item.priority"
										:draggable="true"
										@dragstart="dragService(item)"
										@click="viewOrder(item.order_number)">
										<div class="row">
											<span class="order-number" x-text="item.order_number + ' ' +  (item.method_letter || '')"></span>
											<div class="passed-days">
												<!--<span class="updated-days" x-text="item.updated_days"></span>-->
												<span class="register-day" x-text="item.register_days"></span>
											</div>
										</div>
	
										<div class="row">
											<div>
												<span class="machine" x-text="item.machine"></span>
												<span class="admin-name" x-text="item.technician_name"></span>
											</div>
											<img width="48" height="48" :src="'/static/images/machines/'+item.machine_image" alt="">
										</div>
									</li>
								</template>
							</template>
						</ul>
					</div>
				</template>
			</template>
		</div>
	</div>


	<div
		x-show="$store.modal.isVisible('status')"
		@click="$store.modal.hideLast()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-status"
		x-cloak>
		<div class="modal glass2" @click.stop>
			<span class="title" x-text="'Orden ' + selected_service?.order_number"></span>

			<div class="update">
				<div class="box">
					<img width="20" height="20" :src="'/static/images/support/' + $store.cache.service_status?.[selected_service?.status_id]?.image" alt="from">
					<span x-text="$store.cache.service_status?.[selected_service?.status_id]?.name"></span>
				</div>

				<div class="box">
					<img width="20" height="20" :src="'/static/images/support/' + $store.cache.service_status?.[selected_service?.status_id + 1]?.image" alt="to">
					<span x-text="$store.cache.service_status?.[selected_service?.status_id + 1]?.name"></span>
				</div>
				<img class="arrow" width="16" height="16" src="/static/images/arrownext.svg">
			</div>
				
			<textarea x-model="status_notes" class="text-area" placeholder="Notas internas"></textarea>

			<div class="send-whatsapp">
				<span class="dot"></span>
				Se notificará al cliente
				<label class="box">
					<input id="send-whatsapp" type="checkbox" name="check" checked>
					<span class="slider"></span>
				</label>
			</div>

			<button class="hover-opacity button" @click="updateStatus()">Actualizar</button>

			<div class="hover-opacity modal-close" @click="$store.modal.hideLast()">
				<img alt="close" src="static/images/x.svg" width="12" height="12">
			</div>
		</div>
	</div>


	<div
		x-show="$store.modal.isVisible('view')"
		@click="$store.modal.hideLast()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-view"
		x-cloak>
		<div class="modal glass2" @click.stop>
			<span class="title" x-text="service_order?.order_number + (service_order?.method_name ? (' - ' + service_order?.method_name) : '')"></span>

			<div class="header">
				<div class="left">
					<span class="item">
						<img alt="user" src="static/images/user.svg" width="12" height="12">
						<span x-text="service_order?.technician_name"></span>
					</span>
					<span class="item">
						<img alt="maps" src="static/images/location.svg" width="12" height="12">
						<span x-text="service_order?.origin_name"></span>
					</span>
				</div>
				
				<span class="days" x-text="service_order?.passed_days"></span>
			</div>

			<div class="client">
				<img width="48" height="48" :src="'/static/images/machines/'+service_order?.machine_image" alt="">
				
				<div class="data">
					<span class="machine" x-text="service_order?.machine"></span>
					<span class="name" x-text="show_document ? service_order?.client_document : service_order?.client_name"></span>
				</div>

				<div class="icons">
					<a :href="'https://api.whatsapp.com/send?phone=' + service_order?.client_phone" target="_blank" class="hover-opacity" rel="noopener noreferrer">
						<img alt="phone" src="static/images/whatsapp.svg" width="16" height="16">
					</a>

					<button @click="show_document = !show_document" class="hover-opacity">
						<img alt="document" src="static/images/document.svg" width="16" height="16">
					</button>
				</div>
			</div>

			<div class="history">
				<template x-for="history in service_order?.history" :key="history.status_id">
					<div class="row">
						<img width="20" height="20" :src="'/static/images/support/' + $store.cache.service_status[history.status_id].image" alt="">

						<div class="left">
							<div class="head">
								<span class="name" x-text="$store.cache.service_status[history.status_id].name"></span>
								<div class="right">
									<span class="admin" x-text="history.admin_name"></span>
									<span class="date" x-text="history.register_at"></span>
								</div>
							</div>
							<span class="notes" x-text="history.notes"></span>
						</div>
					</div>
				</template>
			</div>

			<div class="hover-opacity modal-close" @click="$store.modal.hideLast()">
				<img alt="close" src="static/images/x.svg" width="12" height="12">
			</div>
		</div>
	</div>


	<div
		x-show="$store.modal.isVisible('add')"
		@click="$store.modal.hideLast()"
		x-transition.duration.300ms
		class="modal-wrap"
		id="modal-add"
		x-cloak>
		<div class="modal glass2" @click.stop>
			<span class="title"><img alt="user" width="20" height="20" src="/static/images/users/00000000.jpg">Nueva orden</span>
			
			<div class="fields">
				<label class="white">
					<select x-model="add_service_order.method_id">
						<template x-if="$store.cache.service_methods?.length !== 1">
							<option value="">Tipo de servicio</option>
						</template>

						<template x-for="method in $store.cache.service_methods" :key="method.id">
							<option :value="method.id" x-text="method.name"></option>
						</template>
					</select>
				</label>

				<label class="white">
					<input type="date" x-model="add_service_order.register_date">
				</label>

				<label class="white">
					<img alt="user" src="static/images/id.svg" width="16" height="16">
					<input type="text" maxlength="11" @input="add_service_order.document = add_service_order.document.replace(/\D/g, '')" placeholder="DNI / RUC" x-model="add_service_order.document" @blur="fetchUserData()">
					<input type="hidden" x-model="add_service_order.document_id">
				</label>
			</div>

			<div class="white">
				<label class="percent100">
					<img alt="user" src="static/images/user.svg" width="16" height="16">
					<input type="text" placeholder="Nombre o Razón Social" x-model="add_service_order.name">
				</label>

				<label class="percent66">
					<img alt="email" src="static/images/email.svg" width="16" height="16">
					<input type="text" placeholder="Email" x-model="add_service_order.email">
				</label>

				<label class="percent33">
					<img alt="phone" src="static/images/phone.svg" width="16" height="16">
					<input type="text" maxlength="9" @input="add_service_order.phone = add_service_order.phone.replace(/\D/g, '')" placeholder="Celular" x-model="add_service_order.phone">
				</label>
			</div>

			<div class="fields">
				<label class="white">
                	<input type="text" x-model="service_order.machine" placeholder="Nombre del equipo" @input="getMachine()">
				</label>

				<div class="white machines">
					<template x-for="machine in machines" :key="machine.id">
						<span
						x-text="machine.name"
						@click="
							service_order.machine = machine.name;
							service_order.machine_id = machine.id;
							service_order.machine_image = machine.image;
							machines = [];
						">
						</span>
					</template>
				</div>
            </div>

			<textarea x-model="status_notes" class="text-area" placeholder="Problema reportado"></textarea>

			<button class="button hover-opacity" @click="newOrder()" :class="buttons.add.class" x-text="buttons.add.text"></button>

			<div class="hover-opacity modal-close" @click="$store.modal.hideLast()">
				<img alt="close" src="static/images/x.svg" width="12" height="12">
			</div>
		</div>
	</div>








	<script>
		Alpine.data('support_data',() => ({
			dashboard: [],
			service_order: [],
			machines: [],
			add_service_order: {
                document: '',
                id: null,
                name: '',
                phone: '',
                notes: '',
                machine: null,
                machine_id: null,
                machine_image: null,
            },
			selected_service: null,
			status_notes: '',
			show_document: false,
			buttons: {
                add: { class: '', text: 'Añadir' },
            },

			async init() {
				console.log('Inicializando Support...');

                this.initSocket();
				const fetchDataIfNeeded = !Alpine.store('cache').isLoaded('service_status') ? this.fetchData() : Promise.resolve();
				await Promise.all([fetchDataIfNeeded, this.getDashboard()]);
			},

			async initSocket() {
				try {
					this.socket = io(Alpine.store('cache').api +"/");

					this.socket.on("support_dashboard_update", async () => {
						await this.getDashboard();
					});

					this.socket.on("connect_error", (err) => {
						console.error("Error en la conexión del socket:", err.message);
					});

				} catch (error) {
					console.error("Error inicializando WebSocket:", error);
				}
			},

			async fetchData() {
				try {
					console.log('Obteniendo datos desde API');
					
					const endpoints = [
						{ url: '/general/service_status', key: 'service_status' },
						{ url: '/general/service_methods', key: 'service_methods' },
						{ url: '/general/technicians', key: 'technicians' },
					];

					const responses = await Promise.all(
						endpoints.map(ep => 
							fetch(Alpine.store('cache').api + ep.url)
								.then(res => res.json())
								.then(data => ({ key: ep.key, data: data.data }))
						)
					);

					responses.forEach(({ key, data }) => {
						Alpine.store('cache').setData(key, data);
					});

				} catch (error) {
					console.error('Error fetching data:', error);
				}
			},

			async getMachine() {
                const machine_search = this.service_order.machine;
                try {
                    NProgress.start();
                    if (machine_search.length < 3) {
                        this.machines = [];
                        return;
                    }
                    
                    const response = await fetch(Alpine.store('cache').api + `/machine/find/${machine_search}`, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' },
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');

                    this.machines = jsonData.data;
                } catch (error) {
                    this.machines = [];
                    return;
                } finally {
                    NProgress.done();
                }
            },

			async newOrder() {
                NProgress.start();

                const payload = { 
                    machine_id: this.add_service_order.machine_id,
                    admin_id: Alpine.store('cache').user.id,
                    notes: this.add_service_order.notes,
                    client_id: this.add_service_order.id,
                    client: {
                        document: this.add_service_order.document,
                        name: this.add_service_order.name,
                        phone: this.add_service_order.phone,
                    },
                }

                try {
                    const response = await fetch(Alpine.store('cache').api + '/support/order/new', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');
                    
                    //this.$refs.terms.scrollTop = 0;
                    //this.step++;
                    this.resetOrder();

                } catch (error) {
                    this.showError('new', error.message);
                } finally {
                    NProgress.done();
                }
            }, 
			
			showError(btnKey, errorMsg) {
                const originalText = this.buttons[btnKey].text;
                const originalClass = this.buttons[btnKey].class;

                if (originalClass == 'error') {
                    return;
                }
                this.buttons[btnKey].text = errorMsg;
                this.buttons[btnKey].class = 'error';

                setTimeout(() => {
                    this.buttons[btnKey].text = originalText;
                    this.buttons[btnKey].class = originalClass;
                }, 1000);
            },

			resetOrder() {
                this.add_service_order = {
                    document: '',
                    id: null,
                    name: '',
                    phone: '',
                    notes: '',
                    machine: null,
                    machine_id: null,
                    machine_image: null,
                };
            },

			async getDashboard() {
				try {
					const response = await fetch(Alpine.store('cache').api + '/support/dashboard');
					const data = await response.json();
					this.dashboard = data.data || [];
				} catch (error) {
					console.error('Error fetching dashboard', error);
				}
			},
			
			dragService(service) {
				this.selected_service = service;
			},

			onDragOver(event, targetStatusId) {
				event.preventDefault();

				if (this.selected_service.status_id == targetStatusId || this.selected_service.status_id + 1 == targetStatusId) {
					event.currentTarget.classList.add('drag-over');
					event.dataTransfer.dropEffect = 'move';
				} else {
					event.dataTransfer.dropEffect = 'none';
				}
			},
			
			onDragLeave(event) {
				event.currentTarget.classList.remove('drag-over');
			},
			
			async dropService(group_id) {
				document.querySelectorAll('.group').forEach(container => {
					container.classList.remove('drag-over');
				});
			
				if (!this.selected_service) {
					return;
				}
				
				if (this.selected_service.status_id == group_id) {
					this.selected_service = null;
					return;
				}
				this.status_notes = '';
				Alpine.store('modal').show('status');
			},
			
			async viewOrder(order_number) {
				NProgress.start();
				try {
					const response = await fetch(Alpine.store('cache').api + `/support/order_number/${order_number}`);
					const data = await response.json();
					this.service_order = data.data;
					Alpine.store('modal').show('view');
				} catch (error) {
					console.error('Error en la asignación:', error);
				} finally {
					NProgress.done();
				}
			},

			addOrder() {
				Alpine.store('modal').show('add');
			},

			async fetchUserData() {
				const document = this.add_service_order.document;
				if (!document) {
					this.add_service_order.document_id = '';
					this.add_service_order.name = '';
					this.add_service_order.phone = '';
					return;
				}

				try {
					const response = await fetch(Alpine.store('cache').api + `/client/data/${document}`);
					if (!response.ok) {
						this.add_service_order.document_id = '';
						this.add_service_order.name = '';
						this.add_service_order.phone = '';
						return;
					}

					const data = await response.json();
					if (data.success) {
						this.add_service_order.document_id = data.data.id;
						this.add_service_order.name = data.data.name;
						this.add_service_order.phone = data.data.phone;
						//this.process_shipping.disabled = true;
					} else {
						console.warn('Respuesta de API no exitosa.');
					}
				} catch (error) {
					console.error('Error al obtener datos del usuario:', error);
				}
			},

			async updateStatus() {
				NProgress.start();
				const payload = {
					order_number: this.selected_service.order_number,
					admin_id: Alpine.store('cache').user.id,
					notes: this.status_notes,
				};
			
				try {
					const response = await fetch(Alpine.store('cache').api + '/support/order/next', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify(payload)
					});
			
					if (!response.ok) {
						throw new Error('Error al asignar la orden.');
					}

					Alpine.store('modal').hide('status');
					this.selected_service = null;
					//await this.getDashboard();

				} catch (error) {
					console.error('Error en la asignación:', error);
				} finally {
					NProgress.done();
				}
			},
			

		}));
	</script>







	<style>
		#support-dashboard {
			width: 100%;
			user-select: none;
			padding: 1rem;
			min-height: calc(100vh - 6.5rem);
			display: flex;
			flex-direction: column;
			gap: 1rem;
			margin: 0 auto;
			max-width: 118rem;
		}
		#support-dashboard .header {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#support-dashboard .header .title {
			background-color: var(--black);
			color: var(--white);
			padding: 0.75rem 1.5rem;
			border-radius: 2rem;
			font-weight: 300;
		}
		#support-dashboard .header .title img {
			padding: 0.5rem;
			border-radius: 0.5rem;
			border: 2px solid #eee;
		}
		#support-dashboard .header .range {
			font-size: 1rem;
			font-weight: 600;
			text-transform: capitalize;
			display: flex;
			align-items: center;
			gap: 0.5rem;
			position: relative;
		}
		#support-dashboard .board {
			display: flex;
			height: 100%;
			user-select: none;
			background-color: #ffffff4a;
			border: 2px solid #ffffff52;
			border-radius: 1.5rem;
		}
		#support-dashboard .group {
			flex: 1;
			display: flex;
			flex-direction: column;
			border-right: 2px solid #ffffff80;
			gap: 0.25rem;
			transition: var(--transition);
		}
		#support-dashboard .group:last-child {
			border-right: none;
		}
		#support-dashboard .group .name {
			display: flex;
			justify-content: center;
			font-size: 0.9rem;
			margin-top: 0.75rem;
			gap: 0.5rem;
			align-items: center;
		}
		#support-dashboard ul {
			margin: 0;
			list-style: none;
			display: flex;
			gap: 0.75rem;
			flex-direction: column;
			padding: 0.75rem;
			flex: 1;
		}
		#support-dashboard ul li {
			border-radius: 0.75rem;
			cursor: pointer;
			padding: 0.75rem;
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-direction: column;
			position: relative;
			transition: var(--transition);
			background-color: white;
			box-shadow: 0 0 1rem hsl(0deg 0% 0% / 2.5%);
		}
		#support-dashboard .group.drag-over {
			background-color: #ffffff80;
		}
		#support-dashboard .group.drag-over ul li {
			box-shadow: 0 0 1rem #0000000d;
		}
		#support-dashboard ul li .row {
			display: flex;
			justify-content: space-between;
			width: 100%;
			align-items: center;
		}
		#support-dashboard ul li .order-number {
			font-size: 1rem;
			font-weight: 600;
			line-height: 1rem;
		}
		#support-dashboard ul li .passed-days {
			display: flex;
			gap: 0.5rem;
		}
		#support-dashboard ul li .updated-days,
		#support-dashboard ul li .register-day {
			font-size: 1rem;
			font-weight: 700;
		}
		#support-dashboard ul li .updated-days {
			background-color: #f0f0f0;
			color: var(--black);
			display: none;
		}
		#support-dashboard ul li .admin-name {
			font-size: 0.75rem;
			opacity: 0.75;
			display: block;
			line-height: 0.8rem;
			margin-top: 0.5rem;
		}
		#support-dashboard ul li .machine {
			font-weight: 600;
			font-size: 0.75rem;
			line-height: 1rem;
			display: block;
		}
		#support-dashboard ul li .buttons {
			display: flex;
			gap: 0.5rem;
		}
		#support-dashboard ul li img {
			mix-blend-mode: darken;
			position: absolute;
			bottom: 0.5rem;
			right: 0.5rem;
			width: 2rem;
			pointer-events: none;
		}
		#support-dashboard ul li.low .register-day {
			color: #6fcc85;
		}
		#support-dashboard ul li.mid .register-day {
			color: #ff9600;
		}
		#support-dashboard ul li.high .register-day {
			color: #f96161;
		}
		/***********************************************************************************/
		#modal-status .update {
			display: flex;
			justify-content: center;
			gap: 1rem;
			background-color: white;
			box-shadow: 0 0 2rem hsl(0deg 0% 0% / 5%);
			border-radius: 1rem;
			position: relative;
		}
		#modal-status .update .box {
			padding: 1rem;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 0.5rem;
			flex: 1;
		}
		#modal-status .update .arrow {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
		}
		#modal-status .update .box img {
			margin-top: 0.5rem;
		}
		#modal-status .update .box span {
			font-size: 0.8rem;
		}
		#modal-status .send-whatsapp {
			display: flex;
			gap: 0.5rem;
			align-items: center;
			font-size: 0.75rem;
		}
