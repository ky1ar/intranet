<div x-data="conversations_data">
	<div id="conversations">

		<div class="conv-layout">

			<!-- ── Left panel: conversation list ─────────────────────── -->
			<div class="conv-sidebar">
				<div class="conv-sidebar-header">
					<span class="conv-sidebar-title">Conversaciones</span>
					<button class="conv-refresh-btn" @click="load()" title="Actualizar">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
							<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
							<path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
						</svg>
					</button>
				</div>

				<div class="conv-list">
					<template x-if="conversations.length === 0">
						<div class="conv-empty-list">Sin conversaciones</div>
					</template>

					<template x-for="conv in conversations" :key="conv.wa_id">
						<div
							class="conv-item"
							:class="selected && selected.wa_id === conv.wa_id ? 'conv-item-active' : ''"
							@click="select(conv)"
						>
							<div class="conv-avatar" x-text="initials(conv.contact_name)"></div>
							<div class="conv-item-body">
								<div class="conv-item-top">
									<span class="conv-item-name" x-text="conv.contact_name"></span>
									<span class="conv-item-time" x-text="formatTime(conv.created_at)"></span>
								</div>
								<div class="conv-item-preview">
									<span
										class="conv-dir-badge"
										:class="conv.direction === 'out' ? 'badge-out' : 'badge-in'"
										x-text="conv.direction === 'out' ? '↑' : '↓'"
									></span>
									<span x-text="previewMsg(conv)"></span>
								</div>
							</div>
						</div>
					</template>
				</div>
			</div>

			<!-- ── Right panel: chat thread ───────────────────────────── -->
			<div class="conv-main">

				<!-- Empty state -->
				<template x-if="!selected">
					<div class="conv-empty-state">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" style="opacity:0.2">
							<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
						</svg>
						<p>Selecciona una conversación</p>
					</div>
				</template>

				<!-- Thread -->
				<template x-if="selected">
					<div class="conv-thread">

						<!-- Thread header -->
						<div class="conv-thread-header">
							<div class="conv-thread-avatar" x-text="initials(selected.contact_name)"></div>
							<div>
								<div class="conv-thread-name" x-text="selected.contact_name"></div>
								<div class="conv-thread-phone" x-text="selected.wa_id"></div>
							</div>
						</div>

						<!-- Messages -->
						<div class="conv-messages" id="conv-messages-scroll">
							<template x-if="loadingMessages">
								<div class="conv-loading">Cargando mensajes...</div>
							</template>

							<template x-for="msg in messages" :key="msg.id">
								<div class="conv-msg" :class="msg.direction === 'out' ? 'conv-msg-out' : 'conv-msg-in'">
									<div class="conv-bubble" :class="msg.direction === 'out' ? 'bubble-out' : 'bubble-in'">
										<template x-if="msg.template_name && !msg.content">
											<div class="bubble-template-label" x-text="`[${msg.template_name}]`"></div>
										</template>
										<template x-if="msg.template_name && msg.content">
											<div>
												<div class="bubble-template-label" x-text="`[${msg.template_name}]`"></div>
												<div class="bubble-text" x-text="msg.content"></div>
											</div>
										</template>
										<template x-if="!msg.template_name">
											<div class="bubble-text" x-text="msgLabel(msg)"></div>
										</template>
										<div class="bubble-time" x-text="formatMsgTime(msg.created_at)"></div>
									</div>
								</div>
							</template>
						</div>

						<!-- Reply input -->
						<div class="conv-reply-bar">
							<input
								type="text"
								class="conv-reply-input"
								x-model="replyText"
								@keyup.enter="send()"
								placeholder="Escribe un mensaje..."
								:disabled="sending"
							>
							<button
								class="conv-send-btn"
								@click="send()"
								:disabled="sending || !replyText.trim()"
							>
								<template x-if="!sending">
									<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
										<path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
									</svg>
								</template>
								<template x-if="sending">
									<span class="conv-spinner"></span>
								</template>
							</button>
						</div>

					</div>
				</template>

			</div>
		</div>

	</div>


	<script>
	Alpine.data('conversations_data', () => ({
		conversations:   [],
		selected:        null,
		messages:        [],
		replyText:       '',
		loadingMessages: false,
		sending:         false,
		_pollTimer:      null,

		async init() {
			await this.load();
			this._pollTimer = setInterval(() => this._poll(), 20000);
		},

		destroy() {
			clearInterval(this._pollTimer);
		},

		async load() {
			const api = Alpine.store('cache').api;
			const r = await fetch(`${api}/conversations`, { headers: { 'X-No-Toast': '1' } });
			const j = await r.json();
			this.conversations = j.data || [];
		},

		async select(conv) {
			this.selected  = conv;
			this.messages  = [];
			this.replyText = '';
			await this.loadMessages(conv.wa_id);
		},

		async loadMessages(wa_id) {
			this.loadingMessages = true;
			const api = Alpine.store('cache').api;
			try {
				const r = await fetch(`${api}/conversations/${wa_id}/messages`, { headers: { 'X-No-Toast': '1' } });
				const j = await r.json();
				this.messages = j.data || [];
				this.$nextTick(() => this._scrollBottom());
			} finally {
				this.loadingMessages = false;
			}
		},

		async _poll() {
			const api = Alpine.store('cache').api;
			// Refresh conversation list silently
			const r = await fetch(`${api}/conversations`, { headers: { 'X-No-Toast': '1' } });
			const j = await r.json();
			this.conversations = j.data || [];

			// Refresh open thread silently
			if (this.selected) {
				const r2 = await fetch(`${api}/conversations/${this.selected.wa_id}/messages`, { headers: { 'X-No-Toast': '1' } });
				const j2 = await r2.json();
				const updated = j2.data || [];
				if (updated.length !== this.messages.length) {
					this.messages = updated;
					this.$nextTick(() => this._scrollBottom());
				}
			}
		},

		async send() {
			if (!this.replyText.trim() || !this.selected || this.sending) return;
			this.sending = true;
			const api  = Alpine.store('cache').api;
			const text = this.replyText.trim();
			try {
				const r = await fetch(`${api}/conversations/reply`, {
					method:  'POST',
					headers: { 'Content-Type': 'application/json' },
					body:    JSON.stringify({ wa_id: this.selected.wa_id, text }),
				});
				const j = await r.json();
				if (j.success) {
					this.replyText = '';
					await this.loadMessages(this.selected.wa_id);
					await this.load();
				}
			} finally {
				this.sending = false;
			}
		},

		_scrollBottom() {
			const el = document.getElementById('conv-messages-scroll');
			if (el) el.scrollTop = el.scrollHeight;
		},

		initials(name) {
			if (!name) return '?';
			const parts = name.trim().split(' ').filter(Boolean);
			return parts.length >= 2
				? (parts[0][0] + parts[1][0]).toUpperCase()
				: name.substring(0, 2).toUpperCase();
		},

		formatTime(iso) {
			if (!iso) return '';
			const d   = new Date(iso);
			const now = new Date();
			if (d.toDateString() === now.toDateString())
				return d.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' });
			const yesterday = new Date(now);
			yesterday.setDate(now.getDate() - 1);
			if (d.toDateString() === yesterday.toDateString()) return 'ayer';
			return d.toLocaleDateString('es-PE', { day: '2-digit', month: 'short' });
		},

		formatMsgTime(iso) {
			if (!iso) return '';
			return new Date(iso).toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' });
		},

		msgLabel(msg) {
			if (msg.content)       return msg.content;
			if (msg.template_name) return `[${msg.template_name}]`;
			return `(${msg.msg_type})`;
		},

		previewMsg(conv) {
			const raw = conv.content || (conv.template_name ? `[${conv.template_name}]` : `(${conv.msg_type})`);
			return raw.length > 42 ? raw.substring(0, 42) + '…' : raw;
		},
	}));
	</script>


	<style>
	#conversations {
		height: calc(100vh - 5rem);
		display: flex;
		flex-direction: column;
	}

	/* ── Layout ── */
	.conv-layout {
		display: grid;
		grid-template-columns: 300px 1fr;
		height: 100%;
		gap: 0;
		border-radius: 1rem;
		overflow: hidden;
		box-shadow: 0 2px 16px rgba(0,0,0,0.07);
	}

	/* ── Sidebar ── */
	.conv-sidebar {
		display: flex;
		flex-direction: column;
		background: #fff;
		border-right: 1px solid #f0f0f0;
		overflow: hidden;
	}
	.conv-sidebar-header {
		display: flex;
		align-items: center;
		justify-content: space-between;
		padding: 1rem 1.25rem;
		border-bottom: 1px solid #f0f0f0;
		flex-shrink: 0;
	}
	.conv-sidebar-title {
		font-weight: 700;
		font-size: 0.95rem;
	}
	.conv-refresh-btn {
		background: none;
		border: none;
		cursor: pointer;
		padding: 0.35rem;
		border-radius: 0.5rem;
		color: #888;
		display: flex;
		align-items: center;
		transition: background 0.15s, color 0.15s;
	}
	.conv-refresh-btn:hover { background: #f5f5f5; color: #333; }

	.conv-list {
		flex: 1;
		overflow-y: auto;
	}
	.conv-empty-list {
		padding: 2rem 1.25rem;
		text-align: center;
		color: #bbb;
		font-size: 0.85rem;
	}

	/* ── Conversation item ── */
	.conv-item {
		display: flex;
		align-items: center;
		gap: 0.75rem;
		padding: 0.85rem 1.25rem;
		cursor: pointer;
		border-bottom: 1px solid #fafafa;
		transition: background 0.12s;
	}
	.conv-item:hover       { background: #fdf3ee; }
	.conv-item-active      { background: #fdf3ee; border-left: 3px solid var(--primary); }
	.conv-avatar {
		width: 2.5rem;
		height: 2.5rem;
		min-width: 2.5rem;
		border-radius: 50%;
		background: var(--primaryopacity, #fde8d8);
		color: var(--primary);
		display: flex;
		align-items: center;
		justify-content: center;
		font-weight: 700;
		font-size: 0.8rem;
	}
	.conv-item-body   { flex: 1; min-width: 0; }
	.conv-item-top    { display: flex; justify-content: space-between; align-items: center; gap: 0.25rem; }
	.conv-item-name   { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
	.conv-item-time   { font-size: 0.7rem; color: #aaa; white-space: nowrap; flex-shrink: 0; }
	.conv-item-preview {
		font-size: 0.78rem;
		color: #999;
		white-space: nowrap;
		overflow: hidden;
		text-overflow: ellipsis;
		margin-top: 0.15rem;
		display: flex;
		align-items: center;
		gap: 0.25rem;
	}
	.conv-dir-badge {
		font-size: 0.65rem;
		font-weight: 700;
		padding: 0.1rem 0.3rem;
		border-radius: 3px;
		flex-shrink: 0;
	}
	.badge-in  { background: #e8f5e9; color: #388e3c; }
	.badge-out { background: #fff3e0; color: #e65100; }

	/* ── Main panel ── */
	.conv-main {
		display: flex;
		flex-direction: column;
		background: #f8f8f8;
		overflow: hidden;
	}
	.conv-empty-state {
		flex: 1;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		gap: 0.75rem;
		color: #bbb;
		font-size: 0.9rem;
		height: 100%;
	}

	/* ── Thread ── */
	.conv-thread {
		display: flex;
		flex-direction: column;
		height: 100%;
	}
	.conv-thread-header {
		display: flex;
		align-items: center;
		gap: 0.75rem;
		padding: 0.9rem 1.25rem;
		background: #fff;
		border-bottom: 1px solid #f0f0f0;
		flex-shrink: 0;
	}
	.conv-thread-avatar {
		width: 2.25rem;
		height: 2.25rem;
		border-radius: 50%;
		background: var(--primaryopacity, #fde8d8);
		color: var(--primary);
		display: flex;
		align-items: center;
		justify-content: center;
		font-weight: 700;
		font-size: 0.78rem;
	}
	.conv-thread-name  { font-weight: 700; font-size: 0.9rem; }
	.conv-thread-phone { font-size: 0.75rem; color: #aaa; }

	/* ── Messages ── */
	.conv-messages {
		flex: 1;
		overflow-y: auto;
		padding: 1.25rem;
		display: flex;
		flex-direction: column;
		gap: 0.5rem;
	}
	.conv-loading {
		text-align: center;
		color: #bbb;
		font-size: 0.85rem;
		padding: 2rem 0;
	}

	.conv-msg { display: flex; }
	.conv-msg-in  { justify-content: flex-start; }
	.conv-msg-out { justify-content: flex-end; }

	.conv-bubble {
		max-width: 68%;
		padding: 0.6rem 0.85rem;
		border-radius: 1rem;
		font-size: 0.875rem;
		line-height: 1.45;
		position: relative;
	}
	.bubble-in {
		background: #fff;
		border-bottom-left-radius: 0.25rem;
		box-shadow: 0 1px 4px rgba(0,0,0,0.07);
	}
	.bubble-out {
		background: var(--primary, #e05a00);
		color: #fff;
		border-bottom-right-radius: 0.25rem;
	}
	.bubble-template-label {
		font-size: 0.7rem;
		font-weight: 700;
		opacity: 0.6;
		margin-bottom: 0.2rem;
	}
	.bubble-text { word-break: break-word; }
	.bubble-time {
		font-size: 0.65rem;
		margin-top: 0.3rem;
		opacity: 0.55;
		text-align: right;
	}

	/* ── Reply bar ── */
	.conv-reply-bar {
		display: flex;
		align-items: center;
		gap: 0.5rem;
		padding: 0.85rem 1.25rem;
		background: #fff;
		border-top: 1px solid #f0f0f0;
		flex-shrink: 0;
	}
	.conv-reply-input {
		flex: 1;
		border: 1.5px solid #e8e8e8;
		border-radius: 1.5rem;
		padding: 0.65rem 1rem;
		font-size: 0.88rem;
		font-family: inherit;
		outline: none;
		background: #f9f9f9;
		transition: border-color 0.15s;
	}
	.conv-reply-input:focus { border-color: var(--primary); background: #fff; }
	.conv-reply-input:disabled { opacity: 0.5; cursor: not-allowed; }

	.conv-send-btn {
		width: 2.4rem;
		height: 2.4rem;
		border-radius: 50%;
		border: none;
		background: var(--primary, #e05a00);
		color: #fff;
		cursor: pointer;
		display: flex;
		align-items: center;
		justify-content: center;
		flex-shrink: 0;
		transition: opacity 0.15s, transform 0.1s;
	}
	.conv-send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
	.conv-send-btn:not(:disabled):hover { opacity: 0.85; }
	.conv-send-btn:not(:disabled):active { transform: scale(0.93); }

	.conv-spinner {
		width: 14px;
		height: 14px;
		border: 2px solid rgba(255,255,255,0.4);
		border-top-color: #fff;
		border-radius: 50%;
		animation: conv-spin 0.6s linear infinite;
	}
	@keyframes conv-spin { to { transform: rotate(360deg); } }

	/* ── Responsive ── */
	@media (max-width: 680px) {
		.conv-layout {
			grid-template-columns: 1fr;
			grid-template-rows: auto 1fr;
		}
		.conv-sidebar {
			max-height: 40vh;
			border-right: none;
			border-bottom: 1px solid #f0f0f0;
		}
		#conversations { height: 100dvh; }
	}
	</style>
</div>
