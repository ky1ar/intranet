<div x-data="conversations_data">
	<div id="conversations">

		<div class="conv-layout">

			<!-- ── Left panel: conversation list ─────────────────────── -->
			<div class="conv-sidebar">
				<div class="conv-sidebar-header">
					<span class="conv-sidebar-title">Conversaciones</span>
					<button class="conv-refresh-btn" @click="load()" title="Actualizar">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
							<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
							<path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
						</svg>
					</button>
				</div>

				<div class="conv-list" @scroll="onScroll($event)">
					<template x-if="conversations.length === 0">
						<div class="conv-empty-list">Sin conversaciones</div>
					</template>

					<template x-for="conv in conversations" :key="conv.wa_id">
						<div
							class="conv-item"
							:class="selected && selected.wa_id === conv.wa_id ? 'conv-item-active' : ''"
							@click="select(conv)"
						>
							<div class="conv-avatar" x-text="initials(displayName(conv))"></div>
							<div class="conv-item-body">
								<div class="conv-item-top">
									<span class="conv-item-name" x-text="displayName(conv)"></span>
									<span class="conv-item-time" x-text="formatTime(conv.created_at)"></span>
								</div>
								<div class="conv-item-preview">
									<span
										class="conv-dir-badge"
										:class="conv.direction === 'out' ? 'badge-out' : 'badge-in'"
										x-text="conv.direction === 'out' ? '↑' : '↓'"
									></span>
									<span x-text="previewMsg(conv)"></span>
								</div>
							</div>
						</div>
					</template>

					<template x-if="loadingMore">
						<div class="conv-loading-more">Cargando más…</div>
					</template>
				</div>
			</div>

			<!-- ── Right panel: chat thread ───────────────────────────── -->
			<div class="conv-main">

				<!-- Empty state -->
				<template x-if="!selected">
					<div class="conv-empty-state">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" style="opacity:0.2">
							<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
						</svg>
						<p>Selecciona una conversación</p>
					</div>
				</template>

				<!-- Thread -->
				<template x-if="selected">
					<div class="conv-thread">

						<!-- Thread header -->
						<div class="conv-thread-header">
							<div class="conv-thread-avatar" x-text="initials(displayName(selected))"></div>
							<div>
								<div class="conv-thread-name" x-text="displayName(selected)"></div>
								<div class="conv-thread-phone" x-text="formatPhone(selected.wa_id)"></div>
							</div>
						</div>

						<!-- Messages -->
						<div class="conv-messages" id="conv-messages-scroll">
							<template x-if="loadingMessages">
								<div class="conv-loading">Cargando mensajes...</div>
							</template>

							<template x-for="msg in messages" :key="msg.id">
								<div class="conv-msg" :class="msg.direction === 'out' ? 'conv-msg-out' : 'conv-msg-in'">
									<div class="conv-bubble" :class="msg.direction === 'out' ? 'bubble-out' : 'bubble-in'">
										<!-- Media -->
										<template x-if="msg.media_url && bubbleMediaType(msg) === 'image'">
											<img class="bubble-media-img" :src="msg.media_url" alt="Imagen adjunta" loading="lazy" style="cursor:pointer" @click="openAttachment(msg)">
										</template>
										<template x-if="msg.media_url && bubbleMediaType(msg) === 'video'">
											<video class="bubble-media-img" :src="msg.media_url" controls preload="metadata"></video>
										</template>
										<template x-if="msg.media_url && bubbleMediaType(msg) === 'audio'">
											<audio class="bubble-media-audio" :src="msg.media_url" controls preload="none"></audio>
										</template>
										<template x-if="msg.media_url && bubbleMediaType(msg) === 'pdf'">
											<a class="bubble-pdf-link" href="#" @click.prevent="openAttachment(msg)">
												<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
												Ver PDF adjunto
											</a>
										</template>
										<template x-if="msg.media_url && bubbleMediaType(msg) === 'document'">
											<a class="bubble-pdf-link" :href="msg.media_url" target="_blank" rel="noopener">
												<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
												Descargar archivo
											</a>
										</template>
										<!-- Body -->
										<template x-if="bubbleHasText(msg)">
											<div class="bubble-text" x-html="renderBubbleHtml(msg)"></div>
										</template>
										<!-- Template badge -->
										<template x-if="msg.template_name">
											<div class="bubble-tmpl-badge" x-text="msg.template_name"></div>
										</template>
										<div class="bubble-time" x-text="formatMsgTime(msg.created_at)"></div>
									</div>
								</div>
							</template>
						</div>

						<!-- Reply input -->
						<div class="conv-reply-bar">
							<input
								type="text"
								class="conv-reply-input"
								x-model="replyText"
								@keyup.enter="send()"
								placeholder="Escribe un mensaje..."
								:disabled="sending"
							>
							<button
								class="conv-send-btn"
								@click="send()"
								:disabled="sending || !replyText.trim()"
							>
								<template x-if="!sending">
									<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
										<path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
									</svg>
								</template>
								<template x-if="sending">
									<span class="conv-spinner"></span>
								</template>
							</button>
						</div>

					</div>
				</template>

			</div>
		</div>

	</div>

	<!-- Modal: visor de adjunto (PDF / imagen) -->
	<div
		x-show="$store.cache.isVisibleModal('attachment')"
		@mousedown.self="$store.cache.hideLastModal()"
		class="modal-wrap"
		id="modal-attachment"
		x-transition:enter="modal-enter"
		x-transition:enter-start="modal-enter-start"
		x-transition:enter-end="modal-enter-end"
		x-transition:leave="modal-leave"
		x-transition:leave-start="modal-leave-start"
		x-transition:leave-end="modal-leave-end"
		x-cloak
	>
		<div class="modal small glass2" @click.stop>
			<div class="modal-grabber">
				<div class="modal-grabber-bar"></div>
			</div>
			<div class="modal-content">
				<template x-if="viewer_payload?.kind === 'pdf'">
					<iframe :src="viewer_payload.url" style="width:100%; height:70vh; border:0;"></iframe>
				</template>
				<template x-if="viewer_payload?.kind === 'image'">
					<img style="border-radius:0.75rem; max-width:100%;" :src="viewer_payload.url">
				</template>
			</div>
		</div>
	</div>

	function _escHtml(s) {
		return String(s ?? '')
			.replace(/&/g, '&amp;')
			.replace(/</g, '&lt;')
			.replace(/>/g, '&gt;');
	}

	function _fmtWa(text) {
		return text
			.replace(/\*(.*?)\*/g, (_, m) => `<strong>${m}</strong>`)
			.replace(/_(.*?)_/g,   (_, m) => `<em>${m}</em>`)
			.replace(/\n/g, '<br>');
	}

	Alpine.data('conversations_data', () => ({
		conversations:   [],
		convLimit:       25,
		convHasMore:     true,
		loadingMore:     false,
		selected:        null,
		messages:        [],
		replyText:       '',
		loadingMessages: false,
		sending:         false,
		viewer_payload:  null,
		_pollTimer:      null,

		async init() {
			await this.load();
			this._pollTimer = setInterval(() => this._poll(), 20000);
		},

		destroy() {
			clearInterval(this._pollTimer);
		},

		async load() {
			const api = Alpine.store('cache').api;
			const r = await fetch(`${api}/conversations?limit=${this.convLimit}&offset=0`, { headers: { 'X-No-Toast': '1' } });
			const j = await r.json();
			this.conversations = j.data || [];
			this.convHasMore   = this.conversations.length === this.convLimit;
		},

		async loadMore() {
			if (this.loadingMore || !this.convHasMore) return;
			this.loadingMore = true;
			try {
				const api    = Alpine.store('cache').api;
				const offset = this.conversations.length;
				const r = await fetch(`${api}/conversations?limit=${this.convLimit}&offset=${offset}`, { headers: { 'X-No-Toast': '1' } });
				const j = await r.json();
				const batch = j.data || [];
				const seen  = new Set(this.conversations.map(c => c.wa_id));
				this.conversations.push(...batch.filter(c => !seen.has(c.wa_id)));
				this.convHasMore = batch.length === this.convLimit;
			} finally {
				this.loadingMore = false;
			}
		},

		onScroll(e) {
			const el = e.target;
			if (el.scrollTop + el.clientHeight >= el.scrollHeight - 80) {
				this.loadMore();
			}
		},

		async select(conv) {
			this.selected  = conv;
			this.messages  = [];
			this.replyText = '';
			await this.loadMessages(conv.wa_id);
		},

		async loadMessages(wa_id) {
			this.loadingMessages = true;
			const api = Alpine.store('cache').api;
			try {
				const r = await fetch(`${api}/conversations/${wa_id}/messages`, { headers: { 'X-No-Toast': '1' } });
				const j = await r.json();
				this.messages = j.data || [];
				this.$nextTick(() => this._scrollBottom());
			} finally {
				this.loadingMessages = false;
			}
		},

		async _poll() {
			const api = Alpine.store('cache').api;
			// Refresh the currently-loaded window silently (keeps infinite-scroll progress)
			const count = Math.max(this.convLimit, this.conversations.length);
			const r = await fetch(`${api}/conversations?limit=${count}&offset=0`, { headers: { 'X-No-Toast': '1' } });
			const j = await r.json();
			const fresh = j.data || [];
			this.conversations = fresh;
			this.convHasMore   = fresh.length === count;

			// Refresh open thread silently
			if (this.selected) {
				const r2 = await fetch(`${api}/conversations/${this.selected.wa_id}/messages`, { headers: { 'X-No-Toast': '1' } });
				const j2 = await r2.json();
				const updated = j2.data || [];
				if (updated.length !== this.messages.length) {
					this.messages = updated;
					this.$nextTick(() => this._scrollBottom());
				}
			}
		},

		async send() {
			if (!this.replyText.trim() || !this.selected || this.sending) return;
			this.sending = true;
			const api  = Alpine.store('cache').api;
			const text = this.replyText.trim();
			try {
				const r = await fetch(`${api}/conversations/reply`, {
					method:  'POST',
					headers: { 'Content-Type': 'application/json' },
					body:    JSON.stringify({ wa_id: this.selected.wa_id, text }),
				});
				const j = await r.json();
				if (j.success) {
					this.replyText = '';
					await this.loadMessages(this.selected.wa_id);
					await this.load();
				}
			} finally {
				this.sending = false;
			}
		},

		_scrollBottom() {
			const el = document.getElementById('conv-messages-scroll');
			if (el) el.scrollTop = el.scrollHeight;
		},

		initials(name) {
			if (!name) return '?';
			const parts = name.trim().split(' ').filter(Boolean);
			return parts.length >= 2
				? (parts[0][0] + parts[1][0]).toUpperCase()
				: name.substring(0, 2).toUpperCase();
		},

		// Los timestamps del backend llegan en hora Peru. Si no traen offset,
		// los fijamos a -05:00 para renderizar SIEMPRE en hora Peru, sin importar
		// la zona horaria del navegador.
		_peruDate(iso) {
			if (!iso) return null;
			const s = /([zZ]|[+-]\d{2}:?\d{2})$/.test(iso) ? iso : iso + '-05:00';
			const d = new Date(s);
			return isNaN(d.getTime()) ? null : d;
		},

		// 'YYYY-MM-DD' del instante en hora Peru
		_peruDayStr(d) {
			return new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Lima' }).format(d);
		},

		formatTime(iso) {
			const d = this._peruDate(iso);
			if (!d) return '';
			const timeOpts = { timeZone: 'America/Lima', hour: '2-digit', minute: '2-digit' };

			const dStr     = this._peruDayStr(d);
			const now      = new Date();
			const todayStr = this._peruDayStr(now);
			if (dStr === todayStr)
				return d.toLocaleTimeString('es-PE', timeOpts);

			const [ty, tm, td] = todayStr.split('-').map(Number);
			const yStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'UTC' })
				.format(new Date(Date.UTC(ty, tm - 1, td - 1)));
			if (dStr === yStr) return 'ayer';

			return d.toLocaleDateString('es-PE', { timeZone: 'America/Lima', day: '2-digit', month: 'short' });
		},

		formatMsgTime(iso) {
			const d = this._peruDate(iso);
			if (!d) return '';
			return d.toLocaleTimeString('es-PE', { timeZone: 'America/Lima', hour: '2-digit', minute: '2-digit' });
		},

		msgLabel(msg) {
			if (msg.content)       return msg.content;
			if (msg.template_name) return `[${msg.template_name}]`;
			return `(${msg.msg_type})`;
		},

		renderBubbleHtml(msg) {
			if (msg.direction === 'out' && msg.template_name) {
				const tmpl = WA_TEMPLATES[msg.template_name];
				if (tmpl) {
					const values = (msg.content || '').split(' | ');
					let text = tmpl.body;
					tmpl.params.forEach((name, i) => {
						text = text.replaceAll(`{{${name}}}`, _escHtml(values[i] ?? ''));
					});
					return _fmtWa(text);
				}
				// Fallback: not in map
				const raw = msg.content ? `[${msg.template_name}]\n${msg.content}` : `[${msg.template_name}]`;
				return _fmtWa(_escHtml(raw));
			}
			// Inbound or free text — plain text, no x-html risk
			return _fmtWa(_escHtml(msg.content || `(${msg.msg_type})`));
		},

		openAttachment(msg) {
			if (!msg || !msg.media_url) return;
			const kind = this.bubbleMediaType(msg) === 'pdf' ? 'pdf' : 'image';
			this.viewer_payload = { kind, url: msg.media_url };
			Alpine.store('cache').showModal('attachment');
		},

		reorderName(raw) {
			if (!raw) return null;
			const name = String(raw).trim().replace(/\s+/g, ' ');
			if (name.includes(',')) {
				const [last, first] = name.split(',');
				if (first && first.trim() && last && last.trim()) return `${first.trim()} ${last.trim()}`;
			}
			return name || null;
		},

		// Nombre extraido del template saliente (param 'name'/'username')
		nameFromTemplate(conv) {
			if (!conv || conv.direction !== 'out' || !conv.template_name) return null;
			const tmpl = WA_TEMPLATES[conv.template_name];
			if (!tmpl || !Array.isArray(tmpl.params)) return null;
			let idx = tmpl.params.indexOf('name');
			if (idx < 0) idx = tmpl.params.indexOf('username');
			if (idx < 0) return null;
			const values = (conv.content || '').split(' | ');
			return this.reorderName(values[idx]);
		},

		displayName(conv) {
			if (!conv) return '';
			const cn = conv.contact_name;
			if (cn && cn !== conv.wa_id) return cn;
			return this.nameFromTemplate(conv) || cn || conv.wa_id;
		},

		bubbleMediaType(msg) {
			// Entrante: el tipo viene del propio mensaje
			const t = msg.msg_type;
			if (t === 'image' || t === 'sticker') return 'image';
			if (t === 'video') return 'video';
			if (t === 'audio') return 'audio';
			if (t === 'document') {
				return (msg.media_url || '').toLowerCase().endsWith('.pdf') ? 'pdf' : 'document';
			}
			// Saliente (plantilla): usar el media declarado en la plantilla
			const tmpl = WA_TEMPLATES[msg.template_name];
			return tmpl?.media || 'image';
		},

		bubbleHasText(msg) {
			const c = (msg.content || '').trim();
			if (!c) return false;
			// Ocultar placeholders "(video)", "(audio)", etc. cuando ya mostramos el archivo
			if (msg.media_url && /^\(.*\)$/.test(c)) return false;
			return true;
		},

		formatPhone(wa_id) {
			if (!wa_id) return '';
			const d = String(wa_id).replace(/\D/g, '');
			if (d.length === 11 && d.startsWith('51')) {
				const n = d.slice(2);
				return `+51 ${n.slice(0,3)} ${n.slice(3,6)} ${n.slice(6)}`;
			}
			return `+${d}`;
		},

		previewMsg(conv) {
			let text;
			if (conv.direction === 'out' && conv.template_name && WA_TEMPLATES[conv.template_name]) {
				const tmpl = WA_TEMPLATES[conv.template_name];
				const values = (conv.content || '').split(' | ');
				text = tmpl.body;
				tmpl.params.forEach((name, i) => {
					text = text.replaceAll(`{{${name}}}`, values[i] ?? '');
				});
				text = text.replace(/\*(.*?)\*/g, '$1').replace(/_(.*?)_/g, '$1').replace(/\n+/g, ' ').trim();
			} else {
				text = conv.content || (conv.template_name ? `[${conv.template_name}]` : `(${conv.msg_type})`);
			}
			return text.length > 50 ? text.substring(0, 50) + '…' : text;
		},
	}));
	</script>
