<div x-data="refunds_data">
	<div id="refunds">
		<div class="controls">
			<div class="right frost-dark" x-show="canRegister()">
				<div class="item" @click="openCreate()">
					<img class="invert" alt="" width="20" height="20" src="/static/icons/line/add.svg">
					<span>Registrar</span>
				</div>
			</div>
		</div>

		<!-- Kanban -->
		<div class="main glass">
			<template x-for="group in $store.cache.getData('refund_dashboard')" :key="group.status_id">
				<div class="group">
					<div class="group-head">
						<img alt="" width="20" height="20" :src="statusIcon(group.status_slug)">
						<span class="group-name" x-text="group.status_name"></span>
					</div>
					<template x-for="req in group.requests" :key="req.id">
						<div class="req-card white hover-opacity" @click="openDetail(req.id)">
							<div class="req-top">
								<template x-if="req.is_admin_register">
									<span class="req-id pri" x-html="`EX-${String(req.id)}<img title='Caja chica' width='16' height='16' src='/static/icons/filled/admin.svg'>`"></span>
								</template>

								<template x-if="!req.is_admin_register">
									<span class="req-id" x-text="`EX-${String(req.id)}`"></span>
								</template>
								
								<div class="req-date" x-text="req.registered_by_name"></div>

<!-- 								
								<span class="req-client" x-text="req.client_name || req.client_dni || '-'"></span>
								<div class="req-top-right">
									<span class="admin-badge" x-show="req.is_admin_register">ADM</span>
									<span class="req-amount" x-text="`S/ ${req.net_refund.toFixed(2)}`"></span>
								</div> -->
							</div>
							<div class="req-client" x-text="req.client_name"></div>

							<!-- <div class="req-reason" x-text="req.reason"></div> -->
							<div class="req-bottom">
								<span class="req-reason" x-text="req.reason"></span>
								<span class="req-amount" x-text="`S/ ${req.net_refund.toFixed(2)}`"></span>
							</div>
						</div>
					</template>
				</div>
			</template>
		</div>

		<!-- ── Modal crear ── -->
		<div
			x-show="$store.cache.isVisibleModal('refund-create')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-refund-create"
			x-transition:enter="modal-enter" x-transition:enter-start="modal-enter-start" x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave" x-transition:leave-start="modal-leave-start" x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 small" @click.stop>
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>

				<input class="title" type="text" placeholder="Número de pedido" x-model="form.order_number" @blur="fetchClientOrder()">

				<div class="modal-content">
					<div class="fields">
						<label :class="form.client_order_found ? 'glass2' : 'white'">
							<img alt="user" src="/static/icons/line/id.svg" width="16" height="16">
							<input
								type="text"
								maxlength="15"
								x-model="form.client_dni"
								placeholder="DNI / RUC"
								@input="form.client_dni = form.client_dni.replace(/\D/g, '')"
								:disabled="form.client_order_found"
								@blur="fetchClientData()">
						</label>

						<label :class="form.client_order_found || form.client_found ? 'glass2' : 'white'" style="flex: 2;">
							<img alt="user" :src="`/static/icons/line/${form.client_order_found || form.client_found ? 'user' : 'useradd'}.svg`" width="16" height="16">
							<input :disabled="form.client_order_found || form.client_found" type="text" placeholder="Nombre o Razón Social" x-model="form.client_name">
						</label>
					</div>

					<div class="fields">
						<label class="white">
							<select x-model="form.reason">
								<option value="" selected disabled>Motivo</option>
								<option value="inconforme">Atención inconforme</option>
								<option value="opinion">Cambio de opinión</option>
								<option value="producto">Cambio de producto</option>
								<option value="envio">Cambio en tipo de envío</option>
								<option value="no_envio">Envío no concretado</option>
								<option value="stock">Falta de stock</option>
								<option value="preventa">Preventa inconclusa</option>
								<option value="otro">Otro</option>
							</select>
						</label>

						<label class="white">
							<select x-model="form.payment_method">
								<option value="" selected disabled>Medio de pago</option>
								<option value="culqi_web">Culqi Web</option>
								<option value="link_pago">Link de pago</option>
								<option value="mercado_pago">Mercado pago</option>
								<option value="plin_yape">Plin o Yape</option>
								<option value="pos">POS</option>
								<option value="bbva">Transferencia BBVA</option>
								<option value="bcp">Transferencia BCP</option>
								<option value="interbank">Transferencia Interbank</option>
								<option value="scotiabank">Transferencia Scotiabank</option>
							</select>
						</label>
					</div>

					<textarea class="text-area glass2" x-model="form.detail" placeholder="Descripción del caso..." rows="2"></textarea>

					<div class="fields">
						<div class="field-group">
							<span class="field-label">Monto del pedido</span>
							<label class="white">
								<input type="number" min="0" step="0.01" x-model.number="form.order_amount" placeholder="0.00">
							</label>
						</div>

						<div class="field-group">
							<span class="field-label">Monto a extornar</span>
							<label class="white">
								<input type="number" min="0" step="0.01" x-model.number="form.refund_amount" placeholder="0.00" @input="calcNet()">
							</label>
						</div>
					</div>
					
					<div class="fields">
						<div class="field-group">
							<span class="field-label">Penalidad</span>
							<label class="white penalty-row">
								<span class="text">¿Aplicar S/ 10 de penalidad?</span>
								<div class="toggle-label">
									<input type="checkbox" x-model="form.applies_penalty" @change="calcNet()">
									<span class="toggle-track"></span>
								</div>
							</label>
						</div>

						<div class="field-group">
							<span class="field-label">Neto a extornar</span>
							<label class="glass2 net-amount" x-text="`S/ ${form.net_refund.toFixed(2)}`"></label>
						</div>
					</div>

					<div class="form-grid">
						<div class="field-group full">
							<label class="white upload-btn hover-opacity">
								<span x-text="form.files.length ? `${form.files.length} archivo(s) seleccionado(s)` : '+ Agregar evidencias'"></span>
								<input type="file" multiple style="display:none" @change="addFiles($event)">
							</label>
							<div class="file-chips" x-show="form.files.length > 0">
								<template x-for="(f, i) in form.files" :key="i">
									<div class="file-chip">
										<img alt="" src="/static/icons/filled/clip.svg" width="14" height="14">
										<span class="chip-name" x-text="f.name"></span>
										<span class="chip-size" x-text="(f.size/1024).toFixed(1)+' KB'"></span>
										<button @click="removeFile(i)" class="chip-remove">×</button>
									</div>
								</template>
							</div>
						</div>
					</div>
				</div>

				<div class="modal-footer buttons">
					<!-- <button class="button ghost hover-opacity" @click="$store.cache.hideLastModal()">Cancelar</button> -->
					<button class="button hover-opacity" @click="submitCreate()">
						Registrar extorno
					</button>
				</div>
			</div>
		</div>

		<!-- ── Modal detalle ── -->
		<div
			x-show="$store.cache.isVisibleModal('refund-detail')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-refund-detail"
			x-transition:enter="modal-enter" x-transition:enter-start="modal-enter-start" x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave" x-transition:leave-start="modal-leave-start" x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 extrabig" @click.stop>
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>

				<div class="detail-head">
					<div class="detail-head-left">
						<span class="detail-title" x-text="`EX-${detail?.id || ''}`"></span>
						<span class="admin-badge" x-show="detail?.is_admin_register">ADM</span>
					</div>
					<div class="detail-status" :class="detail?.status_slug" x-text="detail?.status_name"></div>
				</div>

				<div class="modal-content dual">
					<!-- Columna izquierda -->
					<div class="dataview overflow percent50">

						<!-- Cliente & pedido -->
						<div class="detail-section white">
							<div class="detail-grid">
								<div class="detail-field">
									<span class="label">DNI / RUC</span>
									<span x-text="detail?.client_dni || '-'"></span>
								</div>
								<div class="detail-field">
									<span class="label">Cliente</span>
									<span x-text="detail?.client_name || '-'"></span>
								</div>
								<div class="detail-field">
									<span class="label">Nro. pedido</span>
									<span x-text="detail?.order_number || '-'"></span>
								</div>
								<div class="detail-field">
									<span class="label">Registrado por</span>
									<span x-text="detail?.registered_by_name || '-'"></span>
								</div>
								<div class="detail-field" x-show="detail?.scheduled_date">
									<span class="label">Fecha programada</span>
									<span x-text="detail?.scheduled_date || '-'"></span>
								</div>
							</div>
						</div>

						<!-- Motivo & detalle -->
						<div class="detail-section white">
							<div class="detail-grid">
								<div class="detail-field">
									<span class="label">Motivo</span>
									<span x-text="detail?.reason_label || '-'"></span>
								</div>
								<div class="detail-field">
									<span class="label">Medio de pago</span>
									<span x-text="detail?.payment_method_label || '-'"></span>
								</div>
								<div class="detail-field full" x-show="detail?.detail">
									<span class="label">Detalle</span>
									<span x-text="detail?.detail"></span>
								</div>
							</div>
						</div>

						<!-- Montos + penalidad -->
						<div class="detail-section white">
							<div class="detail-grid">
								<div class="detail-field">
									<span class="label">Monto pedido</span>
									<span x-text="`S/ ${detail?.order_amount?.toFixed(2) || '0.00'}`"></span>
								</div>
								<div class="detail-field">
									<span class="label">Monto extorno</span>
									<span x-text="`S/ ${detail?.refund_amount?.toFixed(2) || '0.00'}`"></span>
								</div>
								<div class="detail-field" x-show="detail?.applies_penalty">
									<span class="label">Penalidad</span>
									<span x-text="`-S/ ${detail?.penalty_amount?.toFixed(2) || '0.00'}`"></span>
								</div>
								<div class="detail-field highlight">
									<span class="label">Neto a extornar</span>
									<span x-text="`S/ ${detail?.net_refund?.toFixed(2) || '0.00'}`"></span>
								</div>
							</div>

							<!-- Toggle penalidad (editable según permisos) -->
							<div class="penalty-edit" x-show="canEditPenalty()">
								<span class="penalty-edit-label">¿Aplica penalidad? (S/ 10.00)</span>
								<label class="toggle-label" @click.stop>
									<input type="checkbox" :checked="detail?.applies_penalty"
										@change="togglePenalty($event.target.checked)">
									<span class="toggle-track"></span>
								</label>
							</div>
						</div>

						<!-- Adjuntos -->
						<div class="detail-section white files">
							<div class="section-label-row">
								<img alt="" width="14" height="14" src="/static/icons/filled/clip.svg">
								<span class="section-label" style="margin-bottom:0;">Adjuntos</span>
								<span class="section-count" x-text="`(${detail?.attachments?.length || 0})`"></span>
							</div>

							<div class="thumbnails-grid small-grid" x-show="detail?.attachments?.length > 0">
								<template x-for="f in (detail?.attachments || [])" :key="f.id">
									<div class="thumb-wrapper">
										<div class="thumb-item hover-opacity" @click="openAttachment(f)">
											<div class="thumbnail-wrapper">
												<template x-if="isImageFile(f)">
													<img :src="getInlineUrl(f)" :alt="f.original_name">
												</template>
												<template x-if="!isImageFile(f)">
													<div class="file-card">
														<div class="file-ext" x-text="(f.ext || '').toUpperCase()"></div>
													</div>
												</template>
											</div>
											<div class="thumb-caption" x-text="f.original_name" :title="f.original_name"></div>
										</div>
										<!-- Delete button: only creator in Registrado -->
										<button class="thumb-delete hover-opacity" x-show="canDeleteAttachment()"
											@click.stop="deleteAttachment(f.id)" title="Eliminar">
											<img alt="×" width="12" height="12" src="/static/icons/line/delete.svg">
										</button>
									</div>
								</template>
							</div>

							<!-- Upload (creator + Registrado only) -->
							<div class="upload-area" x-show="canUploadAttachments()">
								<label class="upload-btn hover-opacity">
									<img alt="" width="14" height="14" src="/static/icons/line/add.svg">
									<span>Agregar archivos</span>
									<input type="file" multiple style="display:none" @change="uploadFiles($event)">
								</label>
							</div>

							<div class="no-files" x-show="!detail?.attachments?.length && !canUploadAttachments()">
								Sin archivos
							</div>
						</div>

						<!-- Acciones de estado -->
						<div class="detail-actions" x-show="getAvailableActions().length > 0">
							<div class="action-btns buttons">
								<template x-for="action in getAvailableActions()" :key="action.status_id">
									<button class="button icon hover-opacity" :class="action.class || ''"
										@click="changeStatus(action.status_id)">
										<img alt="" width="18" height="18" :src="`/static/icons/line/${action.icon}.svg`">
										<span x-text="action.label"></span>
									</button>
								</template>
							</div>
						</div>
					</div>

					<!-- Columna derecha: chat -->
					<div class="comments-container white percent50">
						<div class="comments-box overflow" x-ref="commentsBox">
							<template x-if="!detail?.chats || detail?.chats?.length === 0">
								<div class="no-comments">Nada por aquí</div>
							</template>
							<template x-for="chat in detail?.chats" :key="chat.id">
								<div class="user-comment" :class="{'self': chat.commenter_id == user.id}">
									<img alt="user" :src="'/static/images/uploads/users/' + chat.commenter_image" width="24" height="24">
									<div class="white bubble">
										<div class="top">
											<span x-text="chat.commenter_id == user.id ? 'Tú' : chat.commenter_name"></span>
											<p x-text="chat.created_at"></p>
										</div>
										<p x-text="chat.comment"></p>
									</div>
								</div>
							</template>
						</div>
						<div class="comments-input white">
							<label>
								<textarea x-model="message" placeholder="Ingresa un mensaje..." @keydown.enter="handleEnterSend($event)"></textarea>
							</label>
							<div class="send hover-opacity" @click="sendChat()" :class="{'disabled': !message}">
								<img alt="enviar" width="16" height="16" src="/static/icons/filled/send.svg">
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- Modal visor adjunto -->
		<div
			x-show="$store.cache.isVisibleModal('refund-attachment')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-refund-attachment"
			x-transition:enter="modal-enter" x-transition:enter-start="modal-enter-start" x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave" x-transition:leave-start="modal-leave-start" x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal big glass2" @click.stop>
				<div class="modal-grabber"><div class="modal-grabber-bar"></div></div>
				<div class="modal-content">
					<template x-if="viewer_payload?.kind === 'url' && isPdfFile(viewer_file)">
						<iframe :src="viewer_payload.url" style="width:100%;height:70vh;border:0;"></iframe>
					</template>
					<template x-if="viewer_payload?.kind === 'url' && isImageFile(viewer_file)">
						<img style="border-radius:0.75rem;max-width:100%;" :src="viewer_payload.url">
					</template>
					<template x-if="viewer_payload?.kind === 'download'">
						<div style="text-align:center;" x-text="viewer_payload.message"></div>
					</template>
				</div>
			</div>
		</div>
	</div>

	<script>
		Alpine.data('refunds_data', () => ({
			token: localStorage.getItem('user_token'),
			api:   Alpine.store('cache').api,
			user:  Alpine.store('cache').user,
			detail: null,
			message: '',
			processing: false,
			viewer_file: null,
			viewer_payload: null,

			form: {
				client_order_id: '',
				client_order_found: false, client_found: false,
				client_dni: '', client_name: '',
				order_number: '', reason: '', detail: '',
				order_amount: 0, refund_amount: 0, applies_penalty: false,
				net_refund: 0, payment_method: '', files: [],
			},

			async init() {
				const socket = Alpine.store('cache').socket;
				if (socket) {
					socket.on("refund_update", async () => {
						await Alpine.store('cache').refresh('refund_dashboard');
					});
				}
				await Alpine.store('cache').fetchData([
					{ key: 'refund_dashboard', url: '/refund/dashboard', force: true },
					{ key: 'refund_statuses',  url: '/refund/statuses' },
				]);
			},

			// ── Permissions ──

			canRegister() {
				return Alpine.store('cache').hasPermission('refunds', 'register_commercial')
					|| Alpine.store('cache').hasPermission('refunds', 'register_admin');
			},

			_highPerm() {
				const hp = (p) => Alpine.store('cache').hasPermission('refunds', p);
				return hp('validate') || hp('approve_area') || hp('approve_gerencia');
			},

			canEditPenalty() {
				if (!this.detail) return false;
				if (this.detail.status_id >= 6) return false;  // executed or reverted
				if (this.detail.status_id === 1)
					return this.detail.registered_by === this.user.id;
				return this._highPerm();
			},

			canUploadAttachments() {
				if (this.detail?.status_id !== 1) return false;
				return this.detail?.registered_by === this.user.id || this._highPerm();
			},

			canDeleteAttachment() {
				return this.detail?.status_id === 1 && this._highPerm();
			},

			// ── Create ──

			openCreate() {
				this.form = {
					client_order_id: '',
					client_order_found: false, client_found: false,
					client_dni: '', client_name: '',
					order_number: '', reason: '', detail: '',
					order_amount: 0, refund_amount: 0, applies_penalty: false,
					net_refund: 0, payment_method: '', files: [],
				};
				Alpine.store('cache').showModal('refund-create');
			},

			async fetchClientOrder() {
				const order = this.form.order_number;
				if (!order) {
					this.form.client_order_id = '';
					this.form.client_dni = '';
					this.form.client_name = '';
					this.form.client_order_found = false;
					this.form.client_found = false;
					return;
				}
				try {
					const res = await fetch(`${this.api}/client/order_number/${order}`, {
						headers: { 'X-No-Toast': '1' },
					});
					if (!res.ok) {
						this.form.client_order_id = '';
						this.form.client_order_found = false;
						return;
					}
					const json = await res.json();
					if (json.success) {
						const c = json.data.client;
						this.form.client_order_id    = json.data.client_order_id;
						this.form.client_dni         = c.document;
						this.form.client_name        = c.name;
						this.form.client_order_found = true;
					}
				} catch (e) { console.error(e); }
			},

			async fetchClientData() {
				if (this.form.client_order_found) return;
				const doc = this.form.client_dni;
				if (!doc) {
					this.form.client_name = '';
					this.form.client_found = false;
					return;
				}
				try {
					const res = await fetch(`${this.api}/client/data/${doc}`, {
						headers: { 'X-No-Toast': '1' },
					});
					if (!res.ok) { this.form.client_found = false; return; }
					const json = await res.json();
					if (json.success) {
						this.form.client_name  = json.data.name;
						this.form.client_found = true;
					}
				} catch (e) { console.error(e); }
			},

			calcNet() {
				const amt = parseFloat(this.form.refund_amount) || 0;
				this.form.net_refund = Math.max(0, amt - (this.form.applies_penalty ? 10 : 0));
			},

			addFiles(e) {
				for (const f of e.target.files) this.form.files.push(f);
				e.target.value = '';
			},

			removeFile(i) {
				this.form.files.splice(i, 1);
			},

			async submitCreate() {
				const fd = new FormData();
				fd.append('client_order_id', this.form.client_order_id || '');
				fd.append('order_number',    this.form.order_number || '');
				fd.append('client_dni',      this.form.client_dni || '');
				fd.append('client_name',     this.form.client_name || '');
				fd.append('reason',          this.form.reason);
				fd.append('detail',          this.form.detail || '');
				fd.append('order_amount',    this.form.order_amount);
				fd.append('refund_amount',   this.form.refund_amount);
				fd.append('applies_penalty', this.form.applies_penalty ? 'true' : 'false');
				fd.append('payment_method',  this.form.payment_method);
				for (const f of this.form.files) fd.append('files[]', f);

				try {
					const res = await fetch(`${this.api}/refund/`, {
						method: 'POST',
						headers: { 'Authorization': `Bearer ${this.token}` },
						body: fd,
					});
					const json = await res.json();
					if (!res.ok) { alert(json?.data?.message || json?.data || 'Error'); return; }
					Alpine.store('cache').hideLastModal();
					await Alpine.store('cache').refresh('refund_dashboard');
				} catch (e) { console.error(e); }
			},

			// ── Detail ──

			async openDetail(id) {
				try {
					const res = await fetch(`${this.api}/refund/${id}`, {
						headers: { 'Authorization': `Bearer ${this.token}` },
					});
					const json = await res.json();
					this.detail = json.data;
					this.message = '';
					Alpine.store('cache').showModal('refund-detail');
					this.$nextTick(() => this.scrollCommentsToBottom('instant'));
				} catch (e) { console.error(e); }
			},

			// ── Status actions ──

			getAvailableActions() {
				if (!this.detail) return [];
				const sid = this.detail.status_id;
				const hp  = (p) => Alpine.store('cache').hasPermission('refunds', p);
				const actions = [];

				if (sid < 6 && this._highPerm())
					actions.push({ status_id: 7, label: 'Revertir extorno',  icon: 'dislike',  class: 'black' });

				// 1→2
				if (sid === 1 && hp('move'))
					actions.push({ status_id: 2, label: 'Iniciar revisión',  icon: 'find',     class: '' });
				// 2→3
				if (sid === 2 && hp('validate'))
					actions.push({ status_id: 3, label: 'Extorno validado',     icon: 'like',     class: '' });
				// 3→4
				if (sid === 3 && hp('approve_area'))
					actions.push({ status_id: 4, label: 'Aprobar extorno',      icon: 'like',     class: '' });
				// 4→5 (approve gerencia → auto-schedule)
				if (sid === 4 && hp('approve_gerencia'))
					actions.push({ status_id: 5, label: 'Aprobar y programar', icon: 'schedule', class: '' });
				// 5→6
				if (sid === 5 && this._highPerm())
					actions.push({ status_id: 6, label: 'Extorno ejecutado',  icon: 'approve',    class: '' });
				// →7 revert (any state before executed)
				

				return actions;
			},

			async changeStatus(statusId) {
				if (!this.detail) return;
				try {
					const res = await fetch(`${this.api}/refund/${this.detail.id}/status`, {
						method: 'PUT',
						headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` },
						body: JSON.stringify({ status_id: statusId }),
					});
					const json = await res.json();
					if (!res.ok) { alert(json?.data?.message || json?.data || 'Error'); return; }
					await this.openDetail(this.detail.id);
					await Alpine.store('cache').refresh('refund_dashboard');
				} catch (e) { console.error(e); }
			},

			// ── Penalty ──

			async togglePenalty(value) {
				if (!this.detail) return;
				try {
					const res = await fetch(`${this.api}/refund/${this.detail.id}/penalty`, {
						method: 'PATCH',
						headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` },
						body: JSON.stringify({ applies_penalty: value }),
					});
					const json = await res.json();
					if (!res.ok) { alert(json?.data?.message || json?.data || 'Error'); return; }
					await this.openDetail(this.detail.id);
				} catch (e) { console.error(e); }
			},

			// ── Attachments ──

			isImageFile(f) {
				return ['png','jpg','jpeg','webp','gif'].includes((f?.ext || '').toLowerCase());
			},
			isPdfFile(f) {
				return (f?.ext || '').toLowerCase() === 'pdf';
			},
			getInlineUrl(f) {
				return `${this.api}${f.inline_url}`;
			},

			async uploadFiles(event) {
				const files = event.target.files;
				if (!files?.length || !this.detail) return;
				const fd = new FormData();
				fd.append('refund_id', this.detail.id);
				for (const f of files) fd.append('files[]', f);
				try {
					const res = await fetch(`${this.api}/refund/attachments`, {
						method: 'POST',
						headers: { 'Authorization': `Bearer ${this.token}` },
						body: fd,
					});
					const json = await res.json();
					if (!res.ok) { alert(json?.data?.message || json?.data || 'Error'); return; }
					await this.openDetail(this.detail.id);
				} catch (e) { console.error(e); }
				event.target.value = '';
			},

			async deleteAttachment(attachmentId) {
				if (!confirm('¿Eliminar este archivo?')) return;
				try {
					const res = await fetch(`${this.api}/refund/attachment/${attachmentId}`, {
						method: 'DELETE',
						headers: { 'Authorization': `Bearer ${this.token}` },
					});
					if (res.ok) await this.openDetail(this.detail.id);
				} catch (e) { console.error(e); }
			},

			async openAttachment(file) {
				this.viewer_file = file;
				this.viewer_payload = null;
				try {
					const res = await fetch(`${this.api}${file.preview_url}`, {
						headers: { 'Authorization': `Bearer ${this.token}` },
					});
					const json = await res.json();
					const payload = json?.data ?? json;
					if (payload.kind === 'url') payload.url = `${this.api}${payload.url}`;
					this.viewer_file.download_url = `${this.api}${file.download_url}`;
					this.viewer_payload = payload;
					Alpine.store('cache').showModal('refund-attachment');
				} catch (e) { console.error(e); }
			},

			// ── Chat ──

			handleEnterSend(e) {
				if (e.shiftKey) return;
				e.preventDefault();
				this.sendChat();
			},

			statusIcon(slug) {
				const map = {
					registered:        'requested',
					reviewing:         'reviewing',
					area_pending:      'leader',
					gerencia_pending:  'manager',
					scheduled:         'time',
					executed:          'executed',
					reverted:          'reverted',
				};
				return `/static/icons/module/refunds/${map[slug]}.svg`;
			},

			scrollCommentsToBottom(behavior = 'smooth') {
				const box = this.$refs.commentsBox;
				if (!box) return;
				box.scrollTo({ top: box.scrollHeight, behavior });
			},

			async sendChat() {
				if (!this.message || this.processing || !this.detail?.id) return;
				this.processing = true;
				try {
					const res = await fetch(`${this.api}/refund/chat/${this.detail.id}`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` },
						body: JSON.stringify({ comment: this.message }),
					});
					const json = await res.json();
					if (!res.ok) throw new Error(json?.data?.message || 'Error');
					this.detail.chats.push(json.data);
					this.message = '';
					this.$nextTick(() => this.scrollCommentsToBottom());
				} catch (e) { console.error(e); }
				finally { this.processing = false; }
			},
		}));
	</script>
