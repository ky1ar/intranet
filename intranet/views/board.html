<div x-data="board_data">
	<div id="board">
		<div class="header">
			<div class="thumbs">
				<template x-for="users in $store.cache.getData('user_team')" :key="users.id">
					<div class="user">
						<img
						class="hover-opacity"
						width="40" height="40"
						:src="'/static/images/uploads/users/' + users.image" alt=""
						@click="selectUser(users.id)"
						:class="{'selected-thumb': selected_user_id === users.id}">
						<span x-text="users.name"></span>
					</div>
					
				</template>
			</div>

			<div class="menu primary">
				<div class="item" @click="addIssueModal()">
					<div class="button">
						<img alt="" width="20" height="20" src="/static/images/icons/add.svg">
					</div>
					<span>Añadir</span>
				</div>
			</div>
		</div>

		<div class="board glass">
			<template x-for="group in $store.cache.getData('board_dashboard')" :key="group.status_id">
				<div class="group"
					@dragover="onDragOver($event, group.status_id)" 
					@dragleave="onDragLeave($event)"
					@drop="dropService($event, group.status_id)">
					<div class="name">
						<span x-text="$store.cache.getById('board_statuses', group.status_id)?.name"></span>
					</div>

					<ul>
						<template x-if="group.issues.length > 0">
							<template x-for="issue in group.issues" :key="issue.id">
								<li
									x-show="selected_user_id === null || issue.assignee_id === selected_user_id"
									:draggable="true"
									@dragstart="dragService(issue)"
									@click="viewIssue(issue.id)">

									<div class="title">
										<span class="dot"></span>
										<!--<span class="title" x-text="issue.id + ' - '"></span>-->
										<span x-text="issue.title"></span>
									</div>
									<div class="bottom">
										<div class="left">
											<!--<span class="dot"></span>-->
											<span class="id" x-text="issue.created_at"></span>
										</div>
										<div class="right">
											<img width="16" height="16" :src="'/static/images/icons/' + $store.cache.getById('board_priority', issue.priority_id)?.image" alt="users">
											<img class="thumb" width="24" height="24" :src="'/static/images/uploads/users/'+issue.assignee_image" :title="issue.assignee_name">
										</div>
									</div>
								</li>
							</template>
						</template>
					</ul>
				</div>
			</template>
		</div>

		<div
			x-show="$store.cache.isVisibleModal('view')"
			@mousedown.self="$store.cache.hideLastModal()"
			x-transition.duration.300ms
			class="modal-wrap"
			id="modal-add"
			x-cloak>
			<div class="modal glass2">
				<div class="left">
					<span class="dot"></span>
					<!-- <span class="id" x-text="'ID - ' + view_issue.id"></span> -->
					 <textarea x-model="view_issue.title" class="title" placeholder="Título de la actividad"></textarea>
				</div>
				<p class="created" x-text="`Creado por ${view_issue.reporter_name} el ${view_issue.formatted_date}`"></p>

				<textarea x-model="view_issue.description" class="text-area glass2" placeholder="Descripción"></textarea>

				<div class="selects">
					<div class="custom_select">
						<div class="selected_option" @click="tooglePriorityOption()">
							<img width="16" height="16" :src="'/static/images/icons/' + option_priority?.image" alt="user">
							<span x-text="'Prioridad ' + option_priority?.name"></span>
						</div>

						<div x-show="option_priority_active" x-transition.duration.300ms @click.outside="hidePriorityOption()" class="select_options">
							<template x-for="priority in $store.cache.getData('board_priority')" :key="priority.id">
								<div class="option" @click="option_priority = priority; hidePriorityOption()">
									<img width="16" height="16" :src="'/static/images/icons/' + priority.image" alt="priority">
									<span x-text="'Prioridad ' + priority.name"></span>
								</div>
							</template>
						</div>
					</div>


					<div class="custom_select">
						<div class="selected_option" @click="toogleUserOption()">
							<img
								width="24"
								height="24"
								:src="'/static/images/uploads/users/' + (option_user?.image || '00000000.jpg')"
								alt="user"
							/>
							<span x-text="option_user?.name || `No disponible`"></span>
						</div>

						<div x-show="option_user_active" x-transition.duration.300ms @click.outside="hideUserOption()" class="select_options">
							<template x-for="user in $store.cache.getData('user_team')" :key="user.id">
                                <div 
                                    class="option" 
                                    :class="{ 'pick': option_user?.id === user.id }" 
                                    @click="option_user = user; hideUserOption()">
									<img width="24" height="24" :src="'/static/images/uploads/users/' + user.image" alt="user">
									<span x-text="user.name"></span>
								</div>
							</template>
						</div>
					</div>
				</div>
				
				<div class="selects">
					<template x-if="$store.cache.user.level_id > 2">
						<button class="button black hover-opacity" @click="deleteIssue()">Eliminar</button>
					</template>
					<button class="button hover-opacity" @click="updateIssue()" :class="buttons.update.class" x-text="buttons.update.text"></button>
				</div>

				<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
					<img alt="close" src="static/images/x.svg" width="12" height="12">
				</div>
			</div>
		</div>
		
		<div
			x-show="$store.cache.isVisibleModal('add')"
			@mousedown.self="$store.cache.hideLastModal()"
			x-transition.duration.300ms
			class="modal-wrap"
			id="modal-add"
			x-cloak>
			<div class="modal glass2">
				<!--<div class="selects">
					<div class="custom_select">
						<div class="selected_option" @click="tooglePriorityOption()">
							<img width="16" height="16" src="/static/images/icons/tag.svg" alt="user">
							<span>Categoría</span>
						</div>

						<div x-show="option_priority_active" x-transition.duration.300ms @click.outside="hidePriorityOption()" class="select_options">
							<template x-for="priority in $store.cache.getData('board_priority')" :key="priority.id">
								<div class="option" @click="option_priority = priority; hidePriorityOption()">
									<img width="16" height="16" :src="'/static/images/icons/' + priority.image" alt="priority">
									<span x-text="'Prioridad ' + priority.name"></span>
								</div>
							</template>
						</div>
					</div>
				</div>-->
				<textarea x-model="add_issue.title" class="title" placeholder="Añade aquí el título de la actividad" ></textarea>

				<textarea x-model="add_issue.description" class="text-area glass2" placeholder="Descripción (opcional)"></textarea>

				<div class="selects">
					<div class="custom_select">
						<div class="selected_option" @click="tooglePriorityOption()">
							<img width="16" height="16" :src="'/static/images/icons/' + option_priority?.image" alt="user">
							<span x-text="'Prioridad ' + option_priority?.name"></span>
						</div>

						<div x-show="option_priority_active" x-transition.duration.300ms @click.outside="hidePriorityOption()" class="select_options">
							<template x-for="priority in $store.cache.getData('board_priority')" :key="priority.id">
								<div class="option" @click="option_priority = priority; hidePriorityOption()">
									<img width="16" height="16" :src="'/static/images/icons/' + priority.image" alt="priority">
									<span x-text="'Prioridad ' + priority.name"></span>
								</div>
							</template>
						</div>
					</div>

					<div class="custom_select">
						<div class="selected_option" @click="toogleUserOption()">
                            <img 
                                width="24" 
                                height="24" 
                                :src="'/static/images/uploads/users/' + (option_user?.image || 'user_default.jpg')" 
                                alt="user"
                            >
                            <span x-text="option_user?.name || 'No asignado'"></span>
                        </div>

						<div x-show="option_user_active" x-transition.duration.300ms @click.outside="hideUserOption()" class="select_options">
							<template x-for="user in $store.cache.getData('user_team')" :key="user.id">
								<div 
									class="option" 
									:class="{ 'pick': option_user?.id === user.id }" 
									@click="option_user = user; hideUserOption()">
									<img width="24" height="24" :src="'/static/images/uploads/users/' + user.image" alt="user">
									<span x-text="user.name"></span>
								</div>
							</template>
						</div>
					</div>
				</div>
				
				<div class="buttons">
					<button class="button hover-opacity" @click="addIssue()" :class="buttons.add.class" x-text="buttons.add.text"></button>
				</div>

				<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
					<img alt="close" src="static/images/x.svg" width="12" height="12">
				</div>
			</div>
		</div>

	</div>





	<script>
		Alpine.data('board_data',() => ({
			board: [],
			selected_issue: null,
			selected_user_id: null,
			socket: null,
			view_issue: {},
			
			add_issue: {},
			isSending: false,  
			buttons: {
                add: { class: '', text: 'Añadir' },
                update: { class: '', text: 'Actualizar' },
            },

			option_user: null,
			option_user_active: false,
			option_priority: null,
			option_priority_active: false,

			toogleUserOption() { 
				this.option_user_active = !this.option_user_active;
			},

			hideUserOption() { 
				this.option_user_active = false;
			},
			
			tooglePriorityOption() { 
				this.option_priority_active = !this.option_priority_active;
			},

			hidePriorityOption() { 
				this.option_priority_active = false;
			},

			async init() {
				console.log('Inicializando board...');

                const socket = Alpine.store('cache').socket;
				if (socket) {
					socket.removeAllListeners();
					socket.on("update_board", async () => {
						await Alpine.store('cache').refresh('board_dashboard');
					});
				}

				await Alpine.store('cache').fetchData([
					{ key: 'board_dashboard', url: `/board/dashboard/${Alpine.store('cache').user.department_id}`, force: true },
					{ key: 'board_statuses', url: '/general/board_statuses' },
					{ key: 'board_priority', url: '/general/board_priority' },
					{ key: 'user_team', url: `/user/team/${Alpine.store('cache').user.id}`, force: true },
				]);

				await Alpine.store('cache').verify();
			},

			addIssueModal() {
				this.option_user = null;
				this.option_priority = Alpine.store('cache').getById('board_priority', 3);
				Alpine.store('cache').showModal('add');
			},
			
			async addIssue() {
				const team = Alpine.store('cache').getData('user_team');
				const default_user = team?.find(item => item.level_id === 5);

                if (!this.option_user) {
					if (!default_user) {
						this.showError('add', 'Asigne la actividad');
						return;
					} 
					this.option_user = default_user;
                }

                if (this.isSending) return;
				this.isSending = true;
                NProgress.start();
                
                const payload = { 
                    reporter_id: Alpine.store('cache').user.id,
                    assignee_id: this.option_user.id,
                    priority_id: this.option_priority.id,
                    title: this.add_issue.title || "",
                    description: this.add_issue.description || "",
                }

                try {
                    const response = await fetch(Alpine.store('cache').api + '/board/issue', {
                        method: 'POST',
                       	headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${Alpine.store('cache').user.token}`,
                        },
                        body: JSON.stringify(payload),
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');
                    
                    this.add_issue = { priority_id: 3 };
					Alpine.store('cache').hideModal('add');

                } catch (error) {
                    this.showError('add', error.message);
                } finally {
					this.isSending = false;
                    NProgress.done();
                }
            },

			async updateIssue() {
				if (this.isSending) return;
				this.isSending = true;
                NProgress.start();

                const payload = { 
                    reporter_id: Alpine.store('cache').user.id,
                    issue_id: this.view_issue.id,
                    assignee_id: this.option_user.id === 0 ? null : this.option_user.id,
                    priority_id: this.option_priority.id,
                    title: this.view_issue.title || "",
                    description: this.view_issue.description || "",
                }

                try {
                    const response = await fetch(Alpine.store('cache').api + '/board/issue/update', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${Alpine.store('cache').user.token}`,
                        },
                        body: JSON.stringify(payload),
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');

					Alpine.store('cache').hideModal('view');
                    this.view_issue = {};

                } catch (error) {
                    this.showError('update', error.message);
                } finally {
					this.isSending = false;
                    NProgress.done();
                }
            },

			async deleteIssue() {
                NProgress.start();

                const payload = { 
                    reporter_id: Alpine.store('cache').user.id,
                    issue_id: this.view_issue.id,
                }

                try {
                    const response = await fetch(Alpine.store('cache').api + '/board/issue/delete', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${Alpine.store('cache').user.token}`,
                        },
                        body: JSON.stringify(payload),
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');
                    
                    //this.$refs.terms.scrollTop = 0;
                    //this.step++;
					Alpine.store('cache').hideModal('view');
                    this.view_issue = {};

                } catch (error) {
                    console.log(error.message);
                } finally {
                    NProgress.done();
                }
            },

			showError(btnKey, errorMsg) {
				const originalText = this.buttons[btnKey].text;
				const originalClass = this.buttons[btnKey].class;

				if (originalClass == 'error') {
					return;
				}
				this.buttons[btnKey].text = errorMsg;
				this.buttons[btnKey].class = 'error';

				setTimeout(() => {
					this.buttons[btnKey].text = originalText;
					this.buttons[btnKey].class = originalClass;
				}, 2000);
			},
			
			async viewIssue(issue_id) {
				NProgress.start();
				try {
					const response = await fetch(Alpine.store('cache').api + `/board/issue/id/${issue_id}`);
					const data = await response.json();
					this.view_issue = data.data;
					this.option_user = Alpine.store('cache').getById('user_team', data.data.assignee_id);
					this.option_priority = Alpine.store('cache').getById('board_priority', data.data.priority_id);
					Alpine.store('cache').showModal('view');
				} catch (error) {
					console.error('Error en la asignación:', error);
				} finally {
					NProgress.done();
				}
			},

			selectUser(id) {
				this.selected_user_id = this.selected_user_id === id ? null : id;
			},

			dragService(issue) {
				this.selected_issue = issue;
			},

			onDragOver(event, targetStatusId) {
				event.preventDefault();
				event.currentTarget.classList.add('drag-over');
				event.dataTransfer.dropEffect = 'move';
			},

			onDragLeave(event) {
				event.currentTarget.classList.remove('drag-over');
			},

			async dropService(event, group_id) {
				document.querySelectorAll('.group').forEach(container => {
					container.classList.remove('drag-over');
				});
			
				if (!this.selected_issue) {
					return;
				}
				
				if (this.selected_issue.status_id == group_id) {
					this.selected_issue = null;
					return;
				}

				NProgress.start();
				const payload = {
					issue_id: this.selected_issue.id,
					status_id: group_id,
					reporter_id: Alpine.store('cache').user.id,
				};
			
				try {
					const response = await fetch(Alpine.store('cache').api + '/board/issue/status', {
						method: 'POST',
						headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${Alpine.store('cache').user.token}`,
                        },
						body: JSON.stringify(payload)
					});
			
					if (!response.ok) {
						throw new Error('Error al asignar la orden.');
					}

					if (group_id === 4) {
						const container = event.target.closest('.group');
						if (!container) {
							console.error('No se encontró el contenedor .group');
							return;
						}
						const rect = container.getBoundingClientRect();
						const originX = (rect.left + rect.width / 2) / window.innerWidth;
						const originY = (rect.top + rect.height / 2) / window.innerHeight;

						confetti({
							particleCount: 180,
							spread: 240,
							startVelocity: 10,
							gravity: 0.3,
							ticks: 250,
							scalar: 0.8,
							colors: [
								'#ffb3b3',
								'#ffd1dc',
								'#ffefc1',
								'#c1f0f6',
								'#caffbf',
								'#bdb2ff',
								'#ffc6ff'
							],
							origin: { x: originX, y: originY }
						});;
					}
					
					this.selected_issue = null;

				} catch (error) {
					console.error('Error en la asignación:', error);
				} finally {
					NProgress.done();
				}
			},

			launchConfetti() {
				confetti({
					particleCount: 100,
					spread: 70,
					origin: { y: 0.6 }
				});
			},
			
		}));
	</script>
	






	<style>
		#board .menu {
			display: flex;
			background-color: var(--white);
			border-radius: 2rem;
			padding: 0.5rem 0.75rem;
			gap: 0.25rem;
		}
		#board .menu .item {
			display: flex;
			justify-content: center;
			align-items: center;
			border-radius: 2rem;
			padding: 0 0.75rem;
			gap: 0.5rem;
			cursor: pointer;
			transition: var(--transition);
		}
		#board .menu .item:hover {
			background-color: var(--gray);
		}
		#board .menu .item .button {
			border-radius: 2rem;
			transition: var(--transition);
			height: 2rem;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		#board .menu .item span {
			font-size: 0.75rem;
    		font-weight: 600;
		}
		#board .menu.primary {
			background-color: var(--secondary);
			color: var(--white);
		}
		#board .menu.primary .item:hover {
			background-color: hsl(0deg 0% 100% / 20%);
		}
		#board .menu.primary img {
			filter: invert(1);
		}
		#board {
			width: 100%;
			user-select: none;
			padding: 1rem;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			gap: 1rem;
			margin: 0 auto;
			max-width: 118rem;
		}
		#board .header {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#board .header .thumbs {
			display: flex;
    		gap: 0.25rem;
			padding: 0.25rem 0.5rem;
			background-color: var(--white);
			border-radius: 2rem;
		}
		#board .header .thumbs .user {
			position: relative;
		}
		#board .header .thumbs img {
			border-radius: 2rem;
			border: 3px solid transparent;
		}
		#board .header .thumbs span {
			left: 50%;
			transform: translateX(-50%);
			bottom: -3rem;
			position: absolute;
			background-color: var(--secondary);
			color: var(--white);
			padding: 0.5rem;
			border-radius: 0.5rem;
			opacity: 0;
			transition: var(--transition);
			visibility: hidden;
			white-space: nowrap;
			font-size: 0.75rem;
		}
		#board .header .thumbs span:before {
			content: "";
			display: block;
			border: 0.75rem solid var(--secondary);
			border-right-color: transparent;
			border-left-color: transparent;
			border-bottom-color: transparent;
			position: absolute;
			bottom: 1.75rem;
			transform: rotate(180deg) translateX(50%);
			left: 50%;
		}
		#board .header .thumbs img:hover + span {
			opacity: 1;
			visibility: visible;
		}
		#board .header .thumbs img.selected-thumb {
			border: 3px solid var(--secondary);
		}
		#board .header .title {
			background-color: var(--black);
			color: var(--white);
			padding: 0.75rem 1.5rem;
			border-radius: 2rem;
			font-weight: 400;
		}
		#board .header .range {
			font-size: 1rem;
			font-weight: 600;
			text-transform: capitalize;
			display: flex;
			align-items: center;
			gap: 0.5rem;
			position: relative;
		}
		#board .board {
			display: flex;
			flex: 1;
			user-select: none;
		}
		#board .group {
			flex: 1;
			display: flex;
			flex-direction: column;
			border-right: 3px solid #ffffff80;
			gap: 0.25rem;
			transition: var(--transition);
		}
		#board .group:last-child {
			border-right: none;
		}
		#board .group .name {
			display: flex;
			justify-content: center;
			font-size: 0.9rem;
			margin-top: 0.75rem;
			gap: 0.5rem;
			align-items: center;
			font-weight: 600;
		}
		#board ul {
			margin: 0;
			list-style: none;
			display: flex;
			gap: 0.5rem;
			flex-direction: column;
			padding: 0.75rem;
			flex: 1;
		}
		#board ul li {
			border-radius: 0.5rem;
			cursor: pointer;
			padding: 0.75rem;
			display: flex;
			gap: 0.75rem;
			flex-direction: column;
			transition: var(--transition);
			background-color: white;
			box-shadow: 0 0 1rem hsl(0deg 0% 0% / 2.5%);
		}
		#board .group.drag-over {
			background-color: #ffffff80;
		}
		#board .group.drag-over ul li {
			box-shadow: 0 0 1rem #0000000d;
		}
		#board ul li .title {
			font-size: 0.85rem;
			display: flex;
			align-items: center;
			gap: 0.25rem;
			font-weight: 500;
