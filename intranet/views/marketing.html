<div x-data="clients_data">
	<div id="clients">
		
		<div class="header">
			<div class="menu">
				<div class="item">
					<div class="button">
						<img alt="" width="20" height="20" src="/static/icons/line/marketing.svg">
					</div>
					<span>Evento Shining 3D</span>
            	</div>
            </div>

			<div class="menu">
				<div class="item">
					<div class="button">
					</div>
					<span>Asistentes: <span x-text="clients.users ? clients.users.filter(u => u.status === 'yes').length : 0"></span></span>
            	</div>
            </div>
		</div>

		<table class="glass" border="0">
			<tbody>
				<tr class="">
					<th>ID</th>
					<th>Nombre</th>
					<th class="big">Celular</th>
					<th>Asistencia</th>
					<th></th>
				</tr>

				<template x-for="(client, index) in clients.users" :key="client.id">
					<tr class="row">
						<td class="idx" x-text="index + 1"></td>
						<td class="name">
							<span class="short" x-text="client.name"></span>
						</td>
						<td class="big phone" x-text="client.phone"></td>
						<td :style="client.status === 'yes' ? 'color: var(--green); font-weight: 600' : client.status === 'no' ? 'color: var(--red); font-weight: 600' : 'opacity: 0.45'" x-text="translateStatus(client.status)"></td>
						<td>
							<div class="action">
								<img alt="" alt="icon" :src="`/static/icons/module/${getIcon(client.status)}.svg`" width="16" height="16">
							</div>
						</td>
					</tr>
				</template>

			</tbody>
		</table>
	</div>



	<script>
		Alpine.data('clients_data',() => ({
			clients: [],

			async init() {
				console.log('Inicializando Clients...');
				await this.fetchData();

			},

			translateStatus(status) {
				switch (status) {
					case 'yes':
						return 'Sí';
					case 'no':
						return 'No';
					default:
						return 'Pendiente';
				}
			},

			getIcon(status) {
				switch (status) {
					case 'yes':
						return 'safebuy/approved';
					case 'no':
						return 'safebuy/rejected';
					default:
						return 'refunds/time';
				}
			},

			async fetchData() {
				try {
					const [clientsRes] = await Promise.all([
						fetch(Alpine.store('cache').api + '/dev/confirm_flow/list', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ campaign: 'shining_event' }) }).then(res => res.json()),
					]);

					this.clients = clientsRes.data;

					//await this.getDashboard();
				} catch (error) {
					console.error('Error fetching data:', error);
				}
			},
		}));
	</script>
	



	<style>
		#clients {
			width: 100%;
			user-select: none;
			min-height: calc(100vh - 6.5rem);
			display: flex;
			flex-direction: column;
			gap: 1rem;
			margin: -4.5rem auto 0 auto;
			max-width: 64rem;
		}
		#clients table {
			padding: 1rem;
		}
		#clients table th {
			text-align: left;
			font-size: 0.7rem;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			opacity: 0.5;
			padding-bottom: 0.5rem;
		}
		#clients table .row {
			border-top: 1px solid rgba(0,0,0,0.05);
		}
		#clients table .row td {
			font-size: 0.85rem;
			padding: 0.1rem 0;
		}
		#clients table .row .idx {
			font-size: 0.7rem;
			opacity: 0.35;
			width: 1.5rem;
		}
		#clients table .row .phone {
			font-size: 0.78rem;
			font-family: monospace;
			opacity: 0.6;
			letter-spacing: 0.02em;
		}
		#clients table .row .name {
			align-items: center;
			display: flex;
			padding: 0.4rem 0;
		}
		#clients table .row .letter {
			display: flex;
			width: 2rem;
			height: 2rem;
			justify-content: center;
			align-items: center;
			color: var(--white);
		}
		#clients .header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 1rem;
		}
		
		#clients .menu {
			display: flex;
			background-color: var(--white);
			border-radius: 2rem;
			padding: 0.5rem 0.75rem;
			gap: 0.25rem;
		}
		#clients .menu .item {
			display: flex;
			justify-content: center;
			align-items: center;
			border-radius: 2rem;
			padding: 0 0.75rem;
			gap: 0.5rem;
			transition: var(--transition);
		}
		#clients .menu .item span {
			font-size: 0.75rem;
    		font-weight: 600;
		}
		#clients .menu .item .button {
			border-radius: 2rem;
			transition: var(--transition);
			height: 2rem;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		@media only screen and (max-width: 32rem) {
			#clients table .big {
				display: none;
			}
			#clients table .short {
				font-weight: 500;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				max-width: 8rem;
			}
		}
	</style>
</div>
