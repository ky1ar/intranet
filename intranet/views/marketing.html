<div x-data="clients_data">
	<div id="clients">
		
		<div class="header">
			<div class="menu">
				<div class="item">
					<div class="button">
						<img alt="" width="20" height="20" src="/static/images/icons/marketing.svg">
					</div>
					<span>Bambu Lab Fest</span>
            	</div>
            </div>

			<div class="menu">
				<div class="item">
					<div class="button">
					</div>
					<span>Asistentes: <span x-text="clients.total_users"></span></span>
            	</div>
            </div>
		</div>

		<table class="glass" border="0">
			<tbody>
				<tr class="">
					<th>ID</th>
					<th>Nombre</th>
					<th class="big">Celular</th>
					<th>Asistencia</th>
					<th></th>
				</tr>

				<template x-for="client in clients.users" :key="client.id">
					<tr class="row">
						<td x-text="client.id"></td>
						<td class="name">
							<span class="short" x-text="client.name"></span>
						</td>
						<td class="big" x-text="client.phone"></td>
						<td x-text="translateStatus(client.status)"></td>
						<td>
							<div class="action">
								<img alt="" alt="icon" :src="`/static/images/icons/${getIcon(client.status)}.svg`" width="20" height="20">
							</div>
						</td>
					</tr>
				</template>

			</tbody>
		</table>
	</div>



	<script>
		Alpine.data('clients_data',() => ({
			clients: [],

			async init() {
				console.log('Inicializando Clients...');
				
				//const loginVerification = Alpine.store('auth').loginVerify();
				await this.fetchData();

			},

			translateStatus(status) {
				switch (status) {
					case 'sended':
						return 'Pendiente';
					case 'accepted':
						return 'Sí';
					case 'declined':
						return 'No';
					default:
						return 'Registrado';
				}
			},

			getIcon(status) {
				switch (status) {
					case 'sended':
						return 'timer';
					case 'accepted':
						return 'accept';
					case 'declined':
						return 'decline';
					default:
						return 'timer';
				}
			},

			async fetchData() {
				try {
					console.log('Obteniendo datos desde API')
					const [clientsRes, serviceMethodsRes, techniciansRes] = await Promise.all([
						fetch(Alpine.store('cache').api + '/dev/confirm_flow/list').then(res => res.json()),
					]);

					this.clients = clientsRes.data;

					//await this.getDashboard();
				} catch (error) {
					console.error('Error fetching data:', error);
				}
			},
		}));
	</script>
	



	<style>
		#clients {
			width: 100%;
			user-select: none;
			padding: 1rem;
			min-height: calc(100vh - 6.5rem);
			display: flex;
			flex-direction: column;
			gap: 1rem;
			margin: 0 auto;
			max-width: 64rem;
		}
		#clients table {
			padding: 1rem;
		}
		#clients table th {
			text-align: left;
		}
		#clients table .row .name {
			align-items: center;
			display: flex;
			padding: 0.4rem;
		}
		#clients table .row .letter {
			display: flex;
			width: 2rem;
			height: 2rem;
			justify-content: center;
			align-items: center;
			color: var(--white);
		}
		#clients .header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 1rem;
		}
		
		#clients .menu {
			display: flex;
			background-color: var(--white);
			border-radius: 2rem;
			padding: 0.5rem 0.75rem;
			gap: 0.25rem;
		}
		#clients .menu .item {
			display: flex;
			justify-content: center;
			align-items: center;
			border-radius: 2rem;
			padding: 0 0.75rem;
			gap: 0.5rem;
			transition: var(--transition);
		}
		#clients .menu .item span {
			font-size: 0.75rem;
    		font-weight: 600;
		}
		#clients .menu .item .button {
			border-radius: 2rem;
			transition: var(--transition);
			height: 2rem;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		@media only screen and (max-width: 32rem) {
			#clients table .big {
				display: none;
			}
			#clients table .short {
				font-weight: 500;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				max-width: 8rem;
			}
		}
	</style>
</div>
