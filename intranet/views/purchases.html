<div x-data="purchases_data">
	<div id="purchases" class="dashboard">
        <div class="header">
			<!-- <div class="menu">
				<div class="item" @click="search()">
					<div class="button">
						<img alt="" width="20" height="20" src="/static/images/icons/find.svg">
					</div>
					<span>Buscar</span>
				</div>
            </div> -->

			<div class="menu primary" style="margin-left: auto;">
				<div class="item" @click="addPurchase()">
					<div class="button">
						<img alt="" width="20" height="20" src="/static/images/icons/add.svg">
					</div>
					<span>Añadir</span>
				</div>
			</div>
		</div>

		<div class="main glass">
			<div class="table-header">
				<div>Orden</div>
				<div>Usuario</div>
				<div>Área</div>
				<div>Tipo</div>
				<div>Solicitud</div>
				<div>Prioridad</div>
				<div>Estado</div>
				<div>Fecha de solicitud</div>
			</div>

			<template x-for="purchase in $store.cache.getData('purchases_dashboard')?.requests" :key="purchase.id">
				<div class="table-row">
					<div class="table-row-main" @click="viewPurchase(purchase)">
						<div x-text="`PR-00${purchase.id}`"></div>
						<div>
							<img alt="user" class="image" :src="'/static/images/uploads/users/' + purchase.requester_image" width="24" height="24">
							<span x-text="purchase.requester_name"></span>
						</div>
						<div x-text="purchase.requester_department"></div>
						<div x-text="purchase.type_name"></div>
						<div :class="{'express': purchase.express == 1}" x-text="purchase.express == 1 ? 'Express':'Estándar'"></div>
						<div x-text="purchase.urgency_name"></div>
						<div>
							<div :class="purchase.status_slug" x-text="purchase.status_name"></div>
						</div>
						<div x-text="purchase.created_at"></div>
					</div>
				</div>
			</template>

			<div x-show="$store.cache.getData('purchases_dashboard')?.requests?.length == 0" class="table-row" style="
				padding: 8rem;
				text-align: center;
				opacity: 0.5;
			">
				No se encontraron solicitudes de compra
			</div>
		</div>


		<div
			x-show="$store.cache.isVisibleModal('process_purchase')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal"
			x-cloak
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
		>
			
			<div class="modal glass2" @click.stop>
				<div class="title">
					<span x-text="process_purchase.modal === 'add'
						? 'Nueva solicitud'
						: `Solicitud ${process_purchase.pr}`">
					</span>

					<p class="created"
						x-show="process_purchase.modal !== 'add'"
						x-text="`Creada por ${(process_purchase.self_created ? 'ti' : process_purchase.user_name)} el ${process_purchase.created_at}`">
					</p>
				</div>
<!-- 
				<div class="hover-opacity modal-close" @click="$store.cache.hideLastModal()">
					<img alt="" alt="close" src="/static/images/x.svg" width="12" height="12">
				</div> -->

				<div class="modal-content">
					<!-- VIEW FIELDS -->

					<div class="view-box white" x-show="['view','delete'].includes(process_purchase.modal)">
						<div class="view-header">
							<span>Nº</span>
							<span>Ítem</span>
							<span>Cant.</span>
							<span>Precio</span>
							<span>URL</span>
						</div>

						<template x-for="(item, index) in process_purchase.items" :key="index">
							<div class="view-row">
								<span x-text="(index + 1) + '.'"></span>
								<span x-text="item.title"></span>
								<span x-text="item.quantity"></span>
								<span x-text="item.price ? item.price:'-'"></span>
								<template x-if="item.url">
									<a :href="item.url" target="_blank" rel="noopener">
										<img alt="link" width="16" height="16"
											src="/static/images/icons/link.svg">
									</a>
								</template>

								<template x-if="!item.url">
									<span>-</span>
								</template>
							</div>
						</template>
					</div>

					<!-- INPUTS -->

					<div class="fields" x-show="['edit','approve','add'].includes(process_purchase.modal)">
						<label class="white">
							<select x-model="process_purchase.type_id">
								<template x-for="type in $store.cache.getData('purchases_type')" :key="type.id">
									<option :value="type.id" x-text="type.name"></option>
								</template>
							</select>
						</label>

						<label class="white">
							<select x-model="process_purchase.urgency_id">
								<template x-for="urgency in $store.cache.getData('purchases_urgency')" :key="urgency.id">
									<option :value="urgency.id" x-text="urgency.name"></option>
								</template>
							</select>
						</label>

						<!-- <label class="white">
							<input type="date" x-model="process_purchase.register_date">
						</label> -->

						<label class="white express">
							Express
							<label class="box">
								<input id="express" type="checkbox" x-model="process_purchase.express">
								<span class="slider"></span>
							</label>
						</label>

						<label class="white express">
							Validación TI
							<label class="box">
								<input id="it-validation" type="checkbox" x-model="process_purchase.it_validation">
								<span class="slider"></span>
							</label>
						</label>
					</div>

					<div class="items-box" x-show="['edit','approve','add'].includes(process_purchase.modal)">
						<div class="items-header">
							<span>Nº</span>
							<span>Ítem</span>
							<span>Cant.</span>
							<span>Precio</span>
							<span>URL</span>
							<button type="button" class="new hover-opacity" @click="addItem()" title="Agregar">
								<img alt="Agregar" width="16" height="16" src="/static/images/icons/add.svg">
							</button>
						</div>

						<template x-for="(item, index) in process_purchase.items" :key="index">
							<div class="items-row">
								<span x-text="(index + 1) + '.'"></span>
								<label class="white">
									<input type="text" placeholder="Agregar título" x-model="item.title">
								</label>

								<label class="white">
									<input type="number" min="1" step="1" placeholder="1" x-model.number="item.quantity">
								</label>

								<label class="white">
									<input type="number" min="0" step="0.01" placeholder="0.00" x-model.number="item.price">
								</label>

								<label class="white">
									<input type="url" placeholder="Añadir URL" x-model="item.url">
								</label>
								
								<button type="button" class="remove hover-opacity" @click="removeItem(index)" title="Eliminar">
									<img alt="eliminar" width="16" height="16" src="/static/images/icons/delete.svg">
								</button>
							</div>
						</template>
					</div>

					<!-- COMMENTS -->

					<label class="white" x-show="process_purchase.modal === 'add'">
						<input type="text" x-model="process_purchase.comment" placeholder="Ingresa un comentario...">
					</label>

					<div class="comments-container" x-show="process_purchase.modal !== 'add'">
						<div class="comments-box gradient" :class="{'over': process_purchase.status_id > 4}">
							<template x-for="chat in process_purchase.chats" :key="chat.id">
								<div class="user-comment" :class="{'self': chat.commenter_id == user_id}">
									<img alt="user" :src="'/static/images/uploads/users/' + chat.commenter_image" width="24" height="24">
									<div class="white bubble">
										<div class="top">
											<span x-text="chat.commenter_id == user_id ? 'Tú' :chat.commenter_name"></span>
											<p x-text="chat.created_at"></p>
										</div>
										<p x-text="chat.comment"></p>
									</div>
								</div>
							</template>
						</div>

						<div class="comments-input white" x-show="process_purchase.status_id <= 4">
							<label>
								<input type="text" x-model="process_purchase.message" placeholder="Ingresa un mensaje...">
							</label>
							<div class="send hover-opacity" @click="sendChat()" :class="{'disabled': process_purchase.message == '' || process_purchase.message === undefined}">
								<img alt="enviar" width="16" height="16" src="/static/images/icons/send.svg">
							</div>
						</div>
					</div>
					
				</div>

				<!-- BUTTONS -->

				<div class="buttons" x-show="process_purchase.modal === 'add'">
					<button class="button icon hover-opacity" @click="newRequest()" :class="buttons.add.class">
						<img alt="update" width="16" height="16" src="/static/images/icons/add.svg">
						<span x-text="buttons.add.text"></span>
					</button>
				</div>	

				<div class="buttons" x-show="process_purchase.modal === 'view'">
					<div class="buttons" x-show="process_purchase.status_id == 3 && user_id == 1">
						<button class="button icon blue hover-opacity" @click="payRequest()" :class="buttons.payed.class">
							<img alt="eliminar" width="16" height="16" src="/static/images/icons/payed.svg">
							<span x-text="buttons.payed.text"></span>
						</button>
					</div>
					
					<div class="buttons" x-show="process_purchase.status_id == 4 && user_id == 1">
						<button class="button icon violet hover-opacity" @click="invoiceRequest()" :class="buttons.invoiced.class">
							<img alt="update" width="16" height="16" src="/static/images/icons/invoiced.svg">
							<span x-text="buttons.invoiced.text"></span>
						</button>
					</div>
				</div>

				<div class="buttons" x-show="process_purchase.modal === 'edit'">
					<button class="button icon black hover-opacity" @click="deleteRequest()" :class="buttons.remove.class">
						<img alt="eliminar" width="16" height="16" src="/static/images/icons/delete.svg">
						<span x-text="buttons.remove.text"></span>
					</button>

					<button class="button icon hover-opacity" @click="updateRequest()" :class="buttons.update.class">
						<img alt="update" width="16" height="16" src="/static/images/icons/update.svg">
						<span x-text="buttons.update.text"></span>
					</button>
				</div>

				<div class="buttons" x-show="process_purchase.modal === 'approve'">
					<button class="button icon red hover-opacity" @click="rejectRequest()" :class="buttons.reject.class">
						<img alt="eliminar" width="18" height="18" src="/static/images/icons/dislike.svg">
						<span x-text="buttons.reject.text"></span>
					</button>

					<button class="button icon green hover-opacity" @click="approveRequest()" :class="buttons.approve.class">
						<img alt="update" width="18" height="18" src="/static/images/icons/like.svg">
						<span x-text="buttons.approve.text"></span>
					</button>
				</div>

				<div class="buttons" x-show="process_purchase.modal === 'delete'">
					<button class="button icon red hover-opacity" @click="deleteRequest()" :class="buttons.remove.class">
						<img alt="eliminar" width="16" height="16" src="/static/images/icons/delete.svg">
						<span x-text="buttons.remove.text"></span>
					</button>

					<button x-show="user_id == 1 && process_purchase.express" class="button icon blue hover-opacity" @click="payRequest()" :class="buttons.payed.class">
						<img alt="eliminar" width="16" height="16" src="/static/images/icons/payed.svg">
						<span x-text="buttons.payed.text"></span>
					</button>
				</div>
			</div>
		</div>

	</div>
	




	<script>
		Alpine.data('purchases_data', () => ({
			api: Alpine.store('cache').api,
			user_id: Alpine.store('cache').user.id,
			processing: false,
			buttons: {
				add:   { text: 'Registrar solicitud', class: '' },
				update:   { text: 'Actualizar', class: '' },
				remove:   { text: 'Eliminar solicitud', class: '' },
				approve:   { text: 'Aprobar', class: '' },
				reject:   { text: 'Rechazar', class: '' },
				payed:   { text: 'Marcar como pagado', class: '' },
				invoiced:   { text: 'Marcar como facturado', class: '' },
			},
			process_purchase: {
				id: null,
				type_id: 1,
				urgency_id: 2,
				express: false,
				it_validation: false,
				needed_date: "",
				user_image: "00000000.jpg",
				modal: "add",
				can_approve: false,
				items: [
					{
						title: "",
						description: "",
						quantity: 1,
						price: "",
						url: "",
						ruc: "",
					}
				],
			},
			editing: false,

			async init() {
				console.log('Inicializando Purchases...');

				const socket = Alpine.store('cache').socket;
				if (socket) {
					socket.removeAllListeners();
					socket.on("purchase_update_dashboard", async () => {
						await Alpine.store('cache').refresh('purchases_dashboard');
					});
				}

				await Alpine.store('cache').fetchData([
					{ key: 'purchases_dashboard', url: `/purchases/requests`, force: true },
					{ key: 'purchases_type', url: '/purchases/options/type' },
					{ key: 'purchases_urgency', url: '/purchases/options/urgency' },
				]);
				await Alpine.store('cache').verify();
			},

			resetOrder() {
				this.editing = false;
				this.process_purchase = {
					id: null,
					type_id: 1,
					urgency_id: 2,
					express: false,
					it_validation: false,
					needed_date: "",
					can_approve: false,
					modal: "add",
					user_image: "00000000.jpg",
					items: [
						{
							title: "",
							description: "",
							quantity: 1,
							price: "",
							url: "",
							ruc: "",
						},
					],
				};
				this.buttons.add.text = "Registrar solicitud";
			},

			async deleteRequest() {
				if (this.processing) return;

				this.processing = true;
				NProgress.start();

				try {
					const response = await fetch(
						`${this.api}/purchases/${this.process_purchase.id}`,
						{
							method: "PUT",
							headers: {
								"Content-Type": "application/json",
								"Authorization": `Bearer ${Alpine.store('cache').user.token}`,
							},
							body: JSON.stringify({ delete: true }),
						}
					);

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || "Error al eliminar");
					}

					this.resetOrder();
					Alpine.store("cache").hideModal("process_purchase");

				} catch (error) {
					this.showError("remove", error.message);
				} finally {
					this.processing = false;
					NProgress.done();
				}
			},

			async payRequest() {
				if (this.processing) return;

				this.processing = true;
				NProgress.start();

				try {
					const response = await fetch(
						`${this.api}/purchases/${this.process_purchase.id}`,
						{
							method: "PUT",
							headers: {
								"Content-Type": "application/json",
								"Authorization": `Bearer ${Alpine.store('cache').user.token}`,
							},
							body: JSON.stringify({ action: "payed" }),
						}
					);

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || "Error al eliminar");
					}

					this.resetOrder();
					Alpine.store("cache").hideModal("process_purchase");

				} catch (error) {
					this.showError("payed", error.message);
				} finally {
					this.processing = false;
					NProgress.done();
				}
			},

			async invoiceRequest() {
				if (this.processing) return;

				this.processing = true;
				NProgress.start();

				try {
					const response = await fetch(
						`${this.api}/purchases/${this.process_purchase.id}`,
						{
							method: "PUT",
							headers: {
								"Content-Type": "application/json",
								"Authorization": `Bearer ${Alpine.store('cache').user.token}`,
							},
							body: JSON.stringify({ action: "invoiced" }),
						}
					);

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || "Error al eliminar");
					}

					this.resetOrder();
					Alpine.store("cache").hideModal("process_purchase");

				} catch (error) {
					this.showError("payed", error.message);
				} finally {
					this.processing = false;
					NProgress.done();
				}
			},

			async updateRequest() {
				if (this.processing) return;

				const items = this.process_purchase.items
					.map(i => ({
						title: (i.title || "").trim(),
						description: (i.description || "").trim(),
						quantity: Number(i.quantity) || 0,
						price: i.price === "" ? null : Number(i.price),
						url: (i.url || "").trim(),
						ruc: (i.ruc || "").trim(),
					}))
					.filter(i => i.title && i.quantity > 0);

				if (!items.length) {
					this.showError("update", "Debe agregar al menos 1 ítem");
					return;
				}

				const payload = {
					type_id: this.process_purchase.type_id,
					urgency_id: this.process_purchase.urgency_id,
					express: this.process_purchase.express ? 1 : 0,
					it_validation: this.process_purchase.it_validation ? 1 : 0,
					needed_date: this.process_purchase.needed_date || null,
					items,
				};

				this.processing = true;
				NProgress.start();

				try {
					const response = await fetch(
						`${this.api}/purchases/${this.process_purchase.id}`,
						{
							method: "PUT",
							headers: {
								"Content-Type": "application/json",
								"Authorization": `Bearer ${Alpine.store('cache').user.token}`,
							},
							body: JSON.stringify(payload),
						}
					);

					const json = await response.json();
					if (!response.ok) {
						throw new Error(json?.message || "Error al actualizar");
					}

					this.resetOrder();
					Alpine.store("cache").hideModal("process_purchase");

				} catch (error) {
					this.showError("update", error.message);
				} finally {
					this.processing = false;
					NProgress.done();
				}
			},

			async newRequest() {
				if (this.processing) return;

				const items = this.process_purchase.items
					.map((i) => ({
						title: (i.title || "").trim(),
						description: (i.description || "").trim(),
						quantity: Number(i.quantity) || 0,
						price:
							i.price === "" || i.price === null || i.price === undefined
								? null
								: Number(i.price),
						url: (i.url || "").trim(),
						ruc: (i.ruc || "").trim(),
					}))
					.filter((i) => i.title && i.quantity > 0);

				if (!items.length) {
					this.showError("add", "Debe agregar al menos 1 ítem");
					return;
				}

				const payload = {
					type_id: this.process_purchase.type_id,
					urgency_id: this.process_purchase.urgency_id,
					express: this.process_purchase.express ? 1 : 0,
					it_validation: this.process_purchase.it_validation ? 1 : 0,
					needed_date: this.process_purchase.needed_date || null,
					comment: this.process_purchase.comment || null,
					items: items,
				};

				this.processing = true;
				NProgress.start();

				try {
					const response = await fetch(`${this.api}/purchases/process`, {
						method: "POST",
						headers: { 
							"Content-Type": "application/json",
							'Authorization': `Bearer ${Alpine.store('cache').user.token}`,
						},
						body: JSON.stringify(payload),
					});

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || jsonData?.message || "Error al registrar la solicitud");
					}

					this.resetOrder();
					Alpine.store("cache").hideModal("process_purchase");
				} catch (error) {
					this.showError("add", error.message);
				} finally {
					NProgress.done();
					this.processing = false;
				}
			},

			async sendChat() {
				if (!this.process_purchase.message || this.processing) return;

				this.processing = true;

				try {
					const response = await fetch(`${this.api}/purchases/${this.process_purchase.id}/chat`, {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
							"Authorization": `Bearer ${Alpine.store('cache').user.token}`,
						},
						body: JSON.stringify({
							comment: this.process_purchase.message,
						}),
					});

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || "Error enviando comentario");
					}
					const data = jsonData.data
					this.process_purchase.chats.push({
						id: data.id,
						comment: data.comment,
						commenter_id: data.commenter_id,
						commenter_name: data.commenter_name,
						commenter_image: data.commenter_image,
						created_at: data.created_at,
					});

					this.process_purchase.message = "";

					// opcional: scroll al final
					// this.$nextTick(() => {
					// 	const box = document.querySelector("#modal .comments-box");
					// 	if (box) box.scrollTop = box.scrollHeight;
					// });

				} catch (error) {
					console.error(error);
				} finally {
					this.processing = false;
				}
			},

			async approveRequest() {
				if (this.processing) return;

				const items = this.process_purchase.items
					.map(i => ({
						title: (i.title || "").trim(),
						description: (i.description || "").trim(),
						quantity: Number(i.quantity) || 0,
						price:
							i.price === "" || i.price === null || i.price === undefined
								? null
								: Number(i.price),
						url: (i.url || "").trim(),
						ruc: (i.ruc || "").trim(),
					}))
					.filter(i => i.title && i.quantity > 0);

				if (!items.length) {
					this.showError("approve", "Debe agregar al menos 1 ítem");
					return;
				}

				this.processing = true;
				NProgress.start();

				try {
					await fetch(`${this.api}/purchases/${this.process_purchase.id}`, {
						method: "PUT",
						headers: {
							"Content-Type": "application/json",
							"Authorization": `Bearer ${Alpine.store('cache').user.token}`,
						},
						body: JSON.stringify({
							action: "approve",
							type_id: this.process_purchase.type_id,
							urgency_id: this.process_purchase.urgency_id,
							express: this.process_purchase.express ? 1 : 0,
							it_validation: this.process_purchase.it_validation ? 1 : 0,
							needed_date: this.process_purchase.needed_date || null,
							items,
						}),
					});

					this.resetOrder();
					Alpine.store("cache").hideModal("process_purchase");

				} catch (error) {
					this.showError("approve", error.message);
				} finally {
					this.processing = false;
					NProgress.done();
				}
			},

			async rejectRequest() {
				if (this.processing) return;

				this.processing = true;
				NProgress.start();

				try {
					await fetch(`${this.api}/purchases/${this.process_purchase.id}`, {
						method: "PUT",
						headers: {
							"Content-Type": "application/json",
							"Authorization": `Bearer ${Alpine.store('cache').user.token}`,
						},
						body: JSON.stringify({ action: "reject" }),
					});

					this.resetOrder();
					Alpine.store("cache").hideModal("process_purchase");

				} catch (error) {
					this.showError("reject", error.message);
				} finally {
					this.processing = false;
					NProgress.done();
				}
			},

			addPurchase() {
				this.resetOrder();
				this.process_purchase.modal = 'add';
				Alpine.store('cache').showModal('process_purchase');
			},

			async viewPurchase(purchase) {
				this.editing = true;
				NProgress.start();

				try {
					const response = await fetch(`${this.api}/purchases/${purchase.id}`, {
						headers: {
							"Content-Type": "application/json",
							"Authorization": `Bearer ${Alpine.store('cache').user.token}`,
						},
					});
					const dataJson = await response.json();
					const data = dataJson.data;

					if (!response.ok) {
						throw new Error(data?.message || "Error al obtener la solicitud");
					}

					this.process_purchase = data;
					if (!this.process_purchase.items.length) {
						this.process_purchase.items = [
							{
								title: "",
								description: "",
								quantity: 1,
								price: "",
								url: "",
								ruc: "",
							},
						];
					}
					Alpine.store("cache").showModal("process_purchase");
				} catch (error) {
					console.error(error);
				} finally {
					NProgress.done();
				}
			},

			addItem() {
				this.process_purchase.items.push({
					title: '',
					description: '',
					quantity: 1,
					price: '',
					url: '',
					ruc: '',
				});
			},

			removeItem(index) {
				if (this.process_purchase.items.length === 1) {
					this.process_purchase.items = [
						{
							title: '',
							description: '',
							quantity: 1,
							price: '',
							url: '',
							ruc: '',
						}
					];
					return;
				}
				this.process_purchase.items.splice(index, 1);
			},
			
			showError(btnKey, errorMsg) {
                const originalText = this.buttons[btnKey].text;
                const originalClass = this.buttons[btnKey].class;

                if (originalClass == 'error') {
                    return;
                }
                this.buttons[btnKey].text = errorMsg;
                this.buttons[btnKey].class = 'error';

                setTimeout(() => {
                    this.buttons[btnKey].text = originalText;
                    this.buttons[btnKey].class = originalClass;
                }, 1000);
            },

		}));
	</script>
