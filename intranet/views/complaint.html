<div x-data="complaint_data">
	<div id="dashboard">
		<div class="controls">
			<div class="toggle-collapse frost" @click="$store.cache.toogleMoreMenu()" @click.outside="$store.cache.hideMoreMenu()">
				<div class="item">
					<img alt="" width="24" height="24" src="/static/icons/line/more.svg">
				</div>
			</div>

			<!-- <div class="menu-collapse frost" x-transition.duration.300ms x-show="$store.cache.more_menu">
				<div class="item" @click="search()">
					<img alt="" width="18" height="18" src="/static/icons/line/find.svg">
				</div>
				<div class="item" @click="viewHistory()">
					<img alt="" width="18" height="18" src="/static/icons/line/history.svg">
				</div>
				<div class="item" @click="viewStatistics()">
					<img alt="" width="18" height="18" src="/static/icons/line/report.svg">
				</div>
			</div> -->
			
			<!-- <div class="left mobile-hide frost">
				<div class="item" @click="search()">
					<img alt="" width="20" height="20" src="/static/icons/line/find.svg">
					<span>Buscar</span>
				</div>
				<div class="item" @click="viewHistory()">
					<img alt="" width="20" height="20" src="/static/icons/line/history.svg">
					<span>Historial</span>
				</div>
				<div class="item" @click="viewStatistics()">
					<img alt="" width="20" height="20" src="/static/icons/line/report.svg">
					<span>Estadísticas</span>
				</div>
			</div>  -->

			<div class="right frost-dark" x-show="canAdd()" style="margin-left: auto;">
				<div class="item" @click="addOrder()">
					<img class="invert" alt="" width="20" height="20" src="/static/icons/line/add.svg">
					<span>Añadir</span>
				</div>
			</div>
		</div>

		<div class="board glass">
			<template x-for="group in $store.cache.getData('complaint_dashboard')" :key="group.status_id">
				<div class="group"
					@dragover="onDragOver($event, group.status_id)" 
					@dragleave="onDragLeave($event)"
					@drop="onDrop(group.status_id)">
					<div class="name">
						<img alt="" width="24" height="24"
							:src="'/static/icons/module/complaint/' + ($store.cache.getById('complaint_status', group.status_id)?.image || 'default.png')"
							alt="">
						<span x-text="$store.cache.getById('complaint_status', group.status_id)?.name || ''"></span>
					</div>

					<ul>
						<template x-if="group.complaints.length > 0">
							<template x-for="complaint in group.complaints" :key="complaint.id">
								<li
									:class="complaint.priority"
									:draggable="canMove()"
									@dragstart="onDragStart(complaint)"
									@click="viewComplaint(complaint.id)"
									class="white"
									>
									<div class="row">
										<span class="order-number"  x-text="`${complaint.type_letter}-${complaint.id}`"></span>

										<template x-if="complaint.updated_today">
											<div class="update-dot"></div>
										</template>

										<div class="passed-days">
											<span class="register-day" x-text="`${complaint.passed_days} d.`"></span>
										</div>
									</div>

									<div class="row">
										<div>
											<span class="machine" x-text="complaint.client_name"></span>
											<template x-if="group.status_id > 2">
												<span class="admin-name" x-text="complaint.assigned_name"></span>
											</template>
										</div>
									</div>
								
								</li>
							</template>
						</template>
					</ul>
				</div>
			</template>
		</div>


		<div
			x-show="$store.cache.isVisibleModal('status')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-status"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal little glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="title">
					<span x-text="`${selected_complaint?.type_letter}-${selected_complaint?.id}`"></span>
				</div>
				
				<div class="modal-content">
					<div class="update">
						<div class="box">
							<img alt="" width="20" height="20"
								:src="'/static/icons/module/complaint/' + ($store.cache.getById('complaint_status', selected_complaint?.status_id)?.image)"
								alt="from">
							<span x-text="($store.cache.getById('complaint_status', selected_complaint?.status_id))?.name"></span>
						</div>

						<div class="box">
							<img alt="" width="20" height="20"
								:src="'/static/icons/module/complaint/' + ($store.cache.getById('complaint_status', selected_group_id)?.image)"
								alt="to">
							<span x-text="($store.cache.getById('complaint_status', selected_group_id))?.name"></span>
						</div>
						<img alt="" class="arrow" width="16" height="16" src="/static/icons/filled/arrownext.svg">
					</div>
						
					<template x-if="selected_complaint?.status_id == 2">
						<div class="fields options">
							<div class="order-input">
								<!-- <img alt="" width="16" height="16" src="/static/icons/line/box.svg"> -->
								<!-- <span>Pedido</span> -->
								<label class="white">
									<input type="text" x-model="selected_complaint.order_number" placeholder="Número de orden">
								</label>
							</div>

							<label class="white">
								<select x-model="category_id">
									<option value="null" disabled selected>Categoría</option>

									<template x-for="categories in $store.cache.getData('complaint_categories')" :key="categories.id">
										<option :value="categories.id" x-text="categories.name"></option>
									</template>
								</select>
							</label>
						</div>
					</template>

					<template x-if="selected_complaint?.status_id == 2">
						<div class="fields options">

							<label class="white">
								<select x-model="owner_id">
									<option value="null" disabled selected>Responsable</option>

									<template x-for="workers in $store.cache.getData('common_workers')" :key="workers.id">
										<option :value="workers.id" x-text="workers.name"></option>
									</template>
								</select>
							</label>

							<label class="white">
								<select x-model="seller_id">
									<option value="null" disabled selected>Comercial a cargo</option>

									<template x-for="vendors in $store.cache.getData('common_vendors')" :key="vendors.id">
										<option :value="vendors.id" x-text="vendors.name"></option>
									</template>
									<option value="0">Ninguno</option>

								</select>
							</label>
						</div>
					</template>

					<!-- <textarea x-model="status_notes" class="text-area glass2" placeholder="Notas"></textarea> -->
					
				</div>

				<template x-if="selected_complaint?.status_id < 5">
					<div class="buttons">
						<button class="hover-opacity button" @click="updateStatus()" :class="buttons.move_status.class" x-text="buttons.move_status.text"></button>
					</div>
				</template>

				<template x-if="selected_complaint?.status_id == 5">
					<div class="buttons">
						<button class="hover-opacity button" @click="updateStatus(true)" :class="buttons.move_status.class">Resuelto</button>

						<button class="hover-opacity black button" @click="updateStatus()" :class="buttons.move_status.class">Archivado</button>
					</div>
				</template>
			</div>
		</div>


		<div
			x-show="$store.cache.isVisibleModal('view')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-view"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal glass2 extrabig" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="top">
					<span class="title" x-text="`${complaint_data?.type_letter}-${complaint_data?.id}`"></span>
					<span class="days" :class="complaint_data?.priority" x-text="`${complaint_data?.passed_days} día${complaint_data?.passed_days == 1 ? '':'s'}`"></span>
					<!-- <span class="title" x-text="complaint_data?.order_number"></span> -->
					<div x-show="complaint_data?.status_id > 2" class="proof hover-opacity" @click="proofModal()">
						<img alt="" width="16" height="16" src="/static/icons/module/complaint/proof.svg">
						Evidencias
					</div>
				</div>
				
				<div class="modal-content dual">
					<div class="detail flexbox overflow percent50">
						<div class="box white">
							<div class="container">
								<span class="letter" x-text="complaint_data.client_name?.charAt(0)">A</span>

								<div class="data">
									<span class="bold" x-text="complaint_data?.client_name"></span>
									<span class="text" x-text="complaint_data?.document"></span>
								</div>

								<div class="icons">
									<a title="Whatsapp" :href="`https://api.whatsapp.com/send?phone=${complaint_data?.phone}`" target="_blank" class="hover-opacity" rel="noopener noreferrer">
										<img alt="" alt="phone" src="/static/icons/line/whatsapp.svg" width="16" height="16">
									</a>
									<a title="Email" :href="`mailto:${complaint_data?.email}`" target="_blank" class="hover-opacity" rel="noopener noreferrer">
										<img alt="" alt="phone" src="/static/icons/line/email.svg" width="16" height="16">
									</a>
								</div>
							</div>
							
							<div class="container">
								<img alt="" width="16" height="16" src="/static/icons/line/location.svg">
								<span class="text" x-text="`${complaint_data?.address} - ${complaint_data?.department}, ${complaint_data?.province}, ${complaint_data?.district}`"></span>
							</div>

							<div class="container">
								<img alt="" width="16" height="16" src="/static/icons/line/email.svg">
								<span class="text" x-text="complaint_data?.email"></span>
							</div>
						</div>
						
						<div class="box white">
							<div class="container">
								<img alt="" width="16" height="16" src="/static/icons/line/box.svg">

								<div class="data">
									<span class="bold" x-text="complaint_data?.consumption_description"></span>
									<!-- complaint_data?.order_number -->
									<span class="text" x-text="`${complaint_data?.order_number} - ${complaint_data?.purchase_date}`"></span>
								</div>

								<div class="data">
									<span class="bold" x-text="`S/ ${complaint_data?.amount}`"></span>
									<span class="text" x-text="complaint_data?.consumption_name"></span>
								</div>
							</div>
						</div>

						<div class="box white" x-show="complaint_data?.detail">
							<div class="container">
								<img alt="" width="16" height="16" src="/static/icons/line/board.svg">

								<div class="data">
									<span class="bold">Detalle</span>
									<span class="text" x-text="`${complaint_data?.detail}`"></span>
								</div>
							</div>
						</div>

						<div class="box white">
							<div class="container">
								<img alt="" width="16" height="16" src="/static/icons/line/board.svg">

								<div class="data">
									<span class="bold">Solicitud</span>
									<span class="text" x-text="`${complaint_data?.customer_request}`"></span>
								</div>
							</div>
						</div>
					</div>
					
					<div class="comments-container white percent50" x-show="complaint_data.modal !== 'add'">
						<div class="comments-box overflow" x-ref="commentsBox" :class="{'over': complaint_data.status_id > 5}">
							<template x-if="!complaint_data.chats || complaint_data.chats.length === 0">
								<div class="no-comments">Nada por aquí</div>
							</template>
							
							<template x-for="chat in complaint_data.chats" :key="chat.id">
								<div class="user-comment" :class="{'self': chat.commenter_id == user.id}">
									<img alt="user" :src="'/static/images/uploads/users/' + chat.commenter_image" width="24" height="24">
									<div class="white bubble">
										<div class="top">
											<span x-text="chat.commenter_id == user.id ? 'Tú' :chat.commenter_name"></span>
											<p x-text="chat.created_at"></p>
										</div>
										<p x-text="chat.comment"></p>
									</div>
								</div>
							</template>
						</div>

						<div class="comments-input white" x-show="complaint_data.status_id <= 6">
							<label>
								<textarea type="text" x-model="complaint_data.message" placeholder="Ingresa un mensaje..." @keydown.enter="handleEnterSend($event)"></textarea>
							</label>
							<div class="send hover-opacity" @click="sendChat()" :class="{'disabled': complaint_data.message == '' || complaint_data.message === undefined}">
								<img alt="enviar" width="16" height="16" src="/static/icons/filled/send.svg">
							</div>
						</div>
					</div>

				</div>
			</div>
		</div>


		<div
			x-show="$store.cache.isVisibleModal('add')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-add"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal small glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<label class="white">
					<input class="title" type="text" placeholder="N° orden" x-model="new_complaint.order_number" @blur="fetchClientOrder()">
				</label>

				<div></div>

				<div class="modal-content">
					<div class="fields">
						<label class="white">
							<select x-model="new_complaint.type_id">
								<option value="null" selected disabled>Tipo de reclamo</option>

								<template x-for="method in $store.cache.getData('complaint_types')" :key="method.id">
									<option :value="method.id" x-text="method.name"></option>
								</template>
							</select>
						</label>

						<label class="white" style="position: relative;">
							<img alt="repeat" src="/static/icons/line/calendar.svg" width="16" height="16">
							<span
								style="cursor: pointer; flex: 1; line-height: 2.5rem;"
								@click="
									if ($refs.purchase_date.showPicker) {
										$refs.purchase_date.showPicker();
									} else {
										$refs.purchase_date.focus();
									}
								"
								x-text="dateLabel(new_complaint.purchase_date, 'Fecha de compra')"
							></span>

							<input
								x-ref="purchase_date"
								type="date"
								x-model="new_complaint.purchase_date"
								style="position:absolute; inset:0; opacity:0; pointer-events:none;"
							>
						</label>

						<label class="white">
							<img alt="" alt="user" src="/static/icons/line/id.svg" width="16" height="16">
							<input type="text" maxlength="8" @input="new_complaint.client_document = new_complaint.client_document.replace(/\D/g, '')" placeholder="DNI" x-model="new_complaint.client_document" @blur="fetchClientData()">
						</label>
					</div>

					<div class="fields">
						<label :class="client_found ? 'glass2' : 'white'">
							<img alt="" alt="user" src="/static/icons/line/user.svg" width="16" height="16">
							<input :disabled="client_found" type="text" placeholder="Nombre completo" x-model="new_complaint.client_name">
						</label>
					</div>

					<div class="fields">
						<label class="white">
							<img alt="" alt="phone" src="/static/icons/line/phone.svg" width="16" height="16">
							<input type="text" maxlength="9" @input="new_complaint.client_phone = new_complaint.client_phone.replace(/\D/g, '')" placeholder="Celular" x-model="new_complaint.client_phone">
						</label>

						<label class="white">
							<img alt="" alt="email" src="/static/icons/line/email.svg" width="16" height="16">
							<input type="text" placeholder="Email" x-model="new_complaint.client_email">
						</label>
					</div>

					<div></div>

					<div class="fields">
						<label class="white">
							<select x-model="new_complaint.department_id" @change="getProvince()">
								<option value="null" selected disabled>Departamento</option>

								<template x-for="department in $store.cache.getData('common_departments')" :key="department.id">
									<option :value="department.id" x-text="department.name"></option>
								</template>
							</select>
						</label>

						<label class="white">
							<select x-model="new_complaint.province_id" @change="getDistrict()" :disabled="!new_complaint.department_id">
								<option value="null" selected disabled>Provincia</option>

								<template x-for="method in $store.cache.getData('common_provinces')" :key="method.id">
									<option :value="method.id" x-text="method.name"></option>
								</template>
							</select>
						</label>

						<label class="white">
							<select x-model="new_complaint.district_id" :disabled="!new_complaint.province_id">
								<option value="null" selected disabled>Distrito</option>

								<template x-for="method in $store.cache.getData('common_districts')" :key="method.id">
									<option :value="method.id" x-text="method.name"></option>
								</template>
							</select>
						</label>
					</div>

					<label class="white">
						<input type="text" placeholder="Dirección" x-model="new_complaint.address">
					</label>

					<div></div>

					<div class="fields">
						<label class="white">
							<select x-model="new_complaint.consumption_id">
								<option value="null" selected disabled>Tipo de consumo</option>

								<template x-for="method in $store.cache.getData('complaint_consumptions')" :key="method.id">
									<option :value="method.id" x-text="method.name"></option>
								</template>
							</select>
						</label>

						<label class="white">
							<input type="text" @input="new_complaint.amount = new_complaint.amount.replace(/[^0-9.]/g, '')" placeholder="Monto reclamado S/" x-model="new_complaint.amount">
						</label>

						<label class="white">
							<input type="text" placeholder="Descripción" x-model="new_complaint.description">
						</label>
					</div>

					<textarea x-model="new_complaint.detail" class="text-area glass2" placeholder="Detalle del reclamo"></textarea>

					<textarea x-model="new_complaint.request" class="text-area glass2" placeholder="Solicitud del cliente"></textarea>

				</div>

				<div class="buttons">
					<button class="button hover-opacity" @click="newComplaint()" :class="buttons.add.class" x-text="buttons.add.text"></button>
				</div>
			</div>
		</div>


		<div
			x-show="$store.cache.isVisibleModal('history')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-history"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal big glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="top">
					<span class="title">Historial</span>

					<div class="pagination">
						<span class="white hover-opacity left" :class="current_page > 1 ? '':'disabled'" @click="firstPage()" title="Primera página">
							<img alt="" src="/static/icons/line/rightfull.svg" width="20" height="20">
						</span>
						<span class="white hover-opacity left" :class="current_page > 1 ? '':'disabled'" @click="prevPage()" title="Página anterior">
							<img alt="" src="/static/icons/line/right.svg" width="20" height="20">
						</span>
						<span class="white hover-opacity" :class="current_page < total_pages ? '':'disabled'" @click="nextPage()" title="Siguiente página">
							<img alt="" src="/static/icons/line/right.svg" width="20" height="20">
						</span>
						<span class="white hover-opacity" :class="current_page < total_pages ? '':'disabled'" @click="lastPage()" title="Última página">
							<img alt="" src="/static/icons/line/rightfull.svg" width="20" height="20">
						</span>
					</div>
				</div>

				<div class="modal-content history">
					<table class="mobile-hide">
						<thead>
							<tr>
								<th>Orden</th>
								<th>Equipo</th>
								<th>Cliente</th>
								<th>Estado</th>
								<th>Ingreso</th>
							</tr>
						</thead>
						<tbody>
							<template x-for="history in history_list" :key="history.id">
								<tr @click="viewComplaint(history.order_number)">
									<td class="order">
										<div class="machine">
											<b x-text="history.method_letter"></b>
											<div class="model">
												<span x-text="history.order_number"></span>
												<span x-show="history.origin_name == 'Provincia'" x-text="history.origin_name"></span>
											</div>
										</div>
									</td>
									<td class="machine_box">
										<div class="machine">
											<img alt="" width="40" height="40" :src="'/static/images/uploads/machines/'+history.machine_image" alt="">
											<div class="model">
												<span x-text="history.machine"></span>
												<span x-text="history.brand"></span>
											</div>
										</div>
									</td>
									<td class="client" x-text="history.client_name"></td>
									<td class="order">
										<span class="finished" :class="!history.finished ? 'active' : ''" x-text="history.finished ? 'Finalizado':'Activo'"></span>
									</td>
									<td x-text="history.register_at"></td>
								</tr>
							</template>
						</tbody>
					</table>

					<div class="mobile-show mobile-table">
						<template x-for="history in history_list" :key="history.id">
							<div class="row white" @click="viewComplaint(history.order_number)">
								<div class="head">
									<div class="info">
										<span class="id" x-text="history.order_number"></span>
										<span class="date" x-text="history.register_at"></span>
									</div>
									<div class="status" :class="!history.finished ? 'active' : 'finished'" x-text="history.finished ? 'Finalizado':'Activo'"></div>
								</div>
								<div class="body">
									<span class="label">Cliente</span>
									<span class="name" x-text="history.client_name"></span>
								</div>
								<div class="body">
									<span class="label">Equipo</span>
									<span class="name" x-text="`${history.brand} ${history.machine}`"></span>
								</div>
							</div>
						</template>
					</div>
				</div>
			</div>
		</div>

		<div 
			x-show="$store.cache.isVisibleModal('proof')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap common-modal"
			id="modal-proof"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal small glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<div class="top">
					<span class="title">Evidencias</span>
				</div>

				<div class="modal-content bottom thumbnails-grid" >
					<template x-for="f in proof_files" :key="f.id">
						<div class="thumb-item hover-opacity" @click="openAttachment(f)">
							<div class="thumbnail-wrapper" >
							
							<template x-if="isImageFile(f)">
								<img class="hover-opacity" :src="getInlineUrl(f)" :alt="f.original_name">
							</template>

							<template x-if="!isImageFile(f)">
								<div class="file-card">
								<div class="file-ext" x-text="(f.ext || '').toUpperCase()"></div>
								</div>
							</template>

							</div>

							<div class="thumb-caption" x-text="f.original_name" :title="f.original_name"></div>
						</div>
					</template>

					<div class="add-button hover-opacity" @click="$refs.proofInput.click()">
						<img alt="" width="24" height="24" src="/static/icons/line/plus.svg">
					</div>

						<input
						type="file"
						class="hidden"
						multiple
						x-ref="proofInput"
						accept=".pdf,.xml,.txt,.doc,.docx,.xls,.xlsx,image/*"
						@change="uploadProofFiles($event)"
					/>
				</div>
			</div>
		</div>


		<div 
			x-show="$store.cache.isVisibleModal('attachment')"
			@mousedown.self="$store.cache.hideLastModal()"
			class="modal-wrap"
			id="modal-attachment"
			x-transition:enter="modal-enter"
			x-transition:enter-start="modal-enter-start"
			x-transition:enter-end="modal-enter-end"
			x-transition:leave="modal-leave"
			x-transition:leave-start="modal-leave-start"
			x-transition:leave-end="modal-leave-end"
			x-cloak
		>
			<div class="modal small glass2" @click.stop>
				<div class="modal-grabber">
					<div class="modal-grabber-bar"></div>
				</div>

				<!-- <div class="top" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
					<span class="title" x-text="viewer_file?.original_name || 'Archivo'"></span>

					<a class="button hover-opacity"
						x-show="viewer_file?.download_url"
						:href="viewer_file?.download_url"
						target="_blank"
						rel="noopener noreferrer">
						Descargar
					</a>
				</div> -->

				<div class="modal-content">
					<!-- PDF -->
					<template x-if="viewer_payload?.kind === 'url' && isPdfFile(viewer_file)">
						<iframe :src="viewer_payload.url" style="width:100%; height:70vh; border:0;"></iframe>
					</template>

					<!-- Imagen -->
					<template x-if="viewer_payload?.kind === 'url' && isImageFile(viewer_file)">
						<img style="border-radius: 0.75rem;" :src="viewer_payload.url">
					</template>

					<!-- Texto -->
					<template x-if="viewer_payload?.kind === 'text'">
						<div class="white" style="white-space:pre-wrap; padding: 1rem;" x-text="viewer_payload.text"></div>
					</template>

					<!-- HTML (xlsx preview) -->
					<template x-if="viewer_payload?.kind === 'html'">
						<div style="max-height:70vh;" x-html="viewer_payload.html"></div>
					</template>

					<!-- No preview -->
					<template x-if="viewer_payload?.kind === 'download'">
						<div style="text-align: center;" x-text="viewer_payload.message"></div>
					</template>
				</div>
			</div>
		</div>


		<div
			x-show="$store.cache.isVisibleModal('search')"
			@mousedown.self="$store.cache.hideLastModal()"
			x-transition.duration.300ms
			class="modal-wrap"
			id="modal-search"
			x-cloak>
			<div class="modal" @click.stop>
				<div class="bottom glass2">
					<img alt="" class="ico" width="20" height="20" src="/static/icons/line/find.svg">
					<input type="text"
						x-model="find_order_number"
						placeholder="Orden, nombre, dni/ruc"
						@input="findOrders()">
					<div class="hover-opacity clear" x-show="find_order_number" title="Limpiar búsqueda" @click="find_order_number = ''; finded_orders = [];">
						<img alt="" class="" width="12" height="12" src="/static/icons/filled/x.svg">
					</div>
				</div>
				<div class="orders glass2" x-show="finded_orders.length > 0">
					<template x-for="order in finded_orders" :key="order.id">
						<div class="item" @click="viewComplaint(order.order_number)">
							<div class="title">
								<span class="order-number" x-text="order.order_number"></span>
								<span class="machine" x-text="order.machine"></span>
							</div>
							<span class="client" x-text="order.client_name"></span>

							<img alt="" width="48" height="48" :src="`/static/images/uploads/machines/${order.machine_image}`" alt="">
						</div>
						
					</template>
				</div>
			</div>
		</div>
	</div>


	<script>
		Alpine.data('complaint_data',() => ({
			token: localStorage.getItem('user_token'),
			
			api: Alpine.store('cache').api,
			user: Alpine.store('cache').user,
			owner_id: null,
			seller_id: null,
			category_id: null,
			find_order_number: '',
			dashboard: [],
			selected_complaint: null,
			history_list: [],
			total_pages: null,
			current_page: 1,
			complaint_data: [],
			machines: [],
			finded_orders: [],
			status_notes: '',
			new_complaint: {
				order_number: '',
				type_id: null,
				purchase_date: '',
				client_document: '',
				client_name: '',
				client_phone: '',
				client_email: '',
				department_id: null,
				province_id: null,
				district_id: null,
				address: '',
				consumption_id: null,
				description: '',
				amount: null,
				detail: '',
				request: '',

			},
			client_found: false,
			processing: false,
			selected_group_id: null,
			proof_files: [],
			viewer_file: null,
			viewer_payload: null,

			buttons: {
                add: { class: '', text: 'Añadir' },
                move_status: { class: '', text: this.selected_complaint?.status_id == 8 ? 'Finalizar orden': 'Actualizar estado' },
            },

			async init() {
				console.log('Inicializando Complaint...');

                const socket = Alpine.store('cache').socket;
				if (socket) {
					socket.removeAllListeners();
					socket.on("complaint_dashboard_update", async () => {
						await Alpine.store('cache').refresh('complaint_dashboard');
					});
				}	

				await Alpine.store('cache').fetchData([
					{ key: 'complaint_dashboard', url: '/complaint/dashboard', force: true },
					{ key: 'complaint_status', url: '/complaint/status' },
					{ key: 'complaint_types', url: '/complaint/options/type' },
					{ key: 'complaint_consumptions', url: '/complaint/options/consumption' },
					{ key: 'complaint_categories', url: '/complaint/options/category' },

					{ key: 'common_workers', url: '/common/workers' },
					{ key: 'common_vendors', url: '/common/vendors' },
					{ key: 'common_departments', url: '/common/departments' },
				]);

				// await Alpine.store('cache').verify();

			},

			formatShortDate(iso) {
				if (!iso) return "";
				const [y, m, d] = iso.split("-").map(Number);
				const date = new Date(y, m - 1, d);
				const months = ["ene.", "feb.", "mar.", "abr.", "may.", "jun.", "jul.", "ago.", "sep.", "oct.", "nov.", "dic."];

				return `${d} ${months[date.getMonth()]} ${y}`;
			},

			dateLabel(iso, fallback) {
				return iso ? this.formatShortDate(iso) : fallback;
			},

			handleEnterSend(e) {
				if (e.shiftKey) return;

				e.preventDefault();
				this.sendChat();
			},
			
			async newComplaint() {
				if (!this.new_complaint) return;
				
				if (this.processing) return;

				this.processing = true;

                const payload = { 
                    user_id: this.user.id,
					order_number: this.new_complaint.order_number,
					type_id: this.new_complaint.type_id,
					purchase_date: this.new_complaint.purchase_date,
					client: {
						document: this.new_complaint.client_document,
						email: this.new_complaint.client_email,
						name: this.new_complaint.client_name,
						phone: this.new_complaint.client_phone,
						department_id: this.new_complaint.department_id,
						province_id: this.new_complaint.province_id,
						district_id: this.new_complaint.district_id,
						address: this.new_complaint.address,
					},
					consumption_id: this.new_complaint.consumption_id,
					description: this.new_complaint.description,
					amount: this.new_complaint.amount,
					detail: this.new_complaint.detail,
					request: this.new_complaint.request,
                }

                try {
                    const response = await fetch(`${this.api}/complaint/new`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    
                    const jsonData = await response.json();
                    if (!response.ok) throw new Error(jsonData?.data?.message || 'Error en la solicitud');
                    
                    //this.$refs.terms.scrollTop = 0;
                    //this.step++;
                    this.resetOrder();
					Alpine.store('cache').hideModal('add');

                } catch (error) {
                    this.showError('add', error.message);
                } finally {
					this.processing = false;
                }
            }, 

			showError(btnKey, errorMsg) {
                const originalText = this.buttons[btnKey].text;
                const originalClass = this.buttons[btnKey].class;

                if (originalClass == 'error') {
                    return;
                }
                this.buttons[btnKey].text = errorMsg;
                this.buttons[btnKey].class = 'error';

                setTimeout(() => {
                    this.buttons[btnKey].text = originalText;
                    this.buttons[btnKey].class = originalClass;
                }, 1000);
            },

			async getProvince() {
				this.new_complaint.province_id = null;
    			this.new_complaint.district_id = null;

				await Alpine.store('cache').fetchData([
					{ key: 'common_provinces', url: `/common/provinces/${this.new_complaint.department_id}`, force: true },
				]);
			},

			async getDistrict() {
				this.new_complaint.district_id = null;
				
				await Alpine.store('cache').fetchData([
					{ key: 'common_districts', url: `/common/districts/${this.new_complaint.province_id}`, force: true },
				]);
			},

			scrollCommentsToBottom(behavior = 'smooth') {
				const box = this.$refs.commentsBox;
				if (!box) return;

				box.scrollTo({
					top: box.scrollHeight,
					behavior
				});
			},

			async sendChat() {
				if (!this.complaint_data.message || this.processing) return;
				this.processing = true;

				try {
					const response = await fetch(`${this.api}/complaint/chat/${this.complaint_data.id}`, {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
							"Authorization": `Bearer ${this.token}`,
						},
						body: JSON.stringify({
							comment: this.complaint_data.message,
						}),
					});

					const jsonData = await response.json();
					if (!response.ok) {
						throw new Error(jsonData?.data?.message || "Error enviando comentario");
					}
					const data = jsonData.data
					this.complaint_data.chats.push({
						id: data.id,
						comment: data.comment,
						commenter_id: data.commenter_id,
						commenter_name: data.commenter_name,
						commenter_image: data.commenter_image,
						created_at: data.created_at,
					});

					this.complaint_data.message = "";
					this.$nextTick(() => this.scrollCommentsToBottom());
				} catch (error) {
					console.error(error);
				} finally {
					this.processing = false;
				}
			},

			resetOrder() {
                this.new_complaint = {
					order_number: '',
					type_id: null,
					purchase_date: '',
					client_document: '',
					client_name: '',
					client_phone: '',
					client_email: '',
					department_id: null,
					province_id: null,
					district_id: null,
					address: '',
					consumption_id: null,
					description: '',
					amount: null,
					detail: '',
					request: '',
				};
            },

			onDragStart(complaint) {
				this.selected_complaint = complaint;
			},

			onDragOver(event, target_status_id) {
				event.preventDefault();

				if (this.selected_complaint.status_id == target_status_id || this.selected_complaint.status_id + 1 == target_status_id ) {
					event.currentTarget.classList.add('drag-over');
					event.dataTransfer.dropEffect = 'move';
				} else {
					event.dataTransfer.dropEffect = 'none';
				}
			},
			
			onDragLeave(event) {
				event.currentTarget.classList.remove('drag-over');
			},
			
			async onDrop(group_id) {
				document.querySelectorAll('.group').forEach(container => {
					container.classList.remove('drag-over');
				});
			
				if (!this.selected_complaint) {
					return;
				}
				
				if (this.selected_complaint.status_id == group_id) {
					this.selected_complaint = null;
					return;
				}

				this.selected_group_id = group_id;
				this.owner_id = null;
				this.seller_id = null;
				this.category_id = null;
				this.status_notes = '';
				Alpine.store('cache').showModal('status');
			},

			finish(service) {
				this.selected_complaint = service;
				this.status_notes = '';
				Alpine.store('cache').showModal('status');
			},

			async viewComplaint(complaint_id) {
				try {
					const response = await fetch(`${this.api}/complaint/view/${complaint_id}`, {
						headers: { 
							"Content-Type": "application/json",
							"Authorization": `Bearer ${this.token}`,
						}
					});
					const payload = await response.json();
					this.complaint_data = payload.data;
					Alpine.store('cache').showModal('view');
					this.$nextTick(() => this.scrollCommentsToBottom('auto'));
				} catch (error) {
					console.error('Error en la asignación:', error);
				}
			},

			addOrder() {
				Alpine.store('cache').showModal('add');
			},

			async viewHistory() {
				await this.firstPage();
				Alpine.store('cache').showModal('history');
			},
			
			async search() {
				this.find_order_number = '';
				this.finded_orders = []

				Alpine.store('cache').showModal('search');
			},

			async getHistory() {
				try {
					const response = await fetch(`${this.api}/support/history?page=${this.current_page}`);
					const data = await response.json();
					const jsonData = data.data || [];

					this.history_list = jsonData.list;
					this.total_pages = jsonData.pagination.pages;
				} catch (error) {
					console.error('Error fetching history', error);
				} 
			},

			async firstPage() {
				this.current_page = 1;
				await this.getHistory();
			},

			async lastPage() {
				this.current_page = this.total_pages;
				await this.getHistory();
			},

			async nextPage() {
				const new_page = this.current_page + 1;
				if (new_page > this.total_pages)
					return;
				this.current_page = new_page;
				await this.getHistory();
			},

			async prevPage() {
				const new_page = this.current_page - 1;
				if (new_page < 1)
					return;
				this.current_page = new_page;
				await this.getHistory();
			},

			canAdd() {
				return Alpine.store('cache').hasPermission('complaint', 'add');
			},
			canMove() {
				return Alpine.store('cache').hasPermission('complaint', 'move');
			},
			editAllowed() {
				return this.canAdd() || this.canMove();
			},

			async fetchClientData() {
				const document = this.new_complaint.client_document;
				if (!document) {
					this.new_complaint.client_id = '';
					this.new_complaint.client_name = '';
					this.new_complaint.client_phone = '';
					this.client_found = false;
					return;
				}

				try {
					const response = await fetch(`${this.api}/client/data/${document}`);
					if (!response.ok) {
						this.new_complaint.client_id = '';
						this.new_complaint.client_name = '';
						this.new_complaint.client_phone = '';
						this.new_complaint.client_email = '';
						this.client_found = false;
						return;
					}

					const data = await response.json();
					if (data.success) {
						this.new_complaint.client_id = data.data.id;
						this.new_complaint.client_name = data.data.name;
						this.new_complaint.client_phone = data.data.phone;
						this.new_complaint.client_email = data.data.email;
						this.client_found = true;
					} else {
						console.warn('Respuesta de API no exitosa.');
					}
				} catch (error) {
					console.error('Error al obtener datos del usuario:', error);
				} 
			},

			async updateStatus(resolved = false) {
				if (!this.selected_complaint) return;
				
				const status_id = this.selected_complaint.status_id;
				const owner_id = this.owner_id;
				const seller_id = this.seller_id;
				const category_id = this.category_id;
				const status_notes = this.status_notes;

				if (status_id == 2 && owner_id === null) {
                    this.showError('move_status', 'Selecciona un responsable');
					return;
				}

				if (status_id == 2 && category_id === null) {
                    this.showError('move_status', 'Selecciona una categoría');
					return;
				}

				const payload = {
					complaint_id: this.selected_complaint.id,
					notes: status_notes,
					resolved: resolved,

					owner_id: parseInt(owner_id),
					category_id: parseInt(category_id),
					seller_id: seller_id == "0" ? null: parseInt(seller_id),
					order_number: this.selected_complaint.order_number,
				};
				
				if (this.processing) return;
				this.processing = true;

				try {
					const response = await fetch(`${this.api}/complaint/move`, {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
							"Authorization": `Bearer ${this.token}`,
						},
						body: JSON.stringify(payload)
					});

					const jsonData = await response.json();
                    if (!response.ok) {
						throw new Error(jsonData?.data?.message || 'Error en la solicitud');
					}

					Alpine.store('cache').hideModal('status');
					this.selected_complaint = null;

				} catch (error) {
					this.showError('move_status', error.message);
				} finally {
					this.processing = false;
				}
			
			},
			async proofModal() {
				await this.loadProofFiles();
				this.viewer_file = null;
				this.viewer_payload = null;
				Alpine.store('cache').showModal('proof');
			},

			async loadProofFiles() {
				if (!this.complaint_data?.id) return;

				const complaintId = this.complaint_data.id;

				const res = await fetch(`${this.api}/complaint/attachments/${complaintId}`, {
					headers: {
						"Content-Type": "application/json",
						"Authorization": `Bearer ${this.token}`,
					}
				});

				const json = await res.json();
				const payload = json?.data ?? json;
				this.proof_files = Array.isArray(payload) ? payload : [];
			},

			async uploadProofFiles(evt) {
				const files = evt.target.files;
				if (!files || !files.length) return;

				if (!this.complaint_data?.id) return;
				const complaintId = this.complaint_data.id;

				const form = new FormData();
				for (const f of files) form.append("files[]", f);

				const res = await fetch(`${this.api}/complaint/attachments/${complaintId}`, {
					method: "POST",
					headers: {
						"Authorization": `Bearer ${this.token}`,
					},
					body: form
				});

				const json = await res.json();
				if (!res.ok) {
					// reuse your error UI (or show modal message)
					this.showError('move_status', json?.data?.message || "Upload error");
					return;
				}

				evt.target.value = ""; // reset input
				await this.loadProofFiles();
			},

			isImageFile(f) {
				const ext = (f?.ext || '').toLowerCase();
				return ['png','jpg','jpeg','webp','gif'].includes(ext);
			},

			isPdfFile(f) {
				const ext = (f?.ext || '').toLowerCase();
				return ext === 'pdf';
			},

			getInlineUrl(f) {
				// f.inline_url viene del backend tipo "/complaint/attachment/<id>?disposition=inline"
				// aquí lo convertimos a url completa
				return `${this.api}${f.inline_url}`;
			},

			async openAttachment(file) {
				this.viewer_file = file;
				this.viewer_payload = null;

				// pide preview al backend
				const res = await fetch(`${this.api}${file.preview_url}`, {
					headers: {
						"Content-Type": "application/json",
						"Authorization": `Bearer ${this.token}`,
					}
				});
				const json = await res.json();
				const payload = json?.data ?? json;

				// normaliza urls
				if (payload.kind === "url") {
					payload.url = `${this.api}${payload.url}`; // inline
				}

				// siempre tener download_url en viewer_file
				this.viewer_file.download_url = `${this.api}${file.download_url}`;

				this.viewer_payload = payload;
				Alpine.store('cache').showModal('attachment');
			},
		}));
		

	</script>







	<style>
		#modal-attachment {
			z-index: 50;
		}
		.file-card{
			padding: 0.75rem;
			display: flex;
			flex-direction: column;
			justify-content: center;
			gap: 0.25rem;
		}
		.file-ext{
			font-weight:700;
			font-size:12px;
			opacity:.8;
		}
		#modal-proof {
			z-index: 40;
