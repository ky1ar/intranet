<!DOCTYPE html>
<html lang="es-PE">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-title" content="Krear 3D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#F07E46">
    <title>Krear 3D</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/images/logo-256a.png">
    <link rel="apple-touch-startup-image" href="/static/images/logo-256a.png">
    <link rel="icon" href="/static/images/favw.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <script src="/static/js/zxing-browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinecone-router@6.2.1/dist/router.min.js" ></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <!--<link rel="stylesheet" href="static/css/style.css?v=0.1.0.7215">-->
    <link rel="stylesheet" href="/static/css/new.css?v=1.4.0x">
</head>

<body class="container" x-data="data" :class="{'modal-open': $store.cache.hasActiveModals()}">
    <script src="/static/js/firebase-config.js?v=1.4.0x"></script>
    <script src="/static/js/main.js?v=1.4.0x"></script>

    <template x-route="/" x-handler="loginVerify" x-template.preload.target.content="/views/login.html"></template>
    <template x-route="/home" x-template.preload.target.content="/views/home.html"></template>
    <template x-route="/attendance" x-template.preload.target.content="/views/attendance.html"></template>
    <template x-route="/schedule" x-template.preload.target.content="/views/schedule.html"></template>
    <template x-route="/guest" x-template.preload.target.content="/views/guest.html"></template>
    <template x-route="/training" x-template.preload.target.content="/views/training.html"></template>
    <template x-route="/board" x-template.preload.target.content="/views/board.html"></template>
    <template x-route="/support" x-template.preload.target.content="/views/support.html"></template>
    <template x-route="/tracking" x-template.preload.target.content="/views/tracking.html"></template>
    <template x-route="/logistics" x-template.preload.target.content="/views/logistics.html"></template>
    <!--<template x-route="/logistics/:client_order_id" x-handler="logisticsHandler" x-template.preload.target.content="/views/logistics.html"></template>-->
    <template x-route="/driver" x-template.preload.target.content="/views/driver.html"></template>
    <template x-route="/clients" x-template.preload.target.content="/views/clients.html"></template>
    <template x-route="/machines" x-template.preload.target.content="/views/machines.html"></template>
    <template x-route="/marketing" x-template.preload.target.content="/views/marketing.html"></template>
    <template x-route="/purchases" x-template.preload.target.content="/views/purchases.html"></template>
    <template x-route="/complaint" x-template.preload.target.content="/views/complaint.html"></template>
    <template x-route="/imports" x-template.preload.target.content="/views/imports.html"></template>
    <template x-route="notfound" x-template.preload.target.content="views/404.html"></template>

    <template x-if="$store.cache.user.id">
        <div>
            <div id="sidebar">
                <div class="home-logo white-frost" href="/home">
                    <img class="home" src="/static/images/single-logo.svg" alt="Logo" width="32" height="32">
                </div>
                
                <ul class="white-frost">
                    <template x-for="page in $store.cache.getPages()" :key="page.name">
                        <li :class="{'active': $store.cache.active_page == '/' + page.name}">
                            <a :href="'/' + page.name">
                                <img width="20" height="20" :src="'/static/images/icons/'+page.image+'.svg'" alt="">
                            </a>
                            <span x-text="page.label"></span>
                        </li>
                    </template>
                </ul>

                <div class="config white-frost">
                    <div class="reglamento mobile-hide"
                        @click="$store.cache.openPdfModal('/static/pdf/reglamento1.pdf', 'Reglamento')"
                    >
                        <img width="22" height="22" src="/static/images/icons/book.svg" alt="">
                        <span>Reglamento</span>
                    </div>
                    <img alt="user" @click="$store.cache.toogleSidebarMenu()" class="user hover-opacity" :src="'/static/images/uploads/users/' + $store.cache.user.image" width="40" height="40">
                </div>

                <div x-show="$store.cache.sidebar_menu" x-transition.duration.300ms x-cloak @click.outside="$store.cache.hideSidebarMenu()" class="frost menu">
                    <img alt="user" class="image" :src="'/static/images/uploads/users/' + $store.cache.user.image" width="80" height="80">
                    
                    <div class="text">
                        <b x-text="$store.cache.user.name"></b>
                        <span x-text="$store.cache.user.department_name"></span>
                        <span class="ver" x-text="`versión ${localStorage.getItem('app_version')}`"></span>
                    </div>

                    <div class="controlss">
                        <!--<div class="image hover-opacity">
                            <img alt="controls" src="/static/images/settings.svg" width="16" height="16">
                        </div>-->

                        <div class="white hover-opacity"
                            x-show="!$store.cache.notifications_enabled"
                            @click="$store.cache.requestPushPermission();">
                            Activar
                            <img alt="controls" src="/static/images/notifications.svg" width="16" height="16">
                        </div>
                        
                        <div class="white mobile-show" @click="$store.cache.openPdfModal('/static/pdf/reglamento1.pdf', 'Reglamento')">
                            Reglamento
                            <img alt="controls" src="/static/images/icons/book.svg" width="16" height="16">
                        </div>

                        <div class="button hover-opacity" @click="$store.cache.logout()">
                            Cerrar sesión
                        </div>
                    </div>
                </div>
            </div>

            <div
                x-show="$store.cache.isVisibleModal('push-info')"
                @mousedown.self="$store.cache.hideLastModal()"
                class="modal-wrap"
                id="modal-push-info"
                x-transition:enter="modal-enter"
                x-transition:enter-start="modal-enter-start"
                x-transition:enter-end="modal-enter-end"
                x-transition:leave="modal-leave"
                x-transition:leave-start="modal-leave-start"
                x-transition:leave-end="modal-leave-end"
                x-cloak
            >
                <div class="modal glass2" @click.stop>
                    <div class="modal-grabber">
                        <div class="modal-grabber-bar"></div>
                    </div>
                    
                    <img alt="user" src="/static/images/uploads/users/00000000.jpg" width="64" height="64">

                    <span class="title">Activa tus avisos</span>

                    <p x-html="$store.cache.pushHelpMessage()"></p>

                    <div class="fields">
                        <button class="button hover-opacity"
                                @click="$store.cache.requestPushPermission(); $store.cache.hideModal('push-info')">
                            Activar notificaciones
                        </button>
                    </div>
                </div>
            </div>

            <div
                x-show="$store.cache.isVisibleModal('pdf-viewer')"
                @mousedown.self="$store.cache.closePdfModal()"
                class="modal-wrap"
                id="modal-pdf-viewer"
                x-transition:enter="modal-enter"
                x-transition:enter-start="modal-enter-start"
                x-transition:enter-end="modal-enter-end"
                x-transition:leave="modal-leave"
                x-transition:leave-start="modal-leave-start"
                x-transition:leave-end="modal-leave-end"
                x-cloak
            >
                <div class="modal glass2" @click.stop>
                    <div class="modal-grabber">
                        <div class="modal-grabber-bar"></div>
                    </div>

                    <div style="height: 100dvh;">
                        <iframe :src="$store.cache.pdf_url ? ($store.cache.pdf_url + `#view=FitH`) : ``" style="width:100%; height:100%; border:0;" loading="lazy"></iframe>
                    </div>
                </div>
            </div>

        </div>
        
    </template>
    
    <div id="content" :class="{'sidebar': $store.cache.sidebar}"></div>

</body>
</html>
