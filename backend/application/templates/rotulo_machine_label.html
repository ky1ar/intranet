<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <style>
    @page {
      size: 15cm 10cm; /* width height */
      margin: 0;
    }

    @font-face {
      font-family: "Outfit";
      src: url("static/fonts/Outfit-ExtraBold.ttf") format("truetype");
      font-weight: 800;
      font-style: normal;
    }

    html, body {
      width: 15cm;
      height: 10cm;
      margin: 0;
      padding: 0;
      background: #fff;
      font-family: "Outfit", Arial, sans-serif;
      color: #000;
    }

    .label {
      width: 15cm;
      height: 10cm;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .label td {
      border: 0.06cm solid #000;
      padding: 0 0.25cm;
      text-align: center;
      vertical-align: middle;
      overflow: hidden;
    }

    .col-label { width: 4.5cm; }
    .col-mid   { width: 5.5cm; }
    .col-right { width: 5cm; }

    .row-label {
      font-size: 0.65cm;
      font-weight: 800;
      letter-spacing: 0.02cm;
    }

    .value {
      font-size: 0.9cm;
      font-weight: 800;
      line-height: 1.05;
      word-wrap: break-word;
    }

    .id-number {
      font-size: 1.9cm;
      font-weight: 800;
      line-height: 1;
    }

    .detail {
      font-size: 0.9cm;
      font-weight: 800;
      line-height: 1.05;
      word-wrap: break-word;
    }

    .logo-cell {
      text-align: center;
      vertical-align: middle;
    }
    .logo-mark {
      width: 2.6cm;
      height: 2.6cm;
      display: block;
      margin: 0 auto 0.1cm auto;
    }
    .logo-text {
      font-size: 0.55cm;
      font-weight: 800;
      letter-spacing: 0.08cm;
    }
  </style>
</head>
<body>
  <table class="label">
    <colgroup>
      <col class="col-label">
      <col class="col-mid">
      <col class="col-right">
    </colgroup>

    <tr style="height:2cm;">
      <td class="col-label row-label">ID</td>
      <td class="col-mid id-number">{{ data.machine_id }}</td>
      <td class="col-right logo-cell">

        <div class="logo-text">KREAR 3D</div>
      </td>
    </tr>

    <tr style="height:2cm;">
      <td class="col-label row-label">CATEGORIA</td>
      <td class="value" colspan="2">{{ data.category }}</td>
    </tr>

    <tr style="height:4cm;">
      <td class="col-label row-label">PRODUCTO</td>
      <td class="value" colspan="2">{{ data.product }}</td>
    </tr>

    <tr style="height:2cm;">
      <td class="col-label row-label">DETALLE</td>
      <td class="detail" colspan="2">{{ data.detail }}</td>
    </tr>
  </table>
