<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <style>
    @page {
      size: 7.3cm 25cm; /* width height */
      margin: 0;
    }

    @font-face {
        font-family: "Outfit";
        src: url("static/fonts/arial_black.ttf") format("truetype");
        font-weight: 800;
        font-style: normal;
    }

    html, body {
      width: 7.3cm;
      height: 25cm;
      margin: 0;
      padding: 0;
      background: #fff;
    }

    body {
      position: relative;
      overflow: hidden;
    }

    /* QR exacto: inicia a los 2cm */
    .qr {
      position: absolute;
      left: 0;
      top: 2cm;
      width: 7.3cm;
      height: 7.3cm;
      object-fit: contain;
      image-rendering: pixelated;
      display: block;
      z-index: 1;
    }

    /* Líneas horizontales exactas */
    .line {
      position: absolute;
      left: 0;
      width: 7.3cm;
      height: 0.05cm;
      background: #b6b6b6;
      z-index: 2;
    }

    /* 2cm */
    .line-top-2 { top: 1.975cm; }

    /* 9cm */
    .line-after-qr { top: 9.275cm; }

    /* 11cm */
    .line-1 { top: 11.275cm; }
    .line-23-7 { top: 23.675cm; }

    .line-t1 { top: 15.975cm; }
    .line-t2 { top: 20.975cm; }

    .number {
        position: absolute;
        left: 50%;
        transform: translate(-50%, -50%);
        margin: 0 auto;
        color: #000;
        z-index: 2;
        font-size: 2cm;
        font-weight: 800;
        font-family: "Outfit";

    }
    .number-1 { top: 10.3cm; }
    .number-2 { 
        font-size: 5.25cm;
        top: 13.8cm;
     }
     .number-3 { 
        font-size: 5.25cm;
        top: 18.5cm;
     }

     .arrow {
        position: absolute;
        left: 50%;
        z-index: 3;
        transform-origin: center center;
    }
    .arrow-1 { 
        top: 22.175cm;
        transform: translate(-50%, -50%) rotate({{ data.arrow_rotate_deg or 0 }}deg);
     }
     .circle {
      position: absolute;
      width: 1cm;
      height: 1cm;
      transform: translate(-50%, -50%);
      border: 0.05cm solid #b6b6b6;
      border-radius: 50%;
      background: transparent;
      box-sizing: border-box;
      z-index: 2;
    }
    .circle-0 {
      top: 1cm;
      left: 2.4cm;
      width: 4.8cm;
      border-radius: 0;
    }
    .circle-1 {
      left: 2cm;
      top: 1cm;
    }
    .circle-2 {
      right: 1cm;
      top: 1cm;
    }
    .circle-3 {
      left: 2cm;
      top: 24.2cm;
    }
    .circle-4 {
      right: 1cm;
      top: 24.2cm;
    }
  </style>
</head>
