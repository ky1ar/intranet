services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_dev
    environment:
      - FLASK_APP=main.py
      - FLASK_ENV=development
    networks:
      - krear3d
    volumes:
      - ./backend:/application
    ports:
      - 6001:6001
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:6001/"]
      interval: 30s
      timeout: 10s
      retries: 5
    platform: linux/amd64
    restart: always

  redis:
    image: redis:latest
    container_name: redis_dev
    networks:
      - krear3d
    restart: always
    command: redis-server --requirepass "150723"

  support:
    build:
      context: ./support
      dockerfile: Dockerfile
    container_name: support_dev
    networks:
      - krear3d
    volumes:
      - ./support:/usr/share/nginx/html
    ports:
      - 8003:80
      - 4003:443
    restart: always

  intranet:
    build:
      context: ./intranet
      dockerfile: Dockerfile
    container_name: intranet_dev
    networks:
      - krear3d
    volumes:
      - ./intranet:/usr/share/nginx/html
    ports:
      - 8004:80
      - 4004:443
    restart: always

networks:
  krear3d:
    driver: bridge
